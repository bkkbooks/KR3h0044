body:
  text: 珊瑚木難卷四明朱存理編宋趙子固梅竹詩里中康節菴畫墨梅求詩因述本末以示之逃禪祖花光得其韻度之清麗間菴紹逃禪得其瀟灑之布置回觀王靣而鼠須已自工夫較精緻枝枝例作鹿角曲生意由來端若爾所傳正統諒末節捨此的傳皆偽耳僧定花工枝則粗夢良意到工則未女中却有鮑夫人能守師繩不輕墜可憐聞名未識靣云有江南畢公濟季衡醜粗惡拙祖弊到雪篷觴濫矣所恨二王無臣法多少東鄰效西子是中有趣豈不傳要以眼力求其旨踢鬚止七萼則三點眼名椒梢鼠尾枝分三疊墨濃淡花有正背多般蕊夫君固已悟筌蹄重説偈言吾亦贅誰家屏障得君畫更以吾詩跋其底康子領此詩又有許梅谷者仍求又賦長律濃寫花枝淡寫梢鱗皴老幹墨微燋筆分三踼攢成瓣珠暈一圎工點椒糝綴蜂鬚凝笑靨穩拖鼠尾施長條盡吹心側風初急猶把枝埋雪半銷松竹襯時明掩映水波浮處見飄颻黃昏時候朦朧月清淺溪山長短橋閙裏相挨如有意靜中背立見無聊筆端的皪明非畫軸上縱橫不是描頓覺坐成春盎盎因思行過雨蕭蕭從頭總是楊湯法拚下工夫豈一朝王翠岩寫竹求詩亦與古畫畫物無定形隨物賦形皆逼真其次祖述有師繩如印印泥隨前人尚疑屋下重作屋參以新意意乃足晉魏而來幾百年羲獻斷絃誰解續何况髙束李杜編江湖競買新詩讀願君種取渭川一千畝飽飯逍遙步捫腹風晴煙雨畫入君心胸吐出毫端自森肅貟大夫來子章何碌碌三詩蓋梅竹譜也然胸中無詩者見之扞格翠岩得詩後數月忽問余曰所求畫竹詩耳乃及李杜編何也余笑曰非君不解世無人為君言耳作詩必此詩定非知詩人不聞斯語耶皇甫表工學於斯聞余詩欣然求書正恐胸中無詩種又扞格也識者為子一撥豫老不事多言云景定元祀良月六日所寓邸乃鹽橋王氏家二鼓燭下書諸王孫趙孟堅子固彛齋居士記跋吾友趙子固以諸王孫負晉宋間標韻少遊戲翰墨愛作蕙蘭酒邊花下率以筆研自隨人求畫與無靳色往往得之易藏之多人亦未之寶也晚年步驟逃禪工梅竹咄咄逼真豫自江右歸頗悟逃禪筆意將與之是正而子固死矣鄉人云子固近日聲價頓偉片紙可直百千豫未敢謂信一日鬻書者擕數紙來少室果印所聞豈人情不貴於所有而貴於所無耶皇甫君步趨子固者也出子固論畫真迹一卷及其所自作蕙蘭躍然而觀感慨係之吁子固不可作矣倣佛子固者斯可矣皇甫君其勉之咸淳丁卯五月晦日隆禮書于春詠堂葉士則豫幼年侍彛齋兄逰見其得逃禪小軸及間菴橫卷卷舒坐卧未嘗去手是以盡得楊湯之妙先兄好學耽書每作一事不造其精處則不已也平生留意翰墨之外他無一毫世俗好志之專必工必精此豈晚學之所能哉余作此君彛齋兄每亦許之雖法大蘇然筆意之傳實自彛齋兄皇甫表昔侍彛齋遊所作蓋有源流先兄已矣君其勉之咸淳戊辰小暑日書于清逺樓竹所趙孟淳子真昔李伯時表弟喬仲常親受筆法遂入能品今喬筆世甚罕有其貴重殆不減龍眠用志不分乃凝于神子昌勉之哉子昌年少志鋭深造而自得之自成一家可也李喬之事又何足尚云咸淳戊辰良月天台董楷識字正翁號中齋水峯董氏畫謂之無聲詩乃賢哲寄興有神品有能品神者才識清髙揮毫自逸生而知之者也能者源流傳授下筆有法學而知之者也伯氏彛齋天姿穎悟人品既髙以其文章書法之緒餘遊戲翰墨為衆芳寫生運筆如飛氣韻清拔生動造妙其入神品者乎乙卯春子昌至自毗陵彛齋留侍筆硯欽承師事口授筆傳摹倣弗釋是秋彛齋逰壑翁門葉子昌改館於髙丈之煙雨樓住遊間雅時而習之心得手應漸入佳趣後數年彛齋奬之日工於斯傳子固之餘芳者其子昌乎彛齋已矣子昌之筆日進見似之者而喜子昌袖彛齋畫法詩卷求豫著語余深嘉其志之篤欲勉其藝之精超乎能品援山谷先生題宗室大年畫卷云大年學東坡作竹石殊有思致筆雖覺柔年少故耳使大年耆老自當十倍於今精義入神子昌勉諸歲在戊辰中秋趙孟濚題字君澤號直齋僕與子固交最密得子固詩章畫墨尤夥寶祐丙辰子固與正翁校書法纍數十紙僕把玩不釋手於是篝燈摹拓一夕而竟厥明子固驚喜援筆成跋幾二千言兵後所藏散失而二君亦已矣一日皇甫子昌偕僕山隂袖出子固景定庚申所贈梅竹詩譜及正翁跋語三復之餘如見顔色子昌實子固中表正翁實僕內兄弟見似人而喜於焉乃重為感慨云後二十九年戊子中夏汴陽錢應孫定之父菊泉書林余兒時在鄉里斛峰先生齋中見墨蘭數本筆法飄逸可愛知有浙右趙子固名矣所恨其時未知此趣不能鑒賞及長大宦遊四方於江西士友間初見楊逃禪畢公濟墨迹遊戲天真清絶令人意消及來禾興知子固為郡人深切自喜首問其喬木故家則渺然無處詢訪禾興為郡為浙右最陋邦以財雄酒色相尚而好古博雅者絶無其人抱璞荆山至寶橫道可重太息賴有别駕息齋李侯中原之秀為方今天下名人公餘得遊從論書法足以破除塵俗然侯止留心於竹不甚及它品為悵一日有皇甫秀才相過形神骯􅗣語言如泉絶不類秀才自言能畫梅蘭水仙聞知為子固表弟毗陵寓客也得子固親傳妙處往往過之青出於藍與豫論畫中三昧無不中的因出子固傳授詩翰一卷于豫咄咄逼人豈鄭虔三絶足以並其有自來矣是可寶之借觀逾旬不忍去手豫謂子固不特畫蘭水仙為古今第一若書若詩皆入能品豈學力可到耶噫吾雖不飲酒知酒莫如我也豫嘗同皇甫君遊俱徒步市中但見其精彩皪人步履如飛問其年曰七十有三矍鑠哉是翁也抑真水仙中人乎喜之不足特為書相見本末于卷尾以還他時瀛洲會上水仙宫中婆娑政坐諸君耳邂逅拈起此段公案亦足以相顧一笑也大德五年歲在辛丑月建卯鄱陽吳亮采熙載書于嘉興寓所官舍集雅堂亞之詩與此卷借沈維時所録丙午七月一日植芳堂記余友生沈子復吉授經豫門又究習岐黃氏之學于世之名能者治其所居之堂扁曰植芳請記於豫欲大其説余謂夫取諸身者莫若喻諸物取諸物者莫若驗諸身故志潔矣其稱於物也必芳學博矣其遊於藝也必芳行成矣其發於言也必芳言達矣其流於後也必芳今欲以植木之術而為此身之喻植得其地而生生則芳且榮矣然則此身之主宰者在吾方寸之地培之養之榛穢淨盡其所得於取物之效者近之事又推之及物推之及人何莫非學也豈世之所云小道者哉昔之語植芳者曰董仙氏曰蘇仙氏董氏治人疾疾止俾人植一樹杏計實易粟以濟諸貧蘇氏將仙去語家人植橘鑿井曰後此必有癘癘吾人者與人橘一葉水一器即愈後果驗彼二人者以仙術寓醫然迹其心亦可謂博施矣故後之善植者必稱董蘇云今生之植將不在乎此而在乎彼生起謝曰名言也書以為記會稽鐵史楊維禎亷夫撰世莫賢於董奉種杏亷於取財豫獨謂奉之種杏乃其巧於取財也取財於人至於再至於三則已貪矣况不義乎取財於天雖歲取之不以為虐况所推與又一於義得不謂之亷乎二者之取其利一也然世知取於人而不避其貪而不知取於天亦不失於亷此奉之所以髙出千載而人不及之也吳中沈君復吉儒家人也幼嗜書長而精醫不惟得董之學而又得董之心然嫌以董自負故榜其居藥之所曰植芳而不曰種杏大凡以術鳴未有不嚴其視瞻髙其已能雖司馬季主猶不免此惟儒者則不然以是觀之吾於復吉則為儒醫有不待徴於色卜於言而無疑矣加以亷於取財義之聲著於人人則其去俗工衒藝以求售者奚啻千百哉雖然名可辭也實不可辭也苟辭其名而并去其實吾恐君之德不竟且不能無於陵仲子之譏則又過矣觀鐵崕楊先生文故既美其德而又規以中庸之道云洪武己未八月既望登仕佐郎國子助教江隂孫作識于闕中都國學之西齋銘有序人貴自樹立流芳遺臭皆由己而已蘭室鮑肆隨所入而吾身之得喪榮辱係焉故屈大夫慕芳潔而畦蘅陸內史潄芳潤而遊藝可謂能自樹立者矣彼海上夫迷臭為芳而逐之不止至穢德腥聞過者莫不掩鼻而嗟與栁子所傳江湖浪人奚以異哉雲間沈君文舉子復吉秀而文文舉命其所居堂為植芳既已勉其自立而流芳於世而乞銘于友人申屠衡以交修之銘曰孝子顯親在乎植身植之以芳德聞惟馨彼愚無知芳臭莫辨薰蕕同藏蘭芷亦變其變何由不能自植失身汚穢曷以自滌沈氏有子亦既肯堂孜孜進修殖學無忘仰止前賢或潄或沐潔已潤身以繼芳躅申屠衡針瞻彼草木匪植不芳其植維何毋揠毋荒本浮則瘁膚爪則傷朝培夕溉乃蕃乃昌人胡不樹望洋馳騖德義罔修節槩安傅詭隨詐謀絺章繪句誕炫其能曽莫豫步雲間多彥復吉乃賢搆堂志顔植芳允鐫懋學敦行動遵古先復究岐黃診視瞭然氣運既明沉痾屢痊橘泉杏實流譽遺編子擴其功曷止蟬聨黎庶嗸嗸願起顛連勉焉宏濟百世斯傳同郡王基詩嘉樹發幽芳依依自舒榮陽條接隂穎芬馥播前楹之人事髙潔坐閲岐黃經探源潄清潤遡流承德馨慨彼蚩蚩氓戕賊壞天形捐軀齊草腐遺臭汚編青以兹生物理會我惻隱情熙熙布春陽靄靄登素齡流芳被草木因人植嘉言殷弼猗蘭被九畹佳蕙滋百疇荃蘅與杜茝羅生交綢繆俟時苟不利蕪穢將誰尤朝吾芟宿莽夕吾溉清流兾兹枝葉茂充子雜珮酬援琴發清商揚舲泛中洲美人隔南浦延佇增離憂誓言寄所思川路良邈悠恆恐年不與鶗鴂鳴先秋隂風集中野衆芳委林丘蘭芷變不芳菉葹漫道周靈均去已久千載誰與儔英英雲間彥雅嗜窮冥搜蘼蕪集逺思再感王孫遊何所無芳草子獨良好修願言閟英采以俟知者求畨陽甘璞植德期後昌種樹期後芳欽爾種植心躋世咸夀康良闕在旦原野麗春光種橘惟盈井種杏必達岡橘盛引靈泉杏熟致餱糧羣物廣所惠髙門屹相望恭敬古人意永矣福履將越人唐肅髙堂新搆碧山隅緑髮仙人好隱居橘葉秋香浮石井杏隂春暖繞庭除百年種德知能好奕世流芳信不虛老我何時參妙訣東風門巷引柴車越人黃常翼翼髙堂淮水潯亭亭嘉樹已成隂芝蘭佳氣晴熏戶金石丹光夜出林招隱且容髙士傳衛生應得古人心故家喬木今何在信是當年雨露深雲間管訥槖駝善種樹深得養人術宋人揠其苗苗稿死大劇勉彼植芳士鑒兹得與失非加培植功曷及滋蔓力湛湛朝雲晞靄靄春暉白光浮紅杏林香動幽蘭室令德擬同芳修名當自立曽上君子堂微言聊暫述吳郡樊圃髙堂何渠渠衆芳列前楹羅坐雜蘭芷碧葉間紫莖蘇井誰可比董林安足稱若人休文孫揚芬藹簮纓厥子乃肯構樹德家道承羌吾事姱節採秀擷蘭英托根一失所不如蕭艾榮薰蕕世莫辨君子匪攸寧良時難驟得捐珮緬豫情閩中王舉謂人最靈智衛生每苦拙所懼非飢寒將養不得節達人解其會在世無所須羲農去我久空嘆將焉如念之動中懷積善云有報藥石有時間詩書敦夙好藹藹堂前林灼灼葉中花枝條始欲茂春風扇微和弱湍馳文魴靈鳯撫雲舞坐止髙隂下神淵瀉時雨爾從山中來相見無雜言赤泉給我飲乃言飲得仙老夫有所愛養色含津氣遙遙望白雲蒼蒼谷中樹吳郡金珉集陶句春陽被皋陸時雨浹初晨荷鉏臨前除闢壤尚荒榛藝本日成列培根繁竒芬條枝及時榮惠蕚韡以分服綵憩嘉蔭端居離垢氛眷兹世葉繁德馨惟日新興言用棄穢庶以樂吾真臨川李鎬秀出東陽裔芳流自百年種來同古史封植豈韓宣術妙醫中最名香肘後傳滿頭惟白髮待子為重玄州來朱復又銘并序吳淞沈復吉氏好修者也既稔庭訓又熟岐黃書已人疾暇則植衆芳堂下芳葩更熒微馨迭浮因扁其堂曰植芳間徵豫言豫言菽粟麻枲用物也必植而後成衆芳玩物也奚植之為哉復吉之意殆謂衆芳之託於林谷間者固不假乎人也然而日爍霜叨有幸存者焉有夭折者焉其植焉者自芽茁至於鬱茂必培之溉之養之燠之俾氣力固生生之意蔑以息也若是則植而遂其生者豈非吾以藥石夀夫人之比乎彼自生自有不假乎人者又非人之不仰藥石而信夫天之比乎吁復吉其知養生之道者歟至若比德君子特復吉劵內事耳兹不暇論為銘之曰衆芳之生靡賤靡貴根柢淺深悉胚元氣維此沈氏取而植之順物之性相土之冝瘁者使榮么者使碩金之玉之贊天地之德勿愛而迥忽而捐斯盡夫吾道斯全夫彼天四明烏斯道撰又詩沈也江湖豪俊客藥術由來妙無敵世人往往推神功轉覺流聲動京國茅堂雅構淮水濵開林種杏春紛紜香風東來拂曙影芳葩盡散胭脂雲當軒自把瑶軫促發興時時理清曲客來丹實每同餐恥學廬山據斗粟懸壺負局闕徒然逺引逃空名何如植芳住闤闠奕世樹德蘇羣生玉塵霞實世罕有哲人不吝千金售碎錦叢深酣畫闕青箱每為軒農究我生濩落亦已久弱質憂癢愧蒲栁何當載酒看生紅共子幽忩論肘後金華何與雅志葉幽潔蒔芳此堂隂端居寡俗好庶得觀物心菀彼徑寸苗弱質恐不任靈雨及時降春榮萋以森晨興荷吾鉏消搖步前林俟時冀明采敢使蕪穢侵靈均世云逺髙蹤邈難尋興言遺逺者愧匪瑶華音天台林右幽人淡無為植芳探所得蕭艾洊鋤耘芝蘭日盈積青陽齊玄象百彚含秀色時當讀書暇適意還杖策馨香襲衣袂笑掇愒盤石豈無遺世姿療病斯服食遐齡慕松喬長揖謝塵迹於兹生意深終當適其適山隂朱武荷鉏破苔碧繞屋蒔蘭蓀時雨沛然至衆芳日已蕃清晨縱遊目紅紫羅繽紛稠花灑雲霧含光射晴暾叢叢藴生意葉葉開陽春馨香溢忩户蒼翠沾衣巾坐久觀物化見兹天地仁乃知遂其性不在灌溉頻眷彼南國叟私憂何太勤爪膚驗榮悴握本灌疏繁自謂助之長詎識喪其真所以未霜雪往往皆湮淪我知慕間雅於此頗有聞顧乏尺寸土春來廢耕耘豈無抱甕力目斷鄉山雲何時謝世鞅願卜爾為鄰洪武庚申孟夏七日永嘉林鼎書于朋易官舍東家豪華勢薰天名園第宅相鈎連竒花異卉看不盡主翁每作花中仙西家買盡膏腴田桑麻極目如秦川所收貨利已山積况兼歲歲遭豐年東家一朝成瓦礫西家亦復無人煙豫友華亭沈復吉却向鳯陽開藥室年來雖誦岐黃書尤自胸中好儒術有地不種果與花有田不栽桑與麻常時高掉活人手旬日可到千百家當知種芳乃種德無力栽培有餘力傾摧已作舊枝條憔悴還成好顔色植芳只銷方寸餘萬頃田園竟何益我知種者有自來此芳本自前人栽德澤連綿想無己子既傳孫又傳子會稽馬弓元聖製醫術功與天壤俱達人識其然昧者徒拘拘沈君文墨士乃是俞扁徒鴻寶祕淮南騰聲在天都嘗讀養生論頗窮種樹書開徑十餘畝衆芳羅前除日出輒抱甕興來時荷鉏封植不爽節生意紛已敷驗兹草木性悟彼造化樞茫茫六合內有生同一初仁哉軒岐心誓欲濟康衢奈何韓葛輩但復為身圖乘化遺白雲夭札竟接塗我乏經濟具對子空嘆吁不知醫國士舉世當有無楚雨霽南嶠春光薄行車神方我欲究明當造君廬天台許伯放又記一元之氣播流於萬物周運於人身其生生之理未嘗有異也故善養生者不觀諸已恆有驗諸草木其曰彼鬱然而暢茂繁然而華實生生之理為之也而吾之身獨無生理乎於是調之護之甚謹惟恐一隙之失以夭其生故其氣充而容寂雖至老猶如壯盛時平易恬淡邪氣不能襲蹈水火不能變如古至人者亦豈他道哉能順其生而已衆人昧昧焉莫之或察瘁精神於形欲挫明虛於是非恣縱燋亂使本然之生危如一髮猶草木當春夏之交見戕於斤斧聖人懼焉於是設醫藥之方物取草木味取甘辛量人之疾而投之以復其生意嗚呼其亦仁矣哉惜乎世之醫者皆希世苟處不足以盡知聖人之教也使生生之意反見害於草木之性豪毛之失千里之繆果誰之過歟吾未嘗不慨然為世太息也華亭沈復吉氏通先儒書尤精心於醫術研幾索微恍乎有得嘗曰醫譬如植木也能順木之生則其性可茂無失人之生則其身可壯故顔其堂曰植芳此復吉之髙世之醫所以為未及也歟或謂復吉之植芳亦猶蘇耽之橘井夫人之病有萬不同表裏輕重邪滿虛實各有其證而槩欲以一味之藥攻之非惟不足以復其生適足以害其生而已借曰彼神仙幻變之術可也而使復吉躡其故蹤而為之其可得哉人見其事竒怪舉以贊復吉之髙殊不知醫者之髙固不在此能勿失之生則善矣復吉以堂記為請豫故樂為書之且以勸世之醫者也洪武庚申二月初吉將仕郎闕府紀善天台王璞記雲間沈復吉來居於中都東市口以三聖人之學鳴作堂以居問名於尊翁文舉父文舉以植芳扁之豫嘗過焉見其崇簷層砌髙下中度而忩户洞開方席靜設足以延廣爽而滌塵坌也左右前後芳葩幽蕤丹紅雜而文章爛也淮天晴旭芳馥薰蒸而融液秀徹精氣入而粗穢除也因起而謂復吉曰此豈求名而弗得者耶夫芳之為言薰也薰與蕕對稱而不以相入猶小人之不並君子也薰蕕之莫辨也尚矣矧有知所植芳者哉昔屈大夫著離騷以芳馨為仁為義為君子而惡臭為讒為佞為小人是非取舍固有所分矣然而鶗鴂既鳴蘭芷變而荃蕙化矣紛吾有此內美將焉珮謇吾法夫前修將焉程乎此原所以不忍屈心折志於上官靳尚之徒而甘從彭咸之所居焉乃今聖運休明賢才彚進復吉在輦轂下晦迹不耀而芳香自珍乃若有同於楚大夫之為者意果安在哉噫君子之於世亦觀其所處焉爾原以讒見逐者也三后之純粹原固不得而見之矣而其言一則曰苟得列乎衆芳一則曰哀衆芳之蕪穢忠國愛君之心實拳拳焉乃今沈氏一門父子之賢堂構之重所以命名者若此蓋因其濟人利物之心豐殖其胤祚使盡夫人力之至以責效於天耳夫其心之所存道之所存也方之屈大夫其孰多乎哉且夫天地以生物為心風霆之鼓動雨露之滋息有不知其所以然者生物既遂紛紛總總不能以一端名也有人焉通其理而神其用天地之心在我矣心即仁也仁即所謂德也植芳斯植德矣德盛則仁熟矣德之盛仁之熟馨香之聞豈特一堂之上哉繫之以辭曰巋哉斯堂紛其植兮芎蓍參苓間芷术兮靈厖夜吠變殊質兮天風斯征芬其苾兮孰其擷之筐筥積兮以禴以蒸或炮炙兮匕劑維良起沉癖兮咄彼二竪逺避匿兮吾民同躋仁夀域兮神聖在天同日月兮七經有書啓玄籥兮邈彼化工生物育兮潔芳之植符爾德兮善植斯獲盍自力兮毋怠毋忘毋揠拔兮芬其難虧暢以達兮德音孔昭用不極兮植之培之後無斁兮詞訖復吉以示其尊翁尊翁文舉父曰懿哉斯言也幾於橘頌矣意者先生其以古人望女乎乃使來請書為記洪武庚申夏五月初吉鄉貢進士四明鄭真書於臨淮縣學之潤齋丙午七月二十二日黃應龍鈔本見假因録之于小樓性甫記三香圖詩粉態誰描入畫圖玉奴相妬意何如生平不入春紅隊甘與梅兄一處居吳仲明題良工寫此三香圖萬卉千葩總不如一見令人倍惆悵歲多昆季不同居吳源倚韻楚楚山礬間水仙梅花開滿大江邊山中萬卉方搖落石上三生有夙緣雪霽師雄愁庾嶺月明交甫夢湘川當時却笑詩人詠兄弟評來孰後先潯陽臞陶振昨夕風水俱逆波石相舂舟人悸久不定晚出山外始安僕偃仰于短篷之下偶成五言并録呈似舟過道陽城迂行多幾程俗殊難共語山好不知名櫓趂之玄勢歌調欸乃聲來晨宜對月合浦夜珠明十八日甲子積翁書虞瑞巖畫跋嘗考夫六朝五代南渡逮今善畫者不可勝計然而各專其一未盡善也瑞岩虞公以畫為業聞之既久未嘗得一紙筆觀之間會于永新寓舍出示數紙山水人物則有情狀花木竹石則有幽研禽鳥則有飛翔魚龍則有變化其餘所施無不成趣蓋瑞岩遍歷山水窮搜物理而得其妙也察夫百家衆技之流能業其先世者蓋鮮非惟百家衆技之流不能業其先世儒道一而已矣愚雅業儒若子若姓未審異日有能業者不瑞岩有嗣想必能繼其業又兾勉諸吳源書于永新寓舍間境志間境志者肇闢乎方寸之間而莫知其際限之所接自有宇宙便有此境若甚遼邈乃不跬步至焉無炎涼之俗無風波之途如化國之日舒長如桃源與囂塵背如混茫之世無為而常自然真雅懷素志之栖寓峻行逸軌之逰歷也境中之人心和而氣平神靜而體舒不拘拘跂跂不營營汲汲間聰明之用息思慮之機灑濃厚之情停飛動之根喻良弨之解檠營道輪之繫柅然而篤於修勵者譏其墮役於智巧者謂其拙湛於嗜欲者疑其矯非夫特立高尚之人莫此居也昔許由常卜鄰焉其視天下輕矣伯夷季札因之以逃國顔閔子仲因之以辭祿位韙哉卓乎莫可尚已若夫坐忘寄傲之流閉關却掃之士徜徉乎竹林蓮社之間放浪乎草堂松徑之側曲肱箕踞長嘯微吟送日月於枯棋泯乾坤於一醉皆乘堅䇿駿有意臻其藩域者也乃有黃冠羽服壞衲方袍逍遙其間自立門户曰清都曰淨土蓋間境之别名也自世途歆艷斯境榛蕪或純盜虛名或指為捷徑一出焉一入焉誠未足與議今之人遊談賦詠挾以為高慷慨激昻若心將往者狐疑猶豫終莫能至焉豈以其淡泊無味寂寞難安故喜言而畏蹈可暫而莫久歟余嘗熟逰送之者皆自崖而反也因述其旨趣以導夫來者劉屏山髯戲有相者諗病翁曰僕閲人多矣寧馨殊姿噤吟怪形田面之龎鼎角之清固難以一二論也若翁者雖乏鳶肩燕頷之竒亦無麞頭鼠目之陋然而嚏滯言蹇局窮拘羈則多髯之纍也夫髯多則貌古貌古則神厲神厲則語不和語不和則交寡合寡合則動無或宜宜乎翁之沒沒也亦盍鑷亂芟繁稍自矜飭乎溫而儼然霽而􅏌然肅而偃然發而莞然夫如是則孰不爭先覩子為快焉左持右挈或挽或推謦咳之間山移海回慢子者加其敬笑子者止其咍運何塞而不開名何嘯而不來竊為安此翁曰嘻鄙夫樂隨正士自守子徒欲軟美求容而不慚吾行之益醜也吾聞之君子修己者非無榮名之患而無素厲之難我則不偶夫髯何罪且髮膚之傷前哲垂戒豈其敝之輕若辨髦相者曰天生百骸所以立我覘聆鼾號附臿挺朵顛連絡結龎覭侈哆爪義負荷揮隨踏拖惟人具焉闕一不可若夫髯也存乎亡乎皆可以生矣前貽繞涿之譏後發毛蠧之誚苟利夫子必請去之何相撑距而自奪其便乎翁曰子觀夫有形之形而未識夫無用之用也易稱須賁其義尚矣扶踈郁紆可象之儀也勃拂䰐鬖可畏之威也緣飾英姿發揚徑氣偉人特士造物多以畀焉故黃者紫者鬱然者皎然者似蝟者如戟者帛纒者綵編者垂玉𢃄者儼若神者白晢甚美者布置勝人者於此不凡者能令公喜者是以蓬頭相商疏眉輔漢于思強宋絶盼霸蜀美須夸齊長鬛勝楚或抵几而奮或論事而張其剛毅挺挺有如此者或手捋獻規或口御仗誼其忠烈炯炯有如此者是既然矣子獨何患乎且貴賤禍福天實為之子乃謂去窮有政謂攀榮有梯謂機捩可施謂坱圠可移不已甚乎人各有能有不能若乃􅀈䙾俯顔嚅唲強哂偊旅望塵咿呦乞憐雖位三槐食五鼎馬千駟祿萬鍾澤九族宥十世吾弗能也相者趍隅如慚雅譙病翁掀髯為之一笑劉屏山遊絲帖歌圓清無瑕二三月時見遊絲轉空濶誰人寫此一段竒著紙春風吹不脫紛紜糾結擬非書安得龍蛇如許臞闕政喜縈不斷世眼只愁看若無定知苗裔出飛白古人妙處君潛得勿輕漠漠一縷浮力遒可罣千鈞石眷豫弟兄情不忘軸之逺寄悠然堂謝公遺髯掠若闕衛后落鬒搖人光翻思長安夜飛蓋醉酣聲落南山外寧知契濶三十秋筆意與人俱老大政成著御明河津外家風流今絶倫文章固自有機杼戲事豈足勞心神吳傅朋王逢原之外甥也冨山懶稿方一夔字時佐淳安人有豆腐詩淮南有仙術化豆作璚英入磑松花爛含漿石髓生壑氷刀下冷崖雪釡中明未愜屠門嚼偏怡道者情藉菘香迥異雜菌味逾精腥爼羞銀膾加餐侑玉粳山翁惜殘齒愛爾當侯鯖梁寅題竹深書記詩卷棹拂鷗邊緑水錫飛鶴外青山無限胸中清氣新詩流落人間大德元年六月二十九日書於真樂齋張楧長句一首寄上叔方有道先生求賜之教盧橘花開梓樹踈故人安穩在樓居翠眉狎坐春行酒絳帳懸燈夜讀書未必醉來忘簡寂祗緣老去尚髙虛離羣應念行春者道逺天寒欲命車張簡胡石塘遺文顔樂齋原鈔引顔樂齋者永康胡長孺錢唐僦舍之名也後先餘六十年徙遷無常處囂雜下濕卑狹暗冥則皆無甚相逺嘗借房僧坊差似靜清開爽顧亦揭顔樂字楹間又嘗編次所為詩文取𨝍溝還繼盱江行十年名顔樂漫抄再取寧海還繼南昌行七年名顔樂原抄若無行而不與之俱客疑焉問之賤企貴貧慕富鮮不其然貴非企可致富非慕可來徒令奔走繫援畢智竭力悲愁困苦窮日盡年徐悟而中改闕益鮮若闕於其間不企不慕似安似忘健羡弗行隨流處順固已超然是闕上十倍矣乃今豫視若淡然眸絶經營之觀夷然神存凝湛之光浩然外著自適之容灑然中亡外物之纍如是其無憂也若真有道哉曰烏知道非敢為妄也夫非人能為命也必已當為義也聽命盡義分也分之在已前已過而不相及後未至而不相謀時遷變而不相待將於何所而措其憂耶無所措憂而猶憂與非已當憂而強憂等妄也譬夫病在其身權藥石對證治之愈而止翳在其目量針刀抉而去之明而止不敢為妄烏知道復明君子憂道不憂貧若其知道不憂異顔子矣顔子廣大如天不以霾曀霏霧隘其無外悅豫如春不以風雨霜露間其至和彼莊周者以為饘粥絲麻琴娛學樂持管以窺不能以見全體韓愈者以為自得艱難哲人細事面墻而睹其或但聞遺音長孺也何足以同之昔鮮于侁問顔樂於程正叔先生也是已先生曰庸言何樂侁曰樂道曰樂道不為顔矣侁未達以告鄒志完曰吾未識正叔面已識正叔心夫人所造何如是之深也客惘然莫知所言因拾之以為原抄引云延祐七年龍集庚申五月乙酉引吳用晦墓志銘吳用晦卒既禫祭胡長孺以寧海主簿如府計事舍上蔡書院士人周仁榮造焉蓋用晦子壻也以所托爵里行言與棄官將死之事為狀一通持來拜且請曰今兹惟夫子文辭子昂篆楷行草書名天下不得以名若祖父非良子孫夫子幸為仁榮婦翁銘又幸為請子昻作篆楷是尚不死請弗已長孺走避不敢當復還固謝尤不可則應曰諾其明年九月監造舟海上成始閲其狀而為之銘狀曰猋吳氏字用晦先於越人唐季年鼻祖與族人偕徙來台之寧海縣仙岩鄉家焉為縣人十有四世曽大父大明宋迪功郎大父籌父舉尹宋承務郎兒時凝然似成人既冠入州學有能賦聲為曹偶見推登咸淳元年進士第對䇿語直不得在髙等明年郊祀始授迪功郎池州東流縣尉巡捉私茶鹽礬丁外艱服闋循從政郎監紹興府支鹽倉棄歸其家未第時鄉之先達葉少傅王提刑年秩盛髙都當世名德折已貴尊與為遊知交尉東流時嘗權池州司户參軍以治辦聞持喪哀毁甚既棄官沖泊自守於世若無聞知獨於鄉里族姻如諸異日今至元十八年浙東造征日本舟材鐵百需賦里民急不忍其追呼令子鬻田代輸家以故耗施意尤未衰比卒前一歲衣冠哭拜家祠如辭行禮將及歲泊然無語以卒年八十四實大德十一年九月癸亥娶黃州司法參軍同郡金桂卿女子男一人鼎臣女三人其嫡歸今任處州路美化書院山長請銘者也長歸下夀寶次歸胡福臻孫三人男一肖居女二在室鼎臣以至大二年九月壬午葬其鄉於吳興之原得銘距葬日一年長孺曰死生之際微矣隋唐宋選吏繇進士出仕先生類曰是庸祿利蠱士心敗文體亂銓法徒靡風俗不足得雋嘗試取古舉子程文讀之裂道叛經違理害義其尤侮聖人之言也夫因嘗著論排斥不少置俯仰垂千年卓偉魁傑之士顧出於其間何可勝數近四十年亦得六七公其尤著者李瓘登咸淳進士第既臚傳識時相驕肆將覆宗社即日上書闕下挂冠去趙卯發權池州兵薄城夫婦縊州治馮驥戰獨松嶺不勝死髙斯得言丞相當事危急時棄去歸願以同列議已説必僨國罷同簽書樞密院事還湖州眠破屋中或時不食何應桂權發道忠安軍事栖霞嶺不守刾血裂衣帛作書上之縊州治留夢炎為今吏部尚書廷沮沙不丁平章政事撫言賈胡司泉府主市舶可宰相不可忤意曳出復召如初對得釋此六七公者視死何如况區區得喪禍福哉髙材大器自非畏名息影長往不招之士有此積藴必求自著見於時而施用於世固不肯黧面皓首終老於采薪負耒也往往視取士塗徑勉強委曲以就之媒致其身見庸之地又何問賢良中正茂才進士也耶猶寸珠尺璧埋壅塵坌其光輝發見自有不可得掩者乃今用晦死生之際若出入門户與六七公炳曄映照可銘已銘曰司徒俊造墮莫復吏選哤莫紅切離道彌黷浮文程人置科目進士千載一干祿已肆禮亡甚桎梏媟侮聖人恬流俗卓偉魁傑天所屬髙材大器詎潛伏俯首俯就甘詰曲竒節峻操𬒮踵續死生際若伸暨屈用晦洞識盍同録後五百年示陵谷崇寧萬夀禪寺楊氏施田記皇帝龍飛之六年歲行丙辰正月辛酉璽書宣諭軍民官使臣略曰杭州路浙江崇寧萬夀禪寺住持無受正傳長老楊宣慰松江六十頃田地布施屬寺水土園林勿奪正傳欽受迎奉摹鈎鐫飾竟已猗歟嘉哉隆勤崇施之盛德也謹按中大夫浙東道宣慰副使僉都元帥府事楊公梓嘗任海道漕運萬户至大三年冬十月二日用海船僦錢如浙東將渡錢塘至寺時惟見行僧去來包笠櫛比無受親執土木役塗緇手足不厭問焉則拱而對曰桂交廣閩蜀荆江浙之適北東西者水陸出此道若輻綰轂矧濤江潮汐異甚天下無有非目且習熟心掉體戰不自制普覺和尚弟子曰久禪師擇江旁地建蘭若為床坐褥席以處之為飯羮餈餌以食之當宋淳熙間尚書祠部為請得賜崇寧萬夀禪寺額昔者行宣政使知主此席者之不可輕也擇三人於諸山而正傳適中焉墜失是懼敢愛劬苦公聞而偉之曰國家厚恩相仍簮笏藉祖先遺德薄有田園長必有厚捐思報莫踰及物在崇寧萬夀為得其地逢無受長老為得其人謹施松江府華亭縣莊屋一區田六千畝歲收四千石永為常住供雲水僧飯食浴洗闕渡船是田在已在人皆為外物未施則厚止一家已施則賴之者衆以此方彼萬倍差殊事聞於家無不意滿宣政具以聞上無受月與江渡舟人米約不求僧與其徒四衆黃冠往來錢歲費且四百石明年六月丁酉未旦時蕭公橋民不戒于火延及浙江亭四旁閭門皆燼而寺獨存若有物衛之者無受既具良石以公書請文于碑長孺曰謹銘已之文又為銘曰六清淨義獨布施先絶惡去本庸懾懢貪博施濟衆起仁造聖有所不能堯舜猶病靄消霧散洞然明虛嗜欲不作人已一如雨降氣滋八荒潤澤幽火奧隈涓濡莫乾為篤學者趼足苦身受道傳業成已去人處匪廪倉出匪楮篋不有施者鮮不隕越錢唐潮汐悍猛奔衝吼聲雷震飛濤山崇冥晦風雨羣艘並艤進無可乘退無可止久嗣普覺建剎是間飲食床蓐施諸所安初資丐求繼藉租入百三十年用以僅給讓夷急病尚義楊公延暫以永廓狹以充捐華亭田六千其畝髙屋巨舟陸棲以走計舟以數受米有程緇黃來渡弗索弗徴枵果勞休煩除垢滌去留疾徐惟意所適惟時無受既敏既勤是荷楊公久公是承大火四周烈焰旁及有截其疆巋乎特立有己者私及人者公心通道行與物大同是法施義廣無有域作此頌詩鑱在貞石滴露齋記滴露齋者吳江盛子敬讀易之室也民生日用何往而非易其初亦何事乎讀也一而兩兩而四八八而六十四而孰名之曰乾曰坤若可句矣而尤不可讀也元亨利貞分四德矣大亨而利於貞義直為兩事也而其句或難矣六爻有辭十翼生焉理象數之著微嘗知其盡言待於辭而未知辭之待於圖而後見也至此亦備矣然而未易知也聖賢發天人之藴先後演繹宇宙所不容己者在是也人心之靈實具衆理觀其象而玩其辭亦焉有不得其讀哉存之於無有師保之際察之於動靜語默之間非必嘵嘵以聲齗齗以意殆於易思過半矣况其義之皆可尋耶而或者轉相穿鑿自謂古人所未有凛凛乎潔靜精微之受誣豫則不敢因為子敬言之子敬嘉定尚書之曽孫故皆流傳獨親簡編肅容端席有翼其臨丹砂之英沆瀣之清浩乎夜氣之明明以筮期應不占亦貞日進於學矣昔者清溪道士托竒以眩俗耳彼且視太極為虛無固將猖狂妄行以為道也假我數年學易以無大過此誰之志也今之人欲寡其過而未能也此豈非句乎豫輒為子敬乙其處丘可行墨銘并序今溪丘可行儒者也墨法精詣知名當時其子世英南傑傳焉今擅其良者莫之或先故永康胡某為銘續桐膏一燈之照裊陶甌半縷之煙合犢膚烹熬之度中石臼搗舂之權體煅火微不熱色藉煤逺極玄釡用候足無滯杵以數多彌堅罔歙松奚栝匪甲煎麝妍非魚膠麋角靡紫礦丹鉛行硯吐馥落紙敷黔點漆幽黝醫玉光潛不與茂實爭書未知彥卿孰賢誠得湛然同傳可共吳宇相先人咸言必售價之善吾獨悅乃取數之亷或有患槖裝之未具已惟憂世業之無傳兹亦器爾堪置銘焉豈觀美者尚勉持旃古窑爐銘大赤之音火熾見貌中黃之植以甄以陶玉女斯質虛中而圜衆垢莫室允也席珍凝其罔側我匪物玩所觀為德豈曰瓽間可以止息木天邃清竹帛雲積用適其宜敡芬永日詩七首題馬秦山圖馬秦山在昌國東氣候調淑清溫融大海四絶路不到紫巒兩嶂盤元空天球鏗鏘泉墮谷辟邪偃蹇崖依藂僧坊翠微互隱見石梁幽澗懸飛潨稻田活水正拍塞人家山崦方玲瓏髙臺似掌廣堪坐千峯相抱寬可宫三島得見不得到引船欲過遭回風仙聖往來豈荒渺吾意只與兹山同昔人正色臺端立抗疏秦檜非誠忠外主讐敵事叵測植根堅固應難攻上心感悟遽斥逐隱慝了未聞國中時論尚或許忠信此章似亦成匆匆七年復出踞公鼎操柄獨握亘初終飛將軍囚犴狴祕羣君子死煙霧濛當時尚議語無驗宗社固自巍崇崇豈知闕室已戮死在事非復驍前雄祕計欲和繕未具知聞那許餘人通事讐敗國罪莫説更聞海宇休兵戎言挾闕伏或太甚鬼羇炎嶺何其恫初相北庭去未久劾章宜得窺所衷七閩得歸良不惡逺勝鯨魚翻青紅自來舉職盡言責餘年誰計身窮通代謀立見內難息深愁尚服昌言公天憐孤立不偏倚用絶勝地扶衰翁送蔡堯佐歸婺取寒衣蔡氏有子堯佐名家縣東陽世儒生白苧長衫皂革舄輕舟附載錢塘行聞道胡公寄蘭若談經磊落天河傾欲聆緒餘自沾潤一洗學語羣惺惺翁癡凝坐鎮不動外間元漠中虛明薄糜不繼襖不暖謳吟猶自鐘球鳴養子弟無米一斛庇寒士無屋數楹爾隨僧飯尚一飽絺綌安禦西風勍有志不忘溝壑辱凍餒瑣屑何能攖重來猶及十月暖浩歌勿作凄涼聲豫為此詩送堯佐已而讀之自笑曰是祕密藏中休糧方也若果此道一生不患飢病不可但作笑會也贈吳睿兒童學書記名氏粗識東西與三四從衡方直莽莫知已斥羣曹呼小吏清渾淆雜七音倫臂指冥迷六書類皮章急就尚如氷何况簡編科斗字錢唐吳睿竊陋之籀篆𨽻分深注意搜岐詛楚嶧刻文漢碑唐碑滿家笥展舒臨摹不暫停長夜達晨豈思寐秪今已似窺端倪腕運筆從無蹶躓猶夢圓方畫矩規重惜分隂肯捐棄識路行不中道休萬里古人不難至昔時顛張草聖傳悟書舞娘飛劍器桓溫刻意劉司空身闕聲雌良自愧俗紀楚相語逼真虎賁中郎空酷似範金刻木是人形體貌不殊神氣異贈樊道佑生半輪明月尚空輝太白閃爍餘星微擔夫繫足䨥不借薄言送子江南歸西風蕭蕭豈滿旗錢唐潮落江水作鏡湖拒霜笑芍藥剡溪小船逾鳥飛三江九堰亦易爾一去四日還庭闈願得長在無相違却愁有人感伊威右抄雜詩中送胡古愚歸東陽建業秋山森立玉秦淮秋水葡萄緑五湖從此開船歸荷花不洗秋陽酷錢唐行到月盈虧潮怒闕揚暑猶溽二氣相代熱正嬴九月西風雨初足富春桐江溢兩涯蒲帆飛上雙溪曲三年漫仕歸亦佳繞宅碧巒溉如沃出處有道必自知富貴何庸徒嗜欲懷哉稅駕思鱸蓴千古季鷹豈流俗題何能之墨竹圖李公初得湖州迹三日靜對無厭斁趙公既見坡遺蹤時走招提窺敗壁髙公寤寐古丹青泓元幻出王摩詰三公相隨墮長夜朔南闕楮更充斥何能之氏於潛生嗜好結成山水癖但逢佳景寫作圖緑霧翠嵐光照室聞道趙公卧吳興往拜牀下求一筆句法墨妙倐已傳去捐館舍無旬日乘興落手便逼真雖枝可幹蘇瞻石題字印章酷似闕七十故人猶解識縱衡闕張纒紏書闕曲江南闕畫生平逼肖爾固能知路勿休堪努力石塘題宋梅野術飲上池水起人死扁鵲變道長桑君安期海上語蒯徹翁后一洗靖世紛在昔至人妙變化炯如秋月開幽曛學闕師字方册徒自枯稿空山垠闕翁襄陽得書事千載尚可嫓前聞道傍栁下息美蔭靈君相遇顔殊欣遙呼氏名據一帙逝去儼似西飛雲走承下風雨誰某膝行再拜陳殷勤語汝今者吾喪我安有形迹同人羣強名青陽已見囿沉冥世士方酣醺言未出口忽不見眼中漢水流沄沄此豈東皇降瑶席浩歌緩節清塵氛著書别自記禍福百二十載如昏昕片言隻字無不售聲名江左春雷磤里中宋子得翁祕真迹自絶蕕與薰我老厄貧在陋巷簞瓢晏食無腥葷君書幅楮期月日中冬有喜秋闕熏雁行債主事良已天邊除闕來相殷九淵澄寂忘寵辱君於何處窺其濆此道大原自天出馬圖龜書兆人文榮河溫洛不愛道九疇八卦先皇墳隂符素書尚神授圯下河上安足云至誠無私侔造化殃慶善惡猶闕分宋忠賈誼不常有勿與餘子生紛紜大德五年龍集辛丑歲十一月丙申朔越三日哉生明金華峰胡長孺書之虎林陋巷詩謂秋憂冬喜皆去年事何君祖臯墓志銘先君子之友在吾里者曰何氏兄弟其文聲宦迹烜赫一時至于今里中學子羣嚴論議頌説鄉先生不敢察察斥言其姓名字尚公云時齋寬居云逢年子舉二君子之大父曰愕由童子舉父曰倫為宋通闕郎有子四人其第三子則祖臯君也家世儒者資業微甚伯兄不事生産二君子既學又不問家事君讀書求通大義輒棄去自力為生不數年贍給使其兄若弟得専意問學業成為進士歷中外貴仕有當世名君乃益治其産義不數年致富始大積粟為義廪凡宗族之貧與姻黨之賢鄉里之孤弱不能自存者歲時月日皆有米帛遺隆殺物差不失所宜君之鄉多平陸稻田地接台括二郡間二郡山居十九不宜稻姦民事末歲常負榖出旁近縣求倍稱息利日夜不為衰止以故無積粟歲二三月常艱食榖賈重玉與旁近縣相似君常發藏榖取賤價如榖始熟民朝雪釡闕持空􅌩以出歸而舉火環是百餘里賴以不飢然其性質直好面折里人或有微過君聞召與語語皆切至聞者羞愧欲死曽不為少止人猶以為愛己不為怨怒後里中莫敢為失脫或過誤有不善人為蓋覆終不令君有聞也君之處家儉勤甚每食不過一器飯與一杯蔬夜未嘗就席寢身所衣褐數年不易未旦出行閭巷田野視里農勤惰隨事勸勉歸輒課僮奴耕植榖桑果蔬及熟其實碩豐滋甘視他所種若二種雖風雨冥晦不在東畎在西畦未嘗有須臾間及得間與故人父老幼稚為言德若近時鄉里數家成敗所由唧唧不休自處細以至富盛未嘗少改易也伯兄及二君子卒四門之子仰君以學乃延碩儒且厚為禮以故子姓皆賢有文能自卓立而君亦老矣君嘗得一官論吏部調監臨安府徐村酒庫二君子鼎貴用以階進事得美仕君不以為意趣棄去不顧後以子顗故得武翼大夫年七十三遂卒子顗將葬君夀溪先塋之側卜之不吉又卜九里之原則兆未葬手具書抵所交胡長孺曰顗之諸父幸與子之先君子遊顗又幸與子遊今將葬吾父子之銘吾父也奚辭辭既復書許諾矣敬按何氏世出周之唐叔虞其後十一世食采於韓及秦并諸侯韓之公族子孫散處江淮間晉以韓為何遂有何氏世載令德語具國史與二君子之隧碑其隱於婺之金華山者其先也當宋建炎自金華徙來處永康之清渭里者其五世祖也曽祖墀祖洎父逸君諱子申字祖臯叔倫之子為後於是者也甲子二月二十四日與庚辰二月甲申君之卒葬同日也娶孫氏忠愍公孫女先君十年卒子圭不慧顗仕宋為武功大夫閣門宣贊舍人敏早死孫男三人女一人皆顗之子也嗚呼往年先君子無祿早世子幼二君子為治喪事不四三年二君子相繼淪喪獨君巋然存族姻有所仰里井有所賴而後生晚學有所慕而為善有所憚而不敢為不善乃今藏體魄地下俯仰之間無三十年典刑殆盡而長孺之銘之顧不悲乎銘曰九里之陽有翼有翮鵠峙鴻翔九里之外溶溶邐邐滙於而趾墳髙半丈廣視其上典刑是葬百年為期谷陊陵隳視君斯碑右見陶南村文鈔竹月歌竹聲愛呼月聲清月愈明清光照竹影篩碎淡黃氷嫦娥怨孤眠種桂不種竹有風吹桂花堆作黃金粟我愛竹間闕結屋竹間住夜推月出門嫦娥不肯去遺我一片玉照人毛骨寒軒轅鑄不成挂在青雲端無奈白兔翁搗玉作仙藥散與世間人年年生白髮白髮念滿頭古今人共愁杜康采萱子釀酒能忘憂竹聲為我吹明月為我照顧影呼麯生三人共歡笑風定竹聲靜明月在青天天地為衾枕容我一醉眠擺脫世間事夢到羲皇前為我言至道理極歸空玄滄海一杯水太華一微塵醉形不醉心一醉三千春闕黃鶴山中人王叔明畫詩和楊友直萬事紛紛歸去休採山釣水即良謀青山不直田園樂白屋那關時世憂壯士奈何成濩落殘年如此愧淹留何當共駕牛車去却泛春江樹杪舟胡古愚虞邵菴自題戴笠圖詩四首浮雲滿空無所依髙岡獨行來者稀仙人冉冉遺松老鳴鹿呦呦生草肥伐木逺聞何處谷傾筐近得故時薇山中欲雨霧先合此日先生戴笠歸南園多竹暑氣微遊來結屋相因依挂巾石壁晝霧濕沐髮池水朝陽晞頻年車馬踐霜雪六月裳衣無綌絺鄰翁問舊坐來久此日先生戴笠歸老去縣車百意灰西風獨愛菊花開田家酒熟邀皆去茅屋詩成懶更裁欲及天清餐沆瀣要觀日出上蓬萊赤松有約應須待此日先生戴笠來莫問鄉人駟馬車老身全不要人扶雲霄一羽山頭杜風雨孤村海上蘇薄命長鑱尋積雪多情破帽落輕烏莫圍玉帶垂朱紱此是先生戴笠圖李雪菴題顯宗墨竹春滿承華睿思舒墨君别有聖工夫如何整頓乾坤手不寫臯陶大禹謨題三山萬嵗峰一沼曽教役萬民一峰曽使九州貧江山假設方成就真箇江山已屬人題范蠡歸湖圖名遂功成泛五湖知幾千日擅良圖向教句踐堪同樂不識先生肯退無題夷齊圖乾坤分得聖中清一節能為萬世經殷滅周衰幾今古首陽山色愈青青題平陽龍神張誠叔别業姑山之東山之隅龍神風物美且都泉清樹茂田膏腴中有太古仙民居云是先人之故廬龜趺千字存遺墟左岡右林跨修途前潭後阜開畫圖栁塘竹塢當闕藥畦花圃相縈紆三間茅屋藏堪輿延賔有齋㸑有厨壁間懸琴架積書文楸在榻酒在壺棣華春風歡友于紫蘭芝草羅庭除田蠶舂磑賈陶漁牛羊騾馬雞豚鳬絲麻委婢耕委奴嵗時足以供百需打門未始驚追胥繞屋時聞幽鳥呼主人况乃非世儒王門舊曵鄒枚裾胸巾素有廊廟謨冥鴻未可世網拘振衣歸來弗躊躇青鞋布襪竹杖扶南窗寄傲忘居諸一觴一咏日自娛高情淡淡寄太虗出岫野雲同卷舒寬兮綽兮矩不踰優哉遊哉樂有餘人間有此安養區輞川盤谷未必如平生我亦山澤癯所經佳勝神與俱田園至樂獨讓渠知君之樂孰若吾自笑才非陶謝徙作詩闕其可無睦人桂衡孟平詩七首代人送王惟中秋來忽得桂衡書又報王郎去闕除若有鄉情須寄我便生宦况也從渠山中歲月三逢雁客裏饔飱兩饌魚此去上林方校獵要因奏賦識相如送孫性初主簿興化新栁色未勻北郭燈盡試買舟吳山驛送子為貢士楊栁隂滿地荷葉大如錢送子浙江亭去作閩中官為士必作官未有如子快讀書取青紫信若俯拾芥雖由讀書力亦荷明主恩子尚夙夜思何以答至尊惟皇有大誥善惡靡不載善者子當師惡者子當戒恭惟大誥言昭若日月懸為民父母者不出于此編子能遵守之萬無一不濟豈惟免疵癘亦可長富貴父母願子安師友願子賢子有萬金書到任及早傳蘇李泣别我生自恨不如死君死誰知更得生十九年前今日淚都無一滴為功名九日陪陳廣文貢有道遊伏龍岡新菴久客思歸未賜環登髙且上鳯凰山空將青眼看重九不見黃華露一斑老境更從天卜健僧房長許客偷間廣文不是無良舍那得清幽似此間春暮忍將愁眼看韶華桃李無言日自斜晚白菜肥蠶出火冬青花落燕成家歸田誰復如賔饁入室今惟對影嗟無可奈何聊且睡不勞春夢繞天涯雲濤軒髙臺圖畫自天開下有軒居亦壯哉雲氣四時多似雨濤聲八月大如雷直看查泝天潢去莫遣舟乘雪夜回擬待他年具舟楫中流小試濟川才安節堂晚節何由得此安阿兒能孝母心寬蝤蛑曉饌來江浦絡緯秋聲上井闌松柏耐於花易過衣裳偏是綵宜看登堂為爾歌眉夀春酒香濃李子丹鄒奕詩六首寄沈誠莊芝軒先生人中仙儒醫並稱世所艱顔井泉通上池水孔壇杏接匡廬山焚香鼓琴白晝靜吟詩瀹茗青春間老樵何幸忝知己日日杖履相往還又和誠莊韻五首關塞同為客王門共曳裾青雲應咫尺白髮竟何如忽憶吟梁甫長懷賦子虛所嗟衰朽質多枉故人書春來倦行樂春去却尋幽花落隨風舞溪喧𢃄雨流乾坤真逆旅身世似懸疣何物令人羡忘機海上鷗間居忘俗纍行樂喜芳春露滴烏巾墊花迎白紵新清歌移晚興佳句滌襟塵處處香醪熟誰家味最醇荏苒傷春老蹉跎惜鬢華客居猶未定社酒不須賖花栁知無恙雲山畫莫加尋芳徒步好何用早將車長鬚携尺素邀客扣塗茨筋力非前日襟懷似昔時酒從花下酌船傍栁邊維風景還堪賞來遊也未遲陸禧彥吉題山水圖誰寫雲林景亦竒却如吳嶺越來溪柴門未啓雞初唱竹院才聞鶯亂啼藹藹煙籠花樹合漙漙露浥栁梢低令人萬里鄉心切吟斷東風望欲迷沈繹誠莊詩二首送諫師哲萬里還家闕門東風塞路雪猶存栁條未放黃金縷竹葉先浮緑蟻樽比及杜鵑啼客邸料應畫鷁到江村白頭交託忘年舊好附鄉書示姪孫寄以潛姪吾宗阿姪侍金門要竭忠誠報寵恩白髮至親惟叔嬸青囊傳業有兒孫客邊自弔燈前影身後誰招石上魂却寫容儀聊寄汝可能函骨到丘園詹孟舉挽袁子英吳門山水隔陳雷魚雁依然得往來書後常思洞庭橘詩中人寄隴頭梅但知抱道非貧病誰料生兒是禍胎老泪盡從枯眼出西風遙灑鳳凰臺右見葉文莊水東日記文章滑稽目録石君傳司馬用彰著出程以文黟南集甘澧傳范光傳竹君傳並孫大雅著出陶南村文鈔黃將軍傳姚廣孝著出本集豐本傳唐肅著出本集翁仲傳朱應辰著出本集梅先生傳王元章著出竹齋集楮虛白傳連華傳墨君傳鞠玄傳並童中州著出本集元寶傳胡長孺文抄竹夫人傳璞隱者傳麯生傳氷壺先生傳白咸傳五篇並楊亷夫著出東維子文集玉鸞傳不知何人作見舊鈔夏清侯傳宋陶榖著出清異録郭索傳高似孫著出蟹略自然道士傳真一先生傳夀光先生傳三萹並任士林著出松鄉集杜處士傳東坡集中桑寄生傳蕭鳯儀作大庚公世家王柏作見文集湯婆傳林景熙孔方傳墨者傳徐伯幾玉友傳劉岐玉鸞傳孔方傳新仲銘湯媪傳吳寬老境六通并序澗元翰林學士汲郡王惲字仲謀號秋有文集一百卷夫人生百嵗如馳駒過隙能幾七十者又復幾人所謂儻來外物猶浮雲過目亦何足道哉因感壯年所行多輕生之事趨前太猛一也讀書過分二也飲酒無量三也妄慮坐馳四也喜談好氣五也戰藝多勞六也不肖今年已踰六旬念此六失覺五十九年之間何啻是耳而驚而愕且畏且怖豈勝慨哉故養生之念蹶然生于中蓋其勢有不得不然者因作老境六詠庶幾與吾同疢者聞之不無少有所戒亦老者安之之意也至于直逹性情以救往失初不以工與拙為計也幸觀者無誚至元二十四年冬十一月秋澗老人謹白飯飽即步殘書讀罷午餐餘信步徐行當澤車接武徑過通德里談玄時到故人廬老便步穩靴無襪靜愛聲璆珮有琚相送歸時燈已上到床一枕即華胥目倦忘書辛苦雙明六十強滿前花黑理應常酒杯縱對甘無分書卷相看任久忘虛室靜深便默坐午忩晴爛怯餘光悠悠未了三千牘吟諷從今付闕郎言慎養氣聚首間談足是非到頭贏得小人歸屬垣有耳常捫舌守口如瓶慎動機珍惜無先吾氣浩坐忘深識道心微客來客去俱恬靜克已存誠恐庶幾食甘戒飽食前方丈肉如林莫遣分毫胃氣勝百斛盡從中所過微軀能不病相仍已飢便飫甘能止過軟雖鮮熱即乘此是老坡真聖藥免教攜杖去騰騰寤寐絶思夢神依例到殘更目似鰥魚了不瞑正為膽寒增展轉不緣身老惜伶俜滌除玄覽歸安靜宰制心君入杳冥昨旦早興襟闕足不知青鏡鬢星星息藝休心辭筆縱橫更老成只來虛譽不根經風雲滿眼嗟何有月露盈箱笑未停肆口成章終妄作忘言休思是頥齡子淵直在心齋妙一字何嘗及性靈茌平縣乃馬周故鄉今荒廢特甚縣中惟有三兩家知縣姓陳處州人邀豫同往西門郵亭中看花郵亭固廢圃尚有數峯竒石花名玉瓏瑽枝葉與瓊花無異但花蕊層生與葉相間逺望如翠煙籠玉幽香撲人遂呼濁醪痛飲花下陳縣公取紙筆求詩乘醉走筆賦二律誰司后土作花王忍置瑶華官道旁衣袂不經塵世染夢魂猶帶廣寒香孤蟾照破瓊林雪飛蝶栖殘珠樹香天上人間惟有此好將闌檻護荒涼何年碧海會璚仙雲製衣裳雪作鈿醉鎖素虬纒寶樹間騎白鳯下瑶天鶴林寺廢空流水后土祠荒起暮煙慚愧郵亭一株雪春風猶得路人憐黃鶴山中樵者王蒙葉公政字克明淮隂人國初行宣政院都事季實之子翰林直學士蟾心之從子也至正甲午政以浙省幕史奉卜顔平章檄轉餉鄂閫時丹陽富民束子章先與是役會飲于蘄氣合即以兄禮事政未幾起赴沔束泣别曰弟今濟大江涉重地兄言行篤信願以資相託政謹藏之越兩月束之友朱率其奴來報曰束不幸入蓮臺湖遇盜死矣政抆淚曰束己矣家固無恙也勞之去明年竣事還鎮江要束氏啓囊緘得鈔二百五十緡黃金五十兩銀三百兩珠八十枚衣帛有差歸之束氏餘鈔五十緡黃金五兩銀五十兩珠千枚有朱題封歸之朱朱氏盛醴饌以謝辭之前國史編修官膠西張復初嘉政義髙為著還金記且稱政幼知讀書淡利祿嘗從平章克池之諸孫破蘭溪渠魁徐貞一平蘄水寨司輜糧四年無纎芥譴何平章凡七薦中書不報人謂公侯子孫必復其始天道豈獨逺耶席帽山人王逢播之詩曰蘄春肥羊采石酒君為玉昆我金友夜談接膝晝握手乾坤意氣同髙厚霜風吹蘆客衣薄濕雲羈鴻飛漠漠篷窗篝燈照裝槖嘆君逺行感君托蓮臺湖深浪拍銀鷓鴣杜若傷心神天生禍亂有今日誰謂交遊無古人葉郎還金何愧竇禹鈞張延年記事二則翰林伯生虞先生蜀人也布衣時落落不偶抱經世之才挾貫道之器鄉人莫之竒也遂遨遊四方涉江湖歷險易無不周覽而求訪焉至錢唐僦居客邸一日偕友楊仲宏薛宗海范德機過西湖之上謁方外淵微宰鍊師之廬求禱仙卜休咎淵微即設几焚香置箕懸筆而叩有頃箕動筆運而附降云某非仙乃當境神也淵微叱曰吾不召汝神何來神附云某來兹欲凂虞公作一保文申達上帝用求廷升幸公勿吝某將報德焉衆咸謂虞曰君無辭神請公諾翌日文成火於西湖之濵逾旬再詣淵微之廬又將禱焉神復降云某得升而城隍矣特相報謝虞公後當極貴無忽神退衆咸驚且異焉後公遊京師初仕冷官不三十年官極一品爵贈五世文名天下德流後昆生封公沒加諡順受五福何其盛也豈非先世積有餘慶天將報施於公以致然歟杭州屬邑民某姓宦室也所為不法流毒一鄉衆怨赴訴詞出雷同事覺逃匿纍連無辜憲長震怒督責有司示罪賞揭大逵家至壁白彼所犯敢匿者罪連坐能捕者賞萬緡號令四布追索甚急郡民王一山者彼友也業儒居湖山第一樓儔彼於密期月不發計求脫之禁嚴不可鄰察知慕賞報所屬率兵吏圍其室捕被獲之山亦連坐有司走告憲司長云孰敢匿彼拒法如是耶迅致兹吾親訊之有司驅山囚見憲長長怒遽問云女知彼所犯乎山曰知之女知刑法乎山曰知之女見有司揭罪賞乎山曰見知之女奚不就利而避害既發何詞焉山曰山知彼所犯來奔乘其危售其友欲避罪而求賞則為名教中罪人也山不忍為事黨連坐則甘心焉憲長聞山語竦然曰君子所謂臨難毋苟免臨財毋苟得山實踐之矣此義士也語云觀過斯知仁矣若罪之吾且政苛而刑濫民何勸焉遂釋之憲長魯齋許先生之子也此事楊太史元誠公言太史平日篤信人望也匪揄揚之士必不妄請書此入鄉老孫先生客談傳以警世之為友不義者云樂谷易民張延年書於管公樓閲松江志見瑁湖留題一詞因次其韻對九峰無語聽一聲清唳華亭孤雲深處當代才華知蓋世日下長虹光吐空為弔英魂延佇回盼中原狐兔穴問洛陽宫闕今誰住吳與晉在何許人生莫道儒冠誤便卧龍躍馬必竟也歸黃土何似扁舟鴟夷子風煙五湖歸去一嘆起將如意舞闕教咸陽黃犬歎渺吳淞不住流今古斜照裏羡雙鷺記事三則會稽陽明洞天在秦望山後禹廟之西南云即古禹穴越之勝境也洞有東嶽行宫及道宫深邃盤礴諸峰羅立環聳豫嘗留宿道宫次日有老道士鶴髮朱顔延至其室室橫置一夀具云已十餘年矣未能即棄人間世而入此木匣也其後軍臨城下道士乃先沐浴冠𢃄絶粒飲與衆别而卧于棺中七日不死軍至開其棺復食之而生數月城不破而軍退道士乃入城病卒向之具不可得矣豈亦有分定歟陳睿書字思可至元元年春僕之永豐縣於錢塘江頭覔舟上常山同載有李孟容名度中原人乃翁官番陽今由京師回因言在都城見一全真先生年五十餘相貌魁偉嘗坐省東茶肆中所言輒有驗自親炙之造其所寓在五門外第二橋民家叩其所行不答遂敬之如師詢以出處乃曰汝仕不在北方且宜南歸四十後方可食祿臨别復問及時事其人曰此後當改至元至元後改至正天下亂矣時元統年也李曰國初已有至元矣其人曰汝但識之李南還至閘河聞改至元心益信之既别僕每記于懷數年果改至正蓋貞者正也十七年丁酉保參無錫州判李自嚴帥下令史來錫山相會云四十後方補饒吏遷池州辟嚴幕時將六十矣未幾升分省掾卒于吳全真之言信不誣也特不知何術而先知耳蜀人王立中國初張可與李仲方鮮于伯機同仕于朝既而張公除江浙郎中仲方為都事鮮于浙東經歷胥會于杭甚歡一日李卒於官張公移書伯機曰仲方沒矣家貧子幼吾不經理其家孤寡何依吾許一女配其仲子伯機聞訃哀祭成禮亦以一女贅其長子即從善後官至紹興路推官仲子字復初官至淮安路總管泰定間為江隂州尹余館其家教四子惟長子叔成以文學名乃知前輩結交重氣義不以勢利易其心誠可敬也張公仕至中書左丞元朴公乃其姪享富貴必有異於人信不誣矣二年戊申嵗金思誠書記事二則檄書露布何所起乎漢陳琳草檄曺操見之頓愈頭風遂謂檄起於琳説文檄二尺書徐鍇通釋曰檄徴兵之書也漢髙祖以羽檄徵天下兵有急則插以羽爾雅木無枝為檄注檄擢直上也文心雕龍有張儀檄楚書隗囂檄闕斯文文選有司馬相如喻巴蜀檄文則檄非自琳始也明矣隋禮儀志後魏每戰先書帛於漆竿上名露布世説桓宣武征鮮卑令袁宏作露布倚馬手不輟筆俄成七紙如隋志世説所云則露布起於後魏而晉國之闕漢官儀凡制書皆璽封唯赦贖令司徒印露布州郡又漢書賈洪為馬超作伐曺操露布則漢時已然及讀初學記引春秋佐助期曰武露布文露沉宋均云甘露見其國布散者人上武文采者則甘露沉重豈露布之義當取於此與勾曲山房熟水法削沈香釘數箇插入林闕中置瓶內沃以熱湯密封瓶口少之乃飲其妙莫量南村野史陶宗儀書壬寅六月王雲松過葑溪上出此數事因為借録之如右云錫類堂中記酸齋降筆作清江引一闋贈鐵笛道人鐵笛一聲江月曉催上長安道金𢃄紫羅袍象簡烏紗帽誰不説玉堂春事好虞邵菴詩寄侯頥軒侯公有道術隱在洞庭山仙橘曽供母幽花自悅顔新詩傳石洞舊語憶鄉關我欲長相覔應騎一虎還題鶴亭詩稿二首三幅吳箋二十詩才華宫錦翠蛾眉長吟易盡愁無那抱膝茶煙兩鬢絲東南佳麗闕長歌水碧空青闕未多鶯囀上林千樹栁但聞新詠奏雲和題丹丘青山白雲北苑今仍在南宫世奈何青山解浮動端為白雲多題汗簡汗簡一編乃郭忠恕所集凡七十一家字迹為證古尚書為始石經説文次之觀其源委深有自來嗟夫字學之始始於蒼頡無字之字天真粲然有字之字筆法宛然古無筆筆於秦至秦而小篆生矣今人率皆遺小篆之法不古之尚而今之尚流而愈流忘本亦甚古人製字良各有説特後世莫知其故傳之久而後人不免有舛繆竟喪其本真汗簡之作追古法於既泯流新傳於無窮郭公之功多矣後之業字學者可不知之庚寅六月所南鄭思肖為山澗葉君題汗簡後題伯機臨鵝羣帖僕與伯機同學書伯機過僕逺甚僕極力追之而不能及伯機已矣世乃稱僕能書所謂無佛處稱尊耳必明持鵝羣帖見示使人歎賞不能去手而義甚慶其有子也至大三年八月草三日將赴杭州車橋寓舍題子昻題錢舜舉畫舜舉作著色花妙處政在生意浮動耳爾來日夕沉埋醉鄉吾恐久乃不復可得覺非其深藏之同郡趙孟俯題蘭亭十三跋子昻蘭亭墨本最多惟定武刻獨全右軍筆意此薛紹彭家所拓者不待聚訟知為正本也至元己丑三衢舟中書時過安仁鎮正月望日蘭亭帖自定武石刻既亡在人間者有數有日減無日增故博古之士以為至寶然極難辨又有未損五字者五字未損其本尤難得此蓋已損者獨孤長老送豫北行携以自隨至南潯北出以見示因從獨孤乞得攜入都他日來歸與獨孤結一重翰墨緣也至大三年九月五日孟俯跋於舟中獨孤名淳朋天台人蘭亭帖當宋未渡南時士大夫人人有之石刻既亡江左好事者往往家剜一石無慮數十百本而真贋始難辨矣王順伯尤延之其精識之尤者於墨色紙色肥瘦穠纎之間分毫不爽故朱晦翁跋蘭亭謂不獨議禮如聚訟蓋笑之也然傳剜既多實亦未易定其甲乙此卷乃致佳本五字鑱損肥瘦得中與王子慶所藏趙子固本無異石本中至寶也至大三年九月十六日舟次寶應重題子昻蘭亭誠不可忽世間墨本日亡日少而識真者蓋難其人既識而藏之可不寶諸十八日清河舟中河聲如吼終日屏息非得此卷時時展玩何以解日蓋日數十舒卷所得為不少矣草二日邳州北題昔人得古刻數行專心而學之便可名世况蘭亭是右軍得意書學之不已何患不過人耶頃聞吳中北禪主僧名正號東屏有定武蘭亭是其師晦巗照法師所藏從其借觀不可一旦得此喜不自勝獨孤之與東屏賢不肖何如也草三日將過吕梁泊舟題學書在玩味古人法帖悉知其用筆之意乃為有益右軍書蘭亭是已退筆因其勢而用之無不如志兹其所以神也昨晚宿沛縣草六日早飯罷題書法以用筆為上而結字亦須用工蓋結字因時相傳用筆千古不易右軍字勢古法一變其雄秀之氣出於天然故古今以為師法齊梁間人結字非不古而乏俊氣此又存乎其人然古法終不可失也草八日濟州南待閘題草九日至濟州遇周景逺新除行臺監察御史自都下來酌酒於驛亭人以紙素求書于景逺甚衆問余書者坌闌殊不可當適登舟解纜乃得休是晚至濟州北明十里重展因題此卷東坡云天下幾人學杜甫誰得其皮與其骨學蘭亭者亦然黃太史亦云世人但學蘭亭面欲換凡骨無金丹此意非學書者不知也十月一日大凡石刻雖一石而墨本皆不同蓋紙有厚薄粗細燥濕墨有濃淡用墨有輕重而刻之肥瘦明暗隨之故蘭亭難辨然真知書法者一見便當了然政不在肥瘦明暗之間也十月二日過安山北夀張書右軍人品甚髙故書入神品奴𨽻小夫乳臭之子朝學執筆暮已自誇其能薄俗可鄙可鄙三日泊舟虎陂待放閘書跋定武禊帖清容居士歐陽公著集古録言定武二民家各有石較其本纎毫不異是則定武有二本從來久矣後宋諸賢謂薛向之子嗣昌私易定武本别刻石以留公庫此論千人一律今以歐公所論則有二本薛之定武果易以歸則民間猶有一本是合公庫本為第三本矣議者又謂嗣昌鑱損湍流帶右天以亂真後入宣和曲水亭豫嘗毫髮辨證亦微有不同此卷壓角小印正嗣昌名印而米襄陽親跋尤真舊藏張樂政孝伯家其子寺丞即之以書名一時大變古體遂不能傳印淺猶可考也今以豫平昔所見本悉疏于後不損本趙明誠本前有李龍眠蜀闕畫右軍像後明誠親跋明誠之妻李易安夫人避難寓吾里之奉化其書畫散落往往故家多得之後有紹勳小印蓋史中令所用印圖畫者今在燕山張氏家王順伯本第一跋是王黼順伯名厚之號復齋有金石録家藏石刻鐘鼎篆籀鑑銘泉譜侔內府其家前後不廢近嵗丁未闕赴新昌尤闕遂悉散落始歸于龍翔道士黃石翁黃祕不示人後有順伯為浙西提舉時携入祕省諸賢題名皆有其最著者樓宣獻劉文節今亦歸張氏趙子俊孟籲本得於閩中有樓宣獻跋剪碎作册頁與前二本無異今歸子昻承旨家蘇承旨易簡第一跋後有元豐諸賢同觀于鄞之城南崇法院有闕信道字畫然不著名在內侍談氏家精神無毫髮恨趙子固本舟過嘉興遇風舟覆子固疾呼曰蘭亭在否舟人負以出子固作跋識其事復題八大字曰性命可輕此寶難得子固死入賈相家賈敗籍于官有官印歸濟南張樂政斯立今在集賢大學士李叔固家潘經略畤本題識皆德鄜手書滿軸豫以有半跋本遂贈善之文原鄧借田師孟師孟有借書不還癖因留之豫跋乃剪去矣損本龍圖閣學士劉公克藏本細書滿紙後有賈相跋亦滿紙括蒼鄭用孫為福建儒學副提舉得之為翰林應奉貧質于瓷器劉氏屢入子錢卒以逋重為劉氏所得有叔信父印損本多有叔信父印蓋宣和曲水亭既成臣以御筆繇京兆薛嗣昌家宣取留內璫所暮夜以匱金紙即越蟬翼紙疊三紙拓印故下本肥中本著中上本微瘦然皆無異此本子昻得於都城裝成册頁磁器劉生手之不置以銀壺林盂易之翰林承旨趙孟俯家本得於霅溪陳侍郎振孫伯玉號直齋其家藏書冠東南今盡散落豫家亦得其數十種此本亦有叔信父印翰林侍讀學士張伯浮本有黃豫章跋豫每疑鑱損與山谷差有後先然本無異前數本更俟它日以考珊瑚木難卷四
