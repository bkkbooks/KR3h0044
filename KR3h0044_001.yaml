body:
  text: 珊瑚木難卷一明朱存理編擊蛇笏銘天地至大有邪氣干於其間為凶暴殘賊聽其肆行如天地卵育之而莫禦也人生最靈或異類出於其表為妖怪信其異端如人蔽覆之而莫露也祥符年間寧州天慶觀有蛇妖極怪異郡刺史日兩至於其庭焉人以為龍舉州人內外逺近罔不駿奔於門以觀恭肅莊祗無敢怠者今龍圖待制孔公時佐幕在是邦亦隨郡刺史於其庭公乃曰明則有禮樂幽則有鬼神是蛇不以誣乎惑吾民亂吾俗殺無赦以手版擊其首遂斃於前則蛇無異矣郡刺史暨州內外逺近庶民昭然若發蒙見青天睹白日故不能肆其凶殘而成其妖惑易曰是故知鬼神之情狀公之謂乎夫天地間有純剛至正之氣而或鍾於物或鍾於人人有死物有盡此氣不滅烈烈然彌亘萬世而長在在堯時為指佞草在魯則為孔子誅少正卯刑在齊為南史簡在晉為董史筆在漢武帝朝為東方朔㦸在成帝朝為朱雲劍在東漢為張綱輪在唐為韓愈論佛骨表逐鱷魚文為段太尉擊朱泚笏今為公擊蛇笏故佞人去堯德聰少正卯戮孔法舉罪趙盾晉人懼辟崔子齊刑明拒董偃折張禹劾梁冀漢室乂佛老微聖德行鱷魚徙潮患息朱泚傷唐朝振怪蛇死妖氣散噫天地鍾純剛至正之氣在公之笏豈徒斃一蛇而已軒陛之下有罔上欺民先意順㫖者公以此笏指之廟堂之上有蔽賢蒙惡違法亂紀者公以此笏麾之朝廷之內有諛容佞色附邪背正者公以此笏擊之夫如是則軒陛之下有不仁者去廟堂之上無奸臣朝廷之內無佞人則笏之功也豈必在一蛇公以笏為任笏得公而用公方為朝廷正人笏方為公之良器敢稱德於公作笏銘曰至正之氣天地則有笏惟靈物笏乃能受笏之為物純剛正直公惟正人公乃能得笏之在人能破淫妖公之在朝讒人乃消靈氣未竭斯笏不折正道未亡斯笏不藏惟公寶之烈烈其光徂徠石介守道於烈孔公碩大耳方麟鳯在郊百怪斂藏爾蟲何知乃罔畏忌怵彼蚩蚩改聽易視維是手版猶古璧圭千金則重鼷鼠則微憤激於中有弗遑計寧使妖血狼籍沾漬展也先覺俾民不迷九原可作物是人非人之非兮鰌鱓之舞尚有聞孫曰豫禦侮金華黃溍寧州帝封天慶道宫何物詭仄諱蛇誣龍公初奮擊惟笏在手不復有龍於蛇何有衛公故物魏公甘棠誰無孫子人笏俱亡桓桓巨公異栁之宥磔怪破惑百世不疚天台周仁榮字本心雨露植風雲力匪圭璋豈金石奮英氣揮徑質扶正道踣妖慝光殷紅血凝碧傳百代如一日嚴陵吳暾字朝陽中丞孔公在宋祥符間職寧州推官於時妖蛇憑神熾擅禍福民駿奔以祀官於郡者亦昧昧以從事公至奮笏擊蛇首以斃妖息惑解世譽其偉故笏傳於家今八世孫濤守之蛇隂類也易知而易辨萬民之惑罔一察矧君子小人人類一也有異心異行焉惟公克知言飬氣於先故剛大之發臨事明而弗為外物汩清忠毅直為宋名臣嗚呼觀斯笏其有因物而反躬者乎於人原其心觀其行以辨其君子小人其或立朝司牧而附表之而激揚之使天下之人亦皆知所從違則知言飬氣本乎素勉怪不語也奚惑守者不辱觀者克慕能反躬矣皇慶元年九月七日式觀公笏闕敬為銘銘曰彼蜿蜒兮擅廟食公來觀兮奮一擊妖電掃兮惑氷釋公知言兮氣剛直開民心兮如覩日笏斯藏兮鋭盈尺戴起宗贊烈烈孔公禀是正直疾惡如仇秋隼初擊毅氣寒霜嚴顔夏日張髯决眥出聲動色杓芒嶽靜電流雷激巨奸奪氣萬里辟易矧此虺蛇夭形蕞質委窮茂草春啓冬蟄蜿蜒尊爼若歆以食媒神憑姦汩聽生惑好惡易處民志由辟釋此不誅曷示軌則公鋭往偵曰惟吾職無矛無戈投之以笏其笏伊何匪金匪石廣不三寸長止過尺削槐成簡竒文間錯波濤晝翻雲霧朝鬱月引日長敷膏輸液堅於陶冶黑過㸃漆亦有朱殷腥血餘迹磨刮更著豈不洗滌遺履在廟藏簡去壁守之或渝猶云墜逸此若忠臣直前批賊非比清談看山拄頰嫓美公孫寶同尺璧孺也為贊永彰幽德永康胡長孺余嘗讀宋神宗實録及國史兩朝御史中丞孔公列傳觀其事親孝居官理使契丹不辱君命廢瑶華叩閽力爭平生大節蓋炳如也惜其才不充用澤不大施緬仰風猷為之永慨今公八世孫濤以公在寧州日擊蛇妖笏示豫語在本傳兹不復述豫謂孔子作春秋凡物之災祥變異舛於常而害於民者事雖小必謹而書之故隕霜不殺草李梅實大雨雪無氷雨木氷隕霜殺菽皆災之小者也以其干時令之常則屢書之所以警天災廣修懲也其害不及民非吉凶之所由生者異雖大則削而不書故蛇二鬪於鄭南門蛇十七出於魯泉臺神降於虢莘石言於晉魏榆皆異之大者也以其非隂陽之孽則不書所以逺妖惑一民志也夫蛇山澤之所生也窟宅靈宇蜿蜒闖首用誣於神以惑於民公奮是正直擊之以斃廟妖遂息民乃不惑可謂不昧於理不餒於氣得春秋之㫖矣乃肅恭再拜而為之贊贊曰猗歟孔公蹇蹇王臣義動羣辟色正氣信有蜿者蛇誣民惑神公笏擊斃曽不動心絶妖去惑聖經是循孰云百年凜凜猶今匪笏斯珍而人斯欽東陽張樞正氣烈烈川融山結降生英傑至聖雲仍心炳丹青早讞於寧寧有蛇孽時出於穴守臣是謁卓哉孔公誠激於衷義所不容直前奮笏風生霆擊蛇首碎折妖不能神竟斃厥身正理以伸逮掌風紀表表愈偉名照青史維昔李唐魏笏傳芳儷美甘棠舉笏擊泚逆儔披靡太尉忠死笏乎笏乎金石弗如異世同符槐木赤理其長尺咫妖血凝只公有耿光公笏不亡世寶其藏宇文公諒賦若有物兮良木之英虛宿之精抗金石而比質厠圭璧而聨榮眷朝章之故物漬妖虺之餘腥摩挲睥睨髮竪風生豈非孔氏之祖笏而擊蛇其名者乎粵若古先緣禮創物貴賤有等垂紳正笏君臣殊制以被章服珠玉象齒效珍薦骨兼頒竹木齊位稱德爰書思而對命備君臣之指畫維此古槐木德可稱蓊垂䕃於公位儼列植於公庭闕雲敷闕欎乎翠層澡貞姿於雨露受徑氣於風霆抱觸麑之遺烈藴鑽火之剛明是度是斷以削以繩長僅踰尺剡首鋒稜文章爛然非髹非頳範信桓之矩度秉朝覲之儀刑宋治遹隆濟濟在廷有偉正臣宣尼雲礽秪服寵章司臬於寧胡蛇妖之憑附託神棲而假靈或恍惚而炫異亦蜿蜒而來歆彼蚩蚩其何知豐媚祀而醪牲時則孔公義發於中以此隂類誣明惑聰殺之勿宥豫力可庸越班聨而前邁奮一擊於埃塳若炮落而流電若矢激而乘風刜腥顱之拳曲剪斷爪之蒙茸欻毆除於攘袂之頃曽假手於百錬之鋒使呥舌搖尾之毒螫不若馬蚿尺蠖之微蟲輸智勇之緒餘破鬼蜮之瞢聾糾糾乎擊奸之憤烈烈乎擊賊之忠倣佛赤帝斬蛇之劍想像寄奴射目之弓是皆英君傑士之所施任諒直而屏奸雄者也宜其正色立朝流聲臺閣徑氣干雲讜言排嶽撼環疏瑶華之寃廷奏掃璫竪之惡眷一言於睿思斥伶優於朔幕則是笏也可以排閶闔而腹披指險諛而膽落條疏奏陳則伸諍舌以回天籌畫事宜則出竒謀於帷幄扶綱常於朝端凛英猷之謇諤彼蠢然之么麼何足以窺抱負之廓落也哉噫嘻往哲不留青氊猶在奕世九傳歷三百載翼翼裔孫敬守不怠手澤如新揚芒發彩繽鳯翥而鸞鶱粲濤驅而波滙辟䕫罔之不祥獨黝然而不改靈氣翕欻目怵心駭㸃萇碧之微汙彰神明之司宰骨何貴乎忠賢角何求乎靈豸匹休鄭國之甘棠化美河南之鳯彩豈徒詫垂裳之藴藉誇拄頰之瀟灑而已邪嗟豫小子載瞻載持授我毫素俾述以辭仰先正之偉節誦徂徠之銘詩慚倒執之戰兢虞畫足之貽譏肅正襟而作頌昭盛德於無期頌曰於鑠孔木繄笏之珍殄除怪妖磔腦殲鱗是維正直有嚴斧鑕山摧石裂笏則不屈闕石在朝冠履在堂克配厥祖厚德流光簮紱有傳寶兹宗器見笏若公欽於世世彼欎者槐維德之符尚爾後人貞固弗渝㑹稽趙俶本初詩以笏擊蛇有孔公義與段公擊賊同事之巨細雖有異正氣憤激生於中偉哉孔公聖人裔豈聽妖邪亂民志即今槐木一尺强氣象凛凛含風霜子孫傳之慎寶藏不羡象牙堆滿床吳興趙孟俯怒擊妖蛇血未乾一痕槐面猶朱殷他時御史飛白簡誅死奸諛知不難孔廟寶藏同魏笏生氣稜稜著靈物雷丁獻斧豸豸角文理不邪剛不屈爾孫北上慎保持諸公色動驚見之西山爽氣頰可拄手版倒執夫何為仇逺孔明廟前柏手版賊其枝枯稊無生氣衆目炫一時何如孔公笏鐵面含霜姿虺蛇何足道正氣屢奸欺祥符慶厯間豈無纖人斯聞之膽為落不在彼在兹聖學億萬年聖源浩無涯八傳得巨源憤學求似之遺經與遺物保護如嬰兒萬里去復逺見者咸齎咨况此一尺槐千載孔林思非無原壤杖非無少正鈹用舍各有時小大各有施疇能啓段公共賦甘棠詩白珽蹇蹇諫議公魁儒負才傑寧州邈西土讞獄慎司臬惟神贊𤣥冥北嶽氣栗烈肸饗有慿附蜿蜒此穿穴俗情尚詭怪牲醪走豐潔譬彼僉壬類朋奸巧媒蘖不一剪夷之正論曷昭晰時公儼端辨孤憤眥欲裂手版僅逾尺用過百鍊鐡老槐不生火黝質漬腥血公當寶元際抗疏多論列力排霄漢路義動風雷舌兹事特瑣細亦足厲風節歷階諫兩觀先聖有遺轍彼哉堆床笏華榮等電滅我歌激寸肝天長暮飛雪鄧文原茫茫宇宙間一氣陶庶彚流行有天常偏馭乃為沴惟人萬物靈順正補其弊所以致中和能使天地位中州際明時和氣與善治偏方或湮鬱逖彼西南裔神人糅雜居詛盟成蠱媚虺妖據琳室奔走傳詭異潔牲祀朝夕牧守帥羣吏孔公聖人胄天質抱剛毅直飬氣已充平素有集義憐彼衆人愚惡此醜物厲抽笏奮而前一擊首遂碎壯心發陽剛排斥隂險類諒兹咫尺簡寧比劍㦸利敬存勝百邪妖孽何用避遂能格君心蹇蹇居諫議君家愛甘棠什襲傳百世豈惟子孫珍觀者咸起畏勿謂寶此傳肖德惟尚志東陽許謙益之嗟嗟怪與神凛凛子不語所以祀爰居不為聖門許孔公剛毅姿往訓率厥祖謂兹𤣥武庭饞蛇穴憑附妖孽今弗祛民惑政兹螙我笏秉正直一擊鋭刀斧斃之所不誣敬逺非敢侮笏今八世傳漬血殷尚睹擊賊宜比倫堆床奚足數儼然人若存想此氣甚武可為智者言語怪神亦吐臨海陳恕可如心老槐不爇柯突兀裁作東家孔公笏風霜徑氣鍾此物拈起放下神出沒蛇妖憑穴檀修窟怙毒肆擊惡勃窣叢祠牲血姿磨拂寧料碎首僅俄忽千年信史忠誼骨雲仍寶藏丑倉猝腥班穢梁意牽率嵗月安得埃坌汩孔公在天獨擊鶻欃槍掃净况彗孛傳之世守堪黻黼韻語盥澡更三袚向來段公恨咄咄逐泚中額幾袂捽兩公襟膽䕃濃芾餘子蟲豸聊勿勿孔世平家有髙規曽矩之的燈其擊蛇之笏與錦綈俱襲一日為豫出其所藏斂衽持之久之其妖血猶漬三數百載之下使正人端士聞孔公之風者皆有腦裂鼠子肝軌不制之懷則世平之寶之也豈止於魏謨之寶鄭公之笏也耶是日霜作凛冬凍墨欲氷之泓為書倉卒句如此世平家學模範他日必能嗣諫苑之清志恨豫老矣海粟馮子振仲尼魯祀訊爰居泉臺蛇數史不書後來諌議克繼志抗行絶世莫與俱妖蛇蜿蜒惑西土老稚相傳爭快睹殷勤叩齒薦苾芬為爼孔碩酒且藇惟公正色嚴霜威有笏剡上除慝圭裂眦怒施霹靂手妖氛掃蕩皆清夷餘血朱斑漬木紋家藏手澤歷世珍堆床象牙時所有或愧此笏難共陳段公擊賊可配美拄頰清談何足齒天日凌𢡟翁師德祥符曲阜孫疾惡出天性如豸必觸邪如草能指佞老槐千載枝風霜飬剛徑斫之為手版外直中則正拄頰睨妖蛇一擊新衆聽腥血留餘斑光采牛斗映宗器慎藏之家乘君甚稱魏笏何足言斯文紹將聖鄱陽吳存仲復曝龍成脯擊蛇笏三百餘年只二人義膽忠肝動天地情知怪物豈能神西江鄧楀覺非中丞故笏重魚須合置魯庭弓玉間二尺古槐凝徑氣一痕妖血𢃄餘斑看山曠士徒勞拄叩陛忠臣只漫還珍重錦囊傳不墜千年猶足竦人奸張翥蛇神狙怪同牛鬼子不語來非所畏異言異服疑衆殺何異寧州神鬼事中丞見笏不見蛇奮一擊去思無邪神無聲影接耳目吾聞吾見非昏花碎首不妨同石佛從此妖蛇無復出可憐章聖降帛書爭信先天一畫無三百年來血存跡我知不是看山笏問言朱泚便何如此笏有靈能擊賊合沙俞焯元明有物蜿蜒欲耀靈老槐生氣激風霆妖形拳首隨聲斃殷血留痕著面腥廷諍兩宫成憤烈家傳八世想儀型甘棠一睹存忠義三復徂徠舊日銘金華張道中率性正人操氣義槐簡叱風霆度不滿三尺威能攝六丁蜿蜒空漬血象罔盡潜形諫議今除害無人再乞靈五羊林宦東齊洙泗餘波固不群擊蛇手版至今存一時正氣扶民極千載英風凛血痕故物信為稀世寶異端彌覺聖人尊相逢共話寧州事籍甚中丞九世孫潘純漢祖蛇劍穿屋飛孔孫蛇笏世守之精金百錬尚磨滅此物不朽非人為擬是當年孔林植風霜為剪蒼龍枝百怪斂迹莫敢視終夜牛斗光離離寧州蛇妖在琳宫州人爭拜妖為龍幕府賔僚聖人後觀聽不與庸凡同持笏奮擊蛇腦碎再覩白日醒群蒙妖魂已變山鬼泣妖血浸漬猶殷紅生民免化為蛇虺屹若砥柱頺波中摩挲爾笏三太息利豈干將長僅尺殄除妖慝非無刑不惜輕身與妖敵丈夫烈烈固如此忠義自得神明力為公叩笏慷慨歌英風西來海天碧錢用士成夫笏本記事之端緒以備君前敷奏之用龍圖孔公佐幕古寧乃以碎妖蛇之首而斃之也何居豫嘗思之事莫大於陳善閉邪笏固可以致知亦何嫌於力行想公推讞外服與郡刺史步趣琳宫蓋朝服未嘗須臾去身一時目擊隂類惡物蠱惑民衆大而為政教之纍怒激於衷固不及手版之期妖靡勝德宜就死地而不得以去也昔孫叔敖斷蛇二首周子隱斬蛟九洞皆未聞笏從事以此較彼更為卓絶石徂徠以大手筆為之銘於天地間純剛至正之氣深致意焉豈溢美於公哉顧此一笏自宋祥符以來於今幾三百祀中間日引月長經涉兵燹不知其幾千百變乃巍然獨存八世孫巨源甫尚永寶之非夫神物呵護以章前修剛正之舉詎能爾耶故嘗謂巨源什襲祖笏奉以周旋使朔南名彥詠歌不足賢於魏文貞公之孫逺矣暇日當須齊沐以希快覩荆溪許應祈題原魯孔公登進士第初筮寧州推官州天慶觀有蛇出入神座下衆以為神州守率僚佐拜祭之蛇出公即衆列直前奮笏擊蛇首蛇斃衆大驚已而皆嘆服宋舊史及王稱東都事略具載其事然不紀其嵗月考公履歷自寧州推官轉大理丞知仙源縣入為太常博士仁宗天聖九年擢右正言劾曹利用羅崇勳以是推之公在寧州時非真宗末年即仁宗初年也夫信道篤者不見怵於邪用心剛者不詭隨於俗此君子之恆也原魯此舉切於救時弊正人心故有㓛於世教也甚大章聖之世神仙禱祀之事方盛所謂天慶觀者大中祥符間創於郡國者也時丁謂為相每齊禬必奏鶴降宰相以奏鶴固寵推官以擊妖蛇知名其救世弊正人心之功為何如哉他日使契丹方燕優人以先聖為戲公艴然出主客邀還廷中强之謝公曰兩國通好以禮徘優悔聖人而弗之禁是北朝之過也又何謝既還言者論其生事開釁詔詰公公對曰契丹見漢使輒悔易不較恐益慢中國仁宗然之此意與擊蛇正同切於救時激於為義不自知其勇也公豈立異駭俗者哉裔孫之居三衢者曰世平甫寶藏是笏殆三百年其子思搆至京師擕以視豫木色蒼徑節理疏直異他笏材妖漬猶在而公之剛方正大之氣與笏俱存者使人悚息而增敬焉名大夫士題詠盈軸因識豫言於别卷云至正乙酉七月辛卯後學廬陵歐陽𤣥書禮云笏度二尺有六寸諸侯以象大夫以魚須文竹士竹本又云將適公所史進象笏書思對命備忽忘也秦自荆軻之變謁者持匕首從官執刀劍以備不虞漢髙修文治制以手版侍宋祥符元年始賜進士袍笏五年而四十五世祖中丞公登進士第亦與焉初任寧州幕官州天慶觀真武象下有蛇妖咸以為神刺史率僚佐日謁其廷公曰眀則有禮樂幽則有鬼神惑吾民亂吾俗殺無赦而以笏擊之斃衆驚嘆云神龍尚殛况其他乎其笏長尺餘槐為之非它木材與古制異實登第時所賜也公之季孫四十七代族長中奉公藏於家世守之後遭靖康之亂髙宗南渡與姪四十八代襲封拜疏行闕賜田宅居三衢延祐元祀文運肇興中奉公六世平叔父歸闕里與上計之偕㑹宗族接教氣之感因出所藏笏以示諸故老思立時方總角侍諸父肅拜而觀之質理竒秀妖血殷漬手澤具存凛乎莫不袛懼自分據隔絶祖庭子孫不得見者百八十三年矣又三十二年思立參議中書日從弟思搆復擕入京師謁選再獲一覩故得略叙本末嗚呼魏謨守鄭公之笏才五世而唐人猶比之甘棠况於詩禮遺書又豈甘棠之比哉豫小子敢不夙夜兢業尚祖宗之丕靈正道未喪斯笏必能夀其傳幸寶之至正丙戌春九月世孫思立謹識右擊蛇銘羅元所録本楷法精妙李內翰甚愛其書因出示得借歸一録蓋不能效其筆意乃復草草水德婦李氏節行序彛倫風教之所由生也聖人筆之經昭乎若日月之垂天而有目者覩矣然豫觀乎詩王道得而王化淳者二南之正其風渾渾爾也降而至弼鄘以下之詩之風之變則有美有刺矣當是時詩亡而春秋作春秋則有褒有貶矣夫婦居室之常婚􅊚端本之要尤聖經之所慎重而十三國變風之詩其所美者衛莊姜而止耳衛共姜而止耳若牆茨諸篇抑何其刺多而美寡耶二百四十二年之春秋其所褒者紀叔姬而止耳宋共姬而止耳若孫於齊諸策抑何其貶多而褒寡耶豫之感於斯久矣適有以蘇之崑邑水節婦傳示豫者其文則錢塘陳君潜夫為之其播之詠歌者則皆四方之聞人其信而有徴者耶當節婦之早嫠邑人爭聘之而不二至自縊以絶群望此與衛共姜之矢靡他奚以異及其身在胥靡或勸之無以居孀對冀弗與同産連坐者而節婦堅莫之從此與紀叔姬之不歸宗國而歸於􅈶奚以異彼豪獷吏又乘其危讋之以威而利以怵之節婦又慷慨拒於辭色此與宋共姬之寧逮火而死不肯少避火以生者其志亦不大相異也凡此三節者能聞古人之風而興起有如萬一遇夫婦之變尚豈異於衛莊姜之無怨懟哉嗚呼賢矣夫賢而得書春秋之法也賢而宜詩歌之詩人之㫖也豫是以知斯世之不幸而有斯事也豫是以知斯世之不幸而有斯人也豫是以知斯人之不幸而有斯哀也豫是以知斯人之不幸而有斯名也作節行詩序蘇人金文徴傳節婦李名惠蘇之崑邑人也水德之妻也幼專靜不妄言笑聞女以貞烈著行者則欣然慕之年十九而嫁嫁二年而寡即屏去繁飾誓死以守義服闋里人爭以禮聘者至十數不為之變媒氏則以言動之曰夫人年少而無子其如衰老無托何節婦毅然曰是誠何言夫天也天可二乎夫不夀豫無子是命也吾則守義而已安知其他若亟去無汙吾遂引繩自經賴其姊護之得不死聘者遂止洪武癸丑其宗以事系京獄同産當連坐邑吏之任事者以勢要之曰若適人則可存李氏後不然俱蹈禍無為也節婦忿然曰若然則禮義可以危急去也吾志决矣雖萬被誅戮無悔也至或有勉其無以居孀對者節婦不之從一以實對上官髙其行以聞得護送還家業已沒於官無所歸矣節婦依貸所親僦屋而居紡織縫紉以自給其兄姊之孤女嫁而寡者嫁而失所依者幼而未有歸者咸聚而食之閨門雍睦泊如也節婦年若干距夫卒已二十四年矣贊曰吾嘗觀古節義行事凛凛在人耳目竊謂天地剛直之氣流行於兩間其鍾在人者固不以古今異也是何今之世獨無有哉李氏誓死守義當流離顛沛之際言論慷慨益久愈堅毅然有丈夫氣謂非得天地剛正之氣乎彼朝哭其夫而志已他往聞李氏行事而不之慚者無人心者也故為傳其事以俟觀風者采焉錢塘陳潜夫題後右崑邑水德之妻李氏年少夫亡無子守義孀居雖貧窮患難㷀㷀無依而志益堅能為其無所為而為可無愧於曹文叔之妻也今世之齪齪屈身苟活者能無愧於李氏也哉錢塘陳先生潜夫為之傳而李貞節彰矣蓋潜夫學行卓卓少許可其言足徴豫三覆之餘并識於後豐城余銓詩繄節婦李剛而毅伉儷再期所天逝蓬首垢面屏簮珥鄰媪媒蘖言以說下無兒息旁無恃㷀然孑立非逺計上指天日矢不二引繩自經明已意伯姊往救出死地絶而復蘇息浮議薦罹變故投荒裔執言不回身免竄放還鄉里行益厲朝夕紡織供飲食聚兄姊孤一室內撫育教語若己出貞哉沉江逮火斃之死靡他柏舟誓悲歌黃鵠以見志禮宗罵賊速盡惠景行義桓旌厥懿縊車刺闕刀割鼻剪髮投井斧斷臂繄節婦李誠可儷陳子作傳庶無愧於戲偷生等犬彘汝陽袁華良人應早世貞婦自名門鏡缺人虧影蘭衰命在根斂容知悴色翻袂掩啼痕易斷生前誼難忘死後恩柏舟詩在昔愧我若為論丹丘吳俊彼美水家婦節行端可許藁砧既云沒銜哀告無所疏􅎉月流光形影相弔與一以貞自守長年事機杼厥志莫我奪矢言惟死拒托身比松柏肯受氷雪阻嗟嗟桃李花酣春媚芳墅朝開暮還落曷能久延佇載歌節婦詩敦風振頺靡吳興盧焕崑丘故鄉邑一别三十年歸來訪陳迹衰草迷寒烟峩峩貞節門屹立山之前云是水德婦二十失所天黃鵠去不返泣涕徒漣漣之死矢弗二節行金石堅吏以威福說媒以笙簧言了若耳不聞此心如井泉機杼玉指寒孤燈照愁眠僦居蔽風兩撫育諸顛連寥寥千載下睹彼節婦賢東陽沈中水家婦李家女生長深閨好眉嫵適人未久移所天日日靈前哭如雨百年大義不可孤此心今知鬼是夫蕭條白屋風雨夕青燈照影寒蛩呼東家媒娘曽致語誘以黃金百端綺古今一醮無改更妾身念之惟有死寡居紡織三十年生計粗遣天垂憐剪髮截鼻良自苦柏舟永矢同稱賢持家守道非求衒節行貞堅端可羡鄉里嘖嘖播芳名千載清風著家傳髙平范中立水家貞婦蘭蕙姿念載孀居節自持陶女矢詩黃鵠􅋵共姜誓死柏舟詩感時顧影臨鸞鏡舉案傷心對繐帷只恨同生未同穴九原無路不勝悲曲阜孔克讓右崑山李節婦傳國子學正潜夫陳先生所作節婦二十而夫死夫死無子守節者二十又四年今年幾五十嗚呼李氏誠可書也余嘗居崑山惟聞有王節婦一人不知有李氏蓋王素多資李甚貧鄉里不為表白故不見稱於人也觀李氏之不見稱於人則天下之無聞於世者多矣是可傷也是可傷也今制天下鄉保郡縣立申眀亭以罰惡繼又立旌善亭以賞善余行南北見申眀所列姓名甚多而旌善獨無一人豈真無其人耶人之不樂稱人之善善人之不得聞於世豈細故哉雖然李氏節行能使國子先生文之名公卿詩之天理豈不較然明白耶他日良有司必首能承上㫖意列名旌善光表其門者矣李氏之夫水氏名德為賦崑山五章章四句崑山之陽有玉溫兮惠也如玉不可焚兮崑山之隂有石儼兮惠也如石不可轉兮下有别鶴巢於山松鶴唳皎月松號悲風上有孤鸞棲於山柏鸞翔間雲柏老積雪松柏可摧鸞鶴可伍惟此玉石勒名千古齊郡張紳水節婦李能以貞義自誓臨難不回廬陵易恆作詩以紀之厥俗靡義是履孝婦令女事有矣陳子作傳遲良史海枯石爛婦不死吁嗟乎節孝李易恆豫觀節婦臨難時小人乘間以利誘其陷於不義婦拒以正論而止固婦之罪人又能育族中無歸之子女五人俾其得所則視世之享富貴而以途人待故人饑餓者又何如哉尤婦之罪人也吁其可尚也已矣時洪武壬戌立春前二日書於李氏之書堂恆又識婉而淑靜且寧玉之瑩氷之清一與醮同死生早不天守㷀㷀矢弗二遂自經志益勵行益貞事紡績撫嫠惸拯頺俗是宜旌松南法詢寒水無波不離井古磚作鏡何人信崑山節婦水德妻持鏡照心不照影捲下鴛鴦衾擲下鴛鴦枕嗟嗟未亡人所天身已殞碧梧老去鳯單棲半㸃殘燈照孤影廬陵廖敬先人倫重綱常婦道無二天良人失和聲擘斷瑟琴絃孀居誓不續風化天下先既遭里人毁貞立何所偏自比青山石心如古井泉聽使外物誘不􅏒亦不遷遂令汙濁婦尤當思靜專雖得秉彛理更用文章宣潜光表淑德萬古日月懸淞南張澄跋古之人以忠孝節義自見者必見録於史官以為天下後世勸善則立言君子以發潜闡幽為事者亦從而書之以告當世誠以天理民彛所繫不可得而已也夫豈尋常細故哉崑山李節婦惠水德之配也年二十未有子而寡誓死以守義今草有四年矣吾師潛齊陳先生實為傳其事而節婦之幽光頓以白矣且吾師之言信必傳世而行後而一時聞人又播為詩歌以美之節婦雖云不可而托斯文以傳不朽則有甚幸者焉其姪李進伯裒集若干篇裝潢成軸以示于豫伏覩聖朝崇尚節義使者行部必孳孳以詢察咨訪為務有以上聞將見龍光下賁表異其門則於天理民彛益增重矣豈不偉歟故感而為之書洪武十四年十月十日奉議大夫通政使司試左通政余愾題人之有生不可不知其道且夫女事夫臣事君厥志終始無可渝者蓋夫乃天也可不盡其道乎同郡水德婦李氏年少寡居德容兼備紡績自飬或以勢利誘之毅然拒之則見其志􅋵堅確儼若秋霜烈日不可犯錢塘陳潜夫端友也既為之傳言豈誣哉李氏能守其道而不失其節貞可尚矣余雖不文每讀前代節行諸傳未嘗不掩卷起敬况乎今日目擊而親睹之耶嗟時之人徒知有生之榮不知有生之辱大義淪喪小德奚足論歟使其知有李氏之風焉得無愧於心乎斯言膚淺尚俟國史采托以警流俗云婁東曺亨字長通又詩崑有李女俶且貞兮爰配君子鳯凰和鳴兮夢未維熊夫歸杳冥兮晝哭素帷灑淚盈盈兮夜績青燈抱影惸惸兮巧言蠱惑欲效雉經兮之死靡它艱險履氷兮終焉允臧天理足徴兮義撫孤弱鞠育望成兮岩谷無人蘭蕙自馨兮霜雪沍寒松柏獨青兮一身秉節千載著名兮孰與為儔共姜陶嬰兮旌表可待光賁門庭兮彼二心者靦顔偷生兮鑒以衆目涇濁渭清兮老人作頌庶示勸懲兮洪武十六年秋七月既望司業王嘉㑹書於彛倫堂周道興二南之詩為正風漢廣白茅上作下應婦無有不由於正者周之教也陵夷之久變風於是乎作焉然則謂之正者性正而習亦正也上之人能庶之富之而教之也謂之變風者性未有不正而習或變也上失其道則下遂失其教非其性之罪也故有天命之性不可無修道之教然變風之世去文王之教逺矣鶉之奔奔信醜矣無共姜之柏舟乎株林澤陂信無禮矣無宋伯姬夜不下堂而火乎此性也不與變風俱變者也正變懸絶人品相去逺矣性與習之纍耳若夫兵革前驅衣食內迫苟且活性命權宜狥風俗者屢變矣獨崑山李氏惠年十九歸水德二年而寡且無子邑人爭委禽焉誓不奪志於今二十餘年鄉里以節稱而士大夫贊咏之盈軸夫然後知夫性之自然有不待於邦國之教嫠婦之生全其良心是何美也壯士在險身或辱婦也秉義潔氷玉崑岡孕秀氣清淑脫笄解髢弃膏沐粒聚絲蓄佐不足速於訟終不從婦也髙節烈士同自奮單弱保厥躬懷清臺髙齊玉峰名與婁水流無窮吳郡周南老題李氏女水德妻生來蕙質多令儀年方十九始擇歸二十有一身已嫠崩城哭聲淚交墮化石望回情轉悲掩却嫁時鏡愁對孤鸞影蜂媒來往漫自狂淨洗孤粧容不整髮似春風楊栁花也隨蝴蝶過東家誓將守志只如一任自穿墉作鼠牙將老無兒息夜夜挑燈事機織縱令石爛海揚塵皎皎如初總不易陳君傳述名乃聞宛勝官長表其門北里西鄰美貞節死前艱難那可說吉文郭子翀竹西彼美閨中質居寡當盛年柏舟曽有誓玉貌忍重妍寒暑頻交代貞堅自不遷儒林爭頌述文石看新鐫金華吳沉濬仲朱絲托寶瑟流萍寄緑水水枯萍尚在瑟碎絃不弛憶昨箕帚初結言共終始錦衾幾何時潜寐長不起羅襟為誰開鬢髮為誰理蹇修何為來悲嘯發皓齒飛藿不再陽豈無桃與李保此氷玉身見彼黃泉裡潯陽張來儀荼生根不移菊謝枝不離婦天一醮終不改天且可改三綱隳傷哉古道久凋喪况乃造昧雲雷時昔為東家婦今作西家妻小草有貞性人反禽犢為世無障川手瀾倒誰能支彼美節婦李卓卓見所稀早嵗事良人舉案與眉齊一朝破鏡飛上天二十四載甘空閨不事治容粧不著嫁時衣皎皎玉雪􅋵暗室生光輝繭絲麻枲躬績紡晝響刀尺宵鳴機女紅為飬不自飽族有嫠女咸相依嫗言來簧惑彼寧知秉彛此心匪石不可轉憤怒竟欲以死辭貞義凛莫奪上有天公知冥冥之中隂相之介爾景福錫爾遐夀樂哉黃髮以為期我歌節婦詩警彼薄俗漓惸惸女子能若斯男兒節義胡可虧嗚呼男兒節義何可虧節義不立非男兒華亭黃章玉之山麓滄海漘清淑氣萃生令人水家有婦抱氷節早嵗即傷所天折髻螺不整鏡鸞空色槁形枯淚成血淚成血心愈悲不比世間生别離生離原有重來日死别竟無相見時舊業不復存辟纑禦寒饑饑寒迫身節敢虧艱難萬變志不移清芬誦江左奕奕無盡期况能薰爾類同作蘭與芝山靈嘖嘖海神喜豈愁人世無人知滄海或可填玉山或可摧貞婦之心不可回淮南石光霽狂瀾奔注障者孰節婦李惠名最暴惠歸水氏再伏臘忽然一旦夫不祿荆叉布裙休膏沐之死靡他分幽獨還諸女姪家穆穆女工惟勤胥勸朂媒氏簧言汚貞淑欲使冠裳等禽犢忿然自經兄解縳良人夜臺應瞑目同宗連坐係天獄僉言飾對罪可贖婦見上官以情告官為上請回鄉曲吁嗟節婦義尤篤共姜令女真其屬清燈半世守苑屋松柏同操梅同馥皇華不日覽風俗東觀直筆書汗竹婁江沈丙崑峰李婦世稱賢二十孀居失所天氷蘗素持心匪石衰麻忍著淚如泉機窗竹暗霜飛曉鏡匣塵昏月下弦無子營生遭亂裏有身甘老未亡前自經不憤媒言惑訴實寧教族禍連已報陳情恩特降即時歸里節仍全閣門孤幼能垂撫多士詞章喜甚傳誓比共姜名益著歌諧陶女志逾堅昔年勵行應難並此日觀風孰敢先自是綱常千古事好將貞烈續遺編廬陵伍介貞又跋余讀共姜柏舟詩未嘗不嘉其貞烈而嗟嘆之也今觀崑山之節婦李氏蓋亦類乎共姜者故大夫士歌咏之若其顛沛之際詞色慷慨與夫事女工以活族之孤嫠則共姜之所無而李之所有者若其詩見録於聖人而列於三百篇傳之天下後世者則共姜之所有而李之所無也如論其志行卓然自守而卒不可搖奪斯二人蓋異世而同符也嗚呼禮義之在人心不以盛衰存亡而變易之者於斯可見傳所謂嵗寒然後知松柏之後凋余於節婦亦云洪武丁卯五月八日河東片石山人克明吕昭題又詩鳴雎在河洲飛鴻度河流嗟鴻非雎屬兩志能相投雎生有定偶鴻孤無再儔繄彼物情正胡乃人不修崑峯水德婦志潔澄潭秋新粧識夫面年華才二周良人倐奄逝嫠居終白頭持此不二心誓死同一丘玉顔紅粉盡翠幔蘭香收泣血每自志悲思追柏舟世有未亡人朝哭朝歌謳豈非節婦恥重為雎鴻羞胡漣當途既失御典午紛披猖大朴日以漓薄俗悲風傷孀居惟令女獨以禮自防孤貞照日月雅􅋵凌氷霜悠悠百世下擅美誰聨芳近聞李名惠乃能負劍腸守節志不二臨危行猶良事輕鴻毛並義重金石芳撫此異今昔感歎心難忘緬懷穹壤間曄曄同耿光於焉表風化庶足扶綱常長沙謝文字明逺昔擕箕帚順民風林末歸霞忽墮紅字寫桐花題品滿眼明水碧海雲空治平好在共姜並紡績今歸豳頌中崑玉髙寒三百丈山青不與舊時同王起又跋女之事夫猶士之事君當秉天地剛正之氣忠節雖殊其分一也豫嘗怪司馬公之作史也遊俠者傳焉貨殖者傳焉而不傳烈女行何耶蓋是時去古未逺風節尚存人知守一而已而不知他也降及東漢猶庶幾焉雖曹操之奸雄終其身不敢篡漢皇甫規妻寧死而不負其夫亦可知矣噫世道日降風俗日漓自元迄今吾邑得婦之貞烈者三其中亦有幸不幸也其幸者朱虎妻茅氏旌表門閭名照青史水德妻李氏䇿名天府播之聲詩亦已至矣嗚呼其不幸者則太倉周氏女于白刃之下從容就死可謂難矣而采風者遺之獨錢翁一傳存焉是可嘆也雖然君子盡其在我者而已豈復論其幸哉為臣婦者觀此亦可以少助剛正之氣矣邑人盧彭祖字長嬰婦以節行旌非古也世弊俗偷情勝禮欲奪義其能以節名者不有以章别之則奚足以振頽靡昭貞烈也節婦李氏事筆於吾友陳潜夫之文言可徴也足為世教勸嗚呼秉彛在人貞節恆有而世不盡聞者言未足以取徴耳深可歎也洪武壬戌夏六月望日周敏跋又詩孀婦青年志不羣鉛華寂寞幾經春簫中已斷孤鸞曲機上誰分采鳯文甘與寒梅同徑操肯將白璧涴緇塵惟應行義譽前古贏得清名表縉紳章貢黃莊字伯敬禮義在人心耿耿不可滅所以忠烈人之死保名節世降習俗移斯事豈云缺今觀節婦行禀操早竒絶景慕節義事臨危見貞烈平居尚所難况當值縲絏慷慨出語言丹心更昭晰凛然範薄偷上與古先列崑丘秀而髙婁水清且徹先生為作傳端厚風教設後學朱吉元氏失其馭綱常日以淪如何見婦人節義乃紛紜含笑蹈白刃謾罵損厥身下至里巷間逺邇風化聞崑山水節婦賦質婉且淳閨門著懿行及嫁母命申二載失所天哀號感比鄰生死不再適願從泉下人或者諷非議忿然興怒嗔禽行欲相汙雉經豈無因豪吏乘我急要之結婚􅊚無由得上請戮彼滄江濆連逮獲賜宥仰荷再造恩歸來家室盡觸目皆荒榛僦屋庇風雨女工度朝昏寒食一盂飯淚灑水氏墳自從喪亂來大義久不振屈膝幸苟活多是厚祿臣亷耻道已喪臨危竟忘君庶幾愧此輩正氣時一伸聖朝有盛典旌表節行倫皇華米民風願以行實陳傳之史册內炳炳垂千春吳人錢震衆人皆有偶孤生獨不辰既笄去親側于歸畢婚姻克配承君子率德義與仁好合如琴瑟和樂兩相親執手與偕老誓言豈昧陳誰云一朝異中道忽先淪瓶沉傷綆斷鏡破惜鸞分空梁弔落月殘燈照孤魂幽閨離寒暑獨處慎苦心眷眷懷昔時愴惻淚沾巾生同世上匹死願穴中塵堅秉從一言終此百年身盧儒又跋豫觀古之君子固樂道人之善然亦未嘗有名之而不副其實者誠以天下後世之不可欺也錢塘陳潜夫先生傳李氏貞節事歷歷可考其必因其實而名之者耳不然則何以取信於諸名人又從而詠歌之邪嗚呼世道降矣節義之人不易得矣若傳稱李氏者可謂風雨之雞鳴晦冥之日月矣然則君子不知其實則已知其實又安可不揄揚之以為薄俗勸哉抑又聞潜夫明春秋必知慎豫奪之㫖余故書此以表其言之足徴若夫敘其事之本末則見於諸作者屢矣豫奚庸贅西河林鍾此卷在李內翰處借歸吳才為録今聞此卷在沈石田家聽雨樓篆玉雪坡翁至正草五年四月草七日黃鶴山人王叔明於盧生聽雨樓中晝坐盧名恆字士恆時林東海雲林生同在此樓詩雨中市井迷烟霧樓底雨聲無著處不知雨到耳根來還是耳根隨雨去好將此語問風帆聞見何時得暫閒鐘動雞鳴雨還作依然布被擁春寒樵人張雨為盧山甫題至正八年二月十一日河濶樓低雨如洗祗疑身宿孤蓬底清晨倚檻看新晴依舊山光青滿几聽雨憐君隱市中我憂徭役苦為農田間那得風波險朝朝愁雨又愁風荆蠻民倪瓉虛牖濛濛含宿霧瀑流澗響來何處江湖近向枕邉鳴林風又向簷前去挾水隨雲自往還塵根不染性安閒多情一種嬌兒女淚滴天明翠被寒至正草五年嵗在乙巳盧士恆攜至緑綺軒見示因次貞居外史詩韻以寄意云陶篷寄亭中山人暨諸名流當不默然也後十又八年四月九日瓉記擬張外史倪隱君聽雨樓詩韻湘簾蹙浪縈香霧幽人髙卧雲深處月明叢桂小山空疏烟白鳥滄江去沉浮里社樂蕭閒大隱何妨市井間拋却喧咻清淨耳草樓六月雨聲寒塵生兩耳何由洗喜聽雨聲茅屋底灑然心地自清凉靜對爐熏時隱几乾坤納入懸壺中書田霑潤稱書農也勝江河風浪急客舟飄泊怨秋風西澗老樵蘇大年城市不著耳江湖留此心樓髙人更靜惟有夜懷深醉翁倪隱君索和張外史聽雨樓詩走筆二首答之海氣雜嵐霧聽雨宜髙處風雨無時無倐來復倐去搖搖心懸幡胡為不自閒世人曽聽雪無被不知寒頭白嘗不洗聽雨車屋底兩耳任喧聒坐隱烏皮几筆耕墨畦中自適如老農二仙闕今古神交在閬風堅白老人書於素行精舍一榻春聲雨滿樓杏梢微濕五更頭東風更緑江南岸賣劍家家盡買牛荷影香飄竹外樓雨聲滴碎採菱舟南風一夜生新漲魚鳥還知此樂不積雨新凉轉蓐收碧梧初霽滿城秋鄰家不識豫心樂也愛書聲在小樓天地嚴凝萬壑氷不堪寒雨灑孤燈一樓佳氣尤宜雪紙帳生春睡未成曲江錢惟善春雲靄江郭鳩鳴朝夢餘樓中雨颯至煩抱淡云除歷歷樹頭亂蕭蕭忩影虛如何門外水泥潦沒行車渤海髙啓山忩孤春雨冷氣襲病膚鋪床閉齊閣衣被熏香爐風燈苦屢挑夜茗更再呼煩囂悉屏逐妙理在跏趺問子草樓底兹情還有無承平時貞居張道師與雲林倪徴君並以翰墨致髙名於吳中二人亦雅相引重先君子與貞居遊最早豫時以童子侍坐隅尚能聆其風采今先君久已棄諸孤貞居亦化去天下多故而豫始得從雲林君遊至正乙巳季夏之九日豫謁君於盧士恆氏之聽雨樓獲覩近製詩若畫冲淡雅論令人塵襟灑然既而士恆出此卷徴題二君之作具在因賦存歿口號附於卷末以寓感慨之思云華陽洞裏烟霞閟靈石山中草樹荒惟有小樓曽宿處年年春雨滿滄浪黃冠野服人逾玉畫卷詩篇老更竒白首故人無在者小樓殘燭雨忩時潯陽張附鳯江雨飛來夜氣澄小樓髙處冷於氷聲留蕉葉頻欹枕影亂簷花獨對燈逺客異鄉生白髮故人今夕擁青綾致君堯舜慚無術思入湖天睡未能淮南馬玉麟草樓聽夜雨春燈隔重簾瓶中新茗煮奩裡舊香添風珮潜歸浦雲璈亂綴簷忽驚來湛湛更覺去纎纎頗被風相妬還冝雪與兼喜隨漁艇泊愁怕客忩淹頭白盧貞士髙情苦未厭張紳重題山風滿樓來雨腳耳底蕭蕭生逺情還丹化鶴度句曲破屋無人住洛城酒停深夜蒼燈在簾近餘寒濕葉鳴板上闕書空爪跡繞簷依舊落春深觀張外史所題山甫盧隱君聽雨樓詩詞翰瀟灑令人有超然之想噫故物也士恆其慎藏之四月三十日王謙寫於客居更深樓外何蕭瑟半𢃄滄江逺樹風疑是千林闕坐聽一穗燭花紅斯人雅致今安在此夕幽懷孰與同老我題詩成感慨雨聲有盡思無窮吳郡盧君山甫舊有聽雨樓山甫歿二十年而斯樓尚存豫抵吳惜不及見其人今其子士恆攜張外史所題詩來示豫豫覽之不勝感慨遂為賦此至正二十五年四月一日檇李鮑恂書飛樓何凝隂雨氣正含霧瀟灑集群闕淅瀝散髙樹聲懸長風外坐想當瀑布習喧久漸息靜聽乃真趣隂晴造化闕年芳暗中度白髮如散絲憑君寫幽素開封鄭元雲林夜澄寂有雨彌更佳漠漠著樹穩霏霏度檐斜人靜意所便爭喧競浮誇弛張任槖籥細大無根牙妙運出𤣥造至理忘紛拏變化本無妄聲聞自生瑕不如且置之攝心靜無譁危坐不須寐呼童剪燈花卧龍山民王宥又跋勝國之季兵燹之餘前輩翰墨存者無幾間或獲一見如遇蜼彛兕敦不能不使人欣艷也聽雨樓詩句曲外史及一時名流所作詞翰兼美亦稀世之寶也吳中盧氏恆甫藏於篋中一日出示於豫豫展卷觀之卷中作者多余故友兹睹翰墨便若親彼風度而不忍釋手也士恆宜珍藏於家慎勿輕以示人焉洪武二年春二月二日吳僧道衍書又詩層檐集飛雷深砌走鳴瀑餘聲殷天籟清風入林屋風波任喧洶燕坐瞑雙目置身得蕭爽洗耳絶塵俗香檖鬱水沉蘆花映湘竹篝燈動春酌剪韭留夜宿與客對床眠清談未云足金陵嚴瑄幽人愛樓居燕坐風雨夕髙檐㵼飛湍空除墮殘滴傾耳疑枕流屏喧時岸幘江聲晚蕭蕭樹葉寒􅀈􅀈境絶迹更佳趣淡情自適霽曉愜憑䦨春深杏花色浚儀趙俶一年過京口帆飛疾於走半江疏雨隔篷聽㵼下驪珠三百斗一年過漢陽雪山翻怒瀧黃鵠磯頭泊船住醉聼秋雨眠西江一年過東海急雨亂灑船忩外洞庭帝子鳴鈞天蓬萊仙人鏘玉佩今年過長洲故人邀宿聼雨樓玉山傾倒恍然醉一笑使人消離愁公本拏雲夫我亦聼雨客明朝天晴當奮飛萬里天風振鵬翼淞上鈎鰲生書於百花洲上少年聼雨歇樓上銀燭生惆悵壯年聼雨客舟中天濶雲低斷雁呌西風而今聼雨僧廬下雙鬢蕭蕭也悲歡離合總無情一任空階㸃滴到天明右竹山先生所賦之詞豫偶獲觀此卷因舉是詞成甫俾書卷末夫聼雨一也而詞中所云不同如此蓋同者耳也不同者心也心之所發情也情之遇於景接於物其感有不同耳成甫中年闕有樓聼雨闕其與在僧廬之下者同其情成甫乃曰吾聼雨吾知在吾之樓而已遂書竹山姓蔣名捷字勝慈義興人也卷中諸先輩之先輩詞之腔虞美人也韓奕聼雨樓諸賢記張雨字伯雨號句曲外史武林人學道三茅峰而才名滿天下若虞文靖公黃文獻公咸稱重焉先生妙於書人得片紙咸以為寶至今好事之家多蓄之客至則相與展玩先生書法黃太史清新髙邁不流於衆雖元氏翰林諸公亦自以為不逮也倪瓉字元鎮號雲林無錫人家最饒而先生脫略紈綺一事於翰墨作為詩章妙絶一世人欲不服自不能不服也虞文靖公張外史伯雨深相契焉然先生性癖傲物多忤於時元末棄家業泛舟五湖三􅍩間興至則提筆寫烟林小景或竹枝偶流於市好事者爭貿之雖千金不靳也王蒙字叔明吳興人號黃鶴山人趙松雪之外孫也素好畫得外氏法然不妍求於時惟假筆意以寓其天機之妙為文章不尚矩度頃刻數千言可就君子咸以豪士目之蘇大年字昌齡揚州人元之翰林編修天下亂寓姑蘇為文章有氣不喜衰颯江海襟懷亦人中之豪也饒介之號醉翁江西人元氏時寓姑蘇以跌宕自任工於書君子評之者謂其不减懷素至今人家多有之周伯溫號玉雪坡翁饒州人為人慎重為元氏左丞天下亂流寓胥臺而無所就然妙於古篆得趙文敏公遺意字頗化而玉潤可愛士君子至今寶之錢惟善字思復松江人元末進士精於詩得杜子美法不苟作作必致其妙張紳字仲紳渭南人慷慨激烈不瑣瑣於世事作為詩文雖不經意而自成一家能議論終日亹亹不能休蓋北方豪傑之士也歟為本朝浙江布政而歿馬玉麟髙郵人元氏為長洲縣尹有政聲括蒼鄭明德先生有碑卒於僞吳鮑恂字仲孚嘉禾人元氏乙亥科易經進士為本朝文淵閣學士為人慎重不可狎而學行名天下有學易舉隅行於世後以事纍卒於外趙俶字本初紹興人元氏乙亥科書經進士龍馬賦為時所稱許先生性耿介不易與人交交必久為本朝太學博士而歿張羽字來儀一名附鳳與髙啓行輩也文學歐陽子甚縝密婉轉可愛雖前輩視為不及也君本潯陽人元氏亂寓湖洲為本朝太學博士而歿道衍字斯道姓姚氏姑蘇人𢎞才茂思為時所稱與張來儀髙季迪輩為文詞相頡頏而澡神浴德則非諸君所能及皇上龍興以贊佐功封少師賜名廣孝蓋又以元之劉秉忠並稱云髙啓字季迪姑胥人身長七尺而好於詩詩得唐人體裁語精而意員句穩而情暢雖前輩有所不及焉為本朝編修官後歸家卒王謙字鳴吉姑胥人以春秋學為府學教授王宥字闕助與髙啓逰能為文陶振吳江人有詩才然性不羈人或易之韓奕字公望吳之良醫也好與名僧逰所云蔣竹山者則義興蔣氏也以宋詞名世其清新雅麗雖宋人周美成張玉田不能過焉右聼雨樓詩卷其間所載皆一時名士誠可寶也然豫觀此卷而人品有三其至髙者聞而知之其次者事而知之其又次者交而知之若伯雨張公元鎮倪公其殆最髙聞而知之者歟自叔明先生以下豫髫年皆事之自來儀以下豫少年時曽交之總若干人皆能以文章名世者也然自衍公外多湮沒無名至如伯雨元鎮二先生若精金美玉不可泯滅况其負超邁之才遺世獨立髙潔無纍周游六合盡大觀而無遺乎豫初在鄉里時嘗聞吳城盧士恆家存此卷欲一見而不可得見者無不愛惜今吾友沈成甫偶得之誠可賀也成甫寄至京都求題始得一覽焚香展卷清風凛然使人毛骨頓爽豫復何言姑述卷中作者諸先輩出處大略以為諸賢之記成甫姓沈字睿號存耕有才識善吟詩好與吳士大夫遊豫之布衣交然則觀斯卷者當仰其清風素範益勵其德哉勿以吾言為謬矣峕永樂五年嵗在丁亥二月初吉翰林侍讀學士奉訓大夫錫山後學王達識又跋右聼雨樓詩畫一卷元季及國初諸名公為吾蘇盧山甫父子之所作也永樂間流落錫山沈成甫氏成甫嘗求王內翰達記述卷中諸公出處之大略藏之以為至寶蓋聞淳熬搗珍非遇易牙不足以知其味之美雲門韶濩非遇師曠不足以知其音之妙使後或非人其不視為匣中之故紙而覆之醬瓿者鮮矣聞吾相城沈翁孟淵博雅好古其子若孫多矣而且才必能鑑賞乎此可以寶藏於永久不逺百里持以奉翁一見之喜乃以厚禮答之既而即瀕浮小樓扁以聼雨置卷坐右暇日輒遊玩諷咏恍若接諸公之光儀而聆其謦咳也一時名人勝士登斯樓披斯卷未嘗不心醉神怡斯樓之名遂擅勝於南東是雖翁之髙致所就然亦豈不以斯卷之所在乎或曰諸公無恙日翁多親灸之者惜乎斯卷不為翁作而為盧氏故物也豫謂不然夏后氏之璜封父之繁弱豈為魯之所制耶魯之先公所得分器子孫世守之以為至寶也斯卷也其璜也其繁弱也翁之子孫寶而守之又奚知其盧氏物邪翁之孫啓南出以示豫豫僣贊於左方成化庚子清明日長洲陳頎識此卷石田家藏石田攜至李內翰處秀野軒篆玉雪坡翁書記一元之氣生物而得其氤氲扶輿以成其精英淑粹者為秀焉故卿雲景星天之秀也崇崖繚溪山之秀也麒麟鳳凰羽毛之秀也美材碩德人之秀也人介乎兩間又能覽其物之秀而歸之好樂寓之遊息如昔人棲霞之樓醒心之亭見諸傳記者不一也吳人周君景安居餘杭山之西南其背則倚錦峰之文石面則挹貞山之麗澤右則肘玉遮之障左則盼天池之陂雙溪介其南北四山之間平疇沃野草木葱蒨卓然而軒者景安之所逰息也軒之旁幽溪曲徑佳木秀卉翠軿玉映於䦨楯之間得江浙行省左丞周公題其軒之顔曰秀野以志其美此其是歟嗟乎物有托而傳野得人而秀雷塘謝池是己景安居是軒也又將觀列史諸書以鑑其事服前言往行以進其學使他日有偉然秀出於餘杭之野者吾於景安有望焉因書以為記至正二十四年嵗在甲辰四月十日睢陽山人時年七十又一朱德潤畫并記字澤民别號眉宇山人余昔逰吳中諸山至周氏秀野軒領覽天池玉遮之勝今數年矣近歸寓軒獲視周侍御之大篆朱提學之新圖恍然若夢遊也景安求豫著語聊爾塞責耄餘材盡愧無佳語耳至正二十五年五月既望京口張監天民書時年八十五詩我憶天池與玉遮幽軒淡木水清華笙竽逺振風林竹錦綺晴連曉徑花山罽敷牀朝看雨澗泉潄玉夜分茶番陽大篆睢陽畫不負舂陵處士家昔年曽作軒中客今日重題秀野詩四檻采雲晴縹眇繞墻蒼雪䁱參差雨餘山氣侵茶鼎風過林香落酒巵嘆我松楸渾咫尺倚䦨長是不勝思吳郡朱斌屋裡青山屋外溪水流雲度坐中知粲花翠竹春來好古木蒼藤曉更竒教子讀書兼學稼留人炊黍復烹葵蓬門風景饒天趣都在斜陽曳杖時張吉髙士閒門日日開逺山如髮水如苔幾時稅却塵中鞅布襪青鞋屢往來瞿莊琅玕芝草繞軒幽日靜簾垂不下鈎憶得玩遊聨玉麈仍同騎鶴赴髙洲朵朵峰巒擁玉鬟桐隂滿地闕尤慳居人一覽鍾神秀霽月光風詠笑間香裊洞邉春晝遲忩分花影覆參差只輸我輩烟霞侶恆得憑軒歌紫芝靄靄凉雲雨後隂抱琴開酒愒中林睂山不獨知司馬安也還能識闕心比澗生薛穆結茒近東臯清曠接平衍新春微雨過芳草緑如剪攜書坐深竹自讀自舒卷興至䇿杖行初不賴輂輦西鄰雞豚社落日牛羊圈至貴在無求何勞事冠冕嘉陵楊基江晚洲渚交雨晴草霏霏前山靄欲開罟師度水歸望烟知君家花竹隂半扉乍休田中來獨響林下機此鄉即桃源亂後世有稀開圖身已到不知塵境非孟渚野人髙啓何處問幽尋軒居湖上林竹隂看坐釣苔跡想行吟嶂日斜明牖渚風凉到琴相過有鄰叟應共爾論心郯郡徐賁霽色青蕪外開軒此獨幽竹深頻理徑山近不為樓茶興邀僧共花期報客逰看圖闕到晚借屐闕相求張羽濕翠浮草芽空青散林杪輕舟理橫塘歸人渡清曉棲鴉返故巢潜鱗躍新藻倒景淡斜暉廽颷蕩晴昊衡門夜不扄燕坐事幽討落葉秋自飄殘花春漸掃愛此圖中人朱顔常不老我欲往從之稅駕苦未早揮手謝孤雲去去沒蒼繳菜薖余堯臣唐卿髙館罷零雨前闕揚微風霏霏碧蘿花吹落酒斚中移席俯流水揮絃度秋鴻遙思獨樂意邈哉誰與同太原王行古苔十畝青山麓窈窕幽華映深竹中有髙人晝掩扉裊裊藤梢上書屋清風出谷灑秋香返照穿林破春緑不省睢陽畫裏看闕路經丘秋黍熟王彛東山淑氣曉環翠南畝斜陽晚映紅物我兩忘天理見欣欣花木總春風徐圭遙遙烟際村村上君家屋雜花映洲綺春山繞門緑所居非鹿門避亂良已足月窗古苔詩松琴緑水曲不記來客多惟當酒恆熟沈純德乾不識餘杭縣今知秀野軒溪聲長在耳山影正當門人自千鍾祿君猶獨樂園樵漁不許到車馬幾曽喧江隂張端積雨初開霽郊霏野色新蒼茫連落景迢遞映闕春簷樹隂方合庭蕪緑乍勻豈知多難日獨樂有斯人韓奕時雨靄泉緑開軒欣景幽烟樹籠逺墟風苖際平疇闕林間户射鴨溪上舟居幽絶俗地闕髙隅結搆分平野開軒挹翠岑輕雲生晝暝佳木翳春隂曖曖烟墟緑森森華竹深明當謝塵鞅杖履一追尋勾吳樊圃孟學門掩雨餘苔時因看竹開客閒棋響罷犬吠履聲來雲冷理琴薦花繁近酒杯髙情與幽思只是覔詩材吳郡田耕仲耘聞君溪上結幽居地僻時通長者車山愛夕陽留几席竹因凉雨潤琴書碧香已漉新篘酒白味兼分小艇魚我亦有家山水窟十年無地著茅廬㑹稽張文震澗户掩春隂鶯啼晚山寂殘花落徑多處處迷行跡渾似入桃源令人恨難識桂泉金震秀野軒僕數年前曽為景安茂異賦之恆愧草草塵語不足記録今一展卷諸傑作在前甚覺形窳俯書此圖後日更賦之也秀野軒開瞰水濱無邉光景四時新此用晦菴先生語當是起句十畝餘隂多是雨一庭草色自生春好山似畫開屏障啼鳥如歌送酒巡晴色錦紋題不盡幽花秀竹總清真青城山學樵虞堪背郭幽居如畫裏斷林春水緑回環樹連烟外啼猿寺門對湖中過雨山送客馬嘶清䕃去鈎簾鳥度亂花還十年奔走風塵裏肯借憑闌一日閒周世衡春風十里翡翠屏玉遮對峙峨睂青清泉白石雜花竹天放畫圖鍾地靈髙人開軒當此景聆澗賦詩白日靜四簷風作翠濤聲入忩簾捲晴霞影我亦托迹耕漁間結屋讀書湖上山抱琴訪子從兹始布襪青鞋相往還徐逹左幽居謝塵喧啓户瞰平陸東皋夜來雨百卉如膏沐泓泓水浮溪靄靄雲出谷雉雊麥風暖蠶眠柘烟緑忘形絶衆纍居寵有深辱揮絃對青山夕陽見樵牧金覺十年歸向山中住每憶從容訪隱居雲氣白霏簷外雨竹光清映案頭書憑闌晝靜聼呦鹿鑿沼泉香愛畜魚因憶軒中舊賓客江湖清夢未應疏董逺盤盤錦峰陽原陸平如掌中有故人居層軒起宏敞緑樹出鳥鳴清沼逰魚上已知禾黍收更喜桑麻長徴輸了官賦豈闕田園廣躋堂夀雙親賓朋時宴享怡悅心自安坐久絶塵想披圖一長吟松風答清響寄翁四運無停機生意恆相屬兹軒俯林園長年得娛目灼灼枝上花娟娟坡間竹雨過泛晴彩霜餘净寒緑清芬謝妖靡幽姿逺塵俗心跡淡已安於焉樂貞獨四明山人陳朴子莊雲軒濓溪孫子多清致結屋宏開據澗潯晴動竹光分晝暝日移花影作春隂出林鹿去飲清泛隔樹禽來㺯好音香靜獸爐還自樂推忩更愛看花吟王希白千岩萬壑中一徑澗西通塵論無由到風光自不同竹侵書幌緑花映酒尊紅若問桃源路何須覔舊踪徐濟幽居逺城郭寂寞自成村野色還通市春潮直到門竹忩晴晒藥花塢晚開尊想象其中趣何由得共論天台李至剛老去樂幽棲軒居緑澗西掃庭花雨過尋徑竹烟迷偈聼鄰僧說詩來酒伴題我曽遊此地歸路夕陽低洪武甲子王忱南陽之南千叠山秀野一軒介其間丹青四合吐暗靄百草吹幽春晝閒日照錦峰如翠羽雲入亂山晴更雨隔林啼鳥自間關萬壑松聲答人語木作衡門竹作籬茯苓堪食蘿堪衣簾開曉日映長檻時見白雲生翠微我生落魄詩與酒欲結山中嵗寒友為謝軒中美少年莫取黃金印如斗睢水後學朱復開軒俯平園品物競含秀芳蕤耀春陽叢篁䕃晴晝嚶嚶鳥和鳴鷕鷕雉朝雊傾耳聆洄湍舉目眺逺岫煩襟自兹曠賞心良已遘不見獨樂人摛章漫懷舊白鶴山虞本仰挹天池俯緑疇軒居巧占謂之幽映階碧草供吟賞排闥青山可卧逰雲氣浮空如舞袂鶯聲隔樹囀歌喉呼童種竹時須記留客看花酒旋篘勢阻儼同盤谷裏地偏不减瀼西頭春明擬向輕舟去徙倚䦨干一散愁京口張德常軒宇何清曠慿臨散煩襟叢蘭藹幽芬修篁結重隂兹焉愜遐賞逍遙冥素心斯誠苟不昧訪子西山岑惠楨軒居面蒼岑種藝雜花竹竹影晝扶疏花幽時馥郁坐對雲山亭庭除桑柘緑石田春雨餘幽歌聼樵牧冠蓋豈不榮誰能受羈束韜囊琴滿床插架書連屋門前好客來槽頭酒應熟張均得覽先公草悠然記昔時松楸先隴近花竹故人稀圖畫留遺迹雲山起逺思投閒身未遂感慨一題詩秀野軒者吳周景安眺覽之所也鄱陽周公為題其顔我先公寫而圖之復從而記之蓋其地與吾先隴密邇景安乃先公之愛友非若孰從之而得哉先公暮年每有惓於此明年遂即世此絶筆也景安亦己物故景安之壻何氏幼澄以示余拜觀圖後題咏多吳中秀士俯仰之間已四十餘年矣諸公亦多淪沒豈易得哉且夫名之著者因以德境之勝者由乎人它日何氏子孫傳示永久亦足以侈外家之雜集矣幼澄宜珍藏焉余既賦之以詩復求識之於後遂書而歸之永樂庚寅二月朱吉識獨憐栖隱處晴色與春兼山近青當牖苔交翠入簾移雲岩樹合過雨澗泉添何日擕琴到清吟興不厭吳人王廷圭素秉丘壑姿勞生滯余往覽兹愜幽性遽爾成真賞林霏靄孤野春物組膏壤稍行樵徑逺忽居耕疇廣所云山水情遂結雲霞想掛冠苟有期終焉稅塵鞅安定梁用行髙軒臨秀野信是幽人居炎氛逺不到花竹自扶疏群施藹春芳嘉䕃含夕墟境勝固云適况復有琴書諷詠佳逰外留連清賞餘應知獨樂者無復曵華裾浚儀張肯短棹曽經錦里過髙軒虛敞蔽烟蘿溪浮淨壁澄寒緑山送遙青叠翠螺松韻來時凉吹急梅花香處白雲多畫橋東隔龍池近碧殿隂隂俯澗阿永嘉陳元宗右卷中詩文共四十四人皆名筆也內有九詩乃代筆文詞凡近故不復録云辛丑六月珊瑚木難卷一
