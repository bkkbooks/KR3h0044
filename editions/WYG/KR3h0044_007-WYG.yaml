body:
  text: 珊瑚木難卷七明朱存理編吴文夀詩文夀字景南臨川人有南窓吟槀草廬為序偶出大兒讀書鸎語清小兒學字蚓斜行閉門枯坐茗作伴送客偶出花亂眀一行兩行北歸雁三月二月東風晴江臯農事驚春及白水黄牛人起耕舟泊譚溪溪上雨晴人浣紗一痕西日水眀霞出林苦筍髙於竹落岸殘潮淺及沙春事去人心自懶年光到我髪先華三三兩兩誰家子快馬輕裘踏落花寄凃伯賢杜若生洲啼伯勞山城遊䖏憶同袍岸花送客舟千里春雨添江水一篙遺跡驚鴻留雪爪去心飛鷁御風毛何時挂席随南斗酒濕紅裙夜月髙秋野傍溪人戸兩三家筀竹楓林小路斜我欲為農渾未得秋風歸夢繞黄花疎籬殘菊蕋猶香入眼西風雁數行秋色淡濃天紺碧亂山如畫濕烟光寄興春淺寒猶在村遥得酒艱亂雲埋老樹飛雨暗前山事去心徒苦花遲興自闌惟餘雙白鷺相對共吾閒十二月樂章宫墻新春著栁梢輕絲染作鵞黄嬌風裁雨織舞折腰梅花浩浩飛璚瑶天官賜福下紫霄人間夀獻南山髙正月緗簾拂香花弄姿春風暖入猩紅幃逰絲冉冉弄晴碧胡燕伯勞江上飛蜀花移根醉清淑御輦行春碾銅軸複道飛空聲殷雷清夜瑶池理絲竹年年春滿阿嬌家紫絲歩障金蓮花二月蕙風吹晴雲熱暖修禊年年曲江岸紫茸初成蒲葉短楊花晴雪樓臺滿峩髻新粧下南苑霓旌雉扇行簫管香塵散作隴雲飛人間廽首青春晩三月籜龍梢梢香粉淺枝上殘春無一㸃弄晴小雨宻如毛葱蒨團廻翠波軟薰風一夜摇麥甸黄雲斜開碧雲捲落手金丸脆堪薦四月宫花拂御香猩血濺袍黄今日菖蒲酒玉花浮翠觴朱符纒臂縷金黍浴蘭湯寳扇弄眀月風生羅䄂香五月火龍出海駕雲車雲車吐燄炊赤沙燕王黒蚌珠那得来人家雪山在何處氷海空作柱羅紈夕無風肌肉暗泣露藕花水殿待眀月坐看飛星白光沒六月銀濤界天河影白河上年年候槎客漢家秋殿鎻嵬嵬王母鸞車去不来粉靣修眉冠月嫵願乞巧来持拙去芰荷花老槿花榮夜色秋聲滿凉浦七月列星排空光琰琰玉玦無聲夜西轉促織宵啼旅雁秋怨客枕無眠香闈念逺風淒幽房月眀深殿愁帶似割泪花如翦桂簾香霧夜景差眀朝翠瓦成輕練八月鑄金佛面黄岑岑千百億佛見色身仙人捧觴作花夀花香清入梅枝痩露漙漙風䬀䬀螢蟄光豺祭獸遙天紫雲濕邊月白如晝凍露開花噴玉光闗城夜白征人首九月移短晝續長夜幽壁燈花凝寒灺錦帳懸鈎風不摇芙蓉春暖生蘭麝峩峩霜雉鎔白銅玉河直貫天西東繁霜草枯健鶻疾将軍暁獵號角弓十月銀雪稠稠塞八表枯樹啼號老梅笑徘徊白鳳闐空来氷花浮夜蓮花暁仙人刻玉作楮葉撒向人間收不得酒香熱面眺齋寒一夜羣纎籠縞白玉管吹灰露春色十一月梅花玉鍊容拍盞翠光濃春色来漸近嵗華潛告終亭亭飛綵燕裊裊綴釵蟲玉漏知宵短金爐覺暖融土牛餞太嵗回首踏春風十二月吴景南詩序吴景南家臨川南鄉之種湖向来曽從空山雷講師學詩尊敬其師既沒而拳拳不能忘講師之詩雄健景南之詩婉麗其子寵以示予惜予不能詩寵也其請於工詩之士刪其所可刪者存其所可存焉斯足以彰父之美矣八十五翁吴澄序予㓜時嘗從空山雷先生遊因知種湖吴景南亦執經先生之門未及識焉後二十年予在朝奉命代祀還山景南来山中始得少叙疇昔之所聞者元統乙亥夏五予扈大駕清暑上都其猶子實擕至南窓吟槀首卷求序言余㳺方之外每聞父師之教究性命之學間作一二詩不過陶冩性理歌頌雍熈而已豈曰專門於詩者哉空山先生有道君子也景南既從之遊其所得不待告而知之矣今數其子弟輩教授鄊里者凡十餘人詩禮之傳有足徵焉尚奚以予言為雖然南窓之吟清俊藻麗自成一家子孫其珍襲之學士臨川吴公當代名筆也因特為序其端惜予未及見他日過種湖之上拜空山之墓就一讀焉於是乎書特進上卿𤣥教大宗師看雲道人吴全節寓上亰紫真宫西方丈露筋廟碑天地之間惟二氣陽况君子隂比小人而五行交相為功各有正位其龎雜者亦交處於隂陽之間盖亂臣賊子之所禀婦人女子之所羞雖其粉飾一時班域聖賢眀未即察而隂譴亦不旋踵則澤國之女􅏐膚露筋不就有幃之子氏不顯於一時祠方掲於千古庸夫庸婦之所傳稱有如昨日是幽明之所共信而古今不可得而議者然則伯夷叔齊之節不必俟聖人萬世所自知眀矣紹聖元年十月中岳外史米芾東歸過其下刻石賛曰王化煥猗盛江漢叔運煽猗人倫亂一徳彦猗昭世典情莫轉猗天質善楚澤緬猗雲木偃煒斯囝猗日星建畋謬丞帥府将及二載䕶使客徃反凡十拜祠下其碑刻之所傳蔑有存者偶家藏元章真跡著偉節足以律人者已不敢私謹摹刻置於郡丞官舍使後世有考焉淳熈乙未七月既望䖍亭翟畋題乙巳十月廿二日書于玉峰景徳寺僧舎楊維禎詩丁孝子行孝子蘭刻木肖母顔木有神痛相關况我孝子有母上堂問安否母胡為母雙瞽母瞽捫壁行行聴孝子聲孝子泣母䑛母目何時仰見天日星朝䑛瞽暮䑛瞽一日二日百里程母瞽豁然而月明隣里来賀母如長夜再生孝子名上達天聴華表柱為孝子旌石新婦亭亭獨立傍溪濱四傍無人水作鄰苔髪不梳千古髻翠眉空掃萬年春霜為鉛粉憑風傅霞作臙脂仗日勻莫道岩前無寳鏡一輪明月照夫人桃花犬邑吴氏仲衡家畜犬病踣子能銜食哺其母死葬小山下有花開如白鳯仙人因稱之為孝犬云昔桃花孝義聞天家今桃花生子在吳家桃花子母病踣不起三子者纍纍若悲啼有一子銜食哺母母食之子始出馳一去復一來眠母左右不一離吳老人夀期頥五葉孫斑斕衣門前荆樹不分枝柱下並蒂生靈芝吳家孝慈及草木况爾桃花為有知喔喔梟獍兒泥塗我宫室蕩裂我四維風俗日壊壊不支歌桃花作家慶吳家兒當執政桃花甡甡化梟獍右三詩見諸暨志元真館小集至正四年十二月十七日予從客過如林還謁元真館盧伯融為酒食來餉㑹六七人醉而以山意衝寒欲放梅分韻予得衝字七人者李孝光季和釋徳莊蒙泉郭翼羲仲瞿智恵夫陸仁良貴吕誠敬夫也良朋謝郭邑勝賞屬𤣥冬野静梅將發山乾雪未封生荑近芳節出日媚川容愁用詩湔洗寒憑酒打衝幽人每多暇俗子自無悰聊以供娯悦詎知縻萬鍾李孝光寒雲蔽朝曦野水鳴浄潺偶兹倚松樹若㳺天壇間芳筵接華屋寳瑟觸瑶環粲粲庭下梅寒英雜苔斑良㑹歡方洽轅轍勤屢攀仰視河漢高笙鶴在瑶山吕誠我從仙山㳺投策聊自憩脩篁翳春􅅋隂雪留叢桂於焉賞兹趣載酤雜繁饎班坐依年齡被服製荷芰嘉㑹諒靡常燕樂以適意今我不云樂歳月亦云駛盧昭四時互推序歳事倐已閒羣隂閉萬蟄元氣若龍蟠大哉天地心微陽見其端一一根太極春葩俄星攅馨香不盈掬微雲那忍飡貞素矢弗移相與任嵗寒郭翼旭日散逺坰行遵滄海曲幸逢文士集蘭酌忻見屬念兹芳嵗至去日如轉燭昭代無遺賢白駒在空谷六子慕𤣥理省已無營欲何哉塵中人自令類蠻觸釋徳莊窈窕𤣥館静方外遐情鬯珠樹雜霰下璚芳微風蕩張筵命宴集傾簟酌佳醸坐客仰令才歡舞迭清唱樂兹嵗時康况及年齡壯齪齪塵鞅中安得任流放陸仁朝遊𤣥真館暮宿容城臺正身秀眉翁光燄紫霞杯醉夢廣樂作鵾絃似鳴雷玉女左右侍皎皎嘆且咍帝令歸洗髓羽車載之廻醒来雪盈尺但見庭中梅瞿智漫興九首瞿盧袁陸思清警要我題詩來鶴亭月下吹笙看舞影竹中移栅䕶霜翎廣平梅詞吐清婉恵連雪賦映嬋娟况有文章兼二美吕家亭子得無傳白雲滿地如白石明月窺江來近人最憶滎陽好兄弟著霜柿葉寫詩新淮泗大水斷禾黍聞道居人巢樹頭漢武曽聞歌瓠子老翁更擬賦黄樓城南市中有楚客醉卧高樓看月生兩兒共扶不肯下紫簫吹度到天明側聞朝家置史館須得班馬出羣材掲公已老歐陽死近者何賢為總裁北山一士禪宗秀爛漫交情只憶渠每與王郎傳詛楚不同懐素學狂書永嘉為儒有陳子更思文雅得曹髯麟趾鳳毛不數見龍文虎脊有誰兼江上十月風日好小桃欲開春可憐絶勝龍沙三尺雪雕弓射雁拂廬前郭翼題朱澤民畫白雲白如太古白青山青似佛頭青何時約客山頭寺春日題詩錦繡屏楊亷夫山水之圖不盈尺染得水碧與空青明朝為借王喬舄飛入匡廬九疊屏張伯雨遊山曽識仙人氣每見雲來眼為青夢著峨眉好秋色小奴秉燭看銀屏李孝光送瞿恵夫青龍學官二絶山雨蕭蕭夜轉多思君别後定如何惟犀怪底時時動池上東風生緑波雲影垂江溉樹隂題詩東閣曉寒侵便湏騎馬迎君去街上青泥三尺深吕敬夫送進士蕭孟南之官建始序長沙蕭竹園先生之子潭字孟南為蘇州府儒學弟子讀春秋經登庚辰科進士第廷試在一百九名之中除署知䕫州府建始縣事歸辭其親將即任走江滸為别且乞言予托交竹園有年矣言可靳乎予曰吁儒者之效不著乆矣何也三代之時道行於上化浃於下豈非儒者之效也周之衰君臣父子之道幾乎熄孔子慮之深筆之六籍為萬世凖由古迄今建學立師以掌之不可一日廢者誠以國家倚為培育英材之地他日用之則君心之邪正國體之强弱民俗之安危政治之要靡不繫焉故也惜乎歴代之君徃徃未能皆知所以興學設教之意而開導其君故自漢以来君臣治迹或替或隆由儒者之效不大白於世而斯民不獲蒙其澤者多矣孟南學校士也其亦有感乎然猶有説為孟南告者夫學校之士必由科舉而進科舉豈古人設此為干禄計哉盖將以此觀士之素藴耳先儒嘗曰使孔子生今之日亦必由科舉出科舉豈能累孔子耶然則孔子不為科舉累者善其學即筆之六籍掌之學官由身心而推之家國天下之學也奈何後世之士狥功名之心忘義利之辨其所學與聖人背馳始而燈火寒窻孜孜矻矻以求得及其既得而遂怠之假聖言為求仕之筌蹄學者以相為效而不疑有司以為故常而不慮視致君澤民之術為紙上語其於古者設科取士之意果安在哉嗚呼此士風之所以不厚而儒者之效所以不著有自來矣孟南學校士也寜不因予言而自振乎矧孟南童時嘗從鄉先生俞立菴㳺而乃翁竹園有學有守父師之訓必聞之熟矣今之徃也思作養之不易宜以古之循良自期亷謹以持身和易以接物盡瘁竭誠恪恭厥職使居民過客感戴稱頌皆曰由進士來者其效乃若此異時非特輝映朝廷亦將延譽於父母師友矣予刮目以俟建文二年秋七月廿有三日范陽盧充頼序字次農陳維寅壙志銘處士諱汝秩字惟寅姓陳氏其先本蜀人逺祖篆嘗登宋宣和進士第歴官至左朝散大夫曽大父洽宋鄉貢進士大父仝父徴皆有隠徳父嘗從草廬吳先生學既卒業乃北上燕趙遍交當時名公鉅卿論天下事已而南還遂於吳卜居焉母江氏宋丞相萬里之孫女也處士生而警敏剛介才氣過人早失怙能力貧以篤學工於詩文有古作者之風且嗜古凡前代名畫法書與今人之作心誠好之雖傾貫購得弗惜也與人論古今人物賢否治道興衰自夜至於曙弗怠也奉母夫人曲盡歡心與人交懇懇而有情當大明維新以人材聘至京將大用辭以母老得歸田里正圗菽水以盡親餘年竟以疾卒豈不哀哉處士生於天厯己巳十一月初四日卒於洪武乙丑四月一日享年五十有七娶袁氏生男一人純女四人咸未娶嫁卜以是月六日丁酉𦵏吳縣雅宜山大墩之原從先人兆次友人張適叙而銘之銘曰嗚呼惟寅豐其才而莫伸工其辭而益貧竟潜晦以終身者將以發乎後昆也耶鄧善之詩清明日㑹宋集賢園亭時梨花盛開飲酒聼歌樂甚張郭二學士命僕賦詩琪樹吹香蕩夕暉華簮人對雪霏霏漢宫新火初傳燭楚女行雲乍濕衣一片花疑蝴蝶化滿枝春想玉奴飛蛾眉不用梨園曲唱徹瑶臺醉未歸客京師次張仲實見寄觀梅韻花老蠻烟細雨塵幾經清夢嘆真真夜窺幽樹唯山鬼暖入孤根有谷神嵗晩粧殘金屋冷月明歌散玉樓春十年不到西湖路辜負先生墊角巾春日遣興寳篆香消雨散絲准撩詩興上花枝春風吹度南窻竹一片紅芳落硯池竹西為上虞徐習曾作三徑蕭森緑霧寒東鄰日日報平安高情直到斜陽外渭水秋風一釣竿友聞録序雲間陸蒙氏編縹册二帙釐為若干卷曰友聞録取聖人友多聞義也携以過草𤣥閣求引言閲其所録一時薦紳先生如廣陵蘇公昌齡遂昌鄭公明徳泰陵成公居竹毘陵倪公元鎮俱有手墨列其中可寶而傳也夫豈若三家村儕掇拾猥瑣而遽以自足哉昔李氏有師友談記晁氏有客語涑水有記聞吾先子有聞見錄皆取一時師友賔客以纂錄成書也予嘗怪今朋徒有㑹所談不聞嘉言善行而私議官寺短長爵秩陞降市井庸流之軰否則談諧調謔而已奚有飲食談笑之頃孜孜以紀載為務積以成帙以備他日職史者之資乎夫蒙之以多聞取友從知友之有益於蒙而去其損者又可知矣然予於蒙尚有諗也子之取友得聖門之訓矣其亦得師於講經討傳之際尊其所聞行其所知乎果爾則子於聖域將有所造豈止備見聞事實為職史者計哉蒙尚以予言勉之至正甲辰二月初吉遺叟㑹稽楊維楨在小蓬臺試陸貴頴棗心筆書題舜舉畫舜舉此圗其以畫滑稽遊戯者也當與桞子厚之蝜蝂陸魯望之螙化蘇子瞻之八物同一機軸於世豈曰無補蒙莊謂東郭子云道在螻蟻道在稊稗道在瓦甓道在屎溺可以拉圾堆而眇視之耶王行故翰林待詔滕公墓誌公姓滕氏諱用亨字用衡累世家姑蘇父諱徳進母萬氏公年甫弱冠事從父思勉宦遊南北渉歴山川竒瓌益資其胷中所學晩歸鄉里將終身焉聖朝求賢如不及永樂三年有以名聞遂膺聘起家授官翰林待詔階將仕佐郎預修永樂大典三年考績轉階登仕佐郎永樂七年九月丙申朝退還公館與朋友談笑如平日既暮忽憒憒昏暈夜半竟殁焉公生於至元丁丑八月初五日享年七十有三娶趙氏無子生女一人貞贅陸浩聞訃驚怛奔䘮告白於朝蒙恩賜楮鏹給驛舫還遂以十二月辛酉𦵏吳縣玉山之原予既為銘掲之封墳浩請不可無詞以掩諸幽也爰摭其出處大槩𦵏之壙中嗚呼用衡已矣予之悲其安已耶王汝玉撰瓊林薛真人誄文開府神徳君以神道設教三數百軰徃而有聞者惟閩之陳文學近古所謂博大真人哉文學供奉時落魄不羈以詩酒自汙沒乆始贈真人號朝學士大夫述徳誄行未已也盖能薄聲利外形骸以文章道術相周旋未始出吾宗而已文學去世踰四十載彷彿其人得薛元卿氏元卿早侍神徳君入有蓬萊道山之遊從出有茂松清泉之怡悦視文學公差若有檢束至於翰墨跌宕詩酒淋漓白眼青天傲睨一世則未易有優劣論人當在逸品上矣今大宗師吳公以耆徳重於朝凡執事者一二十輩皆真人聲光赫奕非下士所敢仰而望且何足以測而識之哉元卿已矣論者獨以繼文學公異時或無用之用諸葛雖死尚能動人元卿其有不亡者存今已睹其兆是為元卿誄不死哉至正乙酉暮春之初句曲外史造首為章心逺書一通予將屢書之以識四海之公論如此非張雨暱之而私之也此予之狂言心逺乃弆於無用之所一展對間既重故人之思而一載之内雲嶠陳君以卑位徃彦輔張君以際遇徃獨存者元卿耳雨為無用重識元卿向㽞吳篤斯文契誼數相從已而還山中詩文日已精行業日已高且謂予曰今被璽書徵徃杭之佑聖觀子幸一來豈料元卿遽沒於山中也鄭無用出杭人張伯雨所為之誄三讀其文而悲之若元卿者方且為古之博大真人㳺於太微之上夫豈言語文字所能賛美也哉鄭元祐識鄧善之詩題文與可墨竹此君脱頴蒼筤根修節稜稜見空洞志士林居増眼明嵗窮瞥見氷霜凍我嘗逕造羣籟寂萬玉隂圍天宇空畫圖老可得三昧遺縑敗楮千金重鳳翔青林春向妍龍㧞老湫雲欲動斵輪承蜩道之妙彼哉畫史醯雞甕坡仙磊落兩玉人瑰詞藻句雜嘲弄渭川奚啻千畆胸亦有八九吞雲夢我今闗山苕溪曲欲聽琮琤助清供二老高風杳莫追笑予匏落知何用挽薛助教扈蹕居庸道歸来僕馬疲俄聞痟首疾不見折肱醫靈旐辭官舍寒毡罷講帷吳興四千里􅆭􅆭泣孤嫠與子俱留滯那知隔古今猗蘭摧露草斷雁落秋隂手澤遺書畫心䘮得子衿溪頭吾卜宅相望竹松林樂苦齋記華亭孫錬師字明叔者蚤以頴敏得鄉里名為鄉大姓義門夏氏所知遇如其家老綜理以益其富者將三十年至正乙未主人者亡師喟然曰知己者死矣安用屑屑久覉塵鞅耶遂去為黄冠師丙申城毁於兵民無故居義門乃於府城之北鳳凰山之東外波涇之西築室以聚族焉師亦僦地其旁為屋三楹庸以止息曰吾不忍與義門氏子孫遂相忘也予一日過義門且造師坐予於室東之樂苦齋起而請曰子亦知夫齋之名樂苦者乎余曰不知也師曰將徴子文以記之也久矣幸勿辭予曰好榮惡辱人之常情今夫喜也悦也得意也好也所謂樂也憂悲也窘窮也疾病也禍患也所謂苦也師乃以人所不欲也而曰我乃欲焉是不亦好人之所惡惡人之所好傳所謂拂人之性者乎師曰豈敢試為子陳之吾鄉之人有才幹器局者多出入大家綱紀其門户以濟其私家故倚大富者為小富自小富為巨室比比皆是方義門聲勢赫赫家之政小大芥細悉由鄙人鄙人欲自為計何施不能顧乃澹泊自嗜若將終身不殖貨利不置畎畆不事懋遷䘮亂以來既無田廬生理日拙官方以無田而號富有者嘗依富人以成家者應命有司鄙人已數數困於是矣其應命也始也剥肌膚今也竭膏血父子不保室人怨嗟貿售市易大而衾裘書冊微而箧笥巵匜探索無遺以死為愈殊不知鄙人無田而非富有依富人而未嘗成家者也其苦也孰大於是嘗讀老子書有曰有身有患莊周書亦曰人之生也與憂俱生是凡人之生不能無苦也審矣鄙人既學其道敢不一死生外形體齊物我樂其存於中者聼其苦於外者如是而已是乃所謂樂也予曰師盖可與言道者矣易曰遯世無悶不見是而無悔又曰與時偕行繫辭曰樂天知命故不憂安土敦乎仁故能愛傳曰素其位而行素患難行乎患難陶靖節曰貧賤常交戰道勝無戚顔蘇文忠曰平生學道専以持外物之變非意之來正須理遣皆此意也師盖可與言道者矣昔人有言市中有虎衆皆自若獨一人色惨而意動盖嘗傷於虎者也予以流俗所不偶作畸傖東海上處貧賤之日久矣盖嘗傷於苦者也貧賤之苦世所不堪予亦以孔子之道朝夕自娯苦雖稍來亦復謝去終不能亹亹逼人聞師之言乃知世固有同於予者如是予與師苦雖不同樂豈有異耶師先君子之所愛也予不敢替其愛敬為師記之張雨映雪齋記映雪齋者雲間孫明叔書室也室邇素王燕居之宫明叔㓜習俎豆禮遜溢於目詩書熟於耳既長見益多聞益博學日益進所蓄經書幾千卷若注若疏若觧義諸氏之説備焉史千卷若紀傳若書志歴代紀載萃焉子集又千卷筮史醫師方伎之精者古今名賢墨蹟之真者聚以類焉闢一室序次甲乙而尊丌之題曰映雪盖希其先世之勤於學也而或者疑焉夫勤學而雪是映本由於膏之不繼今明叔非不足於膏也映雪而讀一時適然雪亦非常有而可映也而是之名何居觧之者曰齋之中素壁四環紙窻潔幽籖牙之垂垂軸玉之疏疏其境皆雪也皓魄欲沈晴烏未翔曉色􅃞乎書帷寒光耀乎虚楹景又無時而非雪也指送瑶琴之彈手映玉麈之揮清談而屑霏唾咳而珠玉則雪在乎其人濯宿汚於蟬蜕來新見於融氷湛然虚白皎然靈瑩則雪又在乎其人之心是則雪雖不常有而吾雪則常有也雖焚膏而讀而吾之志則常若映雪而讀也明叔其賢矣哉予嘗卧衡門釣寒江東櫂剡溪北上燕山交是雪乆矣江空嵗晏梅花欲春扁舟下松江明叔邀予坐齋中焚香讀四聖人易但覺夜寒窻白萬象昭然時至正丁亥十二月三日番陽傅貴全子初記詩新裁鶴氅著来輕儼若氷壺不夜城展席繙書延倒景煑茶敲火送深更千山玉立神逾爽一室清虚眼倍明座上高談無雜客蕭蕭白髪可憐生陶宗儀鶴齋詩有序茂宏薛君臨以朱公本初高第弟子也公至順庚午如還道中諸詩盖無媿杜工部石壕吏無家别諸篇茂宏為予誦之為之感激有少陵慕元使君之意茂宏清雅善學其師尤工於詩㫖趣不異自名其齋曰鶴昔薛少保畫鶴動衆雖乆冺沒每誦杜句慨然有凌雲之思焉故以是望吾茂宏也乃賦詩贈之每吟少保郟郊篇畫鶴仍為世所傳羽翮已超千仞表風騷逺軼六朝前兒孫有志翔寥廓妙句相貽起静便今日名齋深屬望雪絲雲錦看冲天青城山樵虞集至正九年青龍在己丑仲秋上戊日天子有事於太社太稷素與執事禮成歸金臺坊寓舍是日雨潦無過客因錄青城先生鶴齋詩以寄薛君君里中有張生兄弟善刻字當刻此詩於晩圃堂中盖先生乆捐館舍其文章不可得矣素書無法不足道也華盖童子危素識有元故薛君思永配倪夫人墓銘至正十年夏元儒薛毅夫𦵏其太夫人倪氏於信之貴溪縣同耕原其友臨川危素方在史館屬其外兄桂孟書其世出言行欲來求銘居無何汝潁盗起道路隔絶後一紀始克航海至京師以請於素不敢辭也按夫人諱瑞真姓倪氏其先在南唐時有信州雄石鎮鎮遏使官至銀青光禄大夫奉化軍開國侯父恕軒先生母某氏生至元二十七年八月時見北斗光燭於庭父母異之年十九歸同里薛君昶思永其字也君之父晩有足疾不良於行扶掖起居供饋飲食必身先之父或謂之曰宜自讀書不煩爾也對曰奉親餘暇方是讀書之時上有太母夫人復從容曰妾當親為治具以養曽祖姑為學不可廢也君有父䘮慟哭過哀人不忍聞懼傷太母之心既葬則哭於他室夫人開釋之終莫能止每見太母則歡然改容服除竟以憂遘疾卒曾祖姑方涕泣慮無以為𦵏夫人乃盡出嫁時衣服簮珥以為棺槨他日撫二子曰汝大父嘗窘於徭役亦不知遽至於貧唯日夜望汝成人以興吾家他日得從爾父於地下足矣哭幾至絶由是堅苦自持蠶桑紡績得繒布奉曽祖姑餘以資教子之費既長則又訓之曰外人多言汝勤能鄉學使汝父及見之喜當何如輙嗚咽流涕曽祖姑䘮伯祖姑議均財治具夫人請曰所積錙銖豫備之矣人尤以為難能嵗時祭祀必躬親爼豆無違於禮至正八年十月戊辰得疾越五日壬申沒得年五十有九子男二毅夫其長也次餘祥先卒孫男一人薛氏之先亦仕南唐為司徒乃徙貴溪之漸歩里五傳至宋朝奉郎尚書駕部員外郎上䕶軍昌弼又六傳至脩職郎金溪縣丞玠君其曽孫也兩家俱著族云銘曰女婦之徳由教而明維薛與倪世有簮纓婉娩令容訓戒是承爾行之孝爾節之貞鬰鬰松栢原曰同畊為善之徴被厥雲仍通奉大夫叅知政事同知經筵事提調四方獻言詳定使司事臨川危素譔中奉大夫同知太常禮儀院事鄱陽周伯琦書藏經銘北斗道經一卷故太史清江范梈所書貴溪薛毅夫奉而藏諸禹穴承母命也母倪姓諱瑞真世大族生於至元之庚寅生之日父母睹北斗光燭於庭故長而事斗極䖍日誦其經年十九歸薛昶氏昶蚤卒時甫三十孀居卓偉訓毅夫詩禮為名士毅夫一旦過清江謁太史告以故太史為書經俾之歸遺母母得之喜曰比夜夢汝軌經我側今致此非偶然也吾百年後可藏諸名山慎勿忘暨毅夫太母䘮乃上會稽詣禹穴藏經已而屬太史氏襄陽張翥為之銘銘曰禹陵之洞陽明虚中閟玉匱遁甲圗孰敢窺之神所徂有孝子毅精誠孚斗七宿經史梈書元黓攝提月在如翥也作銘古作模歴厥世百文弗渝後有道者其徴且贈鶴齋詩并序鶴齋隠居浮海至京師為其母夫人請銘於中書叅政危君既得之復來吳謁予求篆題并以翰林承㫖張君所作藏經銘求予古篆恐難其書賦三絶句以請予嘉其篤孝即書以貽之仍次韻為答時至正癸卯季春上吉也老友鄱陽周伯琦蓼莪報徳自難忘浮海飄然一葦航萬里得銘如見母何慙蛇蚓助餘光陕郊古句人争誦義訓猶知教一經慈範堂堂傳百世故應玉樹長階庭共望江東日暮雲吳門六載對殘春論文何日同尊酒但恐詩成泣鬼神九月一日訪鶴齋於上清别館擬邀小酌適其生朝有出戯書此為明日之約蓬萊宫中尋薛濤芙蓉城裏去逰遨常騎仙人兩脚鶴何處阿母一蟠桃菊花邀客易成晩竹葉於人安所逃歩虚一起且歸去明日與君持蟹螯青城山樵虞集用先叔祖韻夀薛鶴齋真人近以兵避海上㑹鶴齋真人于練川語及舊逰皆如夢寐因誦先叔祖太史文靖公詩乃為真人九月一日生朝賦也今俱客於此復逢此日而誦此詩感懐今昔三十年矣於是堪不能無述謹用韻以為夀云練海秋潮若捲濤遼天得與鶴同遨人間不老三花樹天上初分五色桃甲子每書聊自託姓名千載復誰逃等閒談笑重陽近又向尊前一舉螯虞堪次韻青城文思涌波濤子復長吟海上遨瞻望白雲歌伐木記從瑶水得餘桃百年風雅誰能繼萬里烟塵共此逃不是菊花知節序一桮負却蟹雙螯薛毅夫㳺靈巗三首吳宫花草乆為塵千仭空山嫵黛新雲閣靣湖春渺渺天池浸石碧粼粼諸侯互勝猶争奕三世如來却現身白社楣間留秀氣清逰滿占及芳辰丹梯百折到松林連抱庭杉嵗月深永巷廊虛曽響屧荒宫臺古不聞琴蛾眉傾國悲生樂麈尾談空後視今山下良田明似剪一畦那得老雲岑重㳺已隔十三春纎緑嬌黄嵗度新白髪無情添老態青山有約待詩人菜花間麥畦樆錦薜荔縈藤樹簇鱗香逕斜陽啼杜宇廻舟圓月掛城闉周伯温玉鸞傳玉鸞者蕭氏子也小字阿鸞按蕭氏有二𣲖俱以音律知名其一居大夏之西曰筠有直節黄帝時伶倫用之定律吕筠再世孫龍賛舜作韶樂樂用有成書曰蕭韶九成鳯凰來儀是也其一隠昆山之麓曰璞以抵鵲得名卞和屢獻之楚懐王不用遂匿徳不售子貢稱其韞匱而藏求善賈而沽者也其後子孫遷徙無常處惟居藍田荆山者最盛鸞藍田人也初育於石氏當秦皇帝并吞六國有天下薄海内外瑰怪珍竒瑋異莫不效職惟石氏幽然不為用帝怒盡驅其黨填東海通道蓬萊閬苑以求神仙不死之術中道不行被鞭至流血石族以破鸞無所依乃脱身㳺闗陜闗陜豪俠愛其温潤縝宻亷而不劌氣如白虹以為竒寳為之語曰豈有羙如鸞而長貧者乎鸞雖美姿貌然無他能觧自以落魄闗陕十餘年靡所成立發憤從宗工磨琢一旦心孔忽開於其祖音律不學而通每風清月朗碧天良夜輙一鳴焉而蛟龍為之起舞鸞鳯為之廻翔聞者莫不軒昻激越而手舞足蹈也然未嘗自鳴必待人揄揚吹嘘而始出聲脱非知音者雖王公卿士卑躬下氣萬方冀其鳴亦不肯曲狥其意而一鳴也遇知音則鳴不已君子謂其不近人情而斥之鸞固自若也句呉顧瑛遇鸞呉門市邀至於家既而太史楊公有狄生號鐡龍者亦以音律鳴聞鸞技與已同一見甚喜遂不相舍朝夕更倡迭和如親昆弟至今留楊氏云太史公曰鸞之貎美矣然闚其中則洞然無有校其能則惟音律而已音律於技末也其不遭宜矣噫以鸞之姿而所就僅爾諺曰人不可以貎取信夫釋克新孔方傳孔方字子貫首山人也其系出金天氏黄帝時為童氏黄帝命鑄鼎荆山下鼎成有龍垂胡髯下迎黄帝騎龍上天童氏遂用有名天下夏商之際童氏益振入周為孔氏武王伐商孔氏有曰泉者以神術行天下太公立九府圜法而泉與焉其後子孫散處諸國在魯者佐季氏故季氏富於周公在吳越者范蠡用之而貲埒王者孔氏至今族號最蕃惟方能傳其祖神術隠首山陶冶中師事容成而名益著四方咸以兄呼之漢高帝既平天下中外消耗思振元元而大臣有以方為言者帝甚喜乃遣使召之方乗傳車至闕下問以富國足民之道對曰顧所謂力行何如耳頗甚稱㫖使典府庫以權出納文景之世方儲蓄累百鉅萬貫朽而不可校天子嘉其績累遷至平凖令未幾人誣方盗鑄禁錮不用方為人無圭角與人交無高下雖孩稚亦與狎玩吳王濞之國上大夫鄧通寵用而方奔走濞通之門無虚日平居好聚無頼子弟為賭博之戯贏輸皆由已為有不可意者雖袒跣大叫祈為梟盧亦不肯少徇為之故徃徃致喧争闘毆人頗銜之此其所以獲罪歟先是有燕人楮寳者亦以神術顯用初方赴召抵京見寳喜其術與已同驩如平生遂同舍館出入與偕而寳素輕薄不逮方之剛厚也二人意雖甚合然方遭難而寳卒無一言援之吁真市井之交哉方既罷而寳専任使權益重有偽寳名而為非軌者朝廷患之議復用方以分其權於是丞相𢎞羊言於天子曰孔方有功國家而其才足以任使以非罪黜不復非所以示天下之意制可其奏召方復平凖令方起而寳權果少殺二人並行天下人莫敢先後輕重焉朝廷凡欲建大功興大利非二人不可以故上自天子下逮公卿大夫靡不愛重二人者二人俱口吃不善言語惟以篤實見信於人中外百司之事人所難言者二人至無不可雖臺諌風憲亦嘗曲狥其意方尤利濟於貧窮小民故天下聞方用而莫不稱慶廢而莫不失望盖方之術足以動人亦天下人心之所欲也寳以昬自焚死方亦以年高身皆土色顔靣無精采告老於朝賜爵同城予自便終於家太史公曰孔方起陶冶中獲親任使斥而復用其遭際豈偶然哉方雖名通神術而無他竒能觧不過聚歛而已然而天下無賢與不肖皆忻慕而愛重焉不知其何道可怪也已釋克新右二傳江左外史釋克新仲銘所作刻於雪廬集陶先生遺墨劉嵩高文藁序嗚呼三代以降士之作者多矣求其立言有益於世道而為人人之所稱誦者幾何人哉或者謂世道有隆汙故文章亦與時相上下此固然矣然人各有所能所不能固不可較優劣於異代而亦不可較優劣於同時何也人之為學本於質性充以見聞根於義理徴諸故實而見於是是非非莫非道之所寓譬之植物之生大者小者長者短者堅者脆者其生各因其性其榮悴開落各有其時要之皆有可觀者焉如使其大小長短堅脆者皆歸於同類而榮悴開落亦同見於一時又何足以覩造化之妙哉惟夫人之立言也亦然人心各有所志故其言皆可以傳於世作者不厭其多也予友四明劉君顯仁讀經史百氏之書肆意於古文士大夫多君之才咸稱譽於君不置四方學者咸師宗之凱辱與為友日以道義文章相刮劘故其相知為尤深嵗己丑予裒名人文將次第而傳之至君則語予曰吾為文用心良苦抑不知於道果有合乎否也子幸取而刪之予謝不敢當嵗庚寅君領薦北上予為縣文學信之永豐與君别去辛卯君下第南歸授嵩高書院山長俄而以疾卒卒時遺言謂所主賈君俟予東還必以遺文為託其文凡四卷為若干篇君年二十即負文名嘗一再至京師受知名公卿壯嵗客武林與予友凡十年予見君所為文甚富今所存僅僅如是則知其所遺亡者多矣予續當搜訪乃為編輯庶不負君之託也嗚呼予每評君之文其大者若楩楠其勁者若松竹其艶者若桃李其幽者若芝蘭無不各極其至而其立心懇懇然専務以忠言善道告人未嘗苟措一辭也非古之立言者歟嗚呼今已矣後之覧者庶有徴於予言哉至正十四年七月十有九日天台陶凱序永豐令宋侯興水利記東平宋侯筮仕由中朝出為永豐令侯樂易敦重與民相安於無事適隣郡有警官府多故侯調度不煩民用寜謐及冦入郛郭竭力捍禦民居安堵其於學校農桑知為教民之道養民之政盖常拳拳焉暇日㑹民父老語之曰古井田畎澮溝洫之制度廢於是有渠堰陂池瀦水瀉水以防旱澇使民無饑莩之患然不豫備則恵不及民夫民不可與慮始而可與樂成衆盍相與圗之於是捐俸金為倡率有力者募民子弟増築縣之陂池以東灌橋旁學佛者呉普諒有幹才可以集事使専董是役遂築東灌陂三百丈馬㯶陂二百丈忠良陂一百八十餘丈楊淤一百丈㘭丘五丈蓮湖五丈塞門八十丈魚門諸陂凡一百丈不日告成水之所經凡四十餘里灌民田十萬餘頃嵗大旱林木多槁死獨陂田大稔其自今以始民獲享無窮之利皆侯之力雖古之鄴令史起何以尚諸民父老以狀來求紀其事於是乎書侯名詳字約夫云是為記又系以詩曰維此豐邑厥田磽瘠耕鑿之民嵗食其力雨暘時若黍稌其宜驕陽為災嵗乃大饑職維宋侯力於農田制防築陂民用有年耄耋童髫懽忻鼔舞曰維賢侯民之父母紀侯之功頌侯之徳我用作詩勒之貞石題夏簡伯畫西南逺山隔流水山色蒼茫烟霧裏東西諸峰氣勢高層崕絶壁連雲起岩隈野人屋數椽白石齒齒泉涓涓横坡欹岸接林杪有路可上層崕顛道中行人問前路只愁空山白日暮山南樓觀已在眼相期尋幽湏奔騖稍過前村水亂流危橋直上岩之幽一客騎驢看飛瀑一客抱琴凌素秋終日山中行未了大山小山看總好人間茫茫行路人何如山人拾瑶草刺船東歸何太遲泊舟岩下聊娯嬉一船生涯在烟水咄哉世人安得知東來西去各有適飄飄清風生兩腋村深雨露足桑麻是處山中堪躡屐夏君愛畫入骨髄足跡江山數千里興來寫此遺故人終日披圗為君起君家斗城吾赤城山深夜夜鳴秋聲同是天涯倦遊客吟詩到此猶含情好事珍藏莫輕擲人間好畫不易得時向亭齋一卷舒中有天機人莫識妾薄命紫宫三千人非闗妾命薄請君聼妾言臨風氣蕭索妾家在江南高樓映城郭二八顔如花重門蔽珠箔一朝别親知凌雲上寥廓得充君後庭香風動羅幕丹鉛為君施衣裳為君著願以微賤軀匡牀代菀蒻流連愛景光誰知風塵惡層城隔川梁紅顔歎漂泊月明烏夜啼更深露華落對此情鬱紆形容不如昨君恩本自深妾身非無託願君布陽和聼妾奏羽籥絲竹皆前陳酒漿為君酌南山以為尊北斗以為杓奉君千萬年與君恣歡樂留别千里江東客三年是冷官風塵驚戰伐骨肉喜平安嵗暮思歸切交深話别難臨期各回首相視涕闌干歸舟亂後歸東淛清湖買小舟交遊皆逺送懐抱復添愁細水灘行澁荒邨野趣幽前程山色好早晩到杭州東岳行宫重建天堂記昔先王教人以禮樂使入於善有不然者則刑政施焉後世禮樂壊而政刑紊於是方外之教以禍福示人始有天堂地獄之説猶朝廷以待士大夫而囹圄以待罪人使善有勸而惡有所懲亦世道之一助也然而世變愈下昧其所趣者不竭力於善而竭力以事神盖謂事神可以獲福雖有甚大惡神亦將庇庥焉嗚呼此豈其立法之本意哉永豐地僻民淳其君子咸知禮樂之化其小人能安其生業而其事神甚敬水旱疾疫必禱於神進退趣舍必稽於神距縣治西北一里許有東岳行祠舊建天堂地獄於祠之東西相向以為善惡勸懲之所天堂舊基汙下殿宇湫隘嵗乆復頹圮若不稱其名無以起人之敬住持博山寺僧源公石泉將撤其舊而新之度地於舊基之東數十武廣袤各數十尺其地高敞厥位靣陽衆咸以為宜乃捐衣鉢餘貲又募衆財鳩材僝工擇其徒之能幹蠱有定力者曰道隆使董是役邑耆長徐亨甫韓慶叔實賛成之道隆躬操畚鍤鑿山開址四方之士翕然皈向輿木運石至無虚日經始於辛巳六月落成於壬午八月為浮圖與水陸堂龍象之飾鐘鼓之設粲然聿新左為層樓右為廻廊雲堂居前方丈在後花木周匝途逕靚深其規模氣象視昔加倍跡其地者恍若出塵世下至廪庫庖湢及日用飯食之具靡有不周道隆乃諗於衆曰今功縁粗畢而無恒産後之主者一怠其事則前功隳矣夫善始非難而善其終尤難盍思永久之圖庶其可乎衆遂相率捐田歸之凡若干畆嵗徴其入以給𤓰華之供與繕脩之費焉予職校官永豐道隆請紀其事鑱諸堅珉又刻捨田姓氏於碑隂以垂不朽云予既為記又系之以詩曰佛有象教式昭庸愚厥名天堂龍象所居其居伊何有嚴有翼金碧焜煌仰瞻兢惕生為君子沒為明神善惡之報職由斯人睠兹山川民俗淳古作善降祥受天之祜鳩材搆堂人民具来𤓰華繕脩捐田資之道隆之功衆士之力彌萬千年有永無斁送姚憲史赴浙東東南壓天低雲城江樓日夜聞雨聲掾曹牽帆上水去厭見江頭波浪生嗚呼山有猛獸水有長鯨鴟梟晝嘷狐狸夜鳴西郊烽烟接戎壘朝廷連年常用兵去年夏旱米價貴今年民饑誰力畊公家軍需星火急村墟訛言民屢驚搜材不復間遐邇志士攬轡思澄清兹行執筆在栢府片言良足為重輕能為國家樹根本要在剗惡存鰥梵邊城烏棲白日暮烏啼啞啞天未明哦詩壯子逺行色馬首青山相送迎諸子虚席乆迓子共佐明時致太平竹梅幽禽竹外一枝梅花開雪初凍風来莫吹竹恐驚幽鳥夢梅蘭圗梅花與幽蘭芳馨在山谷折以遺所思其人美如玉送張伯逹序予徃年嘗讀昌黎文見其稱殿中侍御史李虚中以人始生年月日時比其支干以推其休咎而預定之予心頗信尚而未能得其要領聞善論子平家法者予輙就問其説頗聞由虚中數傳而後為子平虚中主用年干子平用日干皆主其所生而以尅者應之若源流一致故虚中子平之説雖不同而所以為生尅制化未始不同也然則子平其善用虚中者乎獨怪世之言子平者以某支辰藏甲乙某支辰藏戊巳紛亂而無所統攝盖惑於多岐而不能考其㑹通者也永豐張伯逹學子平法以主客相附麗而求其㑹通井然各有條理暇日予以生人之時日有富貴貧賤夭夀不齊者試其術而伯逹操論甚整殆百不失其一焉兹告予别將徃遊江湖間予因與伯逹論曰人生於父母而禀於天地之氣乃以始生年月日時推其行運又推其行年以考人之休咎彼始生之時日於今吾果何與哉抑不知有象而有數此自然之妙也夫成吾形者實五行之氣於是而有象矣然始生之時日固吾形之所以生於是而有數矣故五行之氣在於吾身而其行運行年正吾身血氣流行呼吸吐納與四時之氣相為通貫者氣順則休逆則咎如斯而已又何不可以數推乎雖然一日十二時一月三百有六十時一嵗大抵為時四千三百有二十而四海九州所生之人有不可以萬億計其富貴貧賤夀夭果皆同乎否是生人至多術數所不能限也以有限之術數推無窮之生人欲其一一皆中亦戛戛乎難矣嘗觀物之草木春生夏長秋殺冬藏此氣數之常也然其間有生長同時而凋謝不同時者何哉或其地利有肥磽物性有堅脆又或封植之或斬艾之故萬有不齊也人得天之氣與地之氣而生於父母之身是兼於三才者今所論年月日時特其得於天者耳至於山川之風土父母之家世則其因乗之勢有不同也又况其所存之心能樹善積之乆則氣順而不逆反是則氣逆而不順由是而求其休咎之應又豈術數所能拘之哉以伯逹善用其術而又叅考於是彼有無窮之人則皆以無窮之變應之是子平善用虚中而伯逹又善用子平者也何患其不一一皆中乎江湖多賢士大夫必有能知伯逹者尚以予言論之是為序信州路太守于公遺事論人以跡而不以心者乃世俗之常談非古今之通論也是以予觀於于信州之為人混其跡而無以白其心抑亦命也夫予居武林時公為信州比嵗餘人争言公有貪名而無善政大夫士皆譁然攻之莫能諗其故也及予為信屬縣文學詣大府謁公見公謙譲愛士尚儒術也勤勵庶政共其職也吏畏之威之行也民懐之恵之施也事有未當官屬得以言之能聼諌也法有未便衆庶得以陳之能取善也搏擊豪强攻其首惡而已紛争辨訟審其曲直而已四境之内富者安其業貧者遂其生苞苴不進也請謁不行也然而私昵之愛弗能禁之奴𨽻之奸弗能戢之明於逺而暗於近也治其大而忽其小也此人所以争言公之有貪名而不知其有善政也嗚呼世之人好論人之跡孰有明公之心者哉去年夏淮冦猖獗既䧟蘄黄又攻襄漢襲破武昌公得報形憂於色每戒官屬輕刑弛禁賑窮賙乏曰小民無知易以為亂宜善撫之也今年春冦攻江州城䧟州守李公死之公聞為之慟曰天不憗遺善人乃至斯極乎未幾又䧟饒州饒與信接境而信萬夫長以病卒其偏禆與其麾下多從征南徐又徃鎮池陽存者甚寡衆懼力不能支請公為自全計公曰臨難不苟避此吾職也吾行何之遂命其子奉母以行曰若等善自愛以承宗祧吾得從李江州地下㳺足矣已而冦至公守義不屈求死不獲卒為所擒居道上不食死嗚呼死非難而處死為難冦乗勝逺戰歴數千里將士卒者棄其士卒守封疆者棄其封疆徃徃有平時得名譽士也能如公見之明守之固確乎其不可㧞者豈易得哉予懼人之不知公故述其梗概如此苟以予言質諸信之士與其民必以予為知言予非有私於公也公名大本字徳中云座右銘夫學以明其道以脩其身也仁義人之性也孝弟人之本也禮譲所以接人亷潔所以自守也人慾必禁於未萌天理常防其易昧也小善不可以不為小惡不可以不去也動静必貴乎交養言行必期於相顧也能知之而弗能信之是知之弗真也能信之而弗能守之是信之未至也知之真信之至守之固行之篤其庶幾乎君子之道也送沈仲逹内掾北還昔年逺客辭東呉長揖公卿游上都有如彩鳳出丹穴飛集明堂衍瑞圗今年走馬江南路極目春雲滿江樹又如騏驥産渥洼長得孫陽一回顧江頭昨日秋風起聞客逾淮度江水秋風蕭蕭河水渾送行千里若萬里開筵祖道江城西空林野鳥方亂栖主人酒盡客亦去落日城邊散馬蹄雲黒雲深夜聞雨壯士憤激毛髪竪臨風長歌㧞劍舞誓掃妖氛報明主到京八月秋雨凉書来有雁煩寄將小臣葵藿傾太陽願見聖道如天長題襄陽山水屹立青山漢水邊山中臺榭㡬千年於今耆舊消磨盡却憶能詩孟浩然右陶先生遺墨五紙舊得於一士友家每紙有名氏印章字畫清勁可愛紙亦佳墨色如新又可寳也録此一過淵明醉歸圗題䟦千古淵明避俗翁後人貎得將無同杖藜醉態渾如此困来那得北窻風大癡道人時年七十八歸来三徑一年秋自是羞看爾督郵王𢎞斗酒何為者不見南山不舉頭張雨王生持叔厚白描淵明小像来求賛時僕被酒信筆寫四句而句曲外史即刻而成詞意深逺尚有餘妙嘗記張西岩有一篇甚好議論遂寫其上云留侯晩節逰赤松武侯早嵗稱卧龍仇秦復漢身始終淵明初非避俗翁兩侯大節將無同陽秋甲子法王正直筆宛有南山雄易地㶚上祁山功王𢎞何幸奉吾足督郵能芥平生胸歸来種豆南山中斜川只許桃源通門前五柳春濛濛落絮不與江波東環堵蕭然吾未窮北窻儘有羲皇風畫圖不盡千古意作詩一笑浮雲空有黄子乆印淵明詩曰但恐多繆悞君當恕醉人東坡謂此淵明未醉時語一峰老師書此篇當亦在未被酒前所作正得古人佳趣雨云前詩盧踈翁所作今以為西岩則又似乎被酒之餘也句曲外史趙魏公畫卷題䟦予自少小愛畫得寸縑尺楮未嘗不命筆模寫此圗是初傅色時所作雖筆力未至而粗有古意邇来鬚髪盡白畫乃加進然百事皆嬾欲如昔者作一二圗亦不可得右之要予再䟦故重書以識之孟頫右之邇来苦心學道不畜長物故此卷亦復棄置姑蘇金實之収而藏之誠好事哉子昻右先平章初年所作㓜輿丘壑圗雍至正十四年冬被召入京師待制集賢十六年秋航海南還十七年春至錢唐琴川鄒伯常復以見示拜觀之餘悲喜交集展玩不能去手伯常宜寳藏之三月廿五日趙雍謹書此圗乃先大夫魏國公早年所作真蹟無疑至正丁酉四月甲子拜觀於㑹稽之寓舍趙麟謹書濁世公子何翩翩風流丘壑妙當年無端却被鄰娃惱不廢嘯歌猶自賢小齋松雪對青山波上閒鷗自徃還文采風流今不見空餘粉墨落人間京兆宇文公諒伯常避難東徙家貲如山委棄不復顧戀獨珍惜此畫不忍使失去客中時一展玩輙欣然自慰雅好異於流俗深可敬也并書二絶於後萬金家産不復惜特為㑹稽山水来行李只留松雪畫時時展玩旅懐開知君雅志在丘壑况復風流如謝鯤此景人間何處有便堪避世似桃源咸亭侯風流任逹自謂一丘一壑過於庾亮今觀趙文敏用六朝筆法作是圗格力似弱氣韻終勝披卷之餘令人遐想㓜輿公清歌鼓琴於千載之上王阮之徒有不及者至正辛丑闕月廿有六日㑹稽抱遺老人楊維楨在春夢軒試郭玘墨乙巳十月八日録東原家鈔本書評右宋人十一家書表表著見者常試評之李西臺書去唐未逺猶有唐人餘風歐陽公書居然見文章之氣蔡端明書如周南后妃容徳兼備蘇子美書如古之豪侠氣直無前東坡書如老羆當道百獸畏服黄門書視伯氏不無小愧耶秦少㳺書如水邊逰女顧影自媚薛道祖書如王謝家子弟有風流之習黄長睿書如山澤之臞骨氣清澈李博士書如五陵貴㳺非不秀整正自不免於俗黄太史書如高人勝士望之令人敬歎米老書如遊龍躍淵駿馬得御天然秀㧞誠不可扳也丙戌十一月廿一日大梁趙孟頫書薛道祖薛昻之子黄長睿黄履之子二父皆邪人而其子廼以善書知名士亦不可不㳺於藝哉子昻此評乃是效米老也紫陽山方回題小窻剪燭聼雨偶閲叔升錢君所畫古木寒鴉小景不覺技癢因寫蘆洲聚雁以配之適友人黄徳謙在坐曰似瀟湘水雲景也昔年過二妃廟今復觀此圗恍若重逰但少苦竹翳深耳予遂添叢篠於其間殊有天趣并賦詩一絶云甲寅春三月脩禊日朱孟辨在西掖記夜窻聼雨話巴山又入瀟湘水竹間滿渚冥鴻誰得似碧天飛去又飛還饒介之詩一帖病中對梅花一株欣然有作若有㑹也録似西塾孟載季廸兩先生一笑介頓首病中雅量豈堪論澄水能清撓即渾除却妙香無長物秪應静坐洗煩言幾叢晩菊今耆舊一樹寒梅老弟昆曽住鍾山安石里傍人猶恐我争墩書後見剰紙就寫上所有者夜坐一首學黙三年漫不譍流光一去意無徴縁如髪白因循染道似山青自在凝猶有形骸生影迹却將文字寄名稱一川月色多於水更著秋霜見底澄夢中一首流水無心競孤雲與意同坐深明月下行盡亂山中花落聞啼鳥松凉愛御風懸知皆夢境一笑萬縁空至正廿五年十二月十日在采蓮涇梅花樹下寫王叔明詞余觀邵氏見聞録宋南渡後汴京故老呼妓於廢囿中飲歌太白秦樓月一闋坐中皆悲感莫能仰視良由此詞乃北方懐古故遺老易垂泣也予亦嘗填憶泰娥一闋以道南方懐古之意花如雪東風夜掃蘇堤月蘇堤月香銷南國幾回圓缺錢塘江上潮聲歇江邊楊柳誰攀折誰攀折西陵渡口古今離别自更靖康亂後中土歌曲皆淫哇之音能歌憶秦娥者甚少有能歌者求予畫故為畫此詞之意珊瑚木難卷七
