body:
  text: 珊瑚木難卷五明朱存理編唐人臨十七帖䟦此帖唐人書無疑得子昂完補遂成全物當與蘇子羙補懐素自叙同一珍秘視朱繇為道𤣥者異矣鄧文原臨書如九方臯相馬遺其𤣥黄筆意洞達妙在轉摺若拘於位置不復有神韻矣唐臨十七帖較閣帖多異此卷紙卷品質墨色真數百年物宋惟蘇才翁米襄陽得此妙解能書者必能深辨袁桷觀補者之難能則知臨者之不可及觀臨者之不可及則知想像所臨者如飛仙神龍之不可測識矣桷又題此特唐人所摹搨其筆意沈著已如此不可及况真蹟耶楊載松雪補書固不逮唐人然風氣自可相較恨不及見青李來禽真蹟與此臨本又當何如耳張雨松雪翁負書名於當世然八法四斡之際真不愧古人觀唐人所摹帖不完處數行但神采沈著處知公不逮古人多矣觀者粲然奚待贅述雖然渡江以來二百餘載鮮能與公並駕者後此以徃又未審孰能繼之臨風嘅嘆陸行直右唐人王右軍司州等三帖用筆沈著轉摺熟圓自歐陽法中來至其妙處從容中道誠書家所不可無也吴興趙翰林補其不足前人已評之故不論平原凌友仁好論書座中見此帖謂楊漢公所臨良是柯九思吴興趙文敏公以書法稱雄一世觀其手補唐人所臨右軍司州帖近漢時之闕帖殆如叔敖優孟雖神采不能無𣺌茫之殊見者當未易辨也項炯右十七帖真唐人所臨本沈著清勁葢未易得問缺數行而吴興趙松雪補之好事者所收闕其三帖自諸從並數有問至不信具告於是博采之而三帖復得於戴氏厚甫之家宛然為完卷此豈偶然也哉神物離合固自有時不啻干將之與鏌鋣也邵君文伯好古博雅一旦得其全於遘求分散之餘足以知其嗜好之篤幸寳藏之蔣堂子昻臨洛神賦䟦余臨王獻之洛神賦凡數百本間有得意處亦自寳之顧善夫余之愛友其家所藏者皆得意筆也揚州何進士每以髙價求予書可謂好事者遂書此賦一通贈之至治二年秋孟子昻記吴處士墓銘距福州西南百二十里其屬縣曰閩清西南又四十五里其山為平山有隠君子吴公居焉鄉人髙其行稱之曰處士處士之先光州固始人五代時吴氏有樞宻使英者始家蘇州其子孫布濩閩境比比為大官獨稱處士之族入居平山土泉饒沃無水旱之災種樹畜長衣闕粹誦法所聞持身治家造次必有禮法危冠大袖足不跡城市惟以讀書教子孫為務客過門語少異輙走而避之未嘗求人之知而人亦莫知其藴也易曰履道坦坦幽人貞吉夫人事之變有吉㓙得失死生禍福之辨惟有道之士自信於己而不滯於物行常出於人事之表而不以一毫動其心雖老死於深山之中浩然而無愧求之古人蓋亦不㡬見也處士之行若是其又可沒而不稱乎處士生宋嘉熈四年􅏤子沒於至大三年庚戌夀七十有一娶頼氏醇徳克配後處士五年卒夀七十有三合葬於里之陽岡阡子四人文碩文仲文艮文壯文仲前卒孫六人鑑鈁銓鈞鈐錐鑑嘗逰京師補國子學生延祐三年奔祖母氏之䘮遇於錢唐始相識後七年謁於吴門請銘處士之墓余故家閩雖未識處士而嘗聞鄉先生道其行也又嘉鑑之請遂諾而銘之銘曰陽岡之藏文昭有光必世其慶浦城楊載譔仲宏文世所罕見今見於陶南村文鈔復菴銘弁陽老人周公謹父卜終老之丘於先中丞公墓左築室其上掲名曰復菴謂其故人子袁桷曰復反也反諸其本也聖人作易之義深矣予取斯名也厥有旨昔太公表東諸侯歸葬於營丘禮以謂不忘其本予家故齊人雖南徙吴興而其遺禮三世猶守之自予闕仕居錢唐非有酣豢之樂而忘其歸不幸而不得歸者勢也今老矣有終無所歸則於復之道奚取抑嘗推死生直枉之理其變無窮反身而觀虛一而明者物莫能禦則兹丘之樂殆與造物者去來而莫窮其所止也子為我暢繹而銘之銘曰大明麗天隠於崑崙晦㝠有時以全其根海氛騰溢為雲為澤吐竒滋生復反故壑嗟我昏氓雎雎􅈵􅈵齒髪日化莫知其鄉馳車羊腸倒戈蟻垤少誇老衰運徳一跌維子周子心君天㳺顧瞻松柏肇謀菟裘峰廻泉渟虎伏馬立欝為斯丘不龜以吉煌煌先徳如珠在淵既揚其輝終閟其妍盤桓斯立豈不懐歸三返晝夜以為徳機伊復之道其微如芒磅礴一氣變化以彰原本稽中是則是象謹獨内觀動静交養他年逍遥駕風御雲匯為江河炳為星辰其來無趾其去孰止為善是嗣貽於孫子四明袁桷弁陽老人自銘弁陽老人周宻字公謹父其先齊人六世祖諱芳隠居歴山熈寧間以孝亷徴不就賜光祿少卿五世祖諱孝恭吏部郎中知同州贈殿中監髙祖諱位贈太中大夫曽大父諱秘御史中丞贈少卿隨蹕南來始居吴興大父諱珌刑部侍郎贈少傳先君諱晉知汀州妣章氏冝人叅政文莊公良能女老人生於紹慶壬辰五月廿一日娶楊氏匠監伯嵒女以大父澤初調建康府都錢庫亷勤自持或以為材自是六上辟書畿漕京閫幕府由豐儲倉闕改秩陞朝出宰婺之義烏平生及物榮親之志至此謂可少酬而時異數竒素抱弗展耄且及之矣非天歟景定限民田毘陵數最夥朝命徃督之至則除其浮額十之三大忤時宰意禍且不測㑹母病即日歸養醫藥刲體捐年再嵗卒罹憂棘盡心葬禮輯慎終篇五卷三女弟皆庶母出殫力治具悉歸之名閥䟽族貧者賙給之無靳色人有疾裹藥拯療不憚煩雖翹蠋之微亦欲其全生遂性然剛腸疾惡聞見有不平怒髪抵掌毅然亦不少貸也自㓜朗悟篤學慕尚髙逺家故多書心維手抄至老不廢或勉以安佚嗇養然性自樂之不知其勞也於古今得失治亂之故必審真是不喜隨聲接響嘗謂班孟堅不過以成敗論人物况近世私好竊古眩世者哉作詩少負竒崛雄贍晩乃寖趣古淡間作長短句或謂似陳去非姜堯章家藏名畫法書頗多皆嘗集錄為譜今百不一存而嗜古之癖故在性滑稽益刓去垠堮簡易混俗然汶汶者正自不能汙我異時故巢傾覆拮据誅茅至是又為杭人矣所居有志雅堂浩然齋弁陽山房樹桑藝竹壘臺䟽池間遇勝日好懐幽人韻士談諧吟嘯觴咏流行酒酣摇膝浩歌擺落羈馽有蛻風埃齊物我之意客去則焚香讀書晏如也所著有經傳載異浩然齋可筆齊東野語臺閣舊聞澄懐錄武林舊事詩詞叢談及詩文樂章等嗚乎闕似不克應事植勲趾美文獻然粗謹操修辱知諸老晤嘗識㧞與一時名軰頡頏盛際者餘二十年自惟平生大節不悖先訓不叛官常俯仰初終似無慊怍庶乎可以見吾親於地下矣偷生後死甲子且一周是用飾巾治棺以俟考終或土或火隨時之冝歸祔先塋以遂首丘之志若嵗月之詳則俟異時子孫軰填刻於後云銘曰一身之承兮百世之澤始終無端兮運化莫測景翳翳其將莫兮愧修名之不立海水羣飛闕於天航兮所不淪胥以溺持此以復吾親兮尚訓名之弗失畸於人而偶於天不為金砥兮庶乎其瓦合其所當為者為之不敢不力有志而不得為者天也吾何與焉何誕漫兮騖荒逺而無成何底滯兮不能與時而偕行𣺌六合兮闕於逺反乎誰伸曠千載兮庶或鍳於予心然進不登於雜傳退不列於隠淪嗚乎雖予亦不能自名其為何人也句曲外史張伯雨墓誌銘句曲外史雨者錢唐人也姓張氏字伯雨六世祖九成以狀元擢第於宋傳四世至逢源仕宋為奉議郎通判漳州逢源生肖孫肖孫生雨雨舊名澤之後改名雨雨兄弟三人獨雨好學工文章娶某氏生子男一人女二人雨性狷介常眇視世俗悒悒思古道知弗能與人俯仰遂挺身入普福觀戴黄冠為道士年三十登茅山受大洞經籙豁若有所悟遂夐出羣道士表道士見雨顔色皆斂而雨神益完貌益固雖其師亦莫能測也雨獨與翰林學士吴興趙文敏公善趙毎以陶𢎞景方雨謂雨曰昔陶𢎞景得道華陽是為華陽外史今子得道於句曲其必繼陶後乃號雨句曲外史雨遂自居曰句曲外史四方人稱之曰句曲外史明年開元宫王真人入覲京師引外史自副時清江范徳機方教授左衛以能詩播於朝外史造范范適出有詩集在几上外史輙取筆書其後為詩四韻守者見則大怒趨白范范驚曰吾聞若人不得見今來天畀我友也即自詣外史結交而去由是外史名震京城一時賢士大夫若浦城楊仲宏四明袁伯長蜀郡虞伯生皆争與為友願留之京師外史雖為道士恒以親老為憂乃固辭歸錢唐璽書賜號清容𤣥一文度法師住持西湖福真觀父卒廬於墓三年䘮畢為道士如初延祐庚申謝觀居開元宫明年杭灾宫燬外史適華陽劉宗師劉素竒其才使主領崇夀觀及劉卒外史又奉璽書提舉元符宫仍紀至元之丙子以上塜告歸遂不復去築室北郭著書於其間命曰幽文𤣥史又建紫虛閣於葛嶺㑹𤣥教吴宗師命外史為道徳經注注成加教門修撰西太乙宫髙士仍提㸃開元宫時年已六十矣乃先葬其冠劍於南山而辭宫事但飲酒賦詩或焚香終日坐宻室不以世事接耳目後八年卒於宫之齋居箧笥無遺物也外史素不與俗人交有不善輙面折而有善亦未嘗不力揚之故逺近之有才學者無不願踵其門雖不見許可退亦不敢憾非其識見精敏操履端直何能使人畏服若是哉至正乙丑基以提舉儒學偹員江浙始獲識外史一見即如平生懽明年七月而外史卒嗚乎世之㧞流俗而獨行者鮮矣得斯人焉而弗獲久與之㳺寧不深可惜哉外史既卒於是宫之掌事及其弟濟之奉其棺葬於冠劍之所而基適廹棘闈事弗能與執紼及出欲訪其遺躅而為之銘而外史之徒若子弟無能承外史志者踰年始得濮陽吴叡為道外史始末嗟夫外史已矣有友而弗銘咎將誰歸於是乎銘銘曰孰為之與軀以為吾拘式還其虛杳乎㝠乎吁嗟乎幽墟括蒼劉基王文明壙志姬周裔王出太原自廬從王邁南轅浙河之東宅後昆嬪錢趙私亢厥門天地改造木蹶根郭南侯𤓰藤葉蕃將作監簿故國官潤之其子榮祖孫繼宗子麟母氏韓敏慧孝友和睦敦能事畫繢詩書文兎入虎穴䧏初元嵗半甲子縮一千餘木支火四隂騫九三辛終歸魄魂婦子在腹母目昏兄僵妹擗鄰里酸四七陽復芽茁蘭嗣祀續絶慰生存蒼龍騎羊震風翻顧兎肇虧烏未暾㑹稽山隂温泉源近祖父域封乃棺是為卒事永妥安劉基竹林宴集詩序基既從左丞公至越而辭戎事始得與越士大夫逰乃四月丁巳與嘉興王綸趙郡吴溥㑹稽王儼華亭唐虞民㑹於黄本之舎主人出酒肴勞客樂甚徙席於竹林之下主人奉觴酌客而言曰昔司馬氏之臣有飲於竹林而以賢稱者七人今日之㑹亦七人其樂同與彼七人者湎淫以自放袒裸以為達浮誕以為髙悖禮傷教以導天下於縱肆君子疾之吾黨以此為鍳雖然今日之㑹文㑹也必有事以為歡孔子曰作者七人矣或者以魯論所載儀封人晨門荷蕢接輿長沮桀溺荷蓧丈人充之雖不必是而七人者皆士也孔子錄之未有棄焉盍各引其意以為歌辭以暢予懐不亦可乎衆應曰諾詞成擊竹而咏之有金玉之聲聴之泠然飄飄乎有遺世之志浩乎不知其所如也於是比而書之俾基為之序夫七人東周之隠者也使天下而多隠者則其為世也可知矣巢父許由其說不經使實有之亦妄人耳烏足以為道傅說吕尚得時而興為隠不卒伯夷叔齊以一身綱紀萬世仲雍自絶以成父志柳下恵直道見黜皆不得已非固欲𨼆以逺人而忘世也見世之不可為而决意以隠者其惟七人乎儀封人願見孔子其志固異既見而以木鐸喻之可謂善觀聖人而有所感發矣居下位而終不用也悲夫晨門荷蕢接輿沮溺丈人之徒能知世之不可而不能識聖人之意故梏而不解宜其是己而非夫子也狂狷之士或可與有為也下車與言則走以避問津則不答度其不返則逃之何其矯耶嗚呼六子非聖人之倫也磨不磷湼不緇者天下一人而己六子者豈不自知也哉與其出而縻於人孰若處而安其心與其進而觚於時孰若退而全其身隠者之志也我知之矣余今與子之生於斯也處耶出耶不可得而必也其遇也豈有期其合也非有謀咏歌言懐遇適其逄亦聊以解吾憂也彼放浪沉湎之流固非吾之所屑而至於遺人羣以自泯則亦豈吾心之所欲哉至正十四年嵗在甲午夏四月括蒼劉基序右伯雨墓銘文明壙志竹林宴集序共三篇廼陶南村雜鈔中所錄考之覆瓿等集皆不載故錄之於此南村文鈔乃借李兵曺先生所藏者近嘉興姚公綬為外史著傳載事皆不詳覈惜姚公不一見而為作傳識者譏之辛丑六月雨窓逍奥山人詩序浙以東羣山勝絶劂竒剷秀層見疊出相屬而不斷至有以面若眉目為名者余約居田里未及一徃觀之大夫士東游還者徃徃出其所詠歌圖畫示予予固得其大都焉天台陶君明元自號逍奥山人謂予曰台之黄巖吾居也七世矣南去四十里所山曰逍奥先人所藏也四世矣又南百里為雁蕩北望天台赤城在有無中而脉絡則自雁蕩袤延而北也計其崇卑廣狭視諸山不翅什一於千百竊愛其岡盤麓拱空曲而有所容流水縈紆雲樹隂鬰其陽又平衍若案可耕可稼由其地小豪强所弗顧子孫得世有而藏者亦永安焉吾少也春秋拜掃於墓下嵗從大父母至焉卒事周行又歴覧濯清泉翳嘉木盖終日焉休暇復至焉既長也嵗從吾大人至焉二毛也又引諸子而至焉雖行四方未始一日忘逍奥草樹常若在吾目泉石常若在吾耳而霜露之感常若在於吾心百嵗後又將飾冠巾下從先人於此是以命為已號而弗拒也客既為之圖當必有為我賦之者君幸恵叙其事予曰台之山髙且大者不可一二計世傳又或有神仙居之明元置弗取以所重在此而不在彼也夫謂樂其所自生而不忘其本者未有過於明元者也予何敢愛其言而重咈其情也因次明元之說以復之至正丁亥秋八月檇李陳堯道序馬臻詩六首寄友過雨殘紅轉碧溝夕陽偏戀水邉樓白頭慣見春來去縱聴啼鵑不解愁詩愁城中親舊渾零落湖上園林㡬變更只有詩愁消不盡又隨芳草眼前生春日幽居淺淺春風尚帶寒日斜香篆半燒殘杏花一樹開如錦怕觸啼鵑不倚闌贈歌者一聲河滿遏行雲恨逐飛花委路塵莫道尊前無淚下聴歌不是舊時人春意空階重疊長莓苔春静閒門晝不開江上故人終嵗别栁花飛盡不歸來寄黄尊師岸花開盡木芙蓉雨意分􅈵到水葒比似髙眠消永日試來湖上看秋風右見趙思式所借元人詩中抄入野航漁叟漫記蚊雷小藁序天下之物至小而微者莫如蚊聲之至大而震者莫如雷以物之至小而為聲之至大此人所以甚怪而惡聞也故世言蚊聲如雷然蚊也者天實生之隨時而出亦信其天機之自鳴而已烏知聲之類夫雷也哉予生新安山中遭聖明時藉祖父之業粗知讀書家貧而好㳺泰定初絶湖泛江浮於河以達於兩都或羈窮草野或阻絶兵戈或曵裾公卿之門或投筆館閣之下意之所發聲亦隨之有韻語者强名曰詩似章句者遂稱為文自始出至將歸輯之得若干篇其工拙概無足論而七八年間行役之蹟於是可見或有問者則授之以代夫應答之辭焉且時以自省亦猶蚊之有聲不自知其天機之微而冐夫雷之名也雖名曰雷實蚊之聲爾其怪之惡之則余不敢知也昔人有病聰者聞牀下蟻鬭為牛鬬是亦蚊雷之類也然非病聰者有不知也因名是編曰蚊雷小藁云黟南程文小混沌石銘并序新安俞彦聲從使者入蜀還以一石遺其友九江方叔髙曰此武侯八陣圖物也其石卵形而玉質厚外而洞中髙竒之號小混沌余因銘其跗云神禹鑿江水赴海叶喜龍騰上天卵墮水化為異石頑不理歴千百載守江鬼俞竊馳還方得喜錦茵雕跗名譎詭日光垂虹射牕几元氣澒洞含大始疑中有物蟉角尾慎勿鑿竅恐遂死作者銘文辭則俚黒猴之嵗斗揷子伯温至日遣興十九年前此日同浙江西望粤城東山川擁隔乖同軌氣朔分齊正八風坐閱天時占道長起徴雲物願年豐贏糧擬問商顔路好采靈芝伴四翁伯温奉元懿貢元一笑即事千林摇落暮天寒短景經簷嵗序殘口舌得官游說易膏肓致疾上醫難無根荒萼風飄急閱世喬松氣厚完鴻雁隨陽輕逺道帛書何日到長安劉彦昺題趙文敏公墨竹為宋學士作坡翁老可俱已仙誰寫石上青琅玕淇園蕭條白日晚渭水寂寞西風寒歸來三徑無人共翡翠横牕涼露重瀛海終期釣六鰲丹山自擬栖雙鳳八月秋髙夜向沉長梢彷彿坐清隂千尋楚水三閭賦萬里天山屬國心洞庭㝠㝠波浪急糢糊爪甲蛇龍跡悵望天涯翠袖愁一片淞雲墨痕濕題趙善長一家村閒居不用鄰草緑自家春鷄犬無煩接鵝鴨免教嗔砧許漁歌送炊將獵火親夜績非分燭春樵或問津認湏腰百萬去覓吕僧珍唐之淳字愚士號桐岡丹厓先生子工齋說揚州之金崑山之玉天下之所寳也然玉不加追琢礱磨則不能就圭璧金不施爐鞴型模則不能偹鼎彛是故賜也問為仁而孔子必以工之利器喻之其弗信矣乎陸君養正為中吴名家之裔築室於松陵之野扁其室之東偏曰工齋遺楨為之說楨聞之十室之邑必有忠信君方遜志以進學親賢以為務夫既遜志而親賢則人孰不樂告以善道哉雖然人患乎有初而鮮終也君其兢兢然弗替引之使跬歩之間造次之頃莫不相觀而善則惰慢邪辟之氣無從而生他日當見其問學之成炳焉如金玉之為章必登乎廟堂之用非徒韞蔵於巖壑之間而已矣養正於楨為舅行也辭不獲命遂為之說至正二十二年四月十一日吴郡吕楨謹書青城虞勝伯顔丘氏小軒曰看帆為賦律詩四首鄉情客思共有感焉因書以寄余余不敏勉次韻錄奉叔勝徴君彦章髙尚同一笑也謝林再行看帆軒下迥添愁滿眼青山憶舊逰㐮水信來家杳杳蜀江春去思悠悠檣烏暝過漁荘宿風鷁寒隨賈客留咫尺波濤若相失徃來誰不為身謀目送飛㠶若斷蓬閒情不與水俱東自居茒屋秋聲裡如在瀟湘夜雨中檣影逺離滄海月櫂歌歸趂落潮風由來世道隨流轉不用長歎阮籍窮長江波浪雪嵯嵬險過瞿塘灔澦堆龍溉寳珠藏窟宅蜃嘘妖氣作樓臺依依鳥向滄波沒一一船隨返照來徐市漫逰東入海如何不見一人回風帆已逐歸雲盡江水何如客意長荏苒嵗華駒過隙飄摇生理雁隨陽從知白髪非春事醉看青山即故鄉獨歎夢中忘未得落花風起動回檣上已日子貞還承以佳章見示因次韻以復邾經上克用髙尚先生單子來歸自笠澤為說虞君猶遁栖青城從子識丹鳳西郊草堂懐碧鷄後㑹驚看絲髩改新詩煩向錦牋題絶憐三泖冬無雪肯學山隂夜泛溪涼夜讀史擬古數語錄呈勝伯先生知己裁正友生董在拜手王靈靡東周諸侯務兵争六國尚氣侠刦制非本情翩翩魏公子南轅北遽輕折節信得士所慕匪尊榮雖云正道媿砥礪多義名叔世駭莫見渇心劇懸旌丈夫一委質便甘同死生豈知江上漚汎然逐春聲廢書有餘歎露下候蟲鳴送瀚北海上人主靈巖席大山小山樹如髪細路盤盤青石滑記得靈巗寺裡僧相逢坐我憩雙脚雲氣飄忽為逰龍山􅎛虚閣孤涵空眼明飛鳥入煙去亂峯天末開芙蓉昔吴夫差曽避暑泉上金室變黄土老僧指㸃故物存石井分明照千古千古一夢一太息又讀蘄王墳上石王之忠勲炳星日墓道無人剪叢棘諸孫力弱誰為主天颯悲風魂亦語斷垣躑躅春垂花落日鴟鴞暮啼雨我歸僧坐石龕燈十年不向山中行晨起題詩送北海感我山中今古情好依雙樹聼說法重歴舊逰纒布襪徴王家乘翻經餘裹茶井床蘿月白河汾王謙次韻叔勝先生七言一首録呈伏冀賜教朱弦流水寫徽音古意寥寥何處尋道力已消金鑛浄禪那曽住嶺雲深毁譽不礙逍遥樂懲窒應無忿慾心說與先生應悵恨牛山何日見成林瓉此三兩月方為義士之賢子與二三名勝作為文辭以頌述其徳美且預為挽詩弔文之類家傳而户習或有毎夜醉詠一過大笑而登床者獨先生不隨流俗表表耳如何如何故賦此以發一歎云乞於韻㑹中檢尋埏字一觀明日即納還也匆匆不具瓉啟上奉和黙菴有道逰林屋二首聞道尋真林屋洞歸來笠澤路應賖未湏勅賜鑑湖水所憶傳經許掾家蒸术煙侵雲上逸歸樵路逼磵崩斜只恐武陵迷去向扶船䖏處認桃花君向山中餌絳霞行經丘壑路忘賒仙公久去金庭館有仙人毛公嘗栖隠其處祕訣應留玉斧家湖上㠶將青影度煙中鳥趂夕陽斜亦欲維舟候春水華林相約採松花􅌼瓉再拜我愛學公多古道於今古道久寥寥浄名室裏無塵事一見令人意也消不見吕髯今十年想應兩髩已皤然何當共坐維摩室剪燭哦詩聼雨眠九月五日與表維那來訪古道首座因見志學鄉友詩篇走筆成此云懶瓉和南漠漠晴天翠雨飛團雲和霧到林扉秋聲忽起還傾聼晚色相看欲滿衣碧海月寒龍久化玉笙池上鳳來歸風流曠達王猷趣渾笑人間食肉肥勾美周砥和得用行徴君中秋對月有懐佳什金華宋璲書於秦淮官舎中秋月好九霄間毎憶佳人隔逺山玉宇無梯空悵望璚樓有約可躋攀寒光直射金蟇背清影長留桂樹間庾亮南樓興不淺扁舟肯為鱠鱸還題張氏世夀堂奕奕金壇世夀堂鍾才應運適相當練川新借光華月吴縣隂垂蔽芾棠孝友已堪民表率清亷更作吏隄防殷勤父老求篇詠寫向奎仙品藻旁鄭元祐送張别駕一天風雨浄炎埃父老欽迎别駕來撮蚤鵂鶹還避去朝陽鸞鳳却飛回吴門善政人争誦海國甘棠手自栽世夀堂中時進酒綵衣屡舞笑顔開燕山曽朴吴縣鄉三老顧子明求送前縣尹張君徳常改除嘉定州同知詩西澗老樵賦此為贈亂離安輯撫瘡痍保障帡幪及此時感徳陽春元有脚掄材月旦本無私江湖水闊波濤息雨露恩深草木知三老手編遺愛傳送行就當去思碑詩寄徳機判簿十載無家客東西㡬播遷已􅂸書馬劵留作買山錢處處葭花好枝枝棣蕚連將車日來徃便比草堂前六月廿七日揮汗書於吴中客船郝經題徳機荆南精舎圖誰畫荆南精舎圖煙霏嵐翠墨糢糊林間野鳥時相逐洞口山猿不受呼尚有流泉悲夜雨已迷幽徑入寒蕪癡人莫彈西飛雁雲外仙君恐姓蘇隠居城市絶塵埃秋菊春蘭手自栽一為楞伽讀來罷南山相對翠崔嵬户庭不出倦逢迎浄室焚香也自清來客莫教談世事木床分坐話無生倪雲林文甫畫蘭石翠石嶙峋分外幽藂蘭生近磵西頭畫圖來自闕居路相對令人憶孤秋孤秋道者雲林畫竹寄白馬寺今歸文甫處清閟閣前春雨時一枝醉裏寫臨池因風逺寄栖禪侣山路迢迢傍水涯句吴張􅂖字元實題雜畫四首離離江樹暗芳洲江上西風㡬度秋别鶴未歸天又晚不勝清怨憶丹丘亂雲飛雨晝漫漫水閣風林五月寒我憶越江江上客扁舟今向畫中看我憶草堂臨澗阿月明夜夜到松蘿今朝見畫懐歸去收拾間情託詠歌水濶天低欲盡頭桞花如雪暗歸舟平生解識滄洲趣何處飛來䨇白鷗元度比聞闕從者來吴城旦夕之任淮安復徃吴淞迎尊君矣舟經笠澤能一枉顧否因令弟徳機徴君之便輙成小詩以寄倪瓉再行聞道淮安之任去尊君合住叔兮家來朝又鼔吴淞柁好過吴淞弄釣車雲林尺牘良常府判明公執事比附蕭從善一書徃曽達否瓉廿五日謹空瓉再拜新春伏惟履候多福欲徃展賀村野畏人不出耳昨有數字與令闕想曽過目畫匣倘要用當送去無用則己先公竹杖脚爐小中倘有之希尋以見恵無則不煩也元度入城何日還還日為致意謹承候匆匆不具十一日瓉啟上良常先生執事希還數字艇齋篆徳機僦屋鹽橋以教授為業屋之西隅有軒翼然即所謂艇齋也歐陽公有齋名畫舫其記云舫者嬉逰之舟也不知徳機之舟將以渉大川乎其亦乗以嬉逰乎將出入二者之間所謂乗流則逰遇坎則止乎因篆二字更張於屋壁稍暇當為記之七月二日胡悌書右工齋說至此借陳以時所藏二卷鈔得亦虞氏物也睢陽老人小景見陳玉汝所藏閒傍青山結敝廬愛晴還就一齋居食貧始信為官拙年老方知處事迂對日開牕驅壁虎焚香展卷辟書魚何時心緒渾無事得似浮雲任卷舒此僕數年前所作也兹因俞山齋來徴拙作就寫於後至正甲午冬十一月廿又三日睢水朱澤民朱君詩畫今稱絶片紙斷縑人寳藏小筆松岩聊爾爾道寜格律晩堂堂倪瓉胡悌詩眀朝明朝又上闔閭城江上春潮一舸輕過眼落華應有悵傍人飛絮自多情本因世亂依劉表誰謂才多累禰衡試問龎公歸隠計南陽何地可歌耕贈章伯髙共是多情惜嵗華故應美酒送生涯金虀細斮秋風鱠玉髓新烹穀雨茶每愛芙蓉依北渚還思闕過東家江南三月鶯啼遍不信櫻桃未著花平生豪氣慕西州莫怪眉攅萬國愁商皓不知秦正朔荆人曽紀魯春秋新豐酒美春三月劍閣詩多嵗一周中夜聴雞真欲舞馬桓事業在營丘近作寫呈徳機兄求教胡悌再行對春雪瓊葉綴𤣥圃玉羽翔伊川翻霙九霄下呈芳二月前低徊隔簾幕玲瓏入綺錢欲消不自駐已斷復成連珠幃凝華潔花池舞影妍相思梁園莫曽賞洛城年昨日賦得此詩寫奉元度孝亷一笑王老成蘇刻還致二本闕以五鐶送之復其元直也望致之春寒佳否砥再拜初月十七日梅花有便索一枝見恵甚佳山村詩約山中友望極秋空無片雲前山歴歴見遥岑新鴻漸到邉塵静舊雨不來汀草深仙李有時曽入夢伯桃死後少知心如君真是忘機者海上盟鷗便可尋寄宋飲氷欲共談詩一解頥停雲空惹思依依梅花賦就廣平老楊栁門閒靖節歸驛路數程征馬痩家書千里過鴻稀思君怕倚䦨干北拄笏看山竟落暉北牕北牕隠儿樂吾天莫遣新愁到耳邉一㡌好花供醉舞半床涼月伴閒眠故人自是辭文叔眀主何嘗棄浩然留取長安遮日手養成指甲理朱弦拜霞嶼待制伯祖基下難尋華表與豐碑三尺墳臺山四圍翁仲多年蒼珮剥子孫寒食帛錢稀痩藤㧞地長蛇走灌木為垣野鼠肥逺也久違鄉族去忍將村酒酹斜暉髙卧人生天地一蘧廬耕鑿雖勞樂有餘因閱杜詩刪舊藁為觀羲帖習行書山公醉後猶騎馬渭叟閒來只釣魚世道秋風總蕭索何如髙卧白雲居雨餘兩兩鳴鳩語畫簾雨餘芳草欲生煙甕頭酒熟常留客象外詩成頗類仙揚子有才猶執㦸囦明無事合歸田地偏時事人傳少收拾吾書且晝眠元友山南山新居桃栁参差出短墻小樓突兀瞰湖光出門便與青山對讀易能消白日長硯石洗來如玉潤藥苗曬得似茶香鄰僧亦有通文者嘗把詩來惱漫郎偶賦幽居稳占南山下人跡稀來水竹村轉巷始知猶有路傍湖更好别開門酒樽盡日常謀婦詩課閒時畧抱孫孤鶴不來髙士少暗香且伴月黄昏荅胡葦杭久矣相期物外逰長風吹不斷閒愁兩山翼翼青如舞䨇髩颼颼白始休蕉鹿夢廻天地枕蓴鱸興到水雲舟舊藏方鏡明如月看去看來又一秋次胡葦杭韻曽識清明上巳時懶聼㳺冶歩芳菲梨花半落雨初過杜宇不鳴春自歸䨇塚年深人祭少孤山日晚客來稀江南尚有餘寒在莫倚東風褪絮衣送王仙麓使君赴道州蹔歸三山家山小為離支留征斾催行莫待秋應有矮奴騎竹馬相隨迓吏拜蘭舟舜山如畫當樓見楚水浮香繞郡流歎我有親頭雪白雲龍追逐恨無由奉寄恬上人竹笻輕健草鞋寛野外消磨半日閒病葉已霜猶戀樹片雲無雨又歸山燈分寺塔晴偏見水隔漁家夜不闗愧我莫如沙上鷺霎時飛去便飛還閻氏園地真妃已返鳳臺仙獨立池亭思愴然海岳不傳青鳥信石房獨抱白雲眠宫桃移種難生實院籜初翻又引鞭凝碧荒􅈵絃管静萍花浮滿釣魚船江上送友知爾懐親憶故州相逢沽酒且遲留夕陽有限荒荒白江水無聲泯泯流孤鳥出潮投渚尾野蘆飛雪壓船頭却愁眀月中秋近不得同登庾亮樓送劉竹間歸廬陵驛路梅花漠漠寒狨衫絮㡌出長安懸知客久歸心切自覺交深别語難春入西江隨馬去山留殘雪待人看青原白鷺如相問十載湖濵只釣竿道塲山山行龜背路羊腸伏虎禪師古道塲老木隂中安佛坐白雲堆裏撫僧床勺泉清徹涵秋味尖塔孤撑界夕陽笑月亭空人影散松風如雨動天簧柯山溪轉峯回一徑平田頭白水照人清寺因柯氏封山姓客把坡詩證地名蘿月長隨行道影松風猶帶讀書聲雲津橋下潺湲水僧濯袈裟客濯纓新安郡圃臺榭凌空眼界寛得閒來此獨慿闌春浮練水蒸城潤雪被黄山入座寒古樹巢空羣鶴散荒池沙滿碎萍乾白雲在望歸期定不見青油䕶牡丹拜孫花翁墓下水仙分地葬詩人一片荒山野火焚薦菊有亭今作圃掃松無子復留墳蝸牛負殻粘碑石老鸛移雛入隴雲我把長簫歌楚些却憐度曲不如君兵間有歌舞者邉塵未定苦無謀年少金多絶不憂野戰已酣紅帕首塗歌猶醉錦纒頭蛾貪銀燭那知死月戀金樽不照愁亦欲避秦髙隠去桃花源上覓漁舟寄董無益郵鈴帶箭遽紛紛何日山深耳不聞遷客無鄉難避禍饑民失業半充軍馬蹄亂踏湖西雪雁陣平拖塞北雲我亦懶談今世事且看弔古戰塲文題小閣一團和氣斵牕粘紙著方床四面虚明取向陽毡席坐來終日暖皮簾掲動好風􅈵挂瓶水滿梅花活折鼎湯鳴芋子香布被蒙頭晝眠熟不知門外雪洋洋董静傳掛冠四聖觀静挼秋渌洗荷衣問隠孤山隻鶴隨得酒可謀千日醉掛冠猶恨十年遲雲和家有仙人譜石鼎今無道士詩莫對梅花談世事此花曽見太平時劉恱心入道三茆觀鶡冠髙掛九松顛去結三茆香火縁相國向猶為道士將門今又出神仙坐看紅日生滄島吟寄青衣入洞天跨鶴歸來雲舍近西風井邑只依然同楊心卿過孤山訪静傳不遇自逰和靖祠下眀日奉寄二髙士飛仙又向别峯逰竹下閒房且小留滿髩朔風吹客㡌倚闌落日在漁舟梅花路冷難尋塚葑草田荒半作洲獨徃獨來沙鳥怪山空木短使人愁酬鄧山房尊師山房閒伴白雲栖琴不湏彈聴者稀北道主人新拜號西湖隠士舊傳衣粤亡未合鴟夷去蜀逺難隨杜宇歸亦欲共君聨石鼎龍頭豕腹怕相譏不應聘髙士束書入谷起徴君盥耳淵栖似不聞别後故人來問字喜無逋客為移文忍貧羞說黄金盡患老慵將白髪芸獨倚髙樓南北望青天依舊有閒雲懐古吹煞青燈炯不眠滿襟懐古恨綿綿江東曽識桓司馬滄海難追魯仲連吴岫月明吟木客漢宫露冷泣銅仙何時一酌桃源酒醉倒春風數百年和范愛竹三首半生豪氣學元龍湖海惟知敬數公徒有貞心招隠逸恨無巨眼識英雄天街騎馬衣冠異雨屋鳴鷄杼軸空西崦東屯何日了定應愁老浣花翁秉燭追逰憶盛時懽悰終較昔年稀栁多客折涼隂薄薇少人飡雨緑肥蝴蝶覺来方識夢海鷗飛去未忘機相逢且可談風月莫話興亾與是非風雨蕭蕭白晝昏披襟受此一涼恩丘園不作軒裳夢陵谷空遺斧鑿痕乍可扣舷歌楚澤何堪抱瑟立齊門有時散歩西原上共醉田家一野村聞趙元父病裹飯無因絶徃還惟應帖子報平安山公馬向花前放岐伯書從枕上看貿易近来多北藥支持强欲著南冠有時沉醉西園月只尺梅花共倚闌贈金蓀壁黄紙紅旗事已休莫思入谷有鳴騶天開東壁圖書府人立西湖烟雨樓林淺易尋和靖𨼆菊荒空憶魏公逰客來把玩新題扇半似鍾繇半似歐再荅元父騕褭龍媒去未還獨騎欵段客長安青黄誰采溝中斷黒白當從局外看尊俎風流陳日月山林人物古衣冠桂花滿袖王孫逺空倚天風十二闌寄趙春洲莫兩山湖山滿目舊逰空風景荒涼客路窮雨意忽生桐葉外秋光都在木樨中乾坤混混多逰騎江漢寥寥有斷鴻自古隠人多嗜酒却憐無酒醉新豐和兩山二首世事枰碁入角危有人袖手只攅眉路通巴蜀那從檄馬立澶淵更要誰公竟醉耶從汝笑樹猶如此信吾衰傳聞雙珥消兵氣猶把葵心向鬰儀窮鄉何處覓新豐身世悠悠醉夢中未學伏波尸馬革且隨甪里向龜蒙簷頭喜有桑榆日兵後那無草木風亦欲飛神逰八極扁舟坦卧不推篷讀陳去非集簡齋吟冊是吾師句法能從杜拾遺宇宙無人同呌嘯公卿自古歎流離窮途刦刼誰憐汝遺恨茫茫不在詩莫道墨梅曽遇主黄花一絶更堪悲近世習唐詩者以不用事為第一格少陵無一字無來䖏衆人固不識也若不用事云者正以文不讀書之過耳暇日與里人盛元仁言之予元仁俱以筆墨受兩山先生知予之心元仁之心先生之心同矣元仁歸十錦將束書渡淮輙錄小卷贈行以寄君思若元仁少好詩錄以教我以寄予思明月天涯千里對面稱不孤矣戊寅七夕前三日武林仇逺頓首頓首再行右仇仁近手書自作律詩三十八首與元仁二公皆咸淳名士觀其筆筆無倦意豈特其書可貴重哉亦可以見其為人矣他日貴㳺子弟捐一石刻之使吾輩皆得墨本以刮目散懐亦一竒事也至正甲申歳孟秋汾亭石巗民瞻為盛季髙氏書時年八十有五山村雜詩借趙思式所藏歩出上東門歩出上東門肺肺東門栁彼美窈窕女嫁為蕩子婦中堂裁衣裳刀尺常在手之子未歸家何以奉箕帚為君長相思躑躅嵗云久思君頭易白惜無百年夀誰能學仙人辟糓但飲酒素月出東嶺素月出東嶺照我白玉牀床上何所有纍纍書一囊詰曲蝌斗文讀之不成章君車自翺翔駕景朝紫皇蒼苔滿石匣瑶書空秘藏仙人百尺臺吹竹引鳳皇鳳兮来不来虛此明月光雜畫東風吹寒晴春事歸花栁既有杖頭錢何苦不飲酒嗟嗟王孫去芳草入户牖惟有南山髙曉霧亦白首去年秉燭夜知有今日否所以晉名流酒杯不去手牕下黄昬忽上雲西牕竟無月燭花燦盈枝可玩不可折東風送鐘聲急急吹燭滅可惜牕下書少讀三四頁紀夢安翔紫雲軿逰盼璚仙家斜陽射巗谷眩目皆丹砂娃鬟掩鸞尾却掃昌蒲花相隨曲腸結錐可解眉皺熨可伸獨不禁子規日日啼春心春風醉行客門外芳草深芳草已無語行行又何處東園花栁多賤妾不復顧秋胡夫不夫買臣婦不婦人心匪金石悔不隨郎去春風謡春風吹栁枝枝枝拂短墻春風吹桃葉葉葉浮煙江春風薄情不可當鳴鳩乳燕相頡頏春日長春夜短雪花撲帳春不暖聼杜將軍悵下兒歌桓將軍軍城南牛將軍軍城北他軍只有八千人卒急臨洮攻未得靴尖蹴城城未頹馬箠填河河未滿十嵗兒童下馬行兩足胡為與長短什什伍伍都來降將軍忍殺令歸鄉歸時說與汝郎長納土封汝異姓王葛雄女子舞劒歌葛家女兒十四五不向深閨學針縷遍身繡出蛟螭文赤手交持太阿舞紅羅帕兮錦纒頭口吐長安㳺侠語側身弱女飛鳥輕瞋目勇女獨鶻舉雲牕霧閣豈無情終欠嬈娥太粗武黄堂張燕燈燭光兩个喧喧厭歌鼔人言葛氏善舞劍曽向梨園奉尊俎短衣結束當筵呈壯士増雄懦夫阻我憐健婦勝丈夫却歎驕兵如䖏女安得軍號娘子軍直氣端能撻秦楚只愁逢著裴將軍公孫大娘汗成雨秋日曲秋風悲梧桐知不知渇虹挟雨吸河漢嘹嘹數雁天四垂雁急不成字逺向瀟湘飛銅盤露下夜如水宋玉新自巫山歸海上圖澄江仙刻老仙指甲堅如鐡夜畫枯杉出宫闕翠深紅逺十二樓猶理霓裳舞迴雪山椒覆亭小於笠石脚揷船輕似葉桃花㡬度春酣酣弱水何日通舟楫醉中作此狡獪事收拾乾坤入毫髪神刓鬼刻未百年不與丹青共磨滅天鳳頡頏飛霞佩水雲妥帖淩波襪我將袖此逍遥逰髙歩青霄據明月采薇吟采薇采薇西山之西薇死復生不生夷齊陟彼西山我心悲兮圓通峯頂結亭孤絶䖏登眺不辭勞萬木俯在下一峯如此髙山圍湖面小藤絡樹根牢揮手紅塵表天風欲跨鼇雪花仙人初剪水欲下復遲遲半夜忽自落東風竟不知無香粘翠袖有意補春枝却憶江南栁飄綿道路時渡越蒼煙迷左道白水滿平疇落雁湘湖月孤碪越樹秋壯心消蠟屐老淚入貂裘市飲成淒斷何人識馬周韶華韶華已如此冉冉積芳塵石濕先知雨山濃渾是春釣魚臨積水隔栁見行人應有忘歸者扁舟採白蘋和子才山林不可住無酒更何之春去已多日客愁無了時斜陽依樹暝明月到門遲閒事誰消遣陶潜一卷詩鎮海亭海塘三十里此屋獨巍然有浪方知水無雲總是天苔痕封石柱㠶影下樓船閒憶童男女迢迢去嵗年寄潘懐古園林摇落夜静獨奈秋何黄葉下不止青苔掃更多回風喧地􅄜濃露洗天河懐楚思無極長簫按九歌勾龍爽毛女曽是阿房學舞人玉簫殘譜尚隨身喜歸南嶺尋仙藥忍見秦宫化刦塵松蜜春腴差可飽槲衣秋碎不湏紉慿誰唤起勾龍爽更寫湘妃與洛神梅花為怕緇塵染素衣凍痕封蕋放香遲月来忽送闌干影春到不分南北枝啼夢翠禽依樹宿斷魂玉笛隔花吹從他萬片隨風去湏有青青葉底時潮一痕初見海門生頃刻長驅作怒聲萬馬突圍天鼔碎六鰲翻背雪山傾逺朝魏闕心猶在直上嚴灘勢始平寄語吴兒休踏浪天吴象㒺正縱横湖上嵐霧濛濛曉未收青紅牕户失飛樓雨添芳草侵官道水漲浮萍入御舟蘇小空傳身後曲江淹曽賦别時愁杏花風急清明近已覺新寒似麥秋丹心丹心只有杜陵知愁讀傷春五首詩𫝊語龜年休度曲江南正是落花時登寶林應天塔越王城下草青青眺逺湏登第九層白髪山僧閒指㸃斜陽古木是諸陵朝天門城角颯颯秋風起白榆山前吹徹小單于行人便作邉城聼忘却杭州是故都斷橋聞角栁外危橋出戍樓和霜和月按梁州吹時莫近孤山下千樹梅花不識愁懐向古曽同野竈煮溪魚别鶴歸遲信息踈不是山中無楮葉尋常懶寄入城書博望更看星明犯斗牛歸槎穏泛絳河秋茂陵可是無仙分不載丹砂載石榴上已感懐一春無況懶逰山風景依然三月三十里楊花深似雪馬蹄無路入江南巴東西巴東有杜鵑杜鵑啼春花正妍巴西有杜鵑杜鵑啼血花可憐巴東巴西久為客目斷江南歸未得月明滿地山花白石牕玲瓏千丈厓髙䖏倚蓬莱山月照得白颶風吹不開渴龍栖古井病鶴下蒼苔祗有麻衣叟時時闕易来故晉相府長史朱公行状公諱右字伯賢姓朱氏其先河南偃師人十世祖景宋光祿卿生左司諫光庭受業程夫子司諫之孫榮同簽書樞密院建炎初扈從南遷至台之臨海遂家焉生子履仕至知縣履生起宗是為公之髙祖宋通徳郎隠居不仕以醫術濟人曽祖正肅祖致中受業王文憲公著書傳發揮號春江先生父應時以子貴贈晉府長史妣謝氏宋􅄁知政事申國榮敏公廓然曽孫女贈安人生公與其弟四人公㓜聰敏學知向方父母所鍾愛家雖貧鬻産以教之既長博通羣書後以書經應進士舉不得志遂刻意為歌詩文詞動以古人為法間嘗㳺金陵南臺監察御史趙承禧舉才堪校官浙東帥閫檄授慶元路慈溪縣儒學教諭能善於其職人至今猶稱之居無何丁外艱家逾貧弗克治葬事與仲弟昈勤苦自立所居環堵蕭然嵗闕寅遭兵燹奉父遺殖權厝臨海縣楊梅山因徙居城府依其舅氏居二十年舅氏亦卒奉母入越授徒為養俾弟昈居闕墳墓時徃来吴越間又徙居上虞五大夫里調紹興蕭山縣儒學教諭江浙行省丞相察里公承制擢公為其縣主簿嵗丁酉遭母䘮遷父遺函與母合葬餘姚蘭風鄉金雞墩庚子除江浙行省照磨左右司都事轉員外郎就闕公學益力造詩益深名聲日蔚然以起海昌馬氏延公教其子以天下亂復還上虞或㳺永嘉及鄞中洪武三年春用薦召至京師預修元史既竣事以疾辭還蒙賜金帛有差六年翰林侍講學士宋公濓舉公及金華朱亷臨川趙塤有良史才上特可其奏命奉御監李彬傳㫖中書遣人取公公八月至京師九月四日上命公特入史館纂修日厯十八日賜宴冬十一月戊戌甘露降於鍾山命詹公率公特徃采而食之明日公作甘露頌以獻壬戌賜公等七人綵叚各一十二月二十一日日厯稿成庚申上御黄閣承㫖學士詹公同侍講學士樂公韶鳳宋公濓奏日厯稿成總一百卷約十萬餘言特旨授公與趙塤朱亷三人翰林國史院編修官七年學士宋公與公等又奏所纂皇明寳訓五卷正月十六日駕幸翰林院公應制賦簷鵲春聲詩二月賜春衣羅一縑絹一匹髙䴡布一匹五月十八日日厯淨本成計一百冊上御奉天殿丞相胡公學士宋公承旨詹公進上曰此千萬世事蹟皆汝等力也命藏殿前金匱内六月十一日學士宋公傳旨俾公入晉府講書十三日早朝復見上東黄閣上諭之曰老朱爾去教晉王講經史令其通曉大義知詩文法度十五日奉旨賜茶十一月上御城南齋宫勑諸儒與公同考正韻書十二月令考古䘮禮八年正月十一日奉旨與公考歴代后妃儀衛車從時禮十月二十七日召入武樓下賜饍語及中峯月舟字說命賦一篇以進八年秋授晉府長史公生於延祐甲寅九月十有七日至是不幸以疾卒洪武九年春正月十四日也娶張氏先卒贈安人繼詹氏封安人子男二人長孝達次孝錫女一人曰珉孫男二人曰震曰巽女二曰珍曰珂公平生著述有白雲稿十一卷春秋傳類編三卷三史鈞言三卷秦漢文衡三卷深衣考一卷邾子世家一卷選唐宋六先生文集修李鄴侯傳一卷補注漢魏詩四卷歴代統紀要覽一卷元史補遺十一卷藏於家公居家事親至孝其弟篤友愛時節嚴祀先報本之禮著為成規以遺其子待賔客友朋敦尚義概不啻若骨月然見人有死䘮患難者汲汲捄拯之唯恐其不及有貧乏者輙分財助之其㳺金陵居杭居越居鄞賢公卿大夫多雅重之所與友南北之士甚衆若今杭州教授徐公一䕫及予二人與公友好尤篤徃嵗同居杭之海寧當干戈擾攘時不幸遭先人棄背欲扶櫬還葬鄉里方惑於浮言以道梗莫能成行公輙由黄灣附海舟抵上虞乃從越郡城過蕭山度錢唐以還兵戈屏息水浮陸走皆無患予聞之即具舟行使先人得遂首丘之志皆公之力也公平生所為急於義者大率類此公今客死京師有二子奉柩歸葬顧予力乏不足以振之以與公同里學同經友同志今又同仕於朝其知公為深用敢述其梗概俾其子求立言之君子銘其墓以垂於不朽焉洪武九年丙辰夏四月甲辰陶凱謹狀故晉相府長史朱府君墓銘天台朱君伯賢既卒後四年其子孝達持故晉相陶公凱之狀躋門拜且泣曰先君之生辱執事知而薦之今沒矣倘又辱銘焉是先君生死徼恵也惟執事圖之予俯執而泣曰朱君豈待吾言而傳耶然予嘗與君論文知之甚悉信非吾莫能銘君也君諱右字伯賢其譜宋諫議大夫光庭諫議之孫同簽書樞宻院榮建炎初始自偃師徙自臨海生知慶元縣履慶元生通徳郎起宗通徳生君之曽祖正肅祖致中學於王文憲公柏通尚書有所論述父應時以君故贈晉相府長史母謝氏宋􅄁知政事廓然之曽孫贈安人君先世皆居台至君避亂来越葬父母於上虞遂為上虞人然書其鄉里必曰天台識所自也君軀幹端雅美鬚髯少為學甚力讀書無所不究為文章淵源深博不可窺涯涘年三十餘聲名蔚然被吴越間元末名公卿多推舉其文行兩為學官三以七品官授不赴國朝革元命洪武三年詔修元史予時為總裁官薦君名自布衣召入史館史成賜金帛遣歸後三年詔纂修日厯上求有史才者予復以君名應詔書既進除翰林國史院編修官明年承詔授經於晉王八年擢晉相府長史陞承徳郎九年二月十四日以疾終君在翰林毎以辭章獻奏對精宻顧盼有威儀上甚眷重之毎稱以老朱而不名君亦自意為難遇因事多所建明凡被綺段襲衣之賜者二預宴饗恩者數十賜坐應制賦詩者甚衆其同編輯之書最大者曰聖政記洪武正韻其他稽覈舊典以進者不可勝數上盖將用之雖君亦以為且得施所藴而君之病作不起矣嗚乎兹其命耶君善著書有春秋傳類編三史鈎𤣥秦漢文衡各三卷深衣考邾子世家李泌傳歴代統紀要覽各一卷唐宋文一十七卷漢魏詩四卷元史補遺十一卷又為元史編年未成其雜著文有白雲稿十二卷行於世君娶張氏先卒贈安人繼詹氏亦封安人二子長孝達其次孝錫女一人孫男曰震曰㢲孫女二君内外行皆可稱尤急於義能周人之患郡士郭秉心死濠梁家朋友具棺斂以其䘮歸以貧告者分貲財相遺恤與人言恭敬詳慎固有徳人也而其夀僅六十有三位不足以當其才孰謂之非命耶然君有文以傳有名以聞於時其過於人則逺矣君之𦵏以卒之年十一月二十六日墓在餘姚淩雲峰之原銘曰文顯於時身不必華也名昭於後夀不必多也天不全於人竟如何也君得者至寳千載當不磨也玉光劍氣蒸為雲霞也自信而勿疑胡怨嗟也吾銘以慰子勒石於巖阿也前翰林學士承旨嘉議大夫知制誥兼修國史兼太子賛善大夫金華宋濓譔將仕郎前國子助教金華鄭濤篆額故晉相府長史朱公挽辭昭代聲名被八埏吾宗文采更輝然曽持史館春秋筆復入王門醴酒筵他日淩煙期畫像一朝馭氣逐飛仙絶竒喜有徐卿子翠石鑱銘照九原朱亷赤城山水未能歸㡬度宫花照錦衣巢裏白雲無定迹又隨明月上天飛吴興林静子山學士鑾坡視草時金蓮夜賜子同歸如今尚憶清光近地下修文孰是非誰言晉國河山險徳重王門共授經欲為斯文作梁棟不知天上玉樓成金華劉剛養浩東浙騰聲久詞林受薦遲才髙當世用心付後人知遇主寧非命傳經幸有兒蕭條大夫里聞道更從誰才難今始覺文在世應傳幸不求封禪從人歎草𤣥神交秦漢上氣貫斗牛躔一飯懐遺徳臨飡毎慨然里生方孝孺鑑湖春水曽通好濠上秋風復共遷正謂玉堂宜視草忽聞蓬島竟登仙聲名可是為身累文字還留與世傳憶贈白雲遺稿在臨風重覽倍澘然王立中八月十日借應龍所藏燈下草題徐守朴山居雙慶圖士生天地間徳行當兩全徳乃才之本孝為百行先徐子瑚璉才讀書孝且亷築室傍山麓開門臨澗泉繞屋樹隂合春深禽鳥喧翁時坐匡牀笑傲羲皇前蒼顔供酒紅白髪如霜妍以義朂諸子保身無悔愆五福萃一門積善非偶然憶昔亂離際兵火連吴天十室九逃亾骨月相棄捐非無愛子心流離復相憐匪敢忘劬勞天髙呌無縁側聞具天樂仰慕如登仙栖栖反哺烏風樹情纒綿子獨受天恩别母俱髙年甘旨既充足綵服仍褊􅝆承顔在朝夕出逰亟早還及時養親志庶可希前賢謝徽鳳臺集序渤海髙君季廸示余以京師所為詩曰鳳臺藁者余既受以卒業輟而歎曰四百年無此作矣或誚余曰有是哉子之言過歟曰非也夫詩風雅之餘漢魏六朝而降其法莫盛於唐非唐人能度越前古盖以古人之法唐人能兼而有之季廸之詩余取其類唐人耳非謂由宋及元作者皆不能名世而傳後也季廸家姑蘇自少年之時出語已驚流輩及老工於詩厭世俗之體近凡遂棄不復習悉取唐諸家之作者師焉毎一篇出傳嘖嘖歎賞於是古之習俗一變而季廸之詩名亦因是而起矣憶予被召修元史與季廸同至京師居史局者數月又同入内府教西學弟子員今遂同官翰林為史属顧惟出處之際盖未嘗一日不與季廸同而凡身之所歴目之所寓發而歌詩則有不可得而相同者季廸雖有教余而終不能如季廸之能言也盖季廸天資警敏識見超朗其在鄉踪跡滯一方無名山大川以為之逰觀無魁人竒士以為之振發而氣頴秀出己如此今又出逰而致身天子之庭清都太㣲臨照肅穆觀於宗廟朝廷之大宫室人物之盛有以壯其心目觀於諸侯玉帛之㑹四夷琛貢之集有以廣其識量而衣冠搢紳之士又多卓犖竒異之材有以擴其見聞是皆希世之逢而士君子平昔之所願者况金陵之形勝自六朝以来嘗為建都之地今其山水不異而光岳混融之氣聲靈烜赫之極則大過於昔焉登石城而望長江江左之煙雲淮南之草木皆足以資嘯咏而適覽觀季廸雖欲韜抑無言盖有所不能已者此鳳臺之集所以作識者有以知其聲氣之和平有以鳴國家之盛治也使季廸此時而専意致力於其詩則他日之所深造當遂成一家奚止相與唐人軒輊哉季廸之詩文甚多别為缶鳴江館集若干卷皆當世之儒先君子為之序洪武三年八月既望吴郡謝徽序謝徽字元懿長洲甫里人洪武初與修元史授翰林編修未㡬擢吏部郎中辭歸復起助教國子卒官有闌庭集題潔養堂養親非無端潔行誠獨難持身苟不謹無乃遺親患昔聞五鼎家玉食羅衆飡笙鏞漫稠雜親志無由懽羊魚不登爼孟鮓猶是還嗟我貞士心千古良足歎君家南陔下唯有白華繁吴興萃野畫潔養堂并題王氏潔養堂記金華童先生為文學吴興其子壻王子仁實泛之来今年夏將歸省其母氏袖銜紙一軸走余門乞余為題其奉母之堂并求一言以為歸榮余嘉其意因為采詩序語題其堂曰潔養之堂而復為之記按詩之序曰南陔孝子相戒以養也白華孝子之潔白也羽嘗推其說曰人子之於親也養非難潔為難養豐矣身苟不潔則憂其親憂其親雖奉之八珍九鼎孝乎哉養弗豐也身苟潔焉則樂其親樂矣含菽飲水非孝乎旨哉乎二詩之義也宜周之盛王以之用於鄉人邦國所以成孝敬而厚人倫者偹矣惜乎其用之也徒笙而不歌故有聲而無辭後世樂壊而聲亾矣向非毛公之徒有所考述而得其說則二詩之義又將與聲俱亾矣豈不又可惜乎今吾百世之下猶得以因其義而想其聲意其節族之間優柔而不廹有棠棣伐木之忠誠無小弁北山之激越鏗鍧諧金石要眇通神明聞之者孝敬之思勃然而興矣夫豈待於章句詠歌之流者哉子仁之歸也登堂拜親奉觴上夀帣韝而進食昆弟之間更相告語使持身如白華而孝養如南陔驩聲和氣溢於閨門不啻匏竹之參差而陳詩於階下也子之親其有弗順矣乎禮曰與闕孝弟於父母子行辭子之外舅歸而謁闕求余言求是非也洪武辛酉夏張羽記元故徽州路儒學教授陸君墓志銘君諱徳原字靜逺姓陸氏平江長洲之甫里人甫里實唐處士天隨子故居君葢其後也曽大父邁大父文明父應祥母周氏君少知學治别室延宿儒與居與逰左右書數千卷常乗間披閱之自視欿然惴惴焉以不克保前人之遺業為懼然能尚義而好禮館賔客無虛日訃音所及或不逺千里徃賻之永嘉林寛以文學知名君與之年相若以兄事之時從問古今體詩寛死無以斂厚䘏其家而為嫁其女寛弟宏死復為買棺以葬君毎見浮屠老子之居金碧亂人目而儒宫徃徃就摧毁慨念世俗怵於福報之說而不知聖人道徳仁義之澤被於無窮也故於學校之事尤致意焉族有田千畆當歸君君曰吾衣食幸有餘又私此田不可剏義塾以田歸之遺重幣迎儒先生為時所信重如陸君文圭龔君璛栁君貫者以為之師户屨至無所容筆札飲膳之物惟所須而具列古靈陳公製錦管見及四明程君端禮進學工程凡交㳺與来學者人予一帙曰觀此亦足為仕學之法矣郡守趙公鳳儀為請于行中書省畀甫里書院額祠天隨子為先賢而署君為山長初有司舉君茂異不赴至是乃起就職既有以其處湫隘近市更營亢爽之地徙置而増廣之學道書院殿屋將壓君攝事不閱月為之植仆支傾輪奐之美悉還其舊長洲縣學廢已久君市材僦工屋於故墟於是縣復有學甫里秩滿上名中書調徽州路儒學教授徽學亦久廢禮殿缺圯最甚君以徽為儒藪澤朱子闕里在焉不宜坐視其壊謀改作而財用不足乃大發私槖以資土木之費仍身任其役沿郡檄来平江購良材募善工闕先諏日興事君方行而遽屬疾遂卒於家里至元之六年九月三日也享年五十有九其年十一月二日葬吴縣東横山先塋之次一子頥孫始八嵗長女仲耑贅徐元震㓜女用保生甫至月君天性恭謹平居無惰容雖盛暑冠𢃄自若絶去圭角循循下人有以非禮相加者忍弗辯久而来躋門待之不異常時人以為難君有别業在吴淞江之上築室曰笠澤漁隠作續杞菊賦自况將以暮年歸老其間復散人故事不逮也臨終子若壻問後事君曰人受命于天事之方来非人所能必一聼於天而已聞者稱其達云君殁後諸生由君之力得成其學者咸相與為文以祭檢校官王君良與君友善誄之曰居家庭為孝子處州里為善人官學校為良師人謂其無愧辭君既葬之明年元震代頥孫奉先友陳方之状来謁銘乃志而銘之銘曰繄君之先遯於甫里弗襲其迹乃出而仕弗佚其躬乃瘁以死孰閼其施而止於此名乎我遁猶曰善士笠澤之腹吴淞之尾烟波蒼蒼君則已矣覧兹法華君尚有子至正四年閏二月十八日黄溍撰錢伯行墓志銘伯行姓錢氏諱達世業儒為蘇州長洲縣人曽祖恪前元以仲子恩贈承事郎丹陽縣尹祖宗慶隠徳不仕父良右元吴縣為儒學教諭母丘氏生於元癸丑正月二十一日㓜而聰敏迨長刻意力學始開門授徒戸屨常滿禮幣招延者踵至於是嘗館于巨室經史之暇尤工於書闕篆𨽻行楷精絶造古盖先府君善書著名松雪翁嘗稱之故得家傳之妙論者咸謂不下乃翁也名山大刹豪門富族碑銘題匾不下百金求之叅政王公叔能平章達公兼善皆忘其貴顯以叙斯文之好齒踰不惑猶無宦情丙申嵗江浙行中書省分治於蘇乃起家授登仕郎分省管勾架閣尋除本省檢校官歴左右司都事陞文林郎淮南行省員外郎大明混一選赴京師因太常議禮禮成發鳳陽府居住待用洪武元年蒙恩歸鄉方且朱墨自娱十六年冬以事起遣詣京明年正月四日以疾卒於寓所其子文函骨以歸將擇是嵗月日葬吴縣靈巗山黄山徐涇先塋之側從治命也得年七十又二娶陳氏子一人文也女四人淑寧歸陳熊淑婉歸陳祖義淑媛歸管周淑􅈺歸周權俱士族伯行為人淳厚雅飭弱冠以師範自持談論誠實不妄嬉笑其任檢校官也省闕觀風郡邑吴俗有䘮必供佛飯僧動以千百計至有廢家蕩産因循累年不能舉者伯行諭以禮法獲葬者數百家俗為之變里民逃於兵燹田荒而有司仍舊額徴糧八萬餘石亦為白執政悉蠲之疲民免鞭箠之苦及為都事督燕城海運糧三十萬斛不擾而辦佐淮南幕屬吏有因闕渡江覆溺者若干人為白上官復其家月給廪膳其孤寡凡所以利民濟物皆此類勤於稽古攷訂制度雖老不倦平生著述有橧巢藁藏於家葬有日矣子文以其契家長洲縣儒學教諭周敏所述行狀造予乞銘予與伯行早締交晩年自濠梁同歸方期白首丘園忽有死生之别素稱善人而不得易簀正寝豈不痛哉遺文後當有揚子雲識者墨迹已傳於世可以不朽矣尚何俟於予言耶既辭不獲乃為銘曰徳修於躬天或靳焉學成於已命或吝焉既不可必者天莫之而致者命嗚乎行父亦何愠焉王立中撰太虛道士效清容子文鑄金作象深垂饕餮之文索米為饑何異侏儒之拙乃知芻豢之恱我口不如禮義之根人心傳書染指之凶易著濡首之悔詭稱聞道實曰費辭清容子山澤迂踈氷霜傲睨乏燕頷虎頭之相初匪適時為牛溲馬勃之材猶言藏用徒禀薑桂之性殊乏参术之和望似木鷄出語争疑其鐡石癯如野鶴持身或近乎膏粱岐黄之問對匪専元白之唱酧莫預已廢三餘之業獨夸一藝之長隤其家聲耻莫甚矣同乎流俗已實為之弗思尚口之㓙猶見朶頥之色昔茅容鷄黍詎為設客之資而張翰鱸蓴乃在還鄉之日捨飯䟽飲水之自得為蒙袂緝屨之可憐不為盤飱固難免跨驢之誚我有斗酒要當為得魚之歡幸前倨而後恭姑小懲而大誡尚期深省以贖徃愆亡是公代聽雪主人宴客致語疾病相扶持乃天倫之至理酒食召僚友亦人道之常彛挹南斗以為漿夢鈞天而廣奏熒煌接席醲郁陳歡清容處士素褐癯儒青氊舊緒投簮逸海岸有古松流水之心騎馬傍人門無冷炙殘杯之色困頓於爼豆絃歌之事沉淪於醫藥卜筮之流匪曰卑陬亦云曠達喜愠既不形於色口腹亦何異於人聼雪主人出壑清氷臨風玉樹陽和盎面士疑挟纊之恩冲粹積躬衆美虛車之譲鼎烹而調衆口杯水以勝萬言給月支風陋人間之腥穢屠龍膾􅃫實天外之珍羞厥徳不回何闕弗已方將肥羜以速諸父庸不等差敝袴以待有功悉除僥覬芳筵縹緲雅集舒徐露堕三危化逡廵之麯糵風號萬竅陳廣莫之笙竽享若太牢淡如明水敢陳口號少賛神交玉堂學士詫英豪濯濯春葩簇錦袍擬上瑶池擘麟脯不將金帳飲羊羔長卿多病縁消渇坡老長貧號老饕從此青州化烏有夢廻霜月冷如刀見袁伯長清容居士集中乙巳七夕書珊瑚木難卷五
