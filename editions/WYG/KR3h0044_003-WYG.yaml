body:
  text: 珊瑚木難卷三明朱存理編㸔雲圖趙仲穆為仁甫作詩青山與浮雲終日淡相守山為雲窟宅雲為山戸牖無心成白衣有意變蒼狗人情亦如雲寄語㸔雲叟玉山顧瑛落日杖藜溪上行溪流十里帶松聲輞川詩意無人領坐對南山雲氣生富春吳毅靄靄晴雲擁碧巒清分秋影落江干何人宴坐長松下蒼翠滿身生薄寒雲間永彝松隂坐來穩山色望中分寄語東州客歸來㸔白雲彭城劉儼松頭自與峰巒黑雲景何如水意閒放下痩笻成小憩不妨坐對日銜山㑹稽張憲結屋山中住尋幽曵杖行偶來松樹下坐㸔白雲生韓友直行憩蒼石上坐愛青松隂白雲在天際相對總無心潘純横杖坐松下㸔雲起遥岑唯應陶靖節㑹得此時心宇文公諒松溪春水落白石粲可數坐愛南山雲溶溶不成雨南陽納新舊遊清闕上愛㸔弁峰雲稍將春雨度始見逺林分起滅悟真理逍遥遺世紛於焉自怡悅永懷陶隠君龍門良琦雲擁秋濤薄鏡臺道人日日好懷開因此夜來風雨作驚起蛟龍出峽來扶風馬庸讀碑窠石圖李成畫神品上上洛陽范坦評跋讀碑窠石圖李唐宗室成所畫也予謂筆墨備有神妙兩到於此本見之矣前人稱畫山水者必以成為古今第一信不誣矣宜乎評者以此本第居神品上上云成字咸熈五季艱難之際避地北海遂為營丘人凡畫家至不名而曰營丘者是也柯九思詩炎漢乾坤運已移可憐國復屬於誰君臣父子同天性空向荒祠闕讀碑吳郡陸修正草昧乾坤氣鬱森同過祠下讀碑隂可憐英識機徒數不料斯人伏禍心戴有南孝娥祠下曹瞞過立讀碑隂八字中較智何須三十里披圖千古嘆奸雄雲松子黄斌何事碑隂較滑稽射機遲速孰能齊後來人不前人闕猶咏空梁落燕泥石屏後人戴益畫梅明潔衆所忌難與羣芳時貞真歲華晚只有天地知山農荒苔叢篠路縈廻繞澗新栽百樹梅花落不隨流水去鶴歸常帶白雲來買山自得居山趣處世渾無濟世材昨夜月明天似洗嘯歌行上讀書臺飯牛翁即煮石道者閒散大夫新除也山農近日號老村南園種菜時稱呼元章字冕名王姓今年老異於上年須髮皆白脚病行不得不㑹奔趨不能諂佞不㑹詭詐不能干禄仕終日忍饑過畫梅作詩讀書寫字遣興而已自喝曰既無知己何必多言呵呵竹齋方寸銕志呉門朱珪氏師濮陽吳睿大小二篆習既乆盡悟石鼓嶧碑之法因喜為人刻印遇茅山張外史外史錫之名方寸銕持以過錢唐訪余於吳山次舍求一言白其所謂方寸銕者余笑曰余方以銕石心取乖於世而子又欲乖吾之乖乎雖然古之豪傑修已治人者必自方寸銕始黃金白玉可磨此銕不可磨也子以是銕印諸金玉銀銅犀象使佩之者皆無媿於是銕外史氏心印之教行矣吁豈直求工於刻畫無戾夫古制也哉今一妄男子釋蹻起閭巷取封侯印如斗大印咫尺書驅役帶甲百十萬如金翅鴞逐百鳥無一敢後者金斗之權重矣哉吾不知果然為天子剪狂宼佐中興為生民開太平無媿於汝銕否否則徒以苟富貴不至腐尸滅名不已使得珪方寸銕印斯可以蒙金斗而壽榮名矣珪或為今將軍刻符印其亦以是告之至正十九年秋七月八日李黼榜闕甲進士今奉訓大夫江西等處儒學提舉㑹稽楊維禎誌并書銘婁東朱珪字伯盛工古篆籀文其於六書之義考之尤詳嘗以餘力刻印章則為中吳絶藝間遊錢唐遇勾曲張外史名之曰方寸銕以喻其能堅其志操期以進乎道亦若桑國僑志於銕硯之銕云雖然科斗書廢已乆必以篆籀為師法漢𨽻而下不具論能復其古其庶幾朱君乎朱君與予相游從嘉其志操之白堅今年予來玉山中驗朱君之書法益有進是猶張旭悟公孫大娘之舞劔噐也見其刻玉石如切泥則又若漆園氏誇庖丁解牛而得肻綮也張得於舞劔庖丁得於解牛吾知朱君得於書而悟外史方寸銕之㫖矣遂述其事而為之銘銘曰聖人作人文開龍馬出熒圖來神農氏尚結繩民弗犯俗龎淳史蒼頡肇有制譬孳乳乃曰字越夏商歴周秦科斗廢籀篆臻漢而晉書變作唐風媮政日惡日逮今邈寥寥事刻畫昆吾刀鍾鼎隳石鼓頹心太古婁朱珪至正庚子夏四月廿有六日河南陸仁造頌猗方寸銕嫓昆吾刀游刃發硎妙契縱操六書奥㫖探􅄨捐勞史籀秦斯作則孔昭翔鸞翥鳯騰龍騫蛟為印為章珪璧麗霄文苑藝林世賴崇褒我頌匪私永言弗佻至正庚子八月十有八日淮海秦約造詩人心何危患多岐方寸之銕貴自持百鍊耿耿明秋暉彼柔繞指惟詭隨朱盛剛勁真呉兒法書鉄畫逼秦斯晴窓握管儼若思學成變法出瑰奇銕可代筆猶神錐用之切玉如切泥孤忠不媿月食詩清便更賦梅花詞元祐黨碑我所非驢為犬吠我所嗤雕蟲小技同兒嬉屠龍妙割嘆奚為盛乎盛乎知不知北南車書復復來中興定勒磨厓碑大書深刻非子誰至正二十年歲次庚子夏六月初吉天台氏學者元鼎書於白蓮桂子軒虛中神斧磨天割紫雲仙葩殞玉發奇芬靈書寶訣開剛卯不數人間小篆文書刻輸君總色絲前身想是伏靈芝虎頭食肉元無相鑄紐休傳左顧螭我家金粟道人章瓦欵蟠螭識未央千古典刑今復見佩之何必獸頭囊鏤玉塗金與錯銀盡將工巧失天真君能獨闕雕蟲技定品他年合出神伯盛朱隠君予西郊草堂之髙隣也性孤潔不佞於世工刻畫及通字説故與交者皆文人韻士予偶得未央故瓦頭於古泥中伯盛為刻金粟道人私印因驚其篆文與製作甚似漢印又以趙松雪白描桃花馬圖求刻於石精妙絶世大合松雪筆法惜其不得從游松雪之門使茅紹之專美於今世因題四絶於巻末以美之伯盛勿以予言為譽後必有鑒事者公論也至正十七年中秋日書於玉山草堂顧阿瑛朱珪手持方寸銕撫印能工漢篆文并剪分江龍噴月昆刀切玉鳯窺雲他年金馬須承詔此日雕蟲試䇿勲老我八分方漫寫詩成亦足張吾軍至正辛丑八月朔隴右邾經書平湖草堂仲義朱生心似鉄篆刻藝彌精應手多盤折纖毫不重輕么麽形獨辨闕匾勢初呈漢印規模得秦碑出入明風流金石在潤色簡書并餘刃庖丁解風斤郢匠成達觀應自我賞識足平生趂刻無多訝因君託姓名錢唐陳世昌袖裏昆吾一寸鉄江南碑碣萬家文玉符金印雲臺將大篆煩君為勒勲雲間陸居仁十年兵興徧天下名山大澤罹野火野火盡燒秦漢碑咸陽鬼哭無人打故人吳睿業篆隷好古乃有如珪者妙刻金粟道人章尤精白描桃花馬金印聞如金斗大零落當時建章瓦君不見黃仙鶴伏靈芝北海文章長髙價武夷山樵者錢惟善題於海嘯軒跋館閣諸公無不喜用名印雖草廬吳公所尚質樸亦所不免惟揭文安公絶不用其制吾竹房論著甚詳然其所用印又多不合作趙文敏有一印文曰水精宮道人在京與李息齋袁子方同坐適用此印袁曰水精宮道人政可對瑪瑙寺行者闔坐絶倒葢息齋元居闕壽寺也鮮于郎中一印曰鮮于伯幾父吾子行曰可對尉遲敬德鞭滑稽大略相同子行嘗作一小印曰好嬉子葢吳中方言一日魏國夫人作馬圖傳至子行處子行為題詩後倒用此印觀者曰先生倒用了印子行曰不妨坐客莫曉他日文敏見之罵曰箇瞎子他道倒好嬉子耳太平盛時文人滑稽如此情懷可見今不可得矣予座主張先生仲舉在杭一印曰平臯鶴叟葢用杭州三山名臨平臯亭黃鶴也古人亦有如此者如雲烟過眼錄載姜白石印文鷹揚周郊鳯儀虞廷葢以其姓字作隠語辛稼軒印曰六十一上人又以破其姓文米元章書史言劉巨濟符符字亦好奇耳雲門山樵張紳書於朱伯盛印譜後成化乙巳夏五月八日借昆山黃應龍抄本錄於小樓邾性父識子昂竹石石如飛白木如籀寫法還於八法中若也有人能㑹此方知書畫本來同子昂自題水晶宮裏人如雨宅瞰鷗波可釣魚秀石疎林秋色滿時㸔健筆試行書柯九思叢篁偏映寒雲色古石猶凝翠蘚痕曾是碧瀾堂上月獨臨苕水憶王孫危素此幅沈維時所藏右軍鶻等帖臨本鶻等不佳都令人弊見此輩吾衰老不復堪此開成三年三月三日柳公權記跋右軍鶻等帖舊藏李簡之少師家其詳見寶晉書史中更搶攘此帖幸存殆有神物䕶持耶淳祐乙巳夏五陶齋題詩麄豪厭見屋漏雨圓滑欣逢錐畫沙紙墨千年浄如洗料應曽入米顛家畸敬賦絶句贊陶齋所藏晉右將軍帖淳祐乙巳季夏書於始興郡九成臺虞提刑尚書父子詞翰二帖用子和韻送㠭西歸就試㠭屢勸予早還家因一致意兒有掌中杯但把歸期苦苦催兩世衣冠仍上第公台原自詩書澤裏來秋色為渠開先我梁山馬首囘猿鶴莫輕窺蕙帳驚猜緩歩歸休亦樂哉嘉定元年秋七月丁丑漢中澤物堂書寶唐秋半十四夕浮雲破處月華倍明閒中得此闕天佳景其視紛紛闕而履危機者何如哉賦五十六言即事敬呈詔使戸部大監兼柬諸親友㠭頓首再拜闕未滿㸔虛亭小飲勝凴䦨浮雲盡捲堂堂見清影將圓處處歡一㸃神光千里在三秋佳景四闕難人生幾度逢今夕更覺閒中天地寛虞丞相鈞堂帖鈞堂仙集伏惟福本崇大竊聞有長子之戚盛德積善之門豈應有此天道是不可詰矣然去來修短皆前定鈞堂露電世法具大定力自有以處此夢符制幹兄榮改事有涯此心望望甚久今得報而喜不啻其身之得也漢上相處甚樂前此每許為允文留别當具禀次家信一封謹封納伏乞鈞照允文皇恐上覆跋虞忠肅采石之戰日星晦蒙江水震蕩功烈赫然於時足以讋服强敵愧死名將疑其平日為人有喑啞叱咤千人皆廢之狀及觀其手帖詞語詳雅氣象雍容乃真一書生耳公之子孫居吳中者世藏此帖今為葑門朱性甫得之夫性甫雖好文事藏此固吾知其意不在筆墨間也翰林吳寛題唐張長史春草帖春草青青千里餘邊城落日見離居情知海上三年别不寄雲間一鴈書張旭題微仲觀於東府之東齋元祐壬申五月初吉師朴觀於樞府之前㕔元祐癸酉六月晦日器之觀於承㫖㕔之東軒元祐癸酉五月二十八日心闕之妙洞見藴藉河南耿南仲敬書叔通觀於城東惠寂寺之山堂靖康丙午三月十日長史書法昔聞其名今見其字起敬起慕宣和四年十月中浣日梅山拙逸題叔盎因謁安國獲觀長史真蹟建中靖國元年十月壬子寫字力出於不用力耳漢舉嘗觀紹聖乙亥六月初一日題齊郡張紳拜觀於陳氏春草堂至正辛丑十月十日伊吾榮曽與河東唐鞏雲間邵煥同觀於篔谷余嘗見懷素書云鄴下見顔平原曰吾書傳得長史八法其平原尚師之而張草之聖則不待言而可知矣今春草帖即宣和書譜所載者闕内府收闕不存及前賢印章數處亦皆磨滅後有元祐以降諸公題跋惜乎歲逺紙損不幸失於䕶持致令字畫細微斷裂此為可恨然精妙之神具存誠為世寶皇慶改元十二月朔日喬簣成仲山書右張長史草書春草帖鋒穎纖悉可尋其源而闕松煤古意溢目真足為唐人法書之冠晉跡不可復見得見此跡亦末世之希世珍乎顔平原書家之集大成者猶言杜詩韓文顔法亦出於此也因與袁君子英獲觀陳彦廉氏賞歎竟日壬子人日倪瓚題少陵觀張旭草聖極歎其妙東坡題王逸少帖則詆張為書工昌黎石鼓歌又詆為俗書是三公之言何戾耶葢王之於石鼓張之於王其書固不可同語然詩人詞氣抑揚不無太過論者遂欲以為口實未為知書者也亦未為知詩者也世人不以韓言而短王又可以蘇言而少張歟因觀長史春草帖偶書洪武紀元渤海髙啓識右唐張旭春草帖有宋名臣題識其一微仲觀於東府之東齋在元祐壬申其一師朴觀於樞府之前㕔其一器之觀於承㫖㕔之東齋皆在元祐癸酉其餘乃紹聖宣和靖康時人葢壬申癸酉間吕公為左相韓公為樞密劉公為樞密都承㫖一時君子在朝共成元祐之治自此歲后即非復元祐矣於是為紹聖為宣和靖康而宋運中圯此帖遂隨南渡入張循王家故有臣俊等印然則一紙之顯晦與宋之治亂相仍歟披玩之餘不勝歎息時洪武壬子之秋稽岳王彜識昔人評張長史草書雖奇怪百出而求其源流無一㸃畫不該規矩者今觀陳彦廉氏所藏春草帖信然彦廉嘗作堂奉其母節婦廉甚孝顔曰春草忽得此帖於他方與名堂之義相符豈因孝感而致然歟抑物各有所遇而偶然歟他日有子若孫因是帖也而思與堂符名則油然而興夫孝思自不能不以此帖為寶藏也後學張適識琴川陳原錫家藏春草帖韓幹馬為縣令唐禮得之此帖今在王雲松家嘗錄以見寄韓馬亦歸姚公綬予在公綬舟中得一見乙巳五月十日漫記懷素真跡今在李駕部處酒狂昨日過楊少府家見逸少阮歩兵帖甚發書興也顛素何可以到此但恨無好紙墨一臨之耳比見獻之月儀帖内數字遂與右軍並馳非後人所能到一㸃一畫闕新奇一法此乃得鍾弟子宋翼三過波藏鋒法酒狂見此遂大吐出胷中霓耳千文早晚納去俟楊生縛筆至可為也茲不闕太師丈足下酒狂藏真十年揮素學臨池始識王公學衞非草聖未須因酒發筆端應解化龍飛凝式鑒定王逸少臨鍾繇書後跋尾是唐僧懷素書楊凝式鑒定寶寧賜玩記王詵寶寧贈闕書闕庭堅觀倪瓚八月十一日觀於耕漁軒時積雨初霽殘暑猶熾王季畊自其山居折桂花一枝以石罌注水揷花著几格間戸庭閒寂香氣郁然居玩此卷久之如在世外也癸丑顔魯公帖近聞劉中使至瀛州吳希光已降可慰海隅之心耳又聞磁州為盧子期所圍舍利將軍擒獲之呵可慰也跋右唐太師顔魯公書劉中使帖真蹟著載宣和書譜南渡後入紹興内府至元丙戌以陸柬之蘭亭詩歐陽率更卜商帖真蹟二卷易得於張繡江處此帖筆畫雄健不獨與蔡明逺寒食等帖相頡頏而書㫖慷慨激烈公之英風節義猶可想見於百世之下信可寶也二月十有二日大梁王芝再拜謹題於寶墨齋闕北燕喬簣成仲山觀顔太師之書世不多見不肖平生見真蹟三本祭姪季明文馬病及此帖祭姪行草馬病行真皆小而此帖正行差大雖體態不同而英風烈氣見於筆端一也此語豈可為不知者道哉鮮于樞拜手書魯公書存世常見李光顔太保帖乞米帖馬病帖頓首夫人帖祭姪季明文允南母商氏贈誥昭甫誥并此八本觀於此書可謂鈎如屈金㸃如墮石東坡有云書至於顔魯公誠哉是言也時大德九年歲次乙巳冬十月廿五日集賢學士通議大夫張晏敬書瀛州帖觀魯公他書特大而澟澟忠義之氣如對生面非石刻所能髣髴也余平生獲見真蹟二小字麻姑記與此耳嘗有云桃源在何處廼見世道汙所以顔魯公細字記麻姑事近荒忽特賢者適嬰多虞世降俗陋假異境以明其志殆子欲居夷也維魯公忠貫日月功載旂常固不待善書名于代况筆精墨妙若是耶昔桓彜渡江傷晉之弱及見王導輩語則知有托足之地余於是觀公翦擒之快亦知夫唐爝未息歟史侯處厚尚義士也曠歲月而得之非尚義者不出示非其人處厚知所尚哉右唐瑯琊開國公太子太師顔真卿字清臣書劉中使帖真蹟四十一字公嘗學書於張旭得屋漏雨法衍遊京師覽公書最多衍之所藏送辛晃序顔昭甫殷夫人二誥争坐後帖朝囘馬病帖皆經宣和紹興御府然俱未若此帖之雄放豪逸豈特入季明之室將與元氣争長昔人云書一藝耳苟非其人雖工不足貴也惟公可以當之至大己酉中秋日拜觀於蘭谷大卿史侯之第蒙城田衍題太平之日生長京師乃得㑹觀諸名公法帖故能考其筆法辨其真偽也如顔書且勿論碑本今專審其墨蹟如乞米李太保馬病皆真行祭姪文行草字如錢許大四帖相若皆白紙頓首夫人行書淡黃紙字亦錢許大昭甫誥正書甚嚴整有力白紙字亦錢許大闕肖碑刻允南母誥寸五大字筆力不及白紙此劉中使帖字最大觀其運筆㸃畫如見其人端有聞㨗慨然効忠之態真希世之寶也時於明窓浄几展玩之餘收巻三歎後之學者非不厲志米芾所謂心㑹而手不遂也顧中常用東坡研山闕墨敬書於勸學齋此中使帖雲松前年寄予錄本乙巳五月十日雨窓書山谷真跡經伏波神祠蒙蒙篁竹下有路上壺頭漢壘麏鼯鬬蠻溪霧雨愁懷人敬遺像閱世指東流自負霸王略安知恩澤侯鄉園辭石柱筋力盡炎洲一以功名累翻思馬少游師洙濟道與予兒婦有𤓰葛又嘗分舟濟家弟嗣直因來乞言㑹予新病癰瘍不可多作勞得墨瀋漫書數紙臂指皆乏都不成字若持到淮南見予故舊可示之何如元祐中黃魯直書也建中靖國元年五月乙亥荆州沙尾水漲一丈堤上泥深一尺山谷老人病起須髮盡白跋張孝祥安國氏觀於南郡衞公堂上信一代奇筆也養正善藏之乾道戊子八月十日山谷晚年書法大成如此帖毫髮無遺恨矣心手和調筆墨又如人意譬泰豆之御内得於中外合馬志六轡沃若兩驂如舞鍚鸞肅雍自應武象莫不入馳驅之範亦詭遇者之所知也范成大至能題於此楊寅鍾必髙王中敬觀此巻昆山張大參敬之物今歸沈石田氏歐陽文忠公真跡寄子美三十六韻廬陵歐陽修上衆美子美貌堂堂千人英我獨疑其胸浩浩包滄溟滄溟産龍蜃百怪不可名是以子美辭吐出人輒驚其於詩最豪奔放何縱橫衆絃排律吕金石次第鳴間以險絶句非時震雷霆兩耳不及掩百痾為之醒語言既可駭筆墨尤其精少雖嘗力學老乃若天成濡毫㺯㸃畫信手不自停端莊雜醜怪羣星見欃槍爛然溢紙幅視久無定形使我終老學得一已足矜而君兼衆美磊落猶自輕髙冠出人上誰敢揖其膺羣臣列丹陛幾位缺公卿使之束帶立可以重朝廷况今參國議髙論吐峥嶸惜哉三十五白髮今已生近者去江淮作詩寄離情口誦不及寫一日傳都城退之序百物其鳴由不平天方苦君心欲更發其聲嗟我非鸑鷟徒思和嚶嚶因風幸數寄警我聾與盲全集題作答蘇子美離京見寄跋趙子崧觀於廬陵凌波閣伯慈伯武伯起侍戊申歲中元日吳大宗師挽詩僕告老南歸吳大宗師親筆賦詩送别來歲公即上仙矣每覽遺墨不勝感慨輒撰仙遊挽詩三章附見於後以寓知敬不忘之意云人物江東獨巋如龍光異數老齋居肅容朝日修真訣燕坐㸔雲賜御書柱石𤣥門𢎞道德粃糠濁世化清虚崇文别館神遊夕環珮臨風下玉除寶劍飛空共百靈蓬萊霧暗落長星扶持道教傳千祀遊戲天朝望八齡竹屋尚懸髙士榻雲窓誰校太𤣥經錦江春水仙源活化鶴歸來古櫟青逸氣雄姿迥絶塵題詩送客墨猶新𤣥宗嗣教功行世饒國疏封孝逮親一代風騷今大雅千年雨露古真人河圖卜葬衣冠地龍虎山川泣鬼神胡助滄溟曾變幾桑田不與人間較歲年天子殿中常進見神仙班裏獨巍然道髙千古百靈衞澤饜羣公萬口傳最愛太常胡博士談𤣥幸得及生前吳興唐棣宋人墨帖彦博頓首祠部同年近累得來翰深荷勤意審闕美轉伏惟歡㑹未涯披對春中萬萬愛重彦博頓首静萬已至且令權書必應過夏修啟近賈常行曾致拙問辱書承經暑動履清和少慰瞻勤兼蒙惠以韓城鼎銘及博山盤記不意頓得二奇物修集錄前古遺跡自三代以來往往有之獨無前漢時字故常以為恨今遽獲斯文遂大償素願乃萬金之賜也屬患膝瘡家居絶客每日把翫無厭然古文難識當徐訪學古博識之士問之期於盡得而後已不勝珍重珍重謹於郵中奉狀粗報已獲佳貺餘未及他不宣修頓首啟原甫安撫學士坐前五月廿二日謹狀軾謹次傳道先生遊廬山韻塵容已似服轅駒野性猶同縱壑魚出入巖巒千仞表較量筋力十年初雖無窈窕驅前馬幸有䲭夷挂後車莫笑吟詩淡生活當令阿買為君書閱訖幸即付去人送公弼郎中禹功太博明叔教授各乞一首軾上轍謹賦喜雪一首奉權府運使司封郎中一笑發函寛大一封書臥閣雍容三日餘旋見雪花投樹密未應天意與人踈瓦乾漸漸知鳴霰畦潤融融想没鉏髙㑹梁園遺跡在早知詞賦似相如再用書字韻賦喜雪一首春秋無麥似當書况復秋田水潦餘一雪耑來救焦槁千箱乞與等親疎消殘温癘曾非藥蝕遍陳根不用鉏猶恐逺邨沾未足更呼農圃問何如轍上舜民再啓姻期必嘗經度舜民以初二日至洛中自此至初六日良吉又以一行兵冗不能久留欲到初六將財定併行并以是日納壻留箅在門下翌日遂行未審可否餘謹面質舜民頓首庭堅頓首伏承逺歸道塗之勤未得休息而躬料湯藥至輟寢膳竊惟起居不適幸有安平之候想遂釋然矣時雨沾足春風妍暖想同家母萬福民有食麥之闕令嗣長官亦得申睂矣亟作此狀候服藥者安問極不周至續亦别通啓左右矣庭堅再行栻頃在湘中嘗約刑部劉公修斜川故事城南有丘巋然因以南阜名之是歲來守桂負此約三年矣戊戌五月與周允叔吳德夫宇文正父傳父登雪觀和五柳翁韻謹書以寄劉公栻再拜行客念故里勞者思少休如何歲華新尚爾天南遊涉歴遇佳日品題自名流聊復揩病眼沙邊玩輕鷗和風著冠巾春意動林丘眄懷千載人孤髙諒能儔亦有一二士舉酒相勸酬未知吾故園草木如此否政拙甘下考智短忘百憂賜歸倘蒙幸舊盟良可求敬夫寄斜川詩敘往年之約殊不知芮今病久矣非如昔時獨心不忘耳勉和一章以敘謝意芮再拜病著不仕事淹臥心自休經時不出門况復斜川遊每覿節物換怳驚時序流少年喜追逐聚散水上鷗沉舟枯木畔風帆春樹丘我病正爾許懷念老朋儔有酒不能飲徒有獻與酬故人遇佳日亦復我念不佳章寫懷抱一讀寛百憂吾君念逺民歸計未易求戊戌三月乙丑順寧閣右九帖雲松錄之樓前暮靄暗平林樓上人愁寒思深未必薄雲能作雨從來秋日自多隂三年客夢迷歸路一夜西風老壯心欲作新聲寄遺恨直絃先斷緩盈琴久隂忽晴已可喜况復夜氣驅蚊藏清風送廻六月熱急雨借得三秋凉非惟歸雲人目快更有白日天心當從來萬古有未盡待子一夕心胸張劍氣寒髙倚莫空男兒日月鏁心胷莫藏牙爪同痴虎好召風雷起臥龍世説王侯無闕種古闕富貴及耕農須將大道為奇遇莫踏人間齷齪踪紹興戊辰歲十月十三日書於雙港吳説傅朋右詩三紙其一作游絲書其二作真書其次則行書也其書真好游絲風逸無比劉屏山嘗題其書有游絲帖歌一首元安陽韓性亦有題贊於後時乙巳歲之八月一日觀於玉峰黃應龍静逸堂書齋故識褚模禊帖中縫折處鈐墨寶小章武功小印後鈐墨寶印題蘭亭軸後有若象夫子尚興闕里門虎賁狀蔡邕猶傍文舉樽昭陵自一閟真迹不復存予今獲此本亦可比璵璠翰林學士承㫖中書舍人􅀢於玉堂北軒題京兆章惇觀洛陽富弼觀髙平范仲淹嘗守㑹稽郡遊蘭亭曲水今復觀斯文於才翁東齋足為佳遇慶厯八年十二月二十六日題慶厯中襄知福州才翁為監司相從二年故所藏墨迹奇書多亦傳橅善本後於京師王渙金吾借觀渙暴卒凡七本皆亡今攬禊文不覺歎息襄題明年夏四月才翁過宋觀於河館尭臣題沈遘章岵晏崇治平二年正月十九日金山共觀在都覽蘭亭不一今覩蘇令家本殊佳其河南模者矣嘉祐二年七月十八日河東裴煜於吳江題予平生閱蘭亭本為最多此其尤乎當世題丙午閏正月十三日觀於太原燕堂薛嗣昌元宗題汝南許彦先熈寧五年九月四日銜命赴二廣别大雅於司農直舍出蘭亭古本同觀范淳粹熈寧丁巳歲河南范子奇題純老彦祖巨源成伯子雍完夫正重子中敏甫子瞻子由同觀熈寧十年三月廿三日書汲郡公呂大防觀葛蘋米芾武功郡侯蘇寶元祐辛未三月廿一日右蘇易簡䟦唐人所橅王羲之書蘭亭序臣米友仁鑒定真跡恭跋右軍禊帖真迹世不可得矣可見者唐摹耳而唐摹之真者亦復不可得予前所見三四本大率有米家筆仗波戈趯磔無一出於自然故為奇詭以驚俗眼殆元章所戲為耳此本乃吾友劉廷美所收者葢蘇武功家故物也有慶厯治平嘉祐熈寧元祐諸賢題識以為褚河南摹者今雖不可知其是否然視他本獨得晉人筆意要非唐人不能到也予從廷美借之試臨一通未竟有盜竊之而去其夕予與葉及齋湯東谷㑹廷美飲劉草窓所因以告之廷美無惜言而有惜色且愧且悔方共謀使人物色而求之飲間忽有報得盜者已而家童果追帖至予因笑謂廷美曰昔昭陵之藏以為温韜所發今河南之模又復遭此何禊帖之誨盜耶是亦尤物也請歸璧於子昔程夫子謂書札一向好著亦自喪志今予不能用夫子之言而好是一過也而借人之好以為好二過也又不能防盜而幾失之三過也一舉而三過集焉敢不改圖輙題其後以識吾過吁此言雖小可以喻大觀者尚亦有所警哉景泰辛未秋孟之十有九日翰林徐叔子珵題此帖今為宜興尹氏所藏應禎每過荆溪輙從先之借觀今復與太僕丞李廷芝瑞卿同閱敬為之題成化十五年四月二日吳郡李應禎乙巳八月十八日在沈石田秋軒下錄和靖處士真跡二帖逋奉白秋深體履清適大師去後曾得信未院中諸事如常否令送到菱角容易容易謹此馳致不宣逋小簡上廿二日瑫兒座主暫倩一人引此僕去章八郎家逋奉簡三君數日前曾勞下訪屬以多故未果致謝感媿感媿牓名必已見了彼珍重者果為兩手所揞矣呵呵如因暇時許相過否馳此不宣從表林逋頓首四月十七日闕所托買物錢二索省是前人留下尚恐未足餘伺面致多感多感跋此和靖真跡聶衞公帥蜀時所得也觀其筆勢遒勁無一㸃塵俗氣與暗香疎影之句標致不殊此老胷中深有得梅之清故其發之文墨者類如此當襲藏之以為珍玩元統甲戌夏五謝升孫書於南窓子順詩我愛翁書得痩硬雲腴濯盡西湖淥西臺少肉是真評數行清瑩含冰玉宛然風節溢其間此字此翁俱絶俗開緘見字即見翁五百年來如轉燭可憐人物兩相求落我掌中珠有足水邊孤墳我曾拜土冷烟荒骨難肉當時州吏歲勞問於今祀典誰登錄翁固不能知我悲聊對湖山歌楚曲我歌湖山亦不知惟有春鳩呌深竹歸來把酒弔雙緘猶勝無錢對黃菊沈周用坡翁韻西湖處士林君復結廬倒臥湖波淥百年何物傷汝㢘山下梅花總寒玉滿城屋瓦鱗鱗然未信誰人能脫俗紫陌嬉春拾翠鈿歌鐘入夜燒紅燭獨教老鶴閒應門走傍湖隂濯雙足髙平范公遣使來寄以新篇勝餽肉風節文章厚且淳兩句平生成實錄才多墨妙更入神唯許唐翁和髙曲果然遺墨似其人如倚清風捫痩竹惜哉甫里陸天隨不趂斯人書杞菊吳寛湖亭路繞梅花曲石硯年年洗芳淥湖光照眼花絶塵此老當年面如玉詩應獨歩難同調字豈必工終不俗城東蒼頭敬持來一夜起㸔三秉燭我從書法得相法骨痩神清臞亦足有如辛苦學仙人火冷空山斷葷肉遺編舊事已陳迹五百年來登鬼錄水流花落兩無情誰能更和西湖曲石田詩人亦清士居不種梅翻種竹他時并作隠君論何似周蓮與陶菊李東陽我昔孤山訪遺躅春暖西湖汎晴淥山頭草樹不荒凉知是先生此埋玉憶初茆廬結搆完長吏頻顧驚流俗就中薛李最忘形湖上夜歸曾秉燭先生自樂味道腴此懷何嘗忘不足唯耽吟咏苦咿嚘役使心兵削肌肉詩成又復恐驚世輒毁不使相謄錄誰知造物難盡藏千古騷壇傳妙曲亦有遺墨落人間留在剡藤并楚竹見其痩硬想其人似對靈均飡落菊陳頎乾坤悠悠書兩幅墨光深照西湖淥人間翻覆似浮雲此紙完全如璧玉少陵痩硬真入評右軍姿􅆺宜云俗想當援筆對梅花誰用官奴寒把燭自然心畫得天妙一字百金酬不足乃知形貌列仙臞石帶烟霞山少肉嵓嵓氣節髙百世奚假文章身後錄東坡去後古祠荒月下不聞迎送曲遺跡君家豈偶然天遣清風激修竹憑君開卷望孤山三灌薔薇咀秋菊張淵丙午上元日風雨中寓沈氏有竹莊維時出此卷相示為錄之野航記米元暉畫卷元暉􅃧作瑞米氏二字小印文圖書子雲以字為心畫非窮理者其語不能至是畫之為説亦心畫也從古莫非一世之英乃悉為此豈市井庸工所能曉開闢以來漢與六朝作山水者不復見於世惟右丞王摩詰古今獨步僕舊祕藏甚多既自悟丹青妙處覩其筆意但付一笑耳霄壤間所有瀟洒奇觀葢如是也自古文人才士無不為世所忌擠毁下石無足怪者百世之下方自有公論僕己酉歲避兵火於金壇繼至新昌隠君子蔣仲友館僕於村舍者七閱月此畫非大貴人可得亦非大富者可求實一世之所共知因戲作小詩於畫云亂山深處是烟霞雨暗晴暉日夕佳要識先生曾到此故留戲筆在君家庚戌仲秋建炎紀歲初七日元暉此卷乃小米真蹟青綠山水佳絹所作有元暉戲筆四字米氏二字小印及收藏有瑞文圖書印此䟦語另一紙雖元暉之作乃贗書也予往年於古董家亂紙中見一帖即此跋却真跡也今不知何在此為吾車坊郭氏之物屢嘗見之今已為郡侯李公所得矣偶於表褙湯生處見而錄此跋丙午二月八日書於小樓中元暉畫巻詩米家名畫可誰倫愛此苕溪春曉村五色昔經虹下貫百年俄與氣俱昏酒香青葉文魚出歌近滄浪白鳥喧料得意行隨近逺展圖似憩樹隂繁山隂胡隆成碧瀾堂上㸔鷗波曾記蘭舟向曉過滿徑白雲春樹少兩溪微雨落花多蒲光暖泛烟光濕草氣濃兼水氣和欲向畫圖尋舊迹老懷無計奈愁何東吳楊基渺渺烟蕪漾曉波闕每曾過持帆估客凌晨少擊榜漁舟出浦多山樹雨晴雲氣黯溪亭風暖鳥聲和披圖好似蒼茫意景想前人奈逺何彭城劉敏次韻扁舟昔過江南道兩漿吳歌弄春曉野水蘭苕月欲低滄洲白蘋風不悄閣清水氣晝冥冥破暝鷄聲殊草草人烟蒼莽隔朝墟鷗夢微茫墮湖島輕風吹送客櫓遥羣鳥驚翻曙鐘早初陽忽露何處村曲折青林山髙小見圖歴歴舊所遊白髮摩挲媿幽討前身恐是杜牧之題詩能寫江南好陳川題銕冠峩峩霜滿面留得當時舊題卷畫圖猶見白虹垂詩句鸞翔共蛟篆不到吳興已十年夢魂猶遶苕溪舡好山好水寫不盡强似宣和十樣牋晴波蘸碧瑶峰小翡翠雙飛魚在藻鷗波亭上帶餘曛只合身從此中老晴窓展玩憶舊時恨不持將同見之興來且盡一杯酒座上相㸔知是誰僕之不到吳興者十年於兹矣忽一日繼中先生以米元暉所作苕溪春曉圖見示而孟載楊公嘗題一律於左詞工氣逸不覺讀之悵然也無錫馬弓亦為之傚顰云夜聽溪上雨曉㸔溪上山雨歇山更佳尚在空濛間白雲掩疎鐘綠樹迷逺島居人想未起隔屋聞啼鳥采菊寄遐趣拄笏遺世情悠然共時適萬古同佳盟淡淡水容淨冥冥花氣多而此清絶境忽聞漁者歌予亦慕隠淪闕夙所尚展圖因臥遊翹思碧蘿嶂龍泉生張文伯此卷王惟顒近購於市僕於李貞庵先生家見之為錄於此惜無元暉題字而楮墨蕭然僅足以備名家云耳性父記米元暉畫湖山烟雨圖今在菊門盧氏廣文當日官雖冷可奈才名振世何他日君家須炙手而今聊復雀堪羅老年尚喜管城子更愛好山江上青武林秋髙曉欲雨正若此畫雲冥冥三茆别有洞中天我欲山居屏世緣累行積功多蛻舉玉晨欣有地行仙紹興戊午季春書於大姚五湖田舍元暉䟦大姚去姑蘇城東南三十里臨諸江湖江則曰吳淞江姚城江白蜆江小龍江湖則有陳湖葉宅湖車坊漾獨墅淹是也大姚地可百畝浮諸水之間有小山髙不滿數丈上有古刹依山之顛曰文殊院正殿有文殊坐獅子像甚奇古周圍有深渠數匝乃誦經行道之跡也唐宋名公留題甚多皆刻諸石以寘於壁間米南宮弟兄嘗居於其地舊址猶可攷予别業數椽在笠澤姚城江之北與大姚隔小龍江相望咫尺時復往來焉至正甲申予在燕京忽得此巻因拾以歸吳丙申之變予避地入閩丁酉歸家業一空而此巻僅存戊申中吳復兵燹予亦流離濠梁己酉復歸田里故居焚蕩荒榛敗瓦不堪舉目又復得此巻於野人家事物之遇豈偶然哉辛亥秋七月暇日展巻太息因識於後以記歲月云耳雲浦道人詩喟然㸃也宜吾與不利虞兮奈若何鴻鴈欲來風嫋嫋庭前樹子落桫羅吳淞江只蒲萄綠金井峰仍縹緲青説與弋人何慕我髙飛鴻鵠杳冥冥大姚湖水白生烟長物都除絶世緣笙鶴不為歸鶴怨王仙真是勝丁仙雲浦老人亂後復得此巻感慨今昔觀其題字可見辛亥八月十五日來謁雲浦出以見示戲筆追和米公三詩以寫懷云倪瓚又䟦米敷文既遊清都遺跡之在人間者日少至若貌江山之勝槩發詞藻之精英翰墨淋漓同為卷軸者則又加少矣此巻其易得耶王雲浦再失而再獲之所以為至喜耳近又歸諸沈氏沈氏代為良醫而日章尤知玩古嘗締予交今亡矣子𤣥出以徵題見之令人悽斷洪武庚午二月澹如王行此巻為吳城沈煦氏所藏其先公舊物也嘗一示予徐仲山為錄一過留沈氏予就其錄本而又錄之丙午四月十一日特進上卿𤣥教大宗師吳公畫像贊公自至元中入朝累奉命代祀岳瀆及江南名山每竣事必顧瞻修林留憩吟嘯至大庚戌在龍虎山作松下象詩書之澤道德之容泰山北斗甘雨祥風一襟秋霽萬象春融克仁克義惟孝惟忠黼黻皇猷柱石𤣥宗千一百歲今方小住於空峒也上黨李孟至大四年辛亥還朝燕居環樞堂作内觀象儼然服儒邈矣宗聃陽耀喬林霜潔重潭旉兮春温愀兮秋嚴夷爾巖崖中自隅廉斯則畫史筆所形似淵然其存我善模擬寓跡髙𤣥道裕孝忠惟直惟誠克溥而公恬於用世器也何宏將髙天放材也何英緬懷古人若李長源吁嗟名臣終慙綺園清河元明善皇慶二年癸丑大醮長春宫奉命致玉簡於嵩山濟瀆作存思象天門開兮真人出顔渥丹兮髮如漆被寳衣兮耀朝日冠切雲兮戴明月體道德兮用儒術祠竹宫兮薦芳苾輔有道兮皇建極斂五福兮以敷錫皇情凝兮沛恩澤親康寧兮百祥集功名遂兮仙道逸馭雪精兮使橘术肩洪厓兮壽金石呉興趙孟頫延祐元年甲寅公父饒國公母饒國夫人皆年八十天子賜上尊對衣使歸為壽是歲留雲錦山郡守以旱請禱得雨作飛步象列仙之傳身為道樞巻舒經綸綽乎有餘宇宙名言河海偉量冠服髙明河漢之上蜀郡虞集延祐二年乙卯扈從上京遊南屏山見白雲東歸悠然思親作詠歸象風度之淵如天和之粹如野服葛巾閒雅甚都我聞大方之家以身為患胡為見身外之身而為猶龍氏之徒與𤣥德之風夐與衆殊以儒為宗而有道義之腴以𤣥為學而無山澤之臞止水泓渟光風舒徐芥視千金杯觀五湖藏之名山千載而下可嘯歌夫友松鶴而道不孤不然將御風騎氣而游於物之初耶亳郡李源道延祐間公日侍禁廷進則論道退而燕居作燕坐象吳興趙公為作松石竹鶴圖成時稱精妙仁宗皇帝聞之勅令進入御覽之餘再三嘉奬仍以還賜於惟明時道藝臻極象德之容存神之迹喬松如雲舞鶴如雪天鑒所臨千載一日蜀郡虞集延祐三年丙辰公静息林下見晴空飛雲變化無迹作㸔雲象德不形禮為翼熈熈冲静之神侃侃孝友之色籠古絡今其舞如雲佐理以無為智深而若遺朝承衮龍暮撫松鶴心徹九九太虚盤礴是所謂養其尺宅嗣𤣥而生白者耶四明袁桷延祐四年丁巳公修大洞畢法作泥丸象大冠如星執玉如盈籲天之休報國以誠出入帝閽翺翔玉京施於有政可使􅆪纓誰言道家流傳其間衆人皆忙我獨閒閒混迹在朝何異在山不矯不汙其馨如蘭緇衣好賢白駒是縶游心𤣥圃凝情雲笈珮聲鏘洋瑤壇拾級神明煥然快覩山立吳興趙孟頫延祐五年戊午夏奉㫖建大醮於上京作朝元象有毣毣之思而弗施有肅肅之容而自儀冠裳孔都登降拜趨載以德輿豐以道樞俾同我尚世之儒相實民之望豈囿於象者耶浚儀馬祖常延祐五年戊午秋日登西山聽松風作聽松風象敦禮度延陵裔法清净猶龍氏德充符經在笥中秉直佐元治親帝祉湛恩沛玉温如鳴珮琚馭埃風游清都儼巖廊際都俞宇泰定存若虚神得一化萬殊應環中合道樞巴西鄧文原大德元年丁酉代祀江瀆至於青城之山流觀乎清湍巨壑終日忘去作青城象有闕君之子孫爰應運而挺生擢華岳以為質振黃鐘以為聲雷風出其呼吸龍虎為之服乘或翺翔於魏闕或超摇乎太清扼函關以朝騖夕已戾乎青城合𤣥元於一體撫玉石於千齡哂方士於碧雞追神飈於鶴鳴臨飛泉而解帶拂髙霞而抗旌雪山避其高潔錦水讓其泓渟葢其為道也有要雖欲極而難名語禱祀則以修德為本論冲舉則以忠孝為經齊莊惠於物我㑹孔李之粹精加以卿相而不易寵以恩遇而不驚宜然每别席於宣室永揚風於八紘人徒見其寓形於青城也庸詎知即前日崆峒之廣成豫章揭傒斯至元中世祖皇帝嘗命公主祠衡岳後留朝闕過之必躡飛景於層顛覽浴曦於逺海作衡岳象江漢兮揚舲洞庭兮飲馬逍遥乎天柱之上遊宴乎紫葢之下坐碧藟以忘年䕃長松以清夏朱草産乎離明壽星見乎軫野為世治之禎祥宜天錫之純嘏接飛霞於十洲賓出日於半夜公侯造膝猿鶴不避王人薦璧雲月為藉以予觀是翁識鑒􅃉者凝於神光闕同者隣於化置之端委廟堂則范長生之風軌若夫山中宰相固陶𢎞景之流亞也廬陵歐陽𤣥泰定四年丁卯代祀江南三山還朝醮於崇真宫作上清象冠芙容兮玉比德雲霞衣兮絢五色談大道兮坐瑱席流瓊音兮達宣室貫羲文兮妙得一相箕疇兮廣敷錫論天人兮天咫尺言諤諤兮帝心格進泰階兮總仙籍著贊書兮表清直事孔聖兮如一日顯祖父兮饒封國信行藏兮古是式從赤松兮師黃石𤣥中之𤣥兮太虚無迹洞燭萬變兮凌厲八極雲中趙世延至順二年辛未夏有㫖大醮長春宫公專主齋法作説法象游乎萬物之表而能約已於名教老乎朝廷之間而不濡迹於公卿粲若華星之麗乎河漢浩然雲氣之出乎嵩衡其凝也止水善鑒其動也祥風時行祠黃石者葢有遺書之托衣白衣者寧辭當世之名導冲和以輔𤣥化非嘑吸而致長生伊耆有巢父軒轅有廣成則所謂宏衍博大真人者安得不後天地髙日月以贊於休明者乎蜀郡虞集特進大宗師吳公事上接下留中出外汎應百端而大知閒閒一皆行其所無事作閒閒象日月之旁衣冠廟廊巍巍堂堂烟霞之上金玉顔狀融融盎盎雲行悠悠卷舒自由自春自秋山立嶷嶷生遂自殖自朝自夕俛仰而殊疇不憂虞此獨雍愉倐忽所過疇不驚瞿此獨容與彼哉勞勞此無屑騷解其天􅋶彼也忙忙此無劻勷平其畛防彼焉閒閒此無棘艱撤其揵關小知芧狙大知淵魚斯其謂之閒閒者歟臨川呉澄大德間奉詔求賢江南過匡廬觀飛瀑山中人作觀泉象䕃長松兮坐盤石觀流泉兮聊以永日逝如斯而來無窮兮猶道體之不息相天元之真一兮沛為浸而為澤周流太虛兮雨露乎九域混混不舍晝夜兮由其本而真實合一原之自然兮茲逍遥以獨得我聞至人應物無迹淵然浩然請以比德濟南張巖至元四年歲次戊寅夏四月聖天子以特進上卿𤣥教大宗師臣全節年七十詔藝文監廣成闕長臣紹先肖其象中闕知政事知經筵事臣有壬為之贊集賢直學士臣傒斯書其贊之辭一如其師開府大宗師留孫闕事臣有壬謹贊之曰大圓無倪大方無隅純和内融光華四敷挹之其淵持之若虚執道紀以御衆百世不能喙其心而但跡其膚學研古今業豐詩書密勿帝側翺翔天衢為仙為儒以身為樞五十載扶正誼引善類隂芘於衆庶有當軸之所不如衆庶不知而天子知之是以重恩累慶眷寵近而不疏覽七袠之甫及復俾肖像於繪圖望之堂堂白鬚兩頰若伯陽氏之在周室貌古而神腴就之浥浥方瞳玉色又若廣成子之遇軒轅不言而意已孚則知可以長生久視明道德以贊治化和神人奉天子於萬年者非斯人而誰與臣拜手稽首秪奉明詔爰作是贊式昭聖模特進上卿吳公立朝五十餘年歴事列聖過龍樓朝鳯闕者不知其幾矣時逢昌運身切莫年聖恩儻賜於鑑湖圖畫更留於翰墨獲處山林之勝儼觀天日之臨於是命弟子張顯良作鳯闕春朝圖并象姪善為之贊曰於赫世祖憲天立極乃都於燕卜世萬億爰有教父應運而興維清維静主乎誠明釐祝閟宫大宏其教輯寧邦家綽綽厥效道啟世祖繼昌成宗武皇仁皇恩莫比隆英君明孝保我清静文廟無為𤣥風益競今皇臨御炳煥天書言懷列聖丹青是模貝闕珠宫金碧焜燿天門洞開龍騰虎跳心遊道德學際天人動容周旋與物為春老乎山林思我王室展圖肅容如覩天日至元五年後己卯特進上卿𤣥教大宗師吳公手謝七袠歲從兩京㑹慶風雲稱燕屢陪於前席光依日月朝恩特異於外臣報效國家靡遑寢息命弟子張顯良作龍川曉扈圖并象且曰異時聖君優老賜歸山林揭之髙堂庶幾乎身江湖而心京闕也姪善為之贊曰度居庸之積翠目有矚乎龍川浥春陽之澤澤地乃湧乎釀泉綠樹葱蘢兮團葢碧草陂陁兮擁氊卿雲輪囷兮五色協氣冲融乎八埏望乘輿之旖旎陳羽衞之鈎連屬車在後鸞旂在前儼幄殿之中峙仰天容之粹然千官列從兮百辟周旋真人入覲兮羽翩躚敷道德兮言五千物不疵兮登大年𤣥風暢兮教以宣真人之道兮静以專握樞機兮轉坤乾皇情悦乎錫賚駢於萬年兮贊我元神無在而不在兮猶日星之麗天騰光耀之涏濙兮玩神珠於九淵方雲龍之上下兮繄廣成與軒轅慶明良之千載兮又奚羡乎凌烟𤣥教大宗師吳公畫象贊序第一序名者實之賓猶形之有影聲之有響相隨而不可離者也古之不尚名者莫過於老子而猶龍之論吾夫子不能忘於言焉理之所在有不得不然者雖聖人不能不然也若韓國李公吳興趙公巴西劉公清河元公亳郡李公四明袁公皆搢紳之雄者也雅與今大宗師吳公相好故皆贊其畫象葢用猶龍之稱也而區區亦有述於諸君子之後者不自知其言之不腆也吳公門人爰錄諸贊求集書其端昔人有言孔李通家者其吳公之謂歟噫一時人物文章之盛如此今予也獨以白髪蒼顔陪公之杖履詠嘆其詞藻反有以求諸君子之彷彿而不可得見者此右軍之所以興懷於俯仰者乎天厯庚午四月十五日虞集序第二序集既作閒閒吳公畫象贊序之後八年而贊其象者又有凉國公雲中趙公臨川先生吳公延祐首科三進士浚儀馬公濟南張公廬陵歐陽公古史豫章揭公又各述贊集於前序因以深嘆一時人物之盛不十年而諸公又已去世其在者四五人耳天光向曙少微貫落落之星山氣横秋太華擅蒼蒼之色然而往者過而來者續善稱德行者豈乏於方來集雖老於田里尚能為公識之至元三年丁丑十月十五日第三序特進上卿𤣥教大宗師吳公畫象多出名筆執事以對越上帝潛心以内觀神明皆由其手容冠服之威而各有記焉而子孫門人各持歸名山不能㑹一予在京師時嘗令陳芝田為小象通作一卷親錄李韓公以下諸君子贊以附之後八年予在山中又以趙凉公以下諸君子所贊小象既各為序矣至元戊寅聖天子以宗師年七十畫象以賜知政事許公有壬奉勅述贊集賢直學士揭公傒斯書之朝廷之盛典也陳芝田又依放為小象而别為軸宗師以書來告云子為我錄副於上如前兩巻之為者而不知集之老且病不復能為此書久矣然嘗聞之老子自三皇以來歴夏商二代世有可述其降神於周則為柱史藏室徵諸其書而可見焉而史傳云老萊子亦楚人或云即老子修道以養壽或云百六十餘歲或云二百餘歲老子與孔子相見後百數十年有周太史儋者見秦獻公或云即老子也其後千年有善畫者皆追寫其象然則世為象固道家之所尚也宜其屢書不一書也乎老子自隠於無名而見於世者昭昭如此所謂猶龍者固可擬諸形容也耶然聞廣成子居崆峒時千二百歲而身不衰黃帝齋三月而問道焉葢至於修身之問而後對也至天子所以尊髙年尚道德求諸冰雪之容者豈徒然哉古先聖王養老乞言之事在乎是矣而廣成老子之學者其愛君報徳之盛則亦有周公無逸之意乎至元六年四月十有五日虞集序至正四年歲在甲申二月既望饒國諸孫顥謹錄右像贊一卷在城中人家借錄今歸相城沈氏矣然不知饒國諸孫某者出處其楷法典雅可愛也丙午二月跋吳顥書右吳顥秀才家書一幅詩十首寄上特進上卿𤣥教大宗師顥樞密院判公之孫特進公之諸孫故江浙儒學提舉養浩君之子也年才弱冠書辭温安典雅詩律清麗而筆畫秀整真吳氏佳子弟也昔養浩侍特進公京師公篤意造成之俾日從縉紳先生充廣其所學自入官以至為太常博士集賢待制出董江浙文學皆綽著善譽至元再元之四年復來京師明年八月七日殁於蓬萊坊中此書與詩則其子五月廿四日在鄱陽寄來特進公每見此則益悲思養浩不自勝因次韵以自寫嗚呼桐絲之琴絲竹之管物之尤美者也公尚以昔之培植養浩者而培植其子則養浩為不死也傳有之曰國人稱願曰幸哉有子顥有文學能早著見若此養浩可謂有子矣亦可以少慰二老之心矣虞邵菴詩卷答錢翼之祕校枉教之意以奉千里外一笑呉下名書盛有唐流傳風致到錢郎閉門三月梨花雨徧寫千林柿葉霜客㸔舊題驚歲月僧將新句度江鄉莫愁茆舍淹留乆秋菊春蘭各自芳虞集錢郎工書越宋唐詩筒千里寄支郎揮毫曾見坐霏屑待漏尚憐鞾滿霜商嶺歌殘紫芝曲鈞天夢斷白雲鄉不遺故舊相思意酬唱同留百世芳僕過吳中翼之庚兄出示虞先生所答詩巻輙亦次韵以寓羨慕之意至元戊寅六月十三日金華胡助筆翰風流説晉唐敢將拙惡比諸郎健毫日費徒成冢秃髪年侵不待霜才士宜從鴛鷺序畸人合住水雲鄉豈期天藻亭中老逺寄詞章勝采芳良佑嘗奉和虞公所答詩為謝適中州盧彦紀侍官臨川遂書以煩往達後古愚編修見之謂宜以附巻末故書之是年六月望日錢良佑聖代崇文邁漢唐相如詞賦早為郎天門侍燕常終日江客懸車已十霜展卷得詩驚健筆幾時懷舊憶他鄉先生絶學追千古一樹寒梅壓衆芳文昔以筆札從侍書公著書閣下公去國今十年矣去年夏謁公於臨川之里第今年秋將如懷孟過姑蘇錢先生出公手札并得示文伏讀悵然先生俾題其後不敢固辭至正元年九月十有七日新安程文漢庭有道起馮唐亦許明光對夕郎正為青春疑素髮故教白兔擣𤣥霜客來笑我臨書札禮達如將講射鄉閣老無時收衆望褐夫有日譜羣芳翼之得邵菴所寄篇翰裝池成卷携以示予予因有感於其媿悔之言亦次韵增諸卷軸柳貫宋陳亞之詩離郭店馬上廻寄鄉知廻望離亭映楚山慨然西嘆入長安貪程野僕擔書引惜别鄉人駐足觀霞襯曙光烘積靄柳和春色蕩輕寒遥期此地歸來日迎取相如駟馬㸔賦得黃鵠鳴樹止陵陽逢辰下建章奇姿標上瑞正色麗中央昭祀祠壇畔聲歌太液旁鳯教鴻作侶天與菊為裳神雀非靈異流鶯愧彩章集闕寧我類一舉戛雲翔過項羽廟八千子弟已投戈夜帳猶聞怨楚歌學敵萬人成底事不思一個范增多寄寳臣寺丞萬里扶雲宅壽阡謝公純孝是家傳廬開四闕同寒士榱列三圍陋昔賢先域定生連理樹門人多廢蓼莪篇我心罔極君應闕露白霜清泣昊天藍溪閒居白鹿原東虎候西結廬岑寂映藍溪露侵僧履蘭三徑秋入農歌雨一犁耽枕溜聲摇水宿拂簷山色類巖栖閉門養拙無人問揭盡陳篇日又低開元寺凌虚閣對雪寄解唐卿瓊滴琳華一夜凝凌虚雕檻曉來凭眼觀銀色三千界身到瑤臺十二層玉灑砌塵供庾斛粉融簷水妬房陵化人宫好分明在恨不同君把袂登雉媒朱冠衮背一何鮮聲厲情驕目睅然若道物情皆錫類雉媒争似鴆媒賢題劉處士先令公鄩功名劉公事朱梁當年力戰蕩妖氛十萬雄師四七勲將略妙欺班定逺家聲髙過李將軍銘圖魏鼎文猶在筆勒燕山跡尚芬今日閒披有遺恨可憐生不遇明君讀劉蕡䇿藥石危言治亂箴賈生晁錯是知音可憐當日司文者不畏人言合愧心謝人惠三山朱柿烏椑珍果益丹名新折紅林蒂尚青漿冷夜凝仙掌露味甘秋剖楚江萍圓堆玉椀櫻難並削薦金尊酒易醒應有長卿消渴疾整籃封貯到雲扃過田文墓當年聞奏雍門琴話著池臺泪滿襟何况今朝陵谷畔池臺無迹可追尋對雪寄崔仲裕時在藍田聞崔在酒舍奪鶴韜霞勢漸濃捲簾庭館好支笻乘槎路濶寒凝凍種玉畦平晚被封天上瑶宮當月圃酒中銀闕聳鼇峰思君不得同吟賞知在旗髙第幾峰南齊曲江歡宴侍華裾舞拍琴歌藝有餘獨有純臣王仲寶解陳封禪一篇書南齊太祖曲江宴羣臣各使効伎藝褚淵彈琵琶王僧䖍彈琴沈文季歌張敬兒舞王敬則拍王儉曰臣無所能唯解誦書因跪帝前誦相如封禪書帝笑曰此盛徳之事吾何以堪之貽漁者雨蓑烟笠洞庭秋獨繭綸輕一葉舟擬共停橈醉天幕緩歌纓足不廻頭秋日端居暑退蚊雷靜門閒雀刺稀露莎蛩自急星樹鵲何依井臼貧雖樂溪山逺未歸時情似秋鴈一一向南飛讀子虚賦聽辭深恨不同時及到同時位太卑可似馮唐論頗牧禁中言下用無疑題故三司副使陳公詩軸後陳公亞之三十丈復不逮承其教誨也事業在卿士大夫者以補國利民傳復少於先子遺書中得公啟問詩章讀之往往意在栖退若送行閬中詩公時為審刑官朝中望譽始充大已有乞醉墦間之歎是知君子自重而不苟合者虞富貴以非道而至如盜窬禽暴焉則非道者惡得而及之然後踐履無非義施張莫不仁事功可勝紀哉公忠言美庸固易考清逺之趣疑多在文章常恨不得盡見之熈寧九年冬居彭城公孫師出雜詩稿一卷詞格秀古造句愈工則入淡泊愈深若借宅云四壁舊貧寧畏盜一枝雖小易容巢贈無巳師云他年逺公社若箇是遺民藍溪閒適云露侵僧履蘭三徑秋入農歌雨一犁秋居云井臼貧雖樂溪山逺未歸貽漁者云擬共停橈醉天幕緩歌纓足不廻頭聞之者孰不灑然而若醒超然而自愛復疑在文章者今一卷之稿已得如是之多固足為喜又得玩君子始終之尚篤吾所好顧何樂如之詩大小二十二篇䦘中送行不預焉逸者可知已十一月三日曲阜顔復書穆覽詩緬想風蹟而欽監銕君趣尚逺矣按陳公名洎彭城人國朝正史實錄俱無傳然常以歲月考求公常歴知懷州審刑院寶元間自屯田外郎為副端尋陞臺端已而出漕京西淮南京東慶厯五年轉吏部外郎加直史館改使益梓路六年入為度支副使尋轉鹽鐵後山集載公皇祐元年以副使行河還卒今史亦失書信矣史之多放軼闕遺司馬遷所謂滅功臣賢士大夫之業不述非此之謂歟儻非因詩巻長留天地間曲阜長道顔公候官宏中鄭公而下諸大賢表而出之則公之景行懿文世之知者益鮮矣雖然公之行事不得書於史册得是褒述於諸大賢輯成巨軸於百年之後又獲歸諸博雅君子之藏使當世士大夫玩繹詠歎之不足則其榮何必在彼一時之遇乎嘉定癸酉仲秋十七日睂山李􅌫題故吏部彭城陳公在仁廟時以御史奉使關中積以故人子見公又見之於河内其後五十年見公孫於淮南於是獲其詩稿伏而歎息葢不敢少有述焉也即幸而有如平日公以父黨教之讀詩可也如與之言詩則未可也已元祐六年春二月十三日山陽徐積謹書世雄竊伏吏部陳公之賢與令德之孫有以顯融其後皆見於名卿偉人之所論載幾於成書矣世雄不復形容其略獨闕元豐壬戌間初識傳道於松陵獲見此書又三年一邂逅無巳於京師今廿有二年矣而二君皆以不遇卒崇寧癸未端午傳道之子孝友復抱此書泣以相過撫卷悲涕益以知臧孫之有後竊意此書自是與陳氏祖孫隠矣疑其可自致於斗牛間者金石所不能傳也南蘭陵錢世雄謹書如彼衆流必有源陳家詩律自專門後山得法因鹽鐵不減唐朝杜審言嘉定丙子寒孟二十四日睂陽任希夷敬題破錦囊開玉振金舍人胷臆右丞心為時黼藻衣冠藪與國丹青翰墨林慷慨似誰雙舞劍風流隨處一歌琴燕詒苦志追先烈子夏何須論淺深元豐二年三月廿三日陳留張徽天聖中先太尉與故國龎公同為羣牧判官故省副陳公與龎公善光以孺子得拜陳公於榻下元豐二年八月乙丑晦陳公之孫法曹過洛以公手書詩稿相示追計五十年矣嗚呼人生如寄其才志之美所以能不朽於後者賴遺文耳苟無賢子孫其湮没不顯於世者可勝道哉光竊自悲侍公之久今日乃得睹公之文又喜法曹君之賢能顯融其先烈是敢嗣書於羣賢之末涑水司馬光陳公固所嘗聞然不及見也今公之孫以公詩為闕讀之亦足想見其風采矣元豐四年七月一日髙郵孫覺題元豐四年七月於禾興始識公孫師仲師道遂得公之遺稿以觀長樂林希故三司副使吏部陳公軾不及見其人然少時所識一時名卿勝士多推尊之邇來前輩凋喪略盡能稱誦公者漸不復見得其理言遺事皆當記錄寶藏况其文章乎公之孫師仲錄公之詩廿五篇以示軾三復太息以想見公之大略云元豐四年十一月廿二日睂陽蘇軾書轍頃在南都傳道陳君以鹽鐵公詩草相示轍甚愛公詩之精且嘉公之孝恭不墜世德後六年自歙州還京師見君於酇陽復出此詩為示不可以再見而不之志也丙寅正月七日趙郡蘇轍題珊瑚木難卷三
