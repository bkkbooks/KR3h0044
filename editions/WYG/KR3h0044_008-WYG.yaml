body:
  text: 珊瑚木難卷八明朱存理編鮮于公詞一帖近覧鏡白鬚漸多戲作滿江紅長短句繡江先生拜求一見敢錄呈醜幸乞一笑鮮于樞頓首詩酒名塲人都羨紫髯如㦸今已矣星星滿頷不堪重摘衰老自知来有漸春華料應今難得賴此身健在寸隂留還須惜也不怪軒銅直又豈怕青霜逼看匆匆總是這般駒隙生死百年朝有暮盛衰一理今猶昔問人間誰識魯陽戈杯中物虞邵庵詩一帖奉寄都運大㕘相公聊致久别企仰之萬一采覧幸甚虞集頓首計相淮南重幨帷海上還頻煩紆智略周慮及疲孱調鼎公宜早歸耕自得閒常携相贈䇿扶老向江山集至逍遥山見饒紫巗聞將適瓊華之囿當以舊識瞻承風采因得附此起居紫巗𤣥門耆宿之士退食之暇必能少從清淨無為之論遙為傾企二月五日集又行楊鐵崕詩一帖我尋天上張公子新買江南宅一區桂樹小山金作粟芙蓉秋水錦成株青龍繞屋瀦三斛翠鳳當門銜一珠世事紛紛何日了好將真樂問堯夫至正丙午秋七月四日放舟龍江入艾浦訪文湘翼之張侯留飲於真樂齋席上賦詩一解率座客子山徳昂兩進士用韻成什㑹稽抱遺叟楊維禎明日在任老人讀易齋試新製鐵心頴書余日强詩一帖四韻詩奉答大章貢士見寄之辱臘日放船歸泖上滄灣遲子渺愁予河東有賦煩傳送此月無氷又可書老鐵一錐能取紫庾郎二寸豈忘魚明嵗門生求座主相看喜色動皇居臘月八日客埬上余日强再拜又一詩奉上鐵崕先生先録去一過覽後當别寫上也楊子十年官不調才髙白首尚為郎因觀禹迹多留越為愛西湖又入杭仕宦豈無三語掾風流誰似四明狂水南水北題詩遍猶憶吳中錦繡坊倪雲林詩正月十四日舟過吳江第四橋大風浪中貯水一瓢而去乃賦小詩曰松陵第四橋前水風急猶須貯一瓢敲火煮茶歌白紵怒濤翻雪小停橈是夜泊舟吳江城外人家水月浩然與希言嘯詠久之明日題壁詩曰人家近住江城外月色波光上下天風景自佳時俗異泊舟閒詠白雲篇十五日與希言謁三髙祠望江上諸山為寫隔江山色圖并賦詩贈别白鷗飛䖏夕陽明山色隔江眉黛横試看三髙祠下水悠悠中有别離情十九日雨留陶篷戲寫遠樹石岫并録三詩用發一笑倪瓚尺牘鄧文原一帖原頓首再拜總管相公本齋先生閣下文原不意慶門為禍所倚堂上竟以㣲疾奄至大故聞訃驚怛曷能為情然夀母以貞節終始有子克盡孝道為時良二千石亦可無憾九泉矣銘文見委義不得辭屬體中畧苦風寒而来使以河氷不能久留未免力疾屬藁且繕寫納去其於發􅅗徳則未之有取也遺貺益重愧恧地遠不能引却悚然而已人還率爾具復冬令嚴寒惟順理節哀是禱總干照察文原頓首再拜来喻一一為嗣明言之自有書奉答銘文中為字有失筆别篆紙末夀康菴記来使趣行當行驛使便納上杜清碧一帖本頓首再行尚書相公本齋先生文侍舊臘衛易晉拜旌麾之下辱賜教言殊慰積年仰慕之心宴贐稠叠禮意隆至何以克堪惟深愧感而已别来伏想福祥至止百神翼衞大酬士民之望旋膺鈞鼎之任至慰至慰本擬以正初抵杭方聞江上有阻遂自泰興江隂展轉流滯二月初方達吳門得㑹季野舍人同到金井山中瞻視岡巒形局寛大氣勢雄偉與聞相合謂為福夀之基亦頗如諸名公所論而鄙淺之見尚有可疑者盖入手脉直下稍長則乗氣勁急倘稍加轉拓庶合古人增高益下趨吉避凶之説必欲如閩中龜蛇之地山盡水聚生意茂蓄則未能悉其造化之妙亦非面對不能詳盡惟高明裁察兹因人便謹奉起居以致謝私并敢獻其一得之愚蕪率伏祈恕亮餘惟為國家衞愛式副對揚不備二月十八日客吳中杜本頓首拜上呈歐陽文忠公一帖𤣥頓首再拜季野府判相公仁友𤣥於左右雖踈而英譽稔甚矧於先清獻公實有一日之雅向歆克肖契誼不殊相望千里之遥情親對晤有以也夫近者承季道雅盛以清獻神道碑見屬既而傳㫖下諭不敢以病憊控辭已繕寫付季徳今聞託張徳常轉達苐媿無後罹憂百感交集何能發潛光之萬一太湖多善碑材刻成以拓本見寄為幸徳常附海艎行匆匆亟奉起居草畧并干台照客京歐陽𤣥頓首再拜季畊照磨同致再三意𤣥又白張潞公一帖翥頓首上季京郎中相公契友閣下奉違晤言已閲數嵗比聞使馭上三山尋又聞在武林而一皆平安之報良用自慰區區備員翰讀近又承乏胄監昏懶日侵造歸未允其貧而無子猶故吾也僕滿意季徳之回豈意有此凶憂為之痛心况手足至親其終天之恨當何如也尚以人生有數少自寛解為禱季野令兄相公如㑹萬萬叱名不及顓狀燕吳相望海航往來動以年期惟珍䕶自强前即遠大不宣中秋日老蜕張翥頓首上記楊廉夫一帖八月四日老鐵禎帖上徳常相公先生屢承問病乏力不能接對今日體力稍勝忽老胥吳讓者泣拜床下自陳八年淹滯相公憐之欲行􅄁補而有優游不斷者阻之閣下不允告天無路惟有覔死地而已其情可哀今假老夫一言欲相公補押一案為來官收録之階公必賜可此事不徒協衆論亦繫相公平日隂徳事也扶病為布此楮惟冀委察焉不具禎帖上悚恐謹後空饒介之一帖介啓昨許床楣楠木當得舊船上楠木為佳比所有者亦是船上材但稍短耳須急得發來可應用葢匠已至長短當依君家床也暇時可來嬉楠木當勿遲亮之亮之不具十一日介啓村叟老友曩借沈維時所録本今日偶檢閲遂淨寫一過丙午四月廿七日小樓老客婦謠老客婦老客婦行年七十又一九少年嫁夫甚分明夫死猶存舊箕帚南山阿妹北山姨勸我再嫁我力辭涉江采蓮上山采蘼采蓮采蘼可以療飢夜來道過娼門首娼門蕭然驚老醜老醜自有能養身萬兩黄金在纎手上天織得雲錦章繡成願補妾衣裳珩璜為妾佩古意揚清光辨妾不是邯郸娼臣㑹稽楊維禎上老客婦傳老客婦者㑹稽先生楊維禎先生以高科進士仕有元三十年今行年幾八十而新天子以前朝老文學思一見之將延入禮筵文館遣翰林詹同文奉幣詣門起之先生以老客婦謝使者曰豈有八十嵗老婦去木不逺而再理嫁者耶明年又遣松江别駕追趣不已賦老客婦詞一首徹黈聽曰皇帝竭吾之能以用之弗殚吾所不能則可否則惟有蹈海死耳上允之已而賜安車詣闕廷留百有二十日禮文畢史統定即以白衣丐骸骨上成其志弗受爵賞仍給安車還山史館胄監之士祖帳西門外行路之人望之如神仙異人吁客婦之謡伸矣天臞太史贊曰李斯客婦於秦不能去而服五刑揚雄客婦於莽不能去而卒投閣阽於死若會稽老客婦遇明天子而卒完其志節其一時客婦之幸耶抑萬世名教之幸耶翰林侍讀學士詹同文撰飲廉夫拄頰樓時予奉命徴賢松江飛樓髙出市塵表萬丈文光照紫微洞仙曾與鐵為笛天女或裁霞作衣酒酣尚欲招鶴舞詩狂未可騎鯨歸休喚小璚歌白雪自有紫簫吹落暉詹同文送楊維禎還吴淞皓仙八十起商山喜動天顔咫尺間一代遼金歸宋史百年禮樂上春官歸心只憶鱸魚膾野性懶随鴛鷺班不受君王五色詔白衣宣至白衣還宋濓藜科旅生庭中白露日割而為帚謂是日取藜無蟻諺云堂下生旅藜堂上秋風起藜生何重重秋風落其子子落當復生根枮為往事朝乗白露降操割無螻蟻但知傷藜根誰治藜生地我非厭為煩持帚懷厥自丁未八月七日醉翁記髙深齋記距吳城東一舎而逺介於吳淞笠澤之間有僧坊曰大覺其北則文殊院盖皆建於梁天監年者勢沈沈深宏用以填蛟龍之宫黿鼉之窟其意逺矣大覺有名僧曰哲翁賢上人與文殊自南薰上人二師徳望學業年齒性情皆靄然伯仲之間也予甫冠即託二上人為方外交盖其學雖皆本於空宗至其逰戲藝苑從衡下上又皆一出於經傳子史百家之言宜其學術見聞超卓不羣也已薰師示寂而賢師尚獨存年已七十餘謝院事退休平汀洲浦溆之上搆屋若干楹言地僻則幽閴而爽塏言規制則朴儉而固實丹艧之輝麗藻井之繪刻一不得預於其間遂以孟浩然贈其家人貞曜先生之詩扁其室曰髙深齋夫欲求古人之志匪徒以居而得名也予以才拙屛置人事毎遇茂草深林便欲終身栖遲而賢師無恙時邀予過其西隠即其東偏為予闢燕坐之室予亦喜人跡之罕至也毎為師留連而不忘夙習操觚弄翰焚香啜茗欣然忘歸賢師已矣繼公者有曰從哲曰淨見而從哲師以其所乗扁舟即西隠東輦而寘諸地覆以茅晝夜六時趺座舟中刻苦禪觀曾不少休而淨見師尤青出於藍禪觀之餘工詩與畫詩格清峭如涪翁畫法師董北苑要非其師資有卓絶於人者固不能若此也世之人服儒冠衣誦儒經傳堂構菑穫弗克承其先志者視此以為如何予既有愧於其師資而又念其交契之厚故為之記以叙其情致如此云時至正十八年嵗在戊戌夏四月廿有五日黙菴道人沈右記和虞克用見寄試拂龍泉劍虚涵三尺氷直心憂社稷孤憤泣山陵牧墅村村雨漁船夜夜燈感君多道氣懇欵實難憑與金伯祥虞克用清夜聨話浩蕩即扁舟行徐適廣路𤣥雲蔽重隂澄湖漭洄沍客雁度寒洲漁罾掛荒墅故人欣㑹面握手出深愫古篋啓竒文㣲吟發清趣念兹慎勿忘朂哉紀良晤克用先世乃冠纓相家文章事業銘彞鼎被絃歌克用襲藏皆鯨珠也故云陸廣題畫詩層雲起西嶺餘華散芳洲卜居緬清勝願言成卧遊㑹心談無為山水相綢繆書屋倚深谷佳木森且修良時適真意罷飲臨清流吁嘆捷逕者奚識南山幽賦歸遂初服拂袂登崇丘中吳陸廣畫并題詩林積巫山雨山連艮嶽雲屢尋商谷士頻憶洞庭君學篆時拈筆陶情日著文披圖撫陳迹往事孰同聞天游生用伯起韻呈溪月王真人神仙方丈掲開𤣥一帶溪山凝紫煙四海佳賓同晚酌滿懐清興惬春天髙人自適談空麈客子欣逢下水船後日相思何處所金鼇厯厯百寮前李遵道次韻就挽遵道仙李如何竟小年松林滿壁慘風煙青山捫蝨誰同話赤脚騎鯨自上天名世豈惟書畫學起家猶望孝廉船無因得寄松花酒一灑清朙筆冢前王溪月昔年玉麈共談𤣥豈意飜然凌逺􅃄應跨紫鯨歸碧海㦯乗赤鯉上青天洛城空有盧仝屋采石元無李白船墨竹世推賢父子不堪見畫憶生前劉時中不見使君今嵗年豪端無處覓風煙謫仙入海窺秦月騷客沈江問楚天竹石漫存蘇氏譜圖書盡屬米家船人間底是招魂處只在滄江落照前呉養浩茒峰登覽賦思𤣥歸路㝠㝠向夕煙生不臨深元有道死當涉險豈非天輞川風月留詩卷罨畫溪山待酒船囘首清逰成短夢不堪腸斷白鷗前劉師魯青竹騎將何處𤣥一陂燄水畫生煙難尋賣卜支機石致使休官委羽天俗子偷傳摩詰畫仙書的寄賈人船茅山接得詩筒了不道藍關馬不前張伯雨真人曾與洗重𤣥遥指蓬莱隔翠煙賈傅雅期雲外鵠湘纍竟覓水中天江山不見王維筆湖海空懐米芾船獨有孝廉能繼世時時哀些酹墳前杜清碧根蟠仙李世家𤣥猶挺清標入紫煙花落金魚曽把酒栁搖銅雀舊朝天春風不及沅湘佩夜月空来采石船惟有平生寄来竹㡬囘愁展向忩前薛𤣥卿長憶青蓮翰墨仙揮豪随處寫風煙偶来泉石弄明月忽跨紫鱗飛上天元氣淋漓蕭寺壁挐音凄斷越江船誰將一掬懐人淚灑向西風墓樹前王𤣥初采石磯頭望謫仙栁深鬱鬱暮生煙百年盡屬大槐國一日俄歸小有天死别吞聲長入夢舊遊無客更同船醉中傳得王維竹猶對山人卧榻前倪元鎮右見虞勝伯所錄舊抄内晚節堂詩為竹洲仙母賦許姥塘東余姥宅髙年七十見仙風半生閉户機杼老二子讀書燈火同大兒學仙類老子小兒力仕如終童瑤池春酒介眉夀阿母蟠桃千嵗紅至正辛丑三月十有二日鐵篴道人在清真之竹洲館試奎章賜墨書辛敬詩一首芙蓉華上露初晞悵望佳人負逺期何䖏放船歌白紵誰家酤酒送青絲春波楚客行雲夢秋月仙即小字詩蒲葉正青蓮子緑不愁無物寄相思林泉讀書圖調古世寡和材踈出無羣種玉閟竒術還丹隠𤣥文披裘負薪士拾金世所聞雖無箕潁節亦不慕髙勲石田長芝草暮春自耕耘曲肱提耒耜長歌至日曛所樂良在兹沒嵗復何云王蒙題畫虎鬭龍爭萬事休五湖明月一扁舟緑蓑衣上雪颼颼雪月光中垂釣鈎釣得鱸魚春酒熟仙娃酒酣嬌睡足彫胡炊飯斫鱸羮一縷青煙燃楚竹篷忩眺對洞庭山七十二峯青似玉王蒙巷南巷北稀相見奈此村頭泥濘何入手酒杯嗟有限經心春事苦無多空簾花影聽鶯語明月簫聲嘆鶴䭾近報太湖新水濶幾時鼓枻共君過阮孝思房山墨竹跋房山髙尚書墨竹世已罕得宜寳藏之至正十年七月初十日趙雍題詩智老能師杜拾遺雪舟不忝浣花溪過人為有才如錦好客常判醉似泥早嵗傳經曾玉殿暮年通籍必金閨禪房夜詠袈裟薄十月燕山憶馬蹄李宗表至正己丑友人李宗表偕予往訪雪舟是日酌酒談詩宗表且以詩題畫意甚適暮歸而宗表復得此詩寄雪舟越五日師攜此畫示余乃房山髙尚書真跡因談及宗表詩請書其上十月廿有七日也羅元畫沙錐詩序贈陸頴貴吳興陸有才學而隠於筆工其仲氏頴貴美髯善容止尤有才氣可仕亂世而識幾不受聘則慨然曰以弓刀竊禄孰愈吾世守筆錐之為貴也襲名頴貴而製之精者標其號曰畫沙錐尖圓遒健可與古韋昶爭絶臨晉帖用筆喜勁故多用之稱吾心手吾書亦因之而進頴貴亦自貴雖勢要求之而不可得則襆之以錦署曰非㑹稽鐵史先生弗能知宣州諸葛氏云栁學士能書當留其筆否則退還未幾果退還歎曰代無右軍何以用吾筆而頴貴欲以吾當右軍愧甚愧甚惜余老矣所書又不過山經野史汝錐之功無以用之以利天下徒為毛錐累嗚呼錐乎錐乎其勿取晉與衞之所叱乎班虎頭之所謫乎縱弗遇也其深閟毛先生之囊乎慎勿為李鐄兒掩貨以尋竇於王公貴人之門也頴貴肅然起立抱襆退拜為錐誓曰代縱有祖范陽之神鎚吾錐不得易權矣龍集己酉秋八月初吉甲子鐵龍道人楊維禎氏在雲間之拄頰樓試畫沙錐染奎章賜墨書黄華字詩七首掛鏡臺西掛玉龍半山飛雪舞天風寒雲直上三千丈人道髙歡避暑宫手拄一條青竹杖真成自掛百錢逰夕陽欲下山更好深林無人不可留王母祠東古佛堂人傳棟宇自隋唐年深寺廢無僧住滿谷西風落葉黄年来白髪兩三莖一别君時髭未生惆悵料君應滿鬢當初是我十年兄賜酒盈杯誰共持宫花滿把獨相思相思只傍花邊立盡日吟君贈别詩酒盞酌成須滿滿花枝看即落紛紛莫言三十是年少百嵗三分已一分相思夕上松臺悠蟲似蟬聲滿耳秋惆悵東齋風月好主人今夜在幽州此卷舊聞盧廷璧所藏今李延吉見示為録之己酉五月初十日記嘯堂集古録序景春沈君居樂圃坊與予同里閈且嘗同游可齋賀先生之門一日過景春所居出嘯堂集古録見示嘗試觀之由秦以前三代之器若敦槃尊彞鼎鍾甬權之屬無所不有毎列一器必模其欵識而以楷書辨之刻畫甚精殆不類刋本讀之者文從字順如游商周之庭而寓目焉可謂竒矣坐客皆唶唶稱歎予謂景春平生寡嗜慾唯酷好收書有别業在閶門西去城僅數里景春昔嘗居之人有挾書求售者至必勞来之飲食之酧之善賈於是竒書多歸沈氏集古録其一也昔人有以千金市馬者得駿骨與五百金逾年而千里馬至者三今景春嗜書與昔之嗜馬者何以異哉吳中多好古博雅君子將以載酒殽問竒字者踵門而来景春不寂寞矣客曰然請書之元統改元十一月廿又六日吳郡于文傳題補之竹卷跋此筆視渭川千畆瀟湘萬竿則不為多然孤竹清風亦豈以多為貴哉補之寫梅極清作此君尤清進叔寳之野涉翁題詩碧眼胡兒叫横玉落月如盆照茅屋美人清夢㫁梅花却寫相思在修竹至正甲辰七月朢與張可觀觀於市涇别業因題以識顧阿瑛大癡畫詩茂林石磴小齋邊遥望雲山隔澹煙却憶舊游何䖏似翠松齋下看流泉大癡山木蒼蒼飛瀑流白雲深䖏卧青牛大癡胸次多丘壑貎得松齋一片秋雲林散人次倪雲林韻寄孫君實腐儒筆耕豈謀生與世濩落獨髙情緑樽有酒誰共醉素琴無絃聊自横湘簾在鈎月當户羌笛惱人花滿城幽居不知春事盡見客只言詩未成全思誠暮春書事用李學士韻蘿隂承宇晩迷𡨕栁絮縈風雪不晴寓地見花傷故里鄰家賖酒過清明絃拖錦瑟鄰塵闇韋絶芸編蠧粉輕遥憶行春多樂事輶軒風暖動連城清明不出因賦長句著䖏看花即是日一春饒睡戀吾廬客言沽酒休辭醉兒勸今朝罷著書自到中年心境蕩舊開幽徑屐痕踈鬢邊早已無霜縷天上何由馳日車吳炳彦暉别部司馬印銘至元年關將軍既以忠勇為漢死葬沮之陽世廟食玉泉山中在今之荆州當陽縣陳大建中智者大師建寺玉泉山將軍隂有功焉世葆藏其所佩司馬關羽别部司馬二印宋紹興間洞庭漁人復得其夀亭侯印并歸之寺與舊印為三自我元建國凡天子即位寺僧必奉而朝世祖武仁英文及今上皆親覧焉至元中當陽人朱徳政復獻别部司馬印方寸許蔚然如碧玉云得於沮陽墓旁意謂亦將軍所佩寺僧求予銘然當時為别部司馬宜不止一人一人佩重印亦不類而得於墓旁可異也遂為之銘曰方而正義之彰直而剛武之揚秘而蔵千嵗强乗聖時發竒光非將軍曷沮陽葆玉泉配三章於萬億䕶我皇掲傒斯衞青玉印詩陸友仁得白玉印文曰衞青王順伯定為漢物將軍騎從公主時豈意刻玉為文章珠襦已隨黄土化此物還同金雁翔軍中只識長平侯西風木葉茂陵秋人生卑微何可忽碌碌姓名誰見収虞集公主家奴尚公主刻玉姓名奚足多為問任安門下客大將軍印復如何張雨昔聞衞將軍起自衞子夫姊為皇后弟為奴親提漢兵北擊胡旌旗劍㦸羆熊貙指麾六郡良家子輸給三邊幕府租血流金城㫁斥堠魂駭老上燒穹廬天子召見錫印符鐃歌騎吹凱入都椎牛釃酒啓鞠室饗士論功懸箭箶平陽故侯丈二殳公主忸怩膝走趨兩兒佩綬光耀軀外虓内煽絶代無荆玉寸方温且腴古文繆篆姓名俱螭尾壓紐巧盤拏楯鼻磨墨急檄書史傳數紙丘山如王侯螻蟻但須㬰土花苔葉空糢糊何人手曾秉鈞樞何人身已儕𨽻孥昔貧今富鼠作虎昔富今貧鵠化鳬感時撫舊嘆以吁淮隂已死彭越葅良弓走狗諺不誣衞青玉印千載餘珍重漢皇宏遠謨吳莱紫芝生詩八首次韻韓伯清見寄之什凡五首連雲溪水出具區連雲庄叟得自娛髙齋松月足吟嘯濁世詩酒忘榮枯我無丹砂鍊金液君有田土成膏腴倘能種秫逺相致與爾日醉壷公壷卜居海上僅三年春日繁華思逺天練水澄清宜釀酒溪魚鮮美不須錢欲將野艇尋幽賞多謝雲山作勝縁寄語風流老韓子定須禊日過莊前間尋芝术保餘年信是神仙别一天避地有書能教子窮居無術學飛錢桑麻繞舍田園計竹素堆床翰墨縁慚愧長沙毎招隠時臨車馬到階前我居甘寂寞豺虎動成羣地僻傷春草江空憶暮雲友朋難得㑹書札近相聞世事今如此愁来懶學文久客黄岡地新年白髪仍嘆傷思執手憂患苦闗心市井皆譁語山林獨楚吟羨君漁浦上髙隠貴腰金次韻陸秀才春日幽坐新塘雨餘流水新隔忩看花如美人晴絲冉冉墜復起幽鳥嚶嚶啼更頻自憐華髪在海嶠誰肯野服隨山氓故園荒穢久弗治且復飲酒從吾真觀友人所蔵古墨雪堂手劑不可得色如黝漆闇然光安得一丸歸我室臨池剩寫十三行至正二十年十二月廿日紫芝生為又𤣥鍊師寫一過克舊與野髙君作雞栖石圖後七年復觀於松江之客樓嘆嵗月之易度慨人事之不齊為之撫圖悽惻野髙君謂予耿耿者在豪邁之氣非復曩時酒酣出紙徴畫為寫篔簹圖筆意縱逸不計工拙然自謂差强於曩作要知水到渠成顛瀾駭浪自有静時野髙當示雲林髙士同一賞識也幽瀾話别汗沾衣颯爾西風候雁飛我但悠悠安所分誰能屑屑審其微釣竿不揷山頭路獵網寧羅水際磯獨有休心林下者騰騰兀兀靜中機東吳宋克題畫青雲山中大𤣥道人隠者也時扁舟来往茜武之上與游從則樵夫野老而已余拙守衡茒橡林有年矣夏末㑹於幽瀾泉山主常師方啜茗碗忽若氣逼懐黄帽催行甚急别後流光迅速惜哉因就其韻戲成四首書於畫松之上且發一笑梅花道人詩送吾宗張則明先生之山陽淮南嵗晚見宗人况是斯文骨肉親且喜出行無雨雪莫言離亂有風塵一官未必鄭䖍老駟馬何如原憲貧休道廣文氈獨冷山陽教席暖如春金臺張元固寗節婦者故元帥寗武宣公之介婦也姓獨吉氏初至元中武宣自河内以兵從平江南遂留鎮姑蘓因家焉延祐中其季子為樞密㫁事官卒獨吉氏奉柩歸葬河内廬墓三年乃還吳有司上其事旌其門而復其家太行西望别京都長憶初孀柩在途君子首丘今或有婦人廬墓古應無三年喪畢還歸鎮兩地魂消獨撫孤閭里有旌門有㦸何堪把節老東吳掲傒斯花菴編絶妙詞選十首劉過字改之太和人稼軒之客王簡卿侍郎嘗贈詩云觀他論到前賢處據我看来近世無其詞多壯語盖學稼軒者也號龍洲道人賀新郎懐舊老去相如倦問文君説似而今怎生消遣衣袂京塵曾㸃處空有香紅尚軟料彼此魂消腸㫁一枕新涼眠客舍聽梧桐疎雨秋風顫燈暈冷記初見樓低不放珠簾捲晚粧殘翠鈿狼藉淚痕凝臉人道愁來須殢酒無奈愁深酒淺但寄興蕉琴紈扇莫鼔琵琶江上曲怕荻花楓葉俱悽怨雲萬叠寸心逺賀新郎睡覺啼鶯曉醉西湖兩峯日日買花簮帽去盡酒徒無人問惟有玉山自倒任拍手兒童多笑一騎乗風翩然去避魚龍不見波聲悄歌韻逺喚蘇小神仙路近蓬莱島紫雲深參差禁樹有煙花繞人世紅塵西障日百計不如歸好付樂事與他年少費盡栁金梨雪句問沉香亭畔如何召心未愜鬢先老賀新郎贈張彦功暁印霜花步夢半醒扶上雕鞍馬嘶人去嵐濕青絲雙轡冷緩鞚野梅江路聽畫角吹殘更鼓悲壯寒聲撩客恨甚貉裘重擁愁無數霜月白照離緒青樓回首家何䖏早山遥水濶天低㫁腸烟樹誰企天涯牢落况輕負暖雲濃雨記酒醒香消時語客裏歸韉須早發怕天寒風急相思苦應為我翠眉聚賀新郎多病劉郎瘦最傷心天寒嵗晩客他鄉久大舸翩翩何許至元是髙陽舊友便一笑相歡㩦手為問武昌城下月定何如揚子江頭栁追往事兩眉鬭燭花細剪明於晝歎青娥小紅樓上殷勤勸酒昵昵琵琶恩怨語春笋輕攏翠袖看舞徹金釵㣲溜若是相逢吾未老道長安市上狂如舊重㑹面幾時又念奴嬌自述知音少算乾坤許大着身何處直待功成方肯退何日可尋歸路多景樓前垂虹橋下一枕眠秋雨虛名相誤十年枉費辛苦不是奏賦明光獻書北闕無驚人之語我自匆忙天未許贏得衣裾塵土白璧堆前黄金繞後付與君為主蓴鱸江上皓然明月歸去唐多令再過武昌蘆葉滿汀洲寒沙帶淺流二十年重度南樓栁下繫船猶未穏能幾日又中秋黄鶴斷磯頭故人曾到不舊江山都是新愁欲買桂花重載酒終不似少年逰水調歌頭春半春事能幾許宻葉著青梅日髙花困海棠風暖想都開不惜春衣典盡只怕春光歸去片片㸃蒼苔能得幾時好追賞莫徘徊雨飄紅風摇翠苦相催人生行樂且須痛飲莫辭杯坐則髙談風月醉則恣眠芳草醒後亦佳哉湖上新亭好何事不曾来水調歌頭自述弓劍出榆塞鉛槧上蓬山得之渾不費力失亦匹如閒未必古人皆是未必今人皆錯世事沐猴冠老子不分别内外與中間酒須飲詩可作指休弹人生行樂日自催得鬢毛斑達則牙鼓金甲窮則蹇驢破㡌莫作兩般看世事只如此自有識鳴鑾天仙子初赴省别妾别酒醺醺渾易醉回過頭来三十里馬蹄不住去如飛牽一憩坐一憩㫁送殺人山共水是則青衫終可喜不道恩情􅂸得未雪迷村店酒旗斜去則是住則是煩惱自家煩惱你沁園春風雪中欲詣稼軒久寓湖上未能一往賦此詞以自解斗酒彘肩風雨渡江豈不快哉被香山居士與林和靖約坡仙老勸駕予回坡謂西湖正如西子濃抹澹粧照鏡臺二公者皆掉頭不顧只恁傳杯白雲天竺去来看金璧崔嵬樓觀開況一澗縈紆東西水繞兩山南北髙下雲堆逋曰不然暗香浮動何似孤山先放梅須晴去訪稼軒未晚且此徘徊辛稼軒沁園春止酒杯汝来前老子今朝㸃檢形骸甚長年抱病咽如焦釜於今善眩氣似奔雷汝説劉伶古今達者醉後何妨死便埋渾如此歎汝於知己真少恩哉更憑歌舞為媒算合作平居鴆毒猜况愁無大小生於所愛物無美惡過則為災與汝成言勿留急退吾力猶能肆汝杯杯再拜道麾之即去招則須来朱希真西江月二闋世事短如春夢人情薄似秋雲不須計較苦勞心萬事元来有命幸遇三杯酒美況逢一朶花新片時歡笑且相親明日隂晴未定日日深杯酒滿朝朝小圃花開自歌自飲自開懐且喜無拘無礙青史幾畨春夢紅塵多少竒才不須計較與安排領取而今見在釋孤雲詩序某與友人方元質甫往来紫淦玉峡之間毎一㑹合輙取古今作者之詩更續歌詠毎繹其言意元質間誦孤雲詩一二似若流離放逐不得志之為者又若神情閒放無羇於世範者也惜不識其為人且不見其全藁比者其安成令宜春周昌吾致書山中曰釋孤雲之詩若干卷務敏王君將與好雅之士共梓傳之請為序引予既受而讀之則其念母憶弟别友憂時之作極為哀愴不能不使人興起其秋思之情盖亦聰明特達而遭時喪亂不得與於禮樂刑政乃寄所安於浮屠氏故其聲變亦止於其身世之所遇者如此若乃逢時昌盛與縉紳君子上下其論而和平其聲亦可夷猶松菊而傲兀古今矣若廬山道士黄可玉永嘉僧徳儒之詩予甚愛其酌情達意篤於倫理今錢唐道士陳渭叟之紫雲編廬陵僧法髙之疎雨集誠可並傳讀者將因其聲以考其世之所尚因其言以觀其人之所遇則於世故人情之變亦無不盡矣盖詩之在宇宙若元氣之周流凡有生之類莫不充滿大之為日月星辰山嶽河海小之為草木花實鳥獸蟲魚無不各得其所受而為詩者獨能攬結萬類之精㣲以深寓夫理趣之所至而増夫倫誼之則可興可觀可羣可怨而詩之為道其庶幾矣夫孤雲諱法真姓郭氏谷陵安成人也至順四年中秋日京兆社本伯原序先君太史棄諸孤之四年集来吳門省達州府君大墓始見叔父南山翁翁與集同出太師雍國公盖四從矣翁曰後㑹未可期幸留數語識嵗月翁方教授外鄉又以推人生年月日時論禍福以助道故不能久留城中敢賦此以承命云爾玉屛古栢與天齊憶過於今又七期各道遺書向江上西風江水鬢絲絲玉遮墓下有諸孫東望滄波毎㫁魂泣血三年餘喘在更將衰淚灑荒園族人散處江南郡不識音容但記名世澤須令孫子憶故家今幾尚簪纓虞集客桐江風雪中有懐堯書記在吳中吳水三千里相思嵗欲殘一盂供客飯去日是春寒慷慨逢人少髙深用世難政當風雪夜還憶過江干釋法髙謫仙歌清夜獨坐天地無聲星斗動摇欣觀李白集髙吟數篇皆古今不經人道語騷章逸句灑然無留思寥寥數百年間揚鞭獨步吾所起敬起慕者太白一人而已感歎久之恨無人能繼太白後因成謫仙歌以是祝太白舉觴以酬太白太白有靈其聽我聲知我意矣李白字太白清風肺腑明月魄揚鞭獨步只一人我誦太白手屢拍嘗聞太白長庚星夜半星在天上明仰天髙聲叫李白星邊不見白應聲又疑白星是酒星銀河釀酒天上傾奈無兩翅飛見白王母池邊任解酲欲遊金陵自采石翫月乗舟歸赤壁欲上箕山首陽巔看白飡雪水底眠紫烟又不知在何處潄瑶泉酌霞杯悵望不見騎鶴来白也如今安在哉我生恨不與同時死猶喜得見其詩豈特文章惟足法凜凜氣節安可移金鑾殿上一篇頌沉香亭裏行樂詞此特太白細事耳他人所知吾亦知脱靴奴使髙力士辭官妾視楊貴妃此真太白大節處他人不知吾亦知歌其詩鬼神泣解使青塚枯骨立呼其名鬼神驚惟有羣仙側耳聽我今去取崑山玉將白儀形好雕琢四方上下常相隨江東渭北休興思會須乞我乾坤造化兒使我筆下光燄萬丈長虹飛陳亮同甫右見龍川集第十七卷胡布詩車轆轆車轆轆循軌躅騄耳馳紫鴛逐掩弧矢望潼谷車噋噋出東門歴培塿不憚煩豈不懐國士恩登髙山窮躋攀度隴水向秦闗男兒死即以尸裹馬革何用戚戚為妻子凋朱顔旦行青山雲暮繞紫塞烟飲馬月窟水四顧何茫然慷慨登途遠良日上屯還佩劍隨元戎分兵玉帳中挑燈夜决䇿逹旦掠羣兇太白入月敵摧鋒刀横再戰一鼓雄魯連計就羞言功割牲啗勇士醉歌激天風歸来謁天子封侯不足貴袖陳期以致康濟天子曰卿柱石姿國之衛翼時之夷吾㣲臣再拜稱唐虞霸業古所鄙念此民罄敵志曷期墮反側慶忌捷烏獲力終以剪歸有濟先民恥雜霸後王棄同仁劉項不識字碩儒徒坑焚周公不作素文述先遺民理化漸柔邇區㝢載清淳臣願天子師三王法姚姒民惟先徳罔替九閡固羣生遂雨忩分韻得青字時積雨新霽景物爛然上客佳時集衡門緹騎停鏗金披艶藻鳴玉振芳庭麟鹵歸肴核鷹頭飛渌􅙩花明雜樹錦山翠鳯凰翎覽景惜時樂薦芳惟徳馨酣歌迴落日緩帶倚春屛主奉以百年客酬同千齡詎知壮士懐明時在丹青賞静軒幽居安僻地泉石友芳襟倚景覽時秀虚扄延賞音藉君東郭履盼彼北山岑水華籠月沼竹屋韻風琴葉落驚孤鶴花動起鳴禽論感潛夫僻捐之許由心觸此復留憩俛世詎遺簮送友人之京師鳯凰出世不多見神駒汗血非全功子龍勇冠萬人敵劉表氣壓三軍雄㑹使䇿勲誇海内何必紀石歸遼東迓子縱横覽八極當駕巨浪乗長風丈夫許國一何早中原紱冕皆吾徒絳火流雲赤雀下神劍入海妖能屠嘉人玉琯不自惜宋客燕石何其愚㑹見青冥奮鵰鶚鳶飛萬里騁良圖臨青樓詩髙樓百尺瞰奔湍落日憑虚縹緲間石壁倚風青鳥下鸞簫明月玉龍還霸圖猶在英雄夢雲氣或連吳越山何限興亡眼前事五湖烟水不相闗龔宜詩十一首贈劉萬户故宋魏鶴山先生祠宇久為軍士所據萬户劉侯為之屛之故賦此詩於赫魏公百世之師昔我先皇寵建厥初維祠伊何公之所止俾我後人有敬毋弛爰有武士如羆如熊肆其昏嚚紛集於中或號或呶或易寒暑鳴鴞在林公食無所桓桓劉侯眎此曰嘻其如頑獷曷宜有之立飭其旅汝挈子女汝還汝營汝無齟齬其旅既屏公居既寧伊誰之功實侯之明侯功張矣侯且昌矣匪私其言邦人之語嗟予小子式歌頌章敢告國史俾也可忘賦畊雲窩素寡名利心躬畊向南畆晴雲覆行窩棲遲甘白首芸香散遺編松華熟新酒日夕誰與娛相過有隣叟嘆彼操瑟人王門立何久正月九日試筆聖厯迴昌運春陽喜載和落梅風外急輕雪晩来多闕下恩頻降河南使復過野人當此日一酌意如何送趙海寧解纜沙邉驛分符海上城西風駐五馬落日擁雙旌世已厭鞞鼓人皆望治平使君推善政庶以慰疲氓荷雨軒為明上人賦青荷覆前沼白雨来亭軒隨風貯圓葉欲滿儵已翻物理有如此一笑復何言題遊子東歸圖遊子久不歸慈親髪如雪江湖多風波胡為苦跋涉歸来乎山中山中有薇蕨次栁仲修韻兼似水西新仲銘外史滄江為客驚三載故國飛雲渺一鄉結社久欣從恵遠論詩還喜識曹唐馬嘶沙塞旌旗赤鴈度闗河草木黄漢室重興應有日卧龍聞説起南陽送帖尚書督餉還朝聖明天子中興日南土諸侯職貢年萬里傾恩勤玉節千艘轉粟上青天履趨丹陛膺前席酒酌金壺出内筵奏對若承幽側問為言丘壑有遺賢送華徴君還鄉故鄉亂後誰歸得獨愛東湖隠者還豈為丘園邀束帛只緣猿鶴戀空山華邉濁酒須頻醉竹裏衡門不用闗我亦四方倦逰客思家因汝動愁顔秋夜言懐次韻倦客無眠步廣除月髙空宇夜何如醉題梧葉風欹㡌笑拂芙蓉露濕裾歴國底須三寸舌傳家頼有五車書眼明得見承平日白首衡茒不願居題畫葡萄月黒爛星斗下有虬龍蟠起眎夜無寐庭虚秋露寒龔宜王錫詩三首詠竹西上人載雪軒竹西屋上長堆雪疑有天花雨法幢乘興偶忘居陸地浮家仍似在寒江蒲團夜白生虚室栁絮春隂覆短窗炎暑不為融濕去定知滕六被陽降中秋翫月露白秋中河漢平纎雲無翳一輪行素娥不妬傾城色玉兔曽含利物情人事隔垣俱洞見天心四海定同明憑誰為借仙宫便願接盧敖上太清淮南偶書郡邑蕭蕭百戰餘瘡痍未復尚征輸交情頗似周公瑾才學寧無董仲舒漢末英雄金刻璽淮西音捷羽傳書清江擊楫増髙興故國無勞自索居全思誠九首題翟志道大尹題恵山泉韻梁溪之源日泠泠此山得爾方知名九龍蜿蜒鱗甲潤萬家昭晰心神清石闌曉含河漢影竹壚夜沸風雨聲桑苧祠空霜月白老僧留客說無生次韻題江隂驛樓光陽樓頭山日斜漁子棹舟縁白沙大江昔年渡五馬古木至今號暮鴉晴雲散空爛作錦秋葉墜地紛如花我来臨眺獨愁絶破屋炊烟能㡬家次韻過張隠居宅隠君卜居山磵旁數椽茒屋蒼苔荒天霜夜深木葉赤客子曉踏槐花黄魚傳尺書過錦里雞随斗酒来鄰邦劇談終日不忍别坐見嶺月揚清光次倪雲林韻寄孫元實先生腐儒筆耕豈謀生與世濩落非髙情緑草有酒惟共醉素琴無絃聊自横湘簾在鈎月當户羌笛惱人花滿城幽居不知春事盡見客秪言詩未成題錢素菴蔵六窩道人善龜息綿綿中夜存五官謝形役召入侍心君嬰嬰尚肧胎渾沌初未分六子有妙用深蔵天地根空虚與生白𤣥牝為之門支床三十載凶吉兩忘言寄語窩中人得失奚足論錢愛山席上與宇文子貞諸公分韻得緑字芳塘淡微波嘉樹藹新緑王孫敬愛客晝永杯屢覆乾坤一傳舎日月互推轂不知壷天外塵海眯人目懐逺道去去渺逺道依依懐舊丘開軒宿雨霽臨流溽暑収輕飈振庭柯落日明沙鷗太息嵗云暮候蟲吟素秋題趙魏公秋林曉行畫卷王孫愛畫心獨苦下筆天機妙今古涼風蕭蕭涼月落寒烟載我出林莽黄葉打頭秋滿身青山對面如古人不須覓句㶚橋雪何用旅食京華春憶昔玉堂供奉日一二詞臣同住直青綾被冷露華濃金蓮燭殘河漢側雞栖樹底聲喔喔鶴立螭坳望珠箔鳬鷖散亂不成雙歸老林泉有餘樂臨風掩卷老淚落此畫此人那可作送王元章如越我從越中歸山水猶在眼賀湖天寒氷鑑清禹穴水落雲氣暖夢中往往復登臨萬壑千巗姿蕭散故人山水窟中来題詩直上姑蘇臺酒酣目力隘宇宙少年筆陣排風雷謝公屐下小吳越如望中原更竒絶終南大華青不了桑乾之隂多積雪送君出門歌逺逰自歎把鋤空飯牛觀光歸来尚黑頭訪子却覔山隂舟全思誠字希言阿瑛存藁二首草堂五月少人過門巷泥深奈雨何滿樹枇杷鸎竊盡一階芳草蟻行多因思諸葛吟梁父却笑蘇秦讀揣摩老我衰年無白髪從今也會號皤皤憶昨相過寂寞濱白頭傾盖豈如新驚回赤壁三更夢開盡桃花一度春顧我老為思櫪馬憐君逺作倚樓人喜君壚畔三珠樹留待来時醉掛巾堯文文學上謁握手道舊情藹如也臨别蒙贈以詩且厪簡及謹依韻奉呈用博一粲玉山久望子来過一見論文喜若何竹葉留人忘夜永桃花得主自春多親安甘㫖同銘樂民苦瘡痍待揣摩盡說虎頭當食肉老予鬢髪已先皤憶得婁門婁水濱君家来往綵舟新㑹溪避地逢今日繞屋栽花及早春多謝手題相問字獨憐身是未歸人㡬時一醉酬翁徳也就陶公借葛巾白屋山薛毅夫郭亨詩七首近詩寫呈平湖草堂主人大章先生就希粲可友生郭亨再拜八月十五夜與仲義邾君對月海宇塵空洗玉盤清輝共挹此江干一天風露秋無際萬國山河夜未闌歎指𤣥霜分白兔醉看明鏡舞青鸞桂花謹訂嫦娥約還許披香到廣寒十六夜與仲義對月十二瓊樓夜不扃素娥飛舞見分明鮫人獻璧龍湫白蜯腹懐珠海市晴粲粲南山歌不夜輝輝北斗轉孤城清光偏照征夫恨不道閒居有太平次筠谷中秋客松城韻澄澄軒檻夜逾清坐看梧桐璧月生人似錦袍思太白詩如石鼎得彌明今宵景物清塵夢終古江山不老情却憶廣寒天咫尺鳳翎光采怯瑤京次仲義同逰西清道院勝日尋詩来道院解衣盤礴憩秋清蒼松白鶴庭階見緑水金鱗池畔行四面軒忩皆客坐一時懐抱為君傾從容且覓幽貞趣敢望勲垂竹帛名次吳近仁秋日見寄離懐日夜滿丘園清論無由洗耳根水落吳江鱸可鱠秋高禹穴栢休捫兵戈此日同為客鴻雁西風獨掩門吟罷新詩苦相憶白雲紅樹隔孤邨送倪得中赴春闈一經已亞龍頭選萬里早充觀國賓御酒葡萄瓊宴晚宫袍楊栁玉階春瀛洲禮樂同中夏天府圖書拱北辰此日看花酬素志好來歸賀曲江濱次丘克莊寄平湖草堂韻苦憶維揚丘進士移家江上已多時丹墀射策催登第絳帳傳經更說詩兔窟天香吹桂籍鶴巢秋色近松枝相思只隔胥溪水肯負黄花節後期水竹居吳下人多水竹居俞公染翰笑談餘詩文固已瀾翻甚嘯詠還當雨霽初篇什漫勞陳組繡園池無復有禽魚只今蕭散南湖上種玉疏畦孰侮予勉之兄吳城宅中有水竹居聞甚清邃兵後其地以處軍卒因遷居松陵南湖之上亦種竹疏渠婆娑其間比之城中尤清曠也俞尹作記瀾翻浩浸雖白首暮年猶不除少年舉子習氣耳題燕適之所曰水竹居吳人多用之類皆鑿池種竹以為深靜爽朗予至吳中士大夫家毎見如此故篇中悉及之至正二十二年壬寅九月廿六日倪瓉書題馬逺栁塘聚禽圖寒鴉數㸃江南邨鳴飛宿食雁有羣灘頭飛下兩鸂鶒雪色半消潑墨痕修竹天寒低翠袖搖曳絲縧沙上栁陡然斜出數枝紅隔水敧拂淡相守畫来盤礴殊有情頓置色境如生成嵗寒動植各有態相示以意初無聲黯淡溪光不知處撫景吟成有聲句醉来拂拭畫圖看中間著我騎驢去俞焯私印越来子字午翁夏夜乗涼懐舎弟公素正字山暝夜初靜明月来青天茒齋苦炎熱涼生溪樹邊移榻就松隂隂濃清露滴開襟扇罷揮散髪詠苔石靜聞玉漏傳閒看銀河濕於焉惬心賞毎憶京華客未審今夜裏還念家山不金聲送許州太守陳璉之任華星燭廣川驚颷散髙樹故人暫離羣跨馬之官去遥峰淡晴暉孤鶩隠深樹流水日夜馳眷眷那能住隔浦聞疎鐘明朝在何處曽日章見潁州志擢閩海都元帥承恩宴歸奕奕黄封下九天繡衣持節舞蹁躚旌旗影裏庭槐午鼔角聲中海月圓縧綰金符持尺籍歌停翠袖捧觥船醉歸只覺皇恩重一任宫花壓帽偏王都中閶門舟中戯作呈伯原志東二心契吳王故苑古長洲潮汐池邊一佇留秀蕙芳蘭無處所亂莞叢葦滿清流髙歌一曲間宫徴人生只合行樂耳蘋風忽起吹舟悍雨打圖書蔵裹亂閶門咫尺不安流何況河津與江漢非無輕楫妙廻旋逆風逆水適相纒須臾風囘水流順星漢浮槎現嬋娟米南宫吳閣老見南宫真跡所録壬戌六月二日大雨午窓書珊瑚木難卷八
