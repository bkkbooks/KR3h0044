body:
  text: 珊瑚木難卷二明朱存理編破忩風雨𨽻古田詩紙忩風破雨泠泠十載山中對短檠老矣江湖歸未遂畫間如聽讀書聲劉君性初以破忩風雨自居諸公賦詩成卷因作此圖并題絶句於左至正草六年歲在丙午暮春之初遂寧人王立中彥強環堵篝燈夜閴寥欺人風雨更瀟瀟詩成驚落雞忩筆蘆破從來馬鬛瓢萬里浪開看往日連床屋漏耿今宵丈夫莫袖為霖手令沃人間九土焦陸居仁記大名劉易性初氏蚤從宣城汪先生逰後值兵燹辟地吳中今年從吳興來見豫草玄閣出玉坡周公所篆破忩風雨四大字蓋書汪先生贈語也求余文志之余聞破忩在錢唐時夜半讀書有颶挾怒浪從海門來肆其暴烈揚沙漂石怪雨與之俱若萬騎出祁連北鏖於大漠而矢石俱下若蟄龍決起十丈而滄溟之水倒立若黃河自天而落束以龍門呂梁而雷鳴雹噴也崇城如山者圯曽觀如雲者墮其破忩如一葉漏篷下塞磧闕人懼其有不可支者明旦天地清霽賢郡長有過而詰者曰劉子破忩尚無恙否吾饋酒醪解汝愠性初啓忩一笑曰吾由敬亭過武林入雲門下苕霅遭風雨者凡幾吾皆安以為常子何置戚戚於其間哉而呼酒共酌歌老杜秋風破屋辭以澆其中之磊磈者亦亂世一竒士也雖然少陵破屋不為一已憂而寓憂者天下之人也惟少陵能安秋風破屋而后能推大厦萬間之庇性初能安風雨破竇而后能居玉堂雲霧之忩吁處變而不失其常居安而不忘乎危是在性初性初謝曰某不敏敢忘先生之規至正甲辰嘉平初吉楊維禎記蘭雪子脫略干戈外踰十年未嘗有憂色所在讀書雖敗壁頽垣霜晨雪夜不倦斜風橫雨有所不避也一日持牯腰軸過小蓬臺曰吾讀書處號破忩風雨吾闕汪翰林先生所創也鐵崖先生記其端文雄詩豪繼其後者珠貫玉疊公其無一言乎哉豫應之曰列仙之闕之言倬乎雲漢之章矣豫尚何云雖然當破忩風雨之時人不堪其憂而士之讀書窮理其間者不改其樂也是故觀風雨之勢足以助吾氣之浩然聽風雨之聲足以資吾趣之灑然風檣陳馬不足為其快也龍吟虎嘯不足為其壯也金舂玉應石裂竹折不足為其清也峻宇雕牆瓊室瑶臺雲忩霧閣不足為其坦易幽安以樂也當是時豈知破忩之陋風雨之厄哉破忩不能陋風雨不能厄則吾之神爽飛越若翔紫鸞駕白鶴度銀闕逰碧落上玉京以登五城十二樓也果能若所適則羣仙之地位清髙闕風雨者吾將告之以百萬億蒼生命墮顛崖受辛苦也雖然未造乎是則憂民之憂者必先憂已之憂樂民之樂者必先樂已之樂憂之如何憂其不能正已而已樂之如何樂其不復徇欲而已吁吾之靈臺丹府若泰山盤石之安若青天白日之明若松泉蘭雪之潔則吾所處之地破忩之破自破而吾丹府之忩不可破也破忩之風雨自搖撼而吾丹府之忩不可以搖撼也則吾廓寸地於八荒開沖襟於千古者風雨且不識又安知所謂破忩也哉士不可以不𢎞毅吾於蘭雪子不能無所勸云東海賔艾納老友錢鼒敘潤逼疏櫺寒侵芳袂梨花寂寞重門閉撿書剪燭話巴山秋池回首人千里記得彭城逍遙堂裏對床夢語塵聲碎林鳩呼我出華胥恍然枕石聽流水右踏莎行吳興筠菴王國器簷宿吳雲風經楚袂門深不似春宵閉碧疏吹霤濕燈花客鄉無夢尋珂里剪韭吟遙聽潮浪裏江懸漏杳歸心碎相思鳩外緑蓑寒一簾蕉響秋如水嘉興張翨用前韻記大名劉聘君遭世難走楚越間居無室宇所至即浮屠老子之宫而假寓焉每風雨連夕燈忩獨坐車編相對誦讀之聲琅然與風雨相叶瀟瀟湝湝若環珮之鏘絲竹之沸發於簷牙接於人耳於以見君之學之勤而志之有在也翰林直學士汪公叔志過而賢之名其所寓曰破忩風雨而請記於薊人李繹繹知君者也為言曰卑宫惡室人之所惡所不處也而君於牖户之間研殫經籍如居層軒髙棟然則其志可尚矣凄風苦雨人之所厭所不願也而君於隂晦之時吟咏篇章如遇光風霽月然則其守又可嘉矣抑聞昔人有以席為門而處窮厄者終能佐明主以定天下君之志其斯之志歟又聞有大雪僵卧而不干人者終能配往哲以垂令名君之守其斯之守歟由是窮而能逹嗇而能豐鄉也蓬室環堵以栖遲今則朱門大第以容與豈非耽學篤志之驗窮經稽古之力耶坐有客作而前曰子之言足以復劉君矣遂書以遺之君名易字性初今寓吳興魏之貴宦乃以君祖父為稱首云至正二十有三年龍集癸卯冬十二月朔旦記李繹一燈風雨寒忩破讀書不知秋怒號恍如扁舟在江海但覺四壁皆波濤對床髙卧無此客倚劒長歌空二毛曉看庭樹故無恙千峰雲氣落青袍武夷山樵者錢惟善春草何萋萋逰子行未歸雞鳴戒初旦起舞披我衣凄其來何方有淹復祁祁飄飄入疏櫺瀟瀟灑長裾蓬藿掩荒徑緑苔生硯池誰云此情惡靜思良自娛出門臨廣路曠望惟塗泥車馬雖堅良安能範驅馳懸知造物意將欲寧君軀笠澤張庸字熙載大名劉君耽書癖清如梅花瘦如石半生浪迹江海間詩卷酒杯長自適胸中元精妙天趣破屋破忩隨所住酒醒夜披山海圖驚怪蛟龍送風雨青燈熒熒四壁空捲書搔首亂飛蓬長歌拂劒飲如斗造物生我將無同君不見破窑寒灰終夜撥空窖囓氊頭盡白焉得丈夫氣節堅不磨還有聲光照方册陸機祠下忽相逢竟夕談詩風雨中拍甕為君澆磊磈富貴何如一杯水大笑居士并州易履字安道伊人抱負亦云竒明晦由來動合宜為客情懷能樂處破忩風雨讀書時漂流江漢嘆誰識傳舍乾坤信獨知光霽自天須有待眼前百物總熙熙江隂張端敬亭有舊齋風雨一窗破朝對風雨吟暮對風雨坐唯知經史親肯顧衣裳涴有時暫逰息自歌還自和直謂所學成功名如一唾寧同陋巷人獨守簞瓢餓一笑居士廬陵張昱讀書幽澗底茅屋走風雨忩疏木葉鳴燭暗灺花吐隱憂不可寫俯仰棄前古美人何由招涓涓隔秋浦嘉興金絅字子尚君子切聞道不求飽與安讀書破忩底那知風雨寒顔淵在陋巷蕭然一瓢簞原思甕作牖鶉結衣無完日親聖師誨心廣體與胖彼哉豪家子列屋飄羅紈冥頑厚奉養寧殊沐猴冠矯矯性初氏鐵石為肺肝蓬蓽弗嫌陋零凌何足患雅志樂清苦載籍嘗勤觀篤學慎終始成名諒非難朋遊服闕頌詠疇能殫嘆豫老環堵見善飢則餐贅詞愧蕪拙掩卷空長歎霅濱慵客張世昌疏忩久零落亂帙自縱橫方與聖賢對那知風雨鳴乾坤含暝色林壑度秋聲想子心如石看書夜到明始豐徐一夔風雨東南接漏天客忩吹破碧紗煙十年世事關心曲一片秋聲到枕前花落不妨尊有酒客來未覺坐無氊老豫曽覔闕端隱藜杖春扶緑水邊東平牛諒牖隙不須掩風雨欲何如陋固慙青瑣明當奪綺疏桐絲因自緩塵網每為除雞鳴晨鼓後螢飛夜燈初書葉吹還亂簷花落更疏誰能日閴寂得得此中居山隂朱武黑雲壓郊茆屋摧大風拔木勢危哉破壁驚雷從地起長淮飛雨渡江來拍户打忩聲作惡斂襟孤坐意裴徊雨餘蘭雪渾無恙吹倒琅玕挽不回江東杭琪一室蕭然誰與同清如獨鶴寄樊籠詩成春草池塘上夢繞玉堂雲霧中花氣每隨嵐氣入書聲時與竹聲通從容更覺新晴好卧看東林日影紅吳江鍾虞錙頭讀書如學仙朝不出户夜不眠時聞破忩風雨急政自澄心對聖賢尚書汪公敬亭山色青連天執經劉子最清苦亹亹濟道心相傳雞鳴喈喈天欲暮疏櫺蕭颯寒聲度庭前漂麥總不知屋上捲茆寧復顧人生窮逹那可知玉堂金馬自有期青藜還憶夜相訪寂寞破忩風雨時芝山老樵韓元璧題敬亭山色讀書菴破紙忩寒儘自堪但怪蛟龍嘶匣底不知風雨暗江南雲橫黑海秋帆斷花落彤樓曉夢酣五色石崩天頂漏須君手脫巨鼇鑱時至正乙巳秋八月十五日會蘭雪聘君於鐵崖先生小蓬臺見示此卷遂為之賦金蓋山人錢嶽幽人讀書味真樂堅坐那知風雨惡他年髙步玉堂中還憶破忩風雨惡三衢徐汝霖網户羅蛛絲􅌑瓏見秋月如何夜來雨隨風送蕭屑幽疑石溜泉散若瓦鳴雪起舞聽晨雞寒燈淡將滅誰知綺忩人笙歌曙方歇西江張附鳯風雨茅齋倚破忩夜深明滅照書釭平生苦志能如此何處清貧更有雙客况蕭條知已晚壯心卓犖為君降金蓮送直歸青瑣筆力還教鼎可扛蜀董在十載江湖夢滿空風雨宵忩虛聲易入燈暗手慵挑竹洗千竿翠林喧萬鼓潮東南枯渴甚藉爾倒天驕錢塘楊明字復初若有客兮青雲衣珮玉玦兮光陸離爰處兮爰居左琴劒兮右圖書客心兮孔廑聲吾伊兮夜逹晨輕富貴兮浮雲保厥美兮天真山房兮寥落秋清兮氣薄天冥冥兮雲漠漠雨蕭蕭兮風夜作心耿耿兮不寐歎斯時兮落魄滴曉露兮寒忩紛遑遑兮求索彼薄夫兮貪婪惟聲色兮是耽文繡兮膏粱蓀何為兮懷慚秋蘭兮青青我所思兮古人雪案兮寒檠甘與君兮相親檇李江漢字朝宗藹藹煙塵失故廬獨循髙志肯懷居江湖古寺曽借榻風雨破忩時讀書憑几細聽聲淅瀝挑燈重顧影蕭疏莫言此際凄涼甚自是先生樂有餘吳興髙聞禮字子儀客館不就寐坐久愁易集虛櫺吹夜寒風過雨聲入蕭蕭拂欄楹奔湊勢轉急雲亂架上書空牀漏初濕長歌茒屋詩孤懷竟難拾燈前漫激昂撫掌劍華澀老髀肉復生英雄夢中泣五湖歸去來扁舟弄蓑笠吳興莫士安字惟恭憶昔山忩夜讀時西風吹雨濕淋漓篝燈不定門頻掩屋漏無端榻屢移白髮夢回仍墮泪綺疏聽後尚顰眉此聲為寄春樓客莫問杏花開幾枝稽山馮恕客忩讀書過夜半江上長風將雨來茅屋聲和木葉落竹床靜對燈花開何人雞鳴解起舞此際蝶夢付銜杯我欲哦詩慰寥寞蓑笠敲門出緑苔浚儀趙俶草帶殘編荷衣斷袂破忩風雨深深閉江南倦客正思家燈花搖夢來鄉里翠竹簷前碧蕉叢裏秋聲鬬合愁聲碎不教潘鬢總成霜也應有泪如鉛水金絅奉和子尚踏莎行雨歇荒雞呌山空木葉堆玉堂雲霧景多向此中來龍雲從字子髙宋狄武襄有客曰劉易以負氣敢言取重名公卿今劉君亦名易又為左轄張公所敬禮古今人姓名有同若是其所處之地又同若是然宋史載劉易事甚詳固可考也今劉君操履亦表表聞其甘貧忍恥殊於人所居之處即書破忩風雨字揭之薊丘李先生在師之友也以文章名者也既為記其志復命在綴一言在惟士窮棄里巷時苟其中有所主雖蓽門甕牖弗厭居也藜羮糲糗弗厭食也敝衣緼袍弗厭服也今日之能貧賤即異日之能任富貴也古今善觀人者惟於此乎爾劉君於破忩風雨中閲古人行事其所得深矣奚假在言耶姑書此質之薊丘先生謹識蜀董在字彥至劉君性嗜學孜孜事三餘孤燈破窗下簡編自卷舒瀟瀟風雨來吾伊聲自如安貧人所難味道心常愈我聞顔子淵簞瓢陋巷居千載稱亞聖聲名重璠璵又聞陶淵明所處亦敝廬蕭然環堵間左右惟圖書吁嗟世之人性樂耳目娛華居美飲食所求安其軀良心日以斫疇能返厥初朂哉劉孝廉聖賢以為徒檇李沈庭圭字德璋館宿風雨惡客情向寥廓破榻懸秋風微寒夜相薄楚客千金博十年吳下逰擁衾正酣寢那識茅簷愁劉君有逺志居圖偶相示願𢎞經濟心大庇天下士江右李訥字彥敏玉堂金馬世能知茆屋蒼苔孰與期近有劉君更竒絶破忩風雨正吾伊南豐丘思齊字叔賢我昔家住蓬山陽有田五頃八百桑撼風吹籟棟宇閴玉兔旋繞金烏翔有時天遺萬銀燭坐噓雲靄沾洪荒澄空萬里思杳杳髙山一水聲琅琅竪兒曼倩稱東方偷桃近離仙子傍詼諧不了世間事指我蘧廬名破忩涓涓穿牖七星海巨潮駕屋錢塘江彈樓大士遽失色算沙童子安能量到今紀載不知闕此忩破矣誰行莊君不見鳷鵲麒麟擁圖畫阿房灰散驪山下弗如諸葛在南陽髙卧聲名壓王謝計籌山人嶽偷字季堅幽人愛月忩從破其奈蕭蕭風雨何寒襲書帷秋氣重濕侵衣桁夕隂多挑燈看劒聞雞舞貰酒連床待客過不道有人青瑣內春酲隨夢入南柯銅臺公子貂裘敝鐵研磨穿志不迂落落軒忩寒若此瀟瀟風雨夜何如夢回燈火清秋際心在羲皇太古初窮逹有時聊用拙壁間知己是圖書廣陽雅安知善一室蕭然四壁空客懷况復雨兼風濕沾衣服愁仍重清到肌膚句轉工知命肯隨時變化甘貧肯為道汙隆夜深尚對羲皇易應怪寒燈不耐紅東海何恆層霄已許快飛騰即欲拋書還不能僧舍更聽今夜雨故人誰共十年燈四簷雲氣迷塵闕一隙朝光獨凍蠅平陸滔滔嘆伊阻岡頭行客正凌兢會稽陳睿寓館臨苕水清吟破寂寥軒忩秋淡淡風雨夜瀟瀟硯沼沾應濕書衣亂闕飄曉來佳客至留話且停橈曲阜孔思吉字宗道劉郎年少讀書處破忩風雨連朝暮風聲掩雨轉颼颼雨聲不斷還如注風聲雨聲復書聲忩間嘈雜聽夜鳴卯金之子多好學應是然藜來坐聽洪武癸丑春三月晦日拙菴錢唐陳彥博書於南湖之宗所此卷王雲松所藏雲松見訪持以相示留余書樓兩月遂為録一過記三通詩雜體凡三十六首詞三闋跋一篇凡四十一人皆名翰也辛丑元宵雪晴漫記洪武癸丑春三月晦日拙菴錢塘陳彥博書於南湖之宗所此卷王雲松所藏雲松見訪持以相示留余書樓兩月遂為録一過記三通雜體凡三十六首詞三闋跋一篇凡四十一人皆名翰也辛丑元宵雪晴漫記虞相古劔歌宋相虞忠肅公八世孫堪謁豫雲間草玄閣自云先丞相有古遺器四曰瓦琴石磬蜀王硯與此劔也劔長古赤三握具五寸弱握有二稜起欵識可辨者曰千萬嵗其鐔橫寸二狀叨餮末甚鋭縵文為水銀古中末間黝漆色芒可吹毛星月下出之艷發孚尹廪廪然可寒鬼膽是誠千載物也於是酌堪以酒酒酣為作虞相古劔歌使與古虞公劔同傳為家寶云至正二十五年青龍系乙巳王正上日抱遺叟楊維禎在雲間草玄閣書昔聞虞公古劔可以追騰空回落日千年宗社已丘墟子姓西來傳不失江淮都督僨國讐八陵痛骨三千秋采石江頭一提出寒芒夜走完顔酋堪兮堪兮傳八葉價金不售山西俠牀頭寶匣不敢開黃蛇上天走雄雷持謁雲間鐵龍父灑以延津水拭以赤堇土虹光一道裂蚌胎上指黃星落黃雨嗚呼舞鴻門刺魚肚二竪佞何足數我將假霜鍔代天矛西山斫白額二東海斬蛟三頭然後裂蚩尤殪羅㬋大開太陽照九州堪兮堪兮勿失汝劔兮使我徒請尚方斬馬之具於朱遊至正庚寅十月豫遊錢唐過四壁山中與青城小樵遇出示豫古劒乃其先公相國所遺也豫為樵作古劔歌以歌之古劔古劔元非鐵亦非干將與莫邪自從混沌鑄成來出鞘入鞘何生滅輝天燭地不須磨肅氣稜稜凛霜雪是以曾將破敵酋采石江頭建勳業海晏塵清歌太平瑶匣藏之在巖穴或時拈出與人看千古萬古欽猛烈野人鄧羽雍公孫子氣甚清示我楊顛古劍行劔鋒詩律兩竒絶秋蓮光彩玉庚庚楊顛健筆老縱橫是亦鐵中之錚錚吐詞鬱嵂鳴不平鳳凰來為盛世鳴一代惟數虞翁生豫也學書學劔既老何由而成名倪瓉吾友虞勝伯隱居南山讀書耕釣不求人識所與遊者皆巖穴之士也其先丞相雍國公忠義立朝具在史册所佩古劍以貽子孫代不乏賢而餘風遺烈猶未泯也至正乙巳嵗勝伯自山中來命豫賦此劔為虞相古劍歌與勝伯歌以發其所藴云虞山人何入城訪我衡門下要作古劍行云是雍公所遺之古劍采石江頭大破完顔兵匣藏纍世不敢動忽然光怪夜夜蛟龍鳴憑軒拔鞘自起舞皎如月下秋霜明橫磨泰山石直斬東海鯨何不獻書見天子快意一掃風塵清吁嗟此劍亦神物又於堪也同垂萬古名雍國丞相虞公古劍一具今藏其孫勝伯家毗陵倪元鎮匡廬陳惟寅既作歌詩詠之且要豫同賦焉雍公古劍射日星鐵冶鑄出秋霜硎寒光耿耿試一掃魑魅罔象都逃形匣藏鏽澀不敢動龜鱗虎文驚且竦閲歷星霜三百年社稷山河自兹重雍公磊磈雲夢胸白虹紫電符采同有時呼酒醉踏月浩歌起舞多英風采石江頭決長計一戰突營誰可比材官勇將號如雲每視竒功獨懷愧劍鋒猶漬佞血鮮神物不隨陵谷遷只愁雷電破屋壁化作蒼龍飛上天秦約余弱冠即識虞翁者曾見此古劍并劍歌一册以其家故物不敢得後竟流落他所時復得之劍亦尚存其處庚子嵗也明年為辛丑夏書虞邵菴小像昔梓潼虞使君有隂德其殁也其子雍公哭之公輒蘇止雍公哭以為人死而得為佛樂莫大焉乃更哭之耶後從吏入冥乃知使君死為更生佛今青城公集中有所謂更生佛祠前瑞竹生是也雍公既相孝廟其府第在吳下公諸孫有名堪字克用者猶能讀書績學世其家克用於青城公為再從諸孫從江西畫史得公小像裝緝之俾人題詠於卷後青城公既以文章師表當世題詠之者豈易易著語若克用於公為子姓表章其家世則不得不然紫芝眉宇鳯麟姿自是文章百世師何必凌煙畫冠劍雲礽翼翼奉蒸祠遂昌鄭元祐松柏蕭蕭墓上秋衣冠猶識舊風流雄深典雅文章在酷似唐人柳柳州淮南潘純復見玉堂真學士眉山草木必重枯古心古道文章古試問丹青畫得無壺中陸行直頭戴玉冠擕竹杖龎眉丹頰白髯鬚久知後夢非前夢方信今吾即故吾已約耆英開洛社更尋歸路問成都堂堂一代文章伯千載還應再有無趙郡蘇大年雍虞公文序斯文與造化功用相彌綸國家氣象相表裏故文人生於世有數文章用於世有時斯言若夸理實然也皇元混一之初金宋舊儒布列館閣然其文氣髙者崛強下者委靡時見舊習承平日久四方俊彥萃於京師笙鏞相宣風雅迭倡治世之音日益以盛矣於時雍虞公方回翔胄監容臺間吾䣊有識之士見其著作法度謹嚴辭指精核即以他日斯文之任歸之至治天厯公仕顯融文亦優裕一時宗廟朝廷之典册公卿大夫之碑版咸出公手粹然自成一家之言山林之人縫掖之士得其贈言如獲拱璧公之臨文隨事酬酢造次天成初無一毫尚人之心亦無拘拘然步趨古人之意機巧自無境趣自生左右逢原各識其職故自其外觀之如深山窮林蔥蒨蓊鬱莫測根柢巨野大澤汪洋淡泊不為波濤試入其中則日月之精凝結嵗久皆成金珠龍虎之氣變化時至即為風雲孰能窮其妙也哉太史夏臺劉君伯溫蚤歲鼓篋從公成均及為江右肅政使者近公寓邑乃裒公之文將傳諸梓書來京師屬玄為序言惟李漢於昌黎子瞻於廬陵皆能知而能言者走豈為前人役乎第於公有世契生平敬慕公之文以附著姓名為幸又髙劉君政事之暇敦篤風誼如是遂不敢辭而為之序至正六年二月翰林學士承旨榮祿大夫知制誥兼修國史歐陽玄序玄頓首再拜伯溫監司相公仁契玄去歲數四附書憲府邃嚴未審一一逹几下否春和逺惟履候勝常殊慰瞻遡書來知刻虞先生文足見髙誼作序當求名筆乃稱雅意諄切不敢力辭因便輒脫稿去刻成千萬見惠一本為感賤迹遂丐間之請鄉里距貴治稍近專容修簡牘之敬春中惟順序善葆不具備辱契歐陽玄頓首再拜二月十一日謹空此手迹二紙豫得於虞氏久矣李內翰愛而持去余不吝也虞先生詩序自昔文章家著述之盛其集有內外前後續别之分蓋由其體製有同異嵗月有蚤莫故其編纂彚次之法各有所存然其文之可傳者片言半簡皆不得而棄置又復有所謂拾遺者焉國朝一代文章家莫盛於閣學蜀郡虞公公之詩文曰道園學古録者其類目皆公手所編定天下學者既以家傳而户誦之矣然其散逸遺落者猶不可勝計也其從孫堪乃為博加討訪積纍之久得古律詩七百三十七篇而吳郡金君伯祥為鋟諸梓是編之傳其殆所謂拾遺者乎豫嘗獲執筆從公之後而竊誦公之詩以為國朝之宗工碩士後先其於詩尤長者如公及臨江范公蓋不可一二數也學者讀乎是編則知其殘膏賸馥所以沾丐後人者多矣今公已不可復作豫是以三復是編而為之永慨也抑公平生所為文無慮萬餘篇今道園録中所載不翅十之三四而已然則併加討訪而使之盡傳焉豈非堪之志而豫之所深望者乎是故昌黎之集成於門人河東之集托於朋友惟廬陵歐陽公之集其嗣人能致其力焉若堪之汲汲於此其亦可謂無愧於歐陽氏矣堪字克用好學有文能世其家而公之行能官代已具於歐陽內翰所為碑銘兹不著至正十五年正月十五日金華黃溍序豆腐三德贊虞先生以老病請告還臨川山中故人父老賓客鄰曲及族人昆弟子孫咸喜其歸也雞豚之饋狎至不敢不為之盡觀而齒豁目昏又性不喜殺生食飲之際未皆如其意山中人有鬻豆腐以進者欣然樂之蓋盤餐至前目昏不能有所擇選隨七梜所獲粗精骨肉不能辨也而豆腐盈豆如一隨取皆佳一德也齒豁每食肉輒填齒隙非極潄剔不能去濡乾皆費咀嚙可取飽無是苦二德也柔潔淡潤無殺生之惡三德也吾鄉仁夀在萬山中地髙不宜稻而宜豆鄉中人食豆蓋多於粟成都人常呼吾邑為食豆人而鄉語謂豆腐為來其云懷故鄉風物之美緣老年食物之便作豆腐三德贊贊曰掇山腴潄仙漿軟於雲潔於霜舌生肥齒不傷君子食之夀而康肘後服玉舊有方傳之天下匪私吾鄉元統元年十月十九日橫舟中書此手迹今在昆山虞翁家并前小像贊語同作一卷贈曇霄詩我聞炎宋及近代虞門簮紱紛如雲外舅蒼梧府君者上繼祕監傳斯文一女適我有賢德兄弟玉立皆蘭芬自從外舅沒官所歸隔山川魚雁阻兵塵浩浩各天涯夢寐中間時或覩老壯死生那得知子孫有無安可期誰料內兄仲氏子一朝謁我來京師入門面目恍莫識頭已祝髮衣純緇細言六歲武昌别别來草九年華移闔家骨肉既凋喪丹陽芤土鬱相向每嗟流落真可憐石瀨何時得歸葬艱危幾脫虎狼口幸得為僧在林藪止存一兄作秦贅叔氏之子臨安有二人形影相惸惸出家蹤迹如雲萍我聞姑丈歷清要豈知姑已歸幽冥須臾言罷淚雙墮闕痛闕風生四坐使我聞之倍感傷感傷之後喜無奈桑田滄海自古然世家子孫能幾賢當時不填溝壑裏必作丐者閭閻邊或為奴𨽻甘箠辱及遭俘虜罹刑戮孰若爾心不為非落在空門逺塵俗乃知祖宗積者深善慶源源報何速愛爾好文能作詩驪珠紫貝光陸離虞門文業久陵替爾不承嗣當歸誰答云十九從佛教年今卅餘亦修蹈茹葷飲酒皆不為慈航彼岸終須到臨安一兄猶少年有妻有子宗祀傳願廬丹陽墳冡前以永孝思終殘年斯言慰我如醇酎夜談青燭過子丑明日辭我飛錫去愧乏囊金表親厚老懷惆望秋雨晴為爾折斷石城柳七十翁詹同書於翰林序吳興道場寺主藏霄上人來京師謁翰林學士承旨詹公於寓宅詢其所自則公夫人虞氏仲兄奎之子外舅梧州府君之孫也於是不見者凡二十有九年而夫人之喪亦二年矣上人詣几筵哭奠弔慰如禮與公道契濶敘艱危悲慟慨嘆有不能喻之於言者蓋追憶初别時上人甫六歲公年當強仕才名方盛不數載而四方鼎沸風塵滿目音問暌隔不知存亡何似及皇上龍飛江左平羣雄而一海宇制禮作樂登崇俊良公以文學被顧問任天官而持銓衡長詞垣而知制誥康寧夀考詠歌太平虞夫人猶及目覩公之榮遇足以慰疇昔艱危之懷而上人遊乎方外得以保全性命復相見於今日豈非可喜而又可感者耶上人留京踰月乃請於公曰我虞氏世家會稽自唐永興文懿公陪葬昭陵遂為雍人傳十一世有守仁夀郡者因家焉遂為蜀人又八世為宋丞相雍國忠肅公公之季子大理寺丞卒葬餘杭之石瀨鎮至我曾祖為王融令宋亡不降遂死之時祖考梧州府君方七嵗隸育於官及曾叔祖仕元為祕書少監無子因請於朝以府君為嗣後廕官初授光化主簿歷管城丹陽德安尹調湖廣等處𣙜茶提舉升朝列大夫同知梧州路總管府事卒於官謀歸葬石瀨未果仍殯於丹陽縣南之清水潭墓今久闕展省是行也願歸結茅庵於葬側朝夕居其間以盡孝思公不忘親戚之好尚有以教之公乃以其事語趙塤曰我外舅與故奎章學士邵菴先生雍郡文靖公宗系同出於雍國忠肅公子嘗遊文靖公之門有師友之契霄上人之行不可無文字以贊美其孝慕之誠也噫塤於先生為門人於公為屬官又何敢以固陋辭竊嘗觀於前代世家其以立德立功立言著於當世千載不朽者代有其人然由唐宋及元家譜相承以勳業文章照映史册七百餘年逺而足徴未有若虞氏三公同出於一門者也今逢創業維新之治其子孫雖未有顯者然國家政教方隆安知無力學自修以待用者而上人托迹空門懷其世澤切切以祖宗墳墓為念是其孝思無斁過於庸俗人逺矣吾輩稱揚而樂道之豈不足以為士大夫之勸乎謹以此言復於公退而次第書之以為贈大理公諱杭孫宋阜陵所賜名也祕監公諱應隆在元嘗修大一統志今其畫板本猶存梧州府君諱弦字舜臣上人舊名容德以丁酉年入烏程何山禪寺禮南洲藻公為師法名曇霄字具瞻雖學佛而通儒書大義蓋其家學云洪武七年嵗在甲寅秋七月甲午朔翰林國史院編修官清江趙塤序上人曇霄者宋丞相虞忠肅公彬甫之遺裔也其姑歸今閣老詹先生同文而上人因與先生有連一旦來謁將還廬墓於丹陽先生請趙翰林伯友為序且令豫題其左方西方聖人之教一則曰孝二則曰孝故升忉利天為母説法而所演大報恩經亦孳孳弗倦桑門每取之以為準的或者謂其絶棄親屬不亦過乎有若上人通儒書而又善詩念家世之非昔祖宗墳冢逺在一方悽然有白楊悲風之感縛茅而廬諸墓豈非有合西方之教哉雖然此固足為孝也西方以法胤嗣續為至要與吾儒甚不異上人能廬墓矣獨不念虞氏之嗣乎若能幡然改轍歸繼宗祧之重其孝不尤大哉在家出家同一法門居塵而不染塵浮屠氏之教也初何傷乎此惟逹人大觀無所係吝上人尚勉之焉若夫家世之盛趙翰林序之詳矣豫復何言史官宋濓此卷舊曾觀於虞氏今聞在陳玉汝家遊汾湖記至正十年三月十有六日吳江顧君遜既招客遊東林明日復命釣雪舫載聲妓酒具遊汾湖客凡七人會稽楊維禎甫里陸宣大梁程翼金陵孫煥青雲王佐吳郡陸恆汝南殷奎妓二人珠簾氏金粟氏朝出自武陵溪過五子灘二里許北望見鵲巢喬樹顛杏桃花與水楊柳緋翠相間長竿斾出緋翠頂主人云西顧村也又五里所見修篁喬木蔽虧亭臺於岩洞之上遂解舟維來秀橋不問主徑詣亭所亭曰翠岩主人為陸君繼善出肅客憩樂潛丈室設茗飲談樂潛詩有向夕羣動息時聞落葉聲之句豫喜而詠之復引客至嘉樹亭堂觀先君手植百歲棠飲堂上出鐵笛一枝云江南後唐物也有刻字云七點明列星一枝橫寒玉豫為作清江引一弄聲徑亮甚笛闋陸君恆揳豫三絃琴顧君遜亦自起彈十四絃命珠簾氏與孫君煥交作十六魔舞飲徹妓踏歌引客長隄上度來秀橋至南陸庵班荆坐大堤上珠簾氏用白蓮瓣令行杯酌主客舟中鼓吹交作兩岸女婦馳逐而觀者繦履不絶解纜出汪涇五里而至汾湖東西袤十八里南如之湖分一半一屬嘉禾一屬姑蘇故名汾湖舟經龍王廟酹酒龍王借順風果應錦帆一開即抵柳溪過吉祥寺遊鮑氏池亭亭有枯松數十章竒石數十闕亭已廢環翠池及石屋洞尚無恙寺客徐柳邊出陪客談興廢事云池亭為前朝鮑節制舊墅也今子孫無噍類唯遺八十老媼不能主乞入寺云登舟出柳溪過登瀛橋十里所北至蘆墟為巡官寨寨官李某邀客啜茗徐步過泗州橋月已在青松頂一丈矣遂步月色歸蒼雪所用主人顧君遜武陵溪上花如錦之句分韻賦詩夫水國之遊衆矣得名者鴟夷子後唯陶水仙儋州禿翁耳鴟夷先幾去國併挾西家闕去智矣而客則未聞禿翁赤壁之樂客有吹洞簫者清矣而妓尚無聞水仙與賓客聲妓俱載闕孟之流酒徒耳而觴詠之樂又未聞也歌詠而至聲妓之娛又無流連之行今汾湖之遊是已其可不有紀述以為後人之慕乎於是乎書俾主人刻諸蒼雪軒上坐客各繫於後時期而不至者茅山張君雨闕也鐵笛道人楊維禎志武陵溪上花如錦花氣熏人如酒濃簫聲時倚鏌鋣鐵雲影忽落玻璃鍾小娃傳令覆蓮掌遊子掀篷招玉容汾湖歸來夜何晚明月還挂青螺峰顧遜蕩舟武陵溪朝出伍子浦還過西陸家仙童啓巖户棠樹大十圍桃花粲欲語遺我古鐵枝色比修月斧為作古江調江鳥凌亂舞攜之謁龍君湖水吹暮雨曉飲花石岡亭臺已無主瀛橋步月歸竹枝和銅鼓宦者艱薄氷粉色已黃土道人早歸來脫冠挂神武鐵笛得武字春風畫棹錦帆乘鮑陸池臺次第登翡翠花枝人似玉蒲萄銀甕酒如澠泗州寺裏看題竹伍子灘頭聽采菱歌扇斜搖波縠細舞衫輕著唾茸凝七星鐵管金為點萬斛珠琴寶作層臂脫珠韝明越白燕衝烏帽濕吳綾雄詩奪錦欺三謝俠氣凌雲比五陵醉卧氍毹驚露下芙蓉月浸碧壺氷陸恆得陵字翠巖亭上問棠梨主客同舟過栁溪花下停歌聼鸚鵡竹間把酒引玻璃緋桃照眼元無賴石洞關雲路轉迷金粟彈筝銀甲冷珠簾度曲翠眉低銀帆捲浪風生席羅襪生塵草被堤屢舞不妨飛野馬醉歸遮莫報鄰雞梵王宫殿空塵迹鮑氏池亭憶故栖鐵笛一聲山月白竹枝唱過泗橋西陸宣得溪字樓船載酒西湖上萬頃玻璃緑新漲玉簫檀板館娃歌銅鼓雲璈仙樂唱涼蜜金盤荔子漿紫駝銀甕蒲萄釀桃心大舞天魔宫分班小擺花神仗人坐盤陀古翠巖鶴立海棠青錦障醉揮玉麈奪詩魁氣嘆鐵龍驅海將三五朱扉流水香十二欄杆花氣王歸來涼月白紛紛湧出銀濤三萬丈程翼得上字青簾畫舫載吳娃㵿㵿行雲十里賒湖光逺帶耶溪水春色好在桃源家十幅蒲帆風正健一聲鐵笛月初斜玉壺香醪興未盡更醉海棠嘉樹花王佐得花字今朝好天氣天朗隂雲舒湖中朱雀航花下碧油車題詩過子建鳴琴續相如四美古難具餘歡重躊躇孫煥得如字平湖天鏡落波濤殷寒枕鳶飛下跕跕龍眠驚淰淰道人吹鐵龍百竅聲盡噤柳溪千花明粲若天馬錦交朋類摶沙美會猶拾瀋主人敬愛客十日相泥飲嗟豫一介微好古亦天稟作詩續貂末芳評賴題品殷奎得錦字雲林小幅上有雲林子印詩山郭幽居政向陽喬林古木鬱蒼蒼剡藤百幅誰能置為掃虬枝蔽日長荆蠻民雲林雨過踏春陽澗水濺濺老樹蒼不是硯坳雲作陳踈篁空自拂簷長尚左生次韻丘崇崇兮下有流水樹森森兮匪櫟伊梓彼櫟孶兮且夀梓棄為薪兮於材何有造化孔仁兮將誰歸咎韋羌山人陳基千年石上苔痕裂落日溪回樹影深我亦江南樵隱者人間何處有雲林胡寧十年不鼓江湖楫木葉蕭蕭鬢影秋忽憶滿川風雨夕雲林岸口獨維舟陸繼善偶因滌硯寫從容點染那能似畫工千載風流誰可擬令人猛憶米南宫甬東顧盟荆溪圖陳惟久畫詩荆南山水昔曾遊離墨銅官嵐翠浮任氏亭臺好垂釣張公洞口不容舟緑蘿搖雨花飛急白鳥衝煙浪未休今日披圖一惆悵王君闕處憶風流句吳周砥荆溪溪上首重廽豈憶人間化劫灰只有斬蛟橋下水可曾寫入畫圖來遂昌鄭元祜好山都在太湖西滿路風煙棘刺迷華屋燕飛今在否市橋官柳不勝題虞堪斬蛟橋下王樞府髙榭連雲第一家欲向新圖何處問客窗風雨對梨花張監太湖西畔樹離離故國溪山入夢思遼鶴未歸人世換嵗時誰祭斬蛟祠吳興王蒙王家宅子荆溪上回首風埃一惘然怕説當年行樂事卧遊圖裏見山川陸大本邵家樓子百花明袁令祠堂一水平俯仰經行春夢破披圖能不重關情張經環慶遺家三百年書林喜得子孫傳惟餘圖畫仍依舊一壑風煙思惘然王光大荆南山水照清輝客裏時時夢見之風塵澒洞歸未得每展新圖慰我思陳植人家緑樹繞孤城溪上風波落日明三害祠存人已去只今豺虎却縱橫張田殺虎祠前雲尚黑斬蛟橋下水猶腥十年湖海為羇旅夜夜相思入枕屏荆南樵人記東坡先生嘗曰一入荆溪便覺意思豁然欲買田其間種橘作小亭名以楚頌卒不遂其志杜樊川作水榭正當荆溪之上其遺址僧結菴以居至今歷歷可考見蓋荆溪山水之勝善權離墨銅官諸山岡隴之起伏雲霞之吞吐具區滙於其左苕霅引於其前凡仙佛之所宫高人逸流之所宅殆不可以計數也覺軒王先生韞真潛德於其間修天爵以恆貴去人欲以求仁垂子若孫皆循循雅飭弗違先生志也其曾孫允同靜而有智簡而能文與豫為姻契故豫知其義方之訓有自來矣河之始達也才濫觴焉楩楠松柏千尺之材出於萌蘖之微由其源逺而本深耳允同命豫友陳君惟允繪為荆溪圖以示不忘鄉都之意他日指圖而歎曰某樹也吾祖之所封植也某丘也吾父之所遊登也寧無惕然有感於中乎若允同一舉足話言而不敢忘其祖若父者非教之有素而能然哉吾固曰其中多隱君子既樂善於一世又能使其將來之未艾蓋亦山川之鍾秀粹美而致然乎嵗己亥五月十三日東海生倪瓉漫書髙士圖題跋袁安字邵公汝南汝陽人嚴重有威見敬於州里時大雪洛陽令自出案行見人家皆除雪有乞食者至安門無有行路謂安已死令人除雪入户見安僵卧問何以不出安曰大雪人皆餓不宜干人令以為賢舉安孝亷也大德癸卯二月念五日姑蘇寓舍製孟俯袁氏自司徒安後世為上公猗歟盛哉斯其積德纍行有以致也而傳者又以得葬地之故豈其然乎豫兄為通甫作卧雪圖特寫先曾之清髙以貽其子孫而傳無窮也通甫宜保之後一年二月草五日吳興趙孟籲識子俊雪氣侵人卧欲僵苦勞明府到藜牀主賔問答皆情話何用間名入薦章楚龔開大雪塞門袁公髙卧不出不宜干人之語非直一時髙致而已想其面目嚴冷意氣凜烈與雪同其孤髙此豈肯為汝南郡從事持私書致邑令者哉宜其痛遭峻拒也觀大節者於細事他日爭楚獄於人主盛怒之時折竇憲於朋黨怙權之日毅然不少屈真可畏而仰也陵陽牟巘袁氏四世五公迹其貴富烜赫豈淺鮮哉千載之下使人倣佛圖寫思見其人者乃在卧雪時耳姚式書余為通甫作此圖正以通甫好修之士使之景慕其髙節耳然余自謂頗盡其能事此難與不知者道也明年四月七日重題子昂閭巷風雪中僵卧何限洛陽令政為一士來爾乃其所辟舉類如此而史失令名亦可惜舊圖雪中有芭蕉葉子昂更畫之凜凛通甫闕谷陽龔璛題僵卧空齋儘耐寒門前行路雪漫漫投炎附熱非吾事一任人將冷眼看門巷蕭條雪已深空齋居闕泥重衾就令僵死亦間事可見世間君子心聊城周馳隂風響枯梢凍雪埋老屋深徑斷行蹤除道乏僮僕閉門事髙枕政爾清寐熟誰與排户入停馬駐車軸聞知是令君冷語無欵曲卿去我欲眠母煩賁空谷升車首重回願餉不敢瀆移書舉孝亷庶以激頽俗後來立朝端諤諤爭楚獄方其髙卧時何意萬鍾祿令君非素交此舉真具目范史良包羞姓名忘紀録邵公有裔孫眉宇清可掬苕仙贈此圖筆駛髙自足老氣近古作冷光淡朝旭當以淨眼觀那許汙手觸平生氷雪心居玩亦三沐嘉興蔡景傳此圖天真爛漫無一豪筆墨畦徑寒氣凛凛逼人疑此身與令相後先於邵公門術也孔子曰人有不為也而後可以有為公為漢名臣立於朝自天子至大臣皆倚賴之方僵卧時蓋有所不為耳東萊吕克勤在昔洛陽雪深丈餘士也髙卧來令尹車今年吳淞雪復何如積素一色鷗鷺有無之子江皋修亭是居有琴有書有酒有魚賞靜獨眺聊以自娛挹兹清風廩廪起豫此景此圖再卷再舒通川錢重鼎洛陽雪深凍闌干髙士僵卧飢袁安忍貧束腹一榻寒不忍持鉢鄰里干令君曉鞭望門看賢哉此公此操難誰能為口須片肝五公四世清節完吳興松雪峻筆端束縑粉白浩漫漫儼若古意幅面攤好事把玩應長歎人間飽飯炊邯鄲功名回首作霏殘何如小忍聊盤桓門前嵩少青巑岏唐人得髙士袁安卧雪圖宋真宗出諸內府以餞相國丁謂之守升州其被召也留之賞心亭而去後有饞太守者竊而易之莫知流落何許尤物之可嗟惜如此松雪作此幅極有思致非能烹陶家凍茗者安能味之此可與識者道海粟天下豈遽有餓死之士哉士縱不餓死亦死况餓不死耶不宜干人豈特雪中但干人則愧且死矣邵公之所以致洛令來者政在平日不在雪中也子昂以通甫好修為畫閉門卧雪時事通甫沒後數年其子仲長持以示僕時秋暑猶熾展卷寒氣襲人體粟嗚呼好修如通甫者何可多得其子種學績文有操尚克世其家此卷筆意超詣不減古人子昂亦自謂盡其能事仲長宜善藏之郭麟孫東郭先生履下穿更圖卧雪詠袁安就令餓死亦細事門外春泥何日乾璛再題吾十數年前作此圖今日觀之便如一夢通甫沒又已七八年闕使人悵然耳子昂門外雪深泥沒膝幽人懷抱自春風可憐令尹無髙致乘興何須見此公文原向吾友姚子敬持是圖索題回首十六年通甫子敬皆為古人展卷為之歎息子俊曉看嵩少玉嶙峋枉駕應憐處士貧令尹若能為保障長衾盡覆洛陽人牆東老叟陸文圭巷深雪沒脛髙卧不知寒誰計千載下流傳入畫看黃山老樵僵卧雪塞户汝南袁邵公冠蓋洛陽令掃雪見髙風冷竈不生煙虛甑久塵蒙投謁非吾事舍君其誰從東海倪瓉雪中閉戶將何所求令之造之固無加損於公亦無加損於令也而遂相傳以為美事時之可尚耳又惜令亡名亦不煩惜也使公與令聞豫言當相顧一笑既畫之八十四年淡如王行題於翠巖而下十有六人之後此卷於袁氏屢見之今歸陳孟敷矣右東漢袁司徒卧雪圖故元趙文敏公之筆勾吳陳孟敷所藏也文敏公於此卷凡三題識而繼之者有若前代遺老陵陽牟先生兩龔先生暨聊城周公巴西鄧公皆儒林五璧去今才半百年咸修文地下不復可見矣昔之君子一時登覽遊詠之適其遺迹之所存往往傳以不朽若司徒卧雪事亦無足深論至於圖而傳之者豈不以其人哉蓋其立朝之大節忠讜弗阿而羣憸讋服海內仰其清德與漢祚相為終始所以後世圖而傳之者良以此也苟其人之大節無足稱者則閉門髙卧不宜干人之語曾何足深論哉兹圖乃文敏公為嘉春作而嘉春物故已久而今為孟敷所得東海倪雲林介休王淡如漫題於後尚其寶蓄之洪武二十三年十月草有三日河南後學髙遜志書於姑蘇之山塘公嘗冬時負日陽稱快哉大雪中不干人飢寒不以纍其心是亦一快哉也公之固所守向火乞兒趨走無寒暑誠何物耶子邵子詩半夜風寒當門獨立公真其人矣洛陽令薦之有識者乎令以民苦雪親巡問之牧民君子矣醉釀飽鮮其下斃至於凍餓之鄉氷雪之傷恬不思問及又誠何物耶趙松雪寫公卧雪使後世若目覩其事為士子觀之能不思固守可僕僕以干人乎居民上者觀之能不思賢者有飢餓於吾土地乎陳某愛此卷而購藏之不與他卷同是其重名筆而仰髙風思固守而凛凜於其躬某其有之乎長樂王濵此卷今為南京金元玉所藏甲辰正月草八日雪晴元玉邀豫登樓觀此復出紙俾録歸元玉蓋知豫之所好也性甫志水村圖大德六年十一月望日為錢德鈞作子昂後一月德鈞持此圖見示則已裝成軸矣一時信手塗抹乃過辱珍重如此極令人慙愧子昂題詩向來寓意思卜居住處只今成畫圖胸中本自渺江海主人相凂寫分湖鄧椿鷗鳥難渝舊約湖山不改清秋人自與波上下我其卒嵗優遊題前詩竟後得六言一首併書其後覺非叟鄧椿村南村北樹濛濛秋水清涵野色空道外俗塵飛不到似移家住畫圖中梅塘吳延夀踈柳平蕪落雁飛斷橋斜日釣船歸江天萬頃秋如畫一笑人間醉墨非顧天祥屋後青山門外溪踈踈蘆葦釣漁磯地緣清絶人堪愛長是三春鴈不歸男資深原義當年圖畫知何處如今身向滄洲住吾亦愛吾廬藝窗幾卷書青山天際小目送飛鴻杳試問釣魚船蘆花淺水邉菩薩蠻學子陸祖允青山橫陳水縈浦飢鴻髙超漁設罟中有幽人坐環堵晚風吹斷蘆花舞林宏桑梓未能忘楚甸吾書久已寄吳門悠悠江海風煙隔知是夕陽何處村于文傳坐窗不遨呻蠧竹兀兀那知髀生肉眼明見此水邉村浣我胸中塵百斛荒山寂歷蒼煙斜驚風颯颯鳴蒹葭平沙暮寒羣雁起垂楊掩映幽人家風流王孫摩詰手妙處端如神所授等間點綴皆精姸怪底秋光生户牖我家本住淞江濵恍然一見融心神他年卜築遂君志留取青山容散人松陵葉齊賢跋息齊居士舊嘗為德鈞作水村圖闕題云問君何許水邉村亦有扁舟乘興人無限好山茆屋外他年倘許我為鄰闕既還吳興復來見子昂此圖意象融會令人應接不暇又何暇詩非德鈞詎能領會耶姚式書於姑蘇寓館牛馬百川獨渚烏鳶羣木西村天地四方黃鵠先生秋雨柴門忽有滄浪鳴笛飛鴻黃葉雲深想望美人秋水卷簾隱几何心吳郡陸桂記豫遊淮水來吳會客於季道陸翰林之宇下近十年知其别墅在淞江之南分湖之東欲往來未能每思寬間寂寞之濱得與鱸鄉蟹舍鄰接庶城市委巷逼仄之懷有所托以紓焉季道悉豫志為卜築於其别墅之傍至則聚書其中以自怡悅屋前流水清徹鑒毛髮居人數汲以飲時有鷗鳥舞而下若相忘於江湖可取以玩也異時子昂趙集賢為作水村圖林樾蔭乎茆屋略彴橫乎荒灣秋風鴻雁夕陽網罟短棹延緣葦間不聞拏音掇其意趣圖寫於大德壬寅迄延祐甲寅十有四年景物處所宛然不異於今所居事固有不相期而相符若是然者季道泛舟往來吾廬手叢書一編筆床茶竈之風流故在明月之夜共載以遊撫清絶之區得詠歌之趣或能追皮陸清事可乎噫豫老矣方將卷書學釣容與於煙波之上而為之歌曰舟搖搖兮風嫋嫋兮波鱗鱗兮鷗翩翩兮扣舷漁歌兮孰知其他兮歌已遂書為水村隱居記延祐乙卯季夏望日通川錢重鼎詩四野漫漫水接天孤村林木似凝煙莫言此地無車馬自是髙人逺市廛扎拉伊埒特蒹葭蒼蒼白露為霜所謂伊人在水一方溯洄從之道阻且長溯遊從之宛在水中央蒹葭凄凄白露未晞所謂伊人在水之湄溯洄從之道阻且躋溯遊從之宛在水中坻蒹葭采采白露未巳所謂伊人在水之涘溯洄從之道阻且右溯遊從之宛在水中沚是詩三章賦蒹葭於露已霜想伊人於水一方欲往從之道阻長嘗三復之紫陽夫子以為不知其何所指偶閲水村圖其景物蕭瑟煙波浩蕩有人乘扁舟往來其間此圖此意殆與此詩若相符者故書於其後云延祐己未九月望日學子陸祖宣賦孤村何所厥土若浮宛然虛舟渺乎中流秋雲兮漠漠流水兮悠悠老雁兮肅肅折葦兮颼颼爾其罛罩懸乎夕陽茅屋枕乎灣崎略彴通乎往來林薄鬱乎蔽虧睇幽境兮寥閴隔凡塵兮喧卑我之懷矣一葦杭之忘鈎意釣與物委蛇鄙詹父兮施芒針哂任公兮垂巨緇固匪釣濕兮疑蝦蛭蓋將劈水兮看蛟螭滄浪兮舒嘯漣漪兮賦詩蒼茫兮獨立逸豫兮無期亦有岡巒峙兮嵳峩薜荔深兮婆娑縹眇兮雲霞映帶兮煙波玄真兮漁蓑幼輿兮山阿思夫人兮奈何悲豫生兮蹉跎孰若求吾性兮自得勝外景兮實多任動靜兮有獲希仁智兮靡他庶幾適此性之天兮惘然忘其為畫圖也大德七年六月一日束從大書詩錢子守道殊自適某水某丘藏袖中有時對客且舒卷坐我絶境煙波空參差老雁忽飛起微風欲拂蘆葦叢灣崎寂寥懸網罟夕陽隱約歸漁翁逺山近山雲漠漠前村後村水重重適從何來蕩兩槳闕崖浦溆遙相通深林蔽虧八九家竹籬茅户既不同青天白日機事息樂此耕飲得古風誰言見畫獨幻影我欲振衣即往從因思輞川著摩詰復想嵩山栖盧鴻只今好事空見畫山川緬邈悽遺蹤從大曖曖水邉村蕭條絶塵滓錢君智者徒而能後樂此平生丘壑情所尚政在是問誰為此圖吾兄固能爾趙孟籲題字子俊幽人心地本翛然此境相諳七十年茅屋數椽依約外雲山一抹有無邉眼前生意今林屋筆底秋風古輞川勝景有餘描不盡歸鴻幾點落寒煙聚山黃肖翁空林有影連山逺流水無聲帶雁寒自是漁樵真樂處不知圖畫與誰看東南仲長愛秦郎絶妙詞荒寒暗合輞川詩斜陽萬點寒雅處流水孤村又一竒羅志仁山色濃還淡孤村水繞之俗塵飛不到野老住偏宜崎岸疏疏柳茅簷短短籬小舟欹側過便是少陵詩陵陽牟巘茅舍竹籬山掩映蒹葭楊柳水縈紆漁人定指扁舟路歌客應尋隱者徒漢東孟淳吳中水為鄉人與鳬鷖處闕年黃梅少時雨農不田疇占洲渚鄉風用鉏不用犁築塍踏車兒女妻農家辛苦亦復樂髙低兩宜闕角自愛茅簷暖莫厭社酒濁闕賽神卜東作飯牛何必歌短褐尚可著十年種樹樹滿村明年養蠶蠶百箔延祐丙辰偶賦此十月七日訪湖天學士遂到水村先生寓居煙水蒼茫間適與所詠相似俾書龔璛寒煙漠漠鎖荒村日暮帆歸浦溆昏颯颯秋風鳴老樹涓涓流水繞柴門平沙雁起聲如􅌄斷岸罾懸影若翻要問先生得真趣玩圖默會復何言真定王鈞詞翰林妙寫溪村趣荷屋知何處溪翁想像住溪灣一笑如今家在畫圖間西風門掩蘆花溆聊與漁家伍人間不信有張翰剪取吳淞空向卷中看右調虞美人延祐丁巳中秋日德鈞擕此卷俾賦小詞為題湯彌昌依緑軒記季道為甫里賢子孫余久客其門束書相隨於分湖於其第宅東偏池上架屋亢爽扁曰依緑俾二三子於焉澄懷滌意詠詩讀書暇日倚闌俯瞰魚行鏡中無遁形天寒水落石嶄然離列其涯可坐而釣其流清徹滉漾非斷港絶潢居然有濠濮之想豫嘗獨立蒼茫欲窮水脈之所自來苐見短篷拂蘆葦叢往來煙波之上若鳬鷖然悠悠乎不知其所之中秋雨歇夕陽依依季道謂豫曰此距分湖數里子能共載以遊否遂呼輕舟泛中流雲破月出水月上下輝燭照徹肝膽徘徊者久之東望檇李渺然有無間分湖水之半舒舒焉西南向趨第宅之旁不為湖所吞而資其所潤故其積停者得以為沼為沚演迤於闌檻之下而不去岐而東西以逝者其為澤抑為川乎所謂觀水有術必觀其瀾者非耶二三子睇流動而得其固有之智詠淪漪而得其自然之文因盈科而進悟成章而達未必不為藏修遊息之一助豈特某水某丘童子釣遊云乎哉余老學薄不工於文然紀其勝為季道言之曰子之言不虛其書為記延祐二年正月望日通川錢重鼎記詞楊柳絲絲兩岸風前村溪路逺小橋通人家依約水西東舟一葉移過荻花叢清景逈涵空好山青未了莫雲重是誰驚起幾征鴻天然去却在畫圖中小重山周合肥束從詩平生鷗鷺盟結此茅一把江湖散人傳著我無不可芳浦曹浚青山橫陳流水如玉蕭瑟寒蘆扶踈雲木匪耕伊漁熙然自足眷兹幽尚於誰之屋有隱君子好古耽書扁舟何人載酒來與豈無知者爰作是圖輞川之勝千載與俱孫桂每憐北苑風流逺筆底精神此日同春水孤村無限意題詩輸與杜陵翁吳郡錢良右鴈行低拂水光寒茅屋遙憐野趣寬自是一經摩詰手披圖真作輞川看東淮俞日華幾疊山連松竹一行鴈起汀沙看他水村茅屋誰問處士誰家從虎題古木蕭踈蔽草廬好山重疊水縈紆先生自得漁樵趣無限秋光入畫圖建安黃介翁又詞染秋雲圖澤國野趣入遊戲能事何須五日畫一水重重楊柳陂塘茅茨籬落蓴鄉外西風漁市晚煙霽恰有客泛扁舟延緣度踈葦欲訪幽居宛在碧溪尾浩然目送飛鴻醉歌欸乃溪光裏亂山橫翠祝英臺近彌昌湯又詩澤國漁無定秋霜栁不凋幽人意晼晚此日畫蕭條髙沙龔璛有宅一區兮水之鄉前可漁兮後可耕絶思慮之憧憧兮魚蝦集而鳬雁翔伊昔寄之圖寫兮猶倣像而賦髙唐暨嵗晏遂初服兮遇夫人之慨慷維安宅之攸居兮何羡乎堂皇爰不耕而不穫兮維道之昌我還湖山以騁望兮懷若人兮不可忘眉夀兮未艾維水兮泱泱讀水村隱居記輒歌以樂其後吳興姚式子敬跋德鈞先生家於中吳久而同客於甫里陸氏之門後十四年先生始遂隱居之志適與家叔子昂所畫水村圗相符既與為之賦又復記之僕三讀其文慨甚且有卜鄰之興遂擬賦之以寫先生之懷併致景仰之意云吳興趙由俊識字仲時賦惟具區之大澤兮流𣲖於分湖滉漾演迤以東注兮渺天水之涵虛平疇鱗次以壤接兮但見雲煙竹樹之村墟雞鳴犬吠之相聞兮夕陽照景於桑榆􅑀舟楫以出入兮匪車馬之通衢鷗鷺狎而忘機兮鷹鸇免乎叢驅鳳髙岡而難附兮惟樂郊之可圖慨先生之夙志兮適繪事之相符既卜築於水涯兮軼埃壒之㕓居諒遺情於軒冕兮羌無毁而無譽矧觀逺以為主兮契金石而弗渝從子弟以摳趨兮視詩書之範模遵皮陸之髙軌兮時吟咏以相娛嵗既晏而躊躇兮動西風之蓴鱸含狼山之歷歷兮遡淮水之舒舒悵兩鄉之明月兮託親舊於音書廓達人之大觀兮八荒在乎庭除嘆人生之如寄兮意天地於逆旅苟豫情之瀟灑兮又何必懷乎故土幸締交以忘年兮得相過於雞黍聞咳唾之緒餘兮啓茅塞之心宇羡將濯纓於清泚兮從先生而結廬延祐四年十月二十有六日小姪以道將會試於京師來告逺别因見圖後水村隱居記謹賦小詩以道字子原過京口北來朋友不如鴻幾箇西飛幾箇東多少登臨舊樓觀闌干間在夕陽中過信州二千里地佳山水無數海棠栽路傍風送落花攙馬過春光更比路人忙弋陽雷聲驅雨轉山西山腹雲根已漸䨑日暮牧兒歸不得料應白水漲前溪拍洪樓仰有嵐光俯有溪軒窗初不計東西雲峰雨岫安排定松竹林林自整齊古寺山腰澗曲繚短垣百怪老樹龍蛇蜿山翁有時抱琴至雪霽月明開北軒滿目雲山樓溪頭白鷺來相安溪上紅桃雨打殘滿目雲山為誰好一川晴色上樓看曲澗泉古木隂中生白煙忽從石上見流泉間隨委曲尋源去直到人家竹塢邉大德八年夏五還自江西過虎丘舟中子敬携此卷見示俗客以惡酒相撓清况搆詩不成遂書途中所作少答雅意房山髙克恭芳草孤舟渡幽居一徑通江湖春雨外墟里暮煙中機息鷗先下花飛水自東臨流無限意畫史若為工巴西鄧文原馬足黃塵三尺深清風吹斷自難侵乾坤老矣驚浮世泉木蕭然動隱心鷗鳥起沙春漠漠漁舟繫栁晝隂隂他年無限幽栖處莫似仙源無路尋甫里陸行直澤國淨秋色逺山橫夕煙水田羣雁起蘆渚一罾懸林樹幾間屋君家若箇邉扁舟何日去相伴白鷗眠郭麟孫一片寬間景波涵萬頃天雁飛秋影外樹倚夕陽邉山色來窗牖溪聲與管弦何當明月夜著我釣魚船陸祖凱流水孤村深處茂林修竹誰家知是幽人小隱於焉讀書五車束巽之字申義流水縈紆别浦孤村掩映前山開卷不知何處髙人隱逸其間趙駿聲遊塵飛不到柴關名利無心夢亦間時有扁舟乘興客髙談終日對青山不入山林不入城孤舟容我寄浮生年來與世殊相逺漸喜無人識姓名青巖趙由祚矮窗曲几茶破睡雲水煙村溉元氣政闕側耳圗畫外冥鴻聲中古今意林寬清溪抱村流茒屋蔭踈柳天秋鴈行逺山翠當户牖罷釣者誰子延緣古渡口野情固超逸圖畫傳不朽何當從之遊扁舟落吾手趙由雋煙中山色濃還淡栁外溪流直又斜借問孤村錢處士不知鄰壁是誰家束復之字仁父誰識漁樵興趣闌由來家計在江干羡君圖畫能殊勝愧我田園卒未安浩蕩闌雲低樹影蕭條破屋蔽天寒秋深夜色猶堪愛寫取嬋娟浸石灘趙承孫一水復一村開卷不忍罷前有無聲詩後有有聲畫束同之青山迷逺近蕭條古郊墟側徑深且窈中有幽人居短籬一半掩竹樹相扶踈平疇涵白波淺渚漲緑蕪何人泛扁舟似與相招呼誰令破幽寂驚鴻起寒蘆此意胡可言會心寫成圖撫卷空歎賞悠悠水雲孤陸繼善家住吳淞江水西短垣矮屋緑隂齊朝雲硯濕知山近暮雨舟平覺岸低騎犢看書間自遣得魚沽酒醉相攜從遊尚記髫年日白首闕邉載舊題承學朱梓瑞水村先生家寓吳文章翰墨悉範模平時雅趣何處無寄名播逺聊爾娛子昂濡筆成是圖心與神會美且都山溪遼繞秋色敷籬落荆榛塵迹虛我來拭目聲嗚呼惜哉人物不兩俱僣言子孫思勤劬傳業繼老萬代儒至正七年丁亥二月草日實之兄出示先大夫水村圖思之不覺慷慨漫書於卷末徐關日軒此卷二十年前於劉完菴舟中一見倣佛間不能記憶近於沈維時處借得鈔本為録於此維時又得於徐克成者乙巳二月一日琴川舟還相城舟中復記墨癡道人附傳墨癡者埭里人也姓顧字渚山以嗜墨故别字墨癡道人云道人髫嵗即貪與子墨卿周旋傳斯喜鉢古叉漏痕以自娛爨無炊晏如也好蓄法書及古圖史雖貧不能致床上雅多斷碣殘碑蟲緗蠧竹喜作清課每晨起拂几洗硯理茶鐺溫博山罏禮古佛畢即從事於子墨螺者丸者笏者大都李邵舊藏也以三十種為量而各品目之日試其一序而進月而編如初蓋墨一嵗得十二磨焉墨不敝而道人之手日以適道人之目日以怡矣潑墨竟或應人者求或漫庋之即從破甕取松子桑枝自扇小鼎為秀碧湯煮名􅔩一甌把玩徐啜蓋道人酷有茶韻其貯焙欣賞往往有法故自名渚而字渚山以顧渚山産佳茶亦古人慕藺意耳而因以墨癡自贈其癡殆未可量乎吕氏子傳曰余嘗訪墨癡於雨窗煙屋中欲叩其所以為癡者經户寂若披其帷見其悠然於隱囊間石葉輕上不律柔和春膏潤滑墨瀋淋漓側頭細看欣欣若挹良朋此固道人所以得癡者耶意其踈淡暗古之致足相晤對與余聞古人看茶啜墨為好事者嘉話每嘆裹頭奴不善享受乃今而得之道人幽情雅韻有足多者蘇氏子有言茶欲白墨欲黑道人婆娑夷猶於白白黑黑之間而絶不問户以外其癡真未可量也辛未會魁非菴一經撰詩嗜墨髙人隱埭川結茅禮佛自逃禪常煎蟹眼茶神活更灑龍香草聖顛行世詞章皆潤玉贈人丘壑帶蒼煙多君正接長康脈又有癡名到處傳壬戌狀元文震孟字文起曾傳君似虎頭癡老樹攢軒引北陲石榻坐禪雲習定竹階尋句鶴調飢意成潑墨驚人覺夢起烹茶有婢知一曲寒溪能避世揚舲幾欲曉煙移辛未榜眼吳偉業字駿公跋渚山有墨癖復好茶余嘗耳其名邇得邂逅之其人超然不染住世出世者歟文從簡字彥可歌生不願逐竒贏衣短裾將頓侔圭闕又不願僂而前脅而趄侯門彈鋏歎無魚惟願渚山之下長結廬月團佳品手自儲日拾松枝候蟹眼煎沸有法誰我如松煙忽起拂窗牖滿壁清芬素濤走雪甌再引睨白雪颯颯輕颸襲兩肘鴻漸真吾師盧同亦吾友振衣一嘯山日斜散髮髙歌鹿麋耦乃知道人襟懷頗自竒不能囁嚅俯仰屠沽兒延年其狂不可幾長康癡黠各半之一丘一壑堪樂飢人世寵辱忽如遺七碗聊當闕飲五侯鯖味吾弗知道人好茶兼好墨手藏名種三十璧日試一種月一易墨花遙映青天碧古來至人多若此道人遊戲亦爾爾我欲一贈坡翁語子不磨墨墨磨子珊瑚木難卷二
