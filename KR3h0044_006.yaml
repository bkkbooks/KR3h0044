body:
  text: 珊瑚木難卷六明朱存理編陶主敬詩有辭達類稿四皓奕圖安劉事畢返林丘當局機心老不休松下樵夫應暗笑先輸一著與留侯袁安卧雪洛陽風雪未開門空屋僵眠懶謁人獨向歲寒持節操始知君子不憂貧贈趙道昭十五載前曽識君壯哉詞氣凌青雲十五載後復相見頓訝中年鬚髮變人生嘉會苦不多江海茫茫奈别何清宵懷人耿豫獨目送寒月飛銀河東風放棹姑溪上乘馬敲門一相向竒言縷縷驚坐人包括周天衆星象知音者希誰與論倦持寶瑟立齊門幾見杏桃紅雨亂歲寒梅雪又黃昏天借片時談笑共追憶從前恍如夢雁聲落枕信登途馳騎衝曉霜花重吾别山中不記年為我詩句常流連一朝當路有知者相見恨晚毋歸田題栁如菴小影如菴視醫妙天下後來安有如翁者我恨生晚不識翁形神已托丹青寫眸瞳雙炯雪髯髮豐頷童顔意瀟灑丹臺玉室本仙流藥聖驚人自天假宛陵翁是人中龍相見情懷即傾㵼家藏醫書千種餘竒論名方歸取舍硝黃用少參苓多指點孫晜聞見寡烏紗籠髮青霜衣何心朝服金犀銙蹇驢緩策引新駒何心雲路如龍馬舉頭自有天為汝富貴於吾猶土苴一笻一笠相隨處入眼溪山總幽雅僕夫喜色望歸途落日池濱煙藥瓦六丁下取可用方造化茫茫如吾把三彭𠞰除清不寐霜杵聲中剔紅灺丹砂煉養艷金花玉露精英把瓊斚髙情追逐羲皇人豈特餘功及尻踝還君此圖三歎息兩袖天風颯秋野雙清樓記崑山茜涇廣孝寺之東偏曰雙清樓者寺僧元璋之所居也元璋清偉疏爽喜與當世之賢大夫士相往來故賢大夫士之至茜涇者必聞元璋且知其有是樓之美常先往見焉元璋欣然導之登樓雖日接數十客不倦也且樓之中几案明潔床榻靜好凡可以娛情釋意之物莫不畢具客或能吟詩鼓琴飲酒奕棋投壺唯其所嗜故客至必盡日而後去然客非其人欲入輒大恚曰彼欲穢吾樓耶亟遣譍門之童出止之曰客何為者吾樓主人蚤且出暮未知其能來歸也客無用入可也故獲登元璋之樓者無凡客也元璋因署其樓曰雙清蓋取杜甫心迹雙清之辭且求豫文記之世有居山林水石之間而其迹清矣然外物之來無以禦之日膠擾其中一食之頃雖欲蕩滌其思意之煩不可得已其或處心虛靜而能遺去外物然其寓迹鄽市出入於溷濁猥辱之中日與鄉人相爾汝若蒙汚被垢而不溉濯也是皆內外不能兼有其清者也余嘗竊愧逰乎方之外者天下之物既不得以塵染其心其孤潔之迹又足以傲世而簡俗而兼有其清焉吾亦老矣將歸築室於某水某丘之傍以求吾志苟或得之殆亦無愧於元璋也至正十四年龍集甲午三月望日永嘉鄭東造雙清樓記者永嘉鄭君季明所作也先生有志於時未遂而卒故暮年文辭字畫恢恢然有古人形貌非一言一字剽襲求似者也其弟子嚴寅識其為先生絶筆也請豫識其後豫因歎曰昔昌黎韓子謂栁子死窮弗用於世也使子厚得志於一時其文章必不能力致必傳於後彼此得失必有能辨之者吾於先生亦然時至正戊戌中秋日郭翼書於海曙樓糟丘生傳毗陵有男子年踰弱冠神爽性夷家闤闠間喜從士輩遊少善飲一飲可數斗弗酗鄉人之羣飲者每競酌之則酡焉少頃復飲如初人因其有是量嘗呼為糟丘生生不怪久之呼益熟至不以姓字生亦樂居是號而弗辭余始莫之識歲壬申例選四方善筆翰者書誥命與生五十許輩偕集京驛每聞呼糟丘輒駭及與接待但見其酬酢痛快不少變顔色由是知其號不虛得未幾生以其實告請傳顛末余謂生春秋日富宜有以自律奚以湛樂弛荒之意留滯心神酒雖古為饗祀養老而設然儀狄以是而見疏於禹故易戒濡首詩歌初筵禮則有一獻百拜而德將無醉與夫不及亂之訓莫非古人諄諄為後世防也以此為防人猶有屢舞號呶以為極者袒裼裸裎以為達者粉黛絲竹以為樂者矧糟丘以自命邪生曰子之言固然矣惜徒知以醉為醉未知不醉之醉若羲和之沈湎紂之池林公孫朝之積麴成封鄭伯有之窟室以至罵坐獲罪吐汚車茵是皆以醉為醉也若頌酒德記醉翁與自託醉士酒民是皆不醉之醉也糟丘生雖無所抱負而不欲自託於酒然亦豈能自肆於禮法之外而踵末流之弊耶况以醉為醉則言不文貌不敦行或惰氣或昏匪糟丘之可倫以不醉為醉則道之存趣之真性常醇貌常溫斯糟丘之同羣豫聞生之言而歎曰吁世之人無髙卑貴賤靡不以酣縱而覆轍者生庶其免乎豫因述其言為傳以醒其不醉之醉庶不至多謬誤而求恕於人也生鮑其姓賁其名思文其字云洪武草七年春蘇人盧充賴書東坡先生笠屐圖東坡道人儋耳謫田畯往往分坐席孰黎子雲久莫逆天晴散步為爾出忽然中路逢沾浥竹雞湑湑揮灑疾河橋冠蓋無處覔瘴屩何異廊廟舄老翁家具姑副急篛頂齒躡亦妙劇飛鴻踏雪印蹤迹縑素摸索如昨日前赤壁後赤壁玉堂茒屋皆瞬息流行坎止隨所適海南海北共眠食天一笠地雙屐風不能飄雨不濕海粟翁碁漸消漸長雪成灣作陳寒鴉掠暮關幻思遲遲僧入定窮途落落客知還中原地濶人煙少西蜀城孤鳥道艱局上尋機猶未悟爛柯深處有仙山海粟翁貞燕記元貞二年雙燕巢於燕人栁湯佐之宅一夕家人以燈照瞰其雄驚墮貓食之雌倣徨悲鳴不已朝夕守巢哺諸雛成翼而去明年雌獨來復巢其處人視巢生二卵疑其更偶徐伺之則抱遺之殼爾自是春去秋來凡六稔觀者譁然目為貞燕云長沙馮子振記胡虛白詩春日即事草堂長日無車馬雨後空階長緑苔已見梅花當戶放更移萱草近忩栽引雛沙燕時髙下作伴江鷗自往來物色於人俱適意詩篇吟就為誰裁寄賈徴君三月三日雨晴初東望東岡無鯉魚杜陵愛酒自多債太傅治安還有書洛中牡丹少間地江上燕子識吾廬木蘭舟棹桃花水頗怪近來蹤迹踈東園春日檢點小園無别事清晨汲水自澆花薔薇碧引風前蔓芍藥紅抽雨後芽可是野情忘世故正緣春色屬詩家山僧野老時相遇分送菩提寺裏茶立春雨今朝占得正東風春在江南好雨中六琯氣從溫室候八方雲與泰山通調和草色相將緑沾灑花枝取次紅茒舍一瓢生菜酒自題春帖紀年豐九日和應先生韻白髮秋深莫浪悲有酒且醉髙陽池百年相知從古少一日不見令人思醉來仔細看茱佩興劇風流影柘枝洪範橋西浣花老得錢相覔肯教遲從郭先生韻南郭先生久不來草堂日日向南開笋已長成髙過竹花多狼藉半為苔渴心誰慰病司馬詩債先償麯秀才聞道放舟苕水上看山自倒白螺杯寄馬徴士金水河邊承詔日丹陽郭外買舟時還家已久無書問抱被尋常有夢知髙適平生孟諸野杜陵人日草堂詩尊中且漉黃花酒莫遣秋霜上鬢絲和張伯雨韻寄雲林子昔聞公孫渾脫舞今見書法有張顛君能髙歌白雪調我欲笑拍洪崖肩玉笙皓鶴久無信青芻束帛真可憐洞庭春水碧於酒細雨緑蓑須放船題雲林畫往年曽訪天隨子煙樹微茫過太湖雪色寒驢臨水闕翠毛青鳥隔林呼只今圖畫渾相似如此家山住得無皎皎白駒空谷裏令人搔首憶潛夫凌雲翰詩次俞豫中病起韻桐江清隱客頭白太平時每唱紫芝曲間臨碧落碑無愁何用解小病不須醫恐有登髙興先期報我知秋日懷兄弟秋至轉相憶蕭蕭木落初如何去鄉國不見有音書漂泊全無定存亡半是虛風塵幾時靖還似昔同居相别幾多時相思泪滿衣家貧經難久世亂得書稀作吏謀全拙從軍事亦非鄉心秋雁塞盡日向南飛陳文東詩懷何孝亷絶憐何有道老節獨居貧孝義今誰及交情久更真清齋將十載小隱欲終身别後音書斷相思入夢頻藥闌循闌復南折曲闌花藥新幽徑落紅入恍疑桃源春芙蓉池朱華斂初夕微風㺯清波木末搴芳去雨晴秋思多梧井人靜喧鳥散露井寒梧滴童子汲清泉為洗蒼苔色題梅屋漠漠梨雪深思將花共發緬想山居人無言對寒月題彥臯蓴軒芙蓉花冷煙迷離鯉魚風生紫蓴渚軒前秋容浩無主江人倚楫煙中語纎莖採香光漉漉氷絲齊穿水晶緑蓴有羮菰有米綵衣奉夀阿母喜平生宦情一杯水仲容持紙求書舊詩勉為援筆寫答耳陳文東十月八日書題張德常草堂二首屋下清泉屋上山獨餘猿鶴共髙間仙家只在松蘿外海月常懸水竹間社甕今朝村釀熟鄰翁何處棹歌還華陽真逸時相覔聞道岩扉夜不關髙人自愛山居好繞舍清溪帶雪沙浮玉峯前常作客勾金壇下即為家仙人未採芝如草令尹將歸菊有花他日良常分半席白頭同汝老煙霞成庭圭忠奴李善歌古有富者家暴亡衆奴同謀殺其孤一奴匿之負以走財實纍汝兒何辜孲􅯥雖是奴主簿書不敢欺毫銖哺之朝夕乳湩流不忍去手起􅈱呱置兒牀上拜床下奴以死奉甘勞劬天聽不逺事竟白天子有命行賞誅一奴寵榮衆奴戮卻從主人歸故廬雙乘青驄御史馬猶執舊禮謙若虛寄語悠悠天下士未可容易輕人奴黃玠胡古愚為僕袁普作傳王師魯賦詩用事甚博輒托其遺為詩和之世族之降為皂𨽻人世升沈自常事句章袁普本故家淪落來依太史氏太史典教羽林屯普也服役顓辛勤頗似顔家得銀鹿又如王氏使青猿子淵立約真可笑彼若輸心不相拗結車已肯送窮鬼下狀仍堪論惡少太丘無僕不自聊何時定把漁配樵更尋阿對灌蔬圃未暇殖貨師齊刁胡公掉筆嘲孤客客笑胡公未為得長卿才思應過人挑得文君併僮百卻憐待制王先生只歌袁普之灤京平生我識越石父解驂遲汝相將行陳旅顧梅山詩秋夜宿僧房白雲分半榻正在澗聲邊一夜山中宿三生石上緣孤猿推枕聽明月近窗眠不覺天將曉疏鐘度暝煙嚴月澗同飲湖邊斗酒復斗酒髙歌山水邊世間無此樂我輩即神仙狂發花前笑醉來松下眠行人相偶語堪作畫圖傳風雨樓湖上晴看好雨中猶更竒無窮憑檻趣正是卷簾時鷗鷺飛相失山林晚不知煙雲多變態難畫亦難詩題山居圖展卷擬曽到柴門非一灣抱琴隨白鶴坐石看青山隱者有餘樂貴人無此間更須添數筆著我在其間早秋湖上藕花香裏去獨坐自尋詩秋意在何處夕陽將下時鳥幽忘立久山好覺行遲餘興忽然動橋邊有酒旗偶成達者由來好機心肯暫停幾家才富貴中道又凋零白髮人間寶黃金水上萍無錢陶靖節醉眼不曽醒厲杭雲袖詩見訪此心無所著間散似神仙每日三餐飯誰家一熟田健吟輸少俊起思憶衰年安得同攜手倘徉泉石邊雪中同鄭所南訪趙溪梅所南菊山之子移宅雖然逺攜笻到兩回只知相别去不道又重來溪鯽和氷煮鄰醅帶雪開詩家堪入畫滿眼玉樓臺和文本公先生贈許端甫世上無難事難中獨有詩看來都説易吟到苦方知潭影三年句蟬聲一字師古人如此癖刻燭未為竒秋晚與許端甫山行山行多妙處妙在倚笻中到此興難盡吟成詩不同松濤鳴絶壑葉雨下晴空鐘鼓雲邊寺應知有路通祭平望八尺土地河伯神驅蚊文惟神杳冥無聲無形而能以天地之命而為水土之主者為其有靈故雖嗜不以口聽不以耳而能納吾之味聞吾之音獨不可以鑒吾之誠自嘉禾而東其地曰平望蘇臺而西其地曰八尺水草穢腐蓄瀦不泄蚊之所舍三十餘里不待日出而髙飛其勢如煙其聲如雷豈無居民之所聚舟車之所通而俾夫穢腐之所化而得肆害於人者水土之神寧無愧邪吾聞二氣既分形質既備載則不幬幬則不載兩形之間聖人之所治於是分水土命百官以使之司而職焉由古而下未或不然猶以為未也其上則求之天地其下則求之水土之神民有所不治則天子公卿之所憂求其所不應則社稷神靈之所羞蚊之為蚊生乎穢藂藏乎積草穢者決焉積者疏焉彼則滅矣奈何不然徒使乎來者往者過此而未嘗無言則郡守縣令已可以知其為不賢而水土之神又安可以忽吾之所宣天生斯民獨為萬物之靈載之以形勞之以生謂之勞矣則豈特求免夫噆膚之蚊然旦晝而伏夜而出則人尚何怨而所可怪者以其無辨於朝夕是則既暮而出為蚊之常今至於凌日而飛矣豈隂也而可以先陽吾願一言之出契乎杳冥剪絶此類使無更生則四海之內天地之間孰不知神之有靈陳了齋顔真卿登平望橋下作登樓試長望望極與天平際海蒹葭色終朝鳬雁聲近山猶一作全髣佛逺水忽微明更覽諸公作知髙題柱名鄭君舉詩十一首君舉名洪永嘉人題仙山樓觀圖琅玕珠樹隔煙霄仙子樓居積翠遙羽化夢慿玄鶴返丹成身與白雲飄杖隨麋鹿山深淺釣掣鯨魚海動搖想像虛無圖畫裏秦皇漢武若為招酬錢伯行見寄近聞移宅傍江村緑水平階竹影門書館晝間玄鳥入墨池春淨白鵝翻要鳴珂玉驚鄉里肯積籯金遺子孫詩比牟尼吾豈敢看君三峽倒詞源酬張孔昭簡劉原善爾祖留侯天下士曽為漢家王者師昔聞孺子已可教今見逺孫仍解詩沙邊躍馬海色淨竹裏讀書江月移近來詩興又幾首應是落花春雨時題已上人墨梅故園梅樹三年别長憶看花溪雪晴巧出疏籬便蕭散近遭碧水更分明揚州何遜足詩興茅屋已公無俗情畫圖忽見轉愁絶遙想月華枝上生章菊存水心亭水精之宫仙人居碧忩牙籖森古書波聲下應玉瑟響日影倒射湘簾虛浮丘得道可相鶴陶朱治生兼養魚客散定應攜二子一亭晚色看芙蕖嘉定嚴希德請賞梨花命妓者行酒歌詩為賦一首瀟灑東闌一樹春雪膚氷骨玉精神朝雲著處迷詩夢暮雨來時想玉人華屋洗粧歌小小銀瓶推枕喚真真紫薇閣下繁華處芍藥荼䕷總後塵題少陵騎驢圖蹇驢破帽杜陵翁落日千崖萬壑中若非蜀道依嚴武豈向西岐訪贊公題太白泛月圖月出俄看照錦袍船頭江色瀉葡萄載酒非關尋賀老騎魚似欲訪琴髙移梅不愁雪冷不走看只恐雪盡花飄殘急須鋤置野堂側映我柴門修竹寒幽致軒花落晴忩燕拂簷蕙芽蘭葉翠纎纎幽谷與雲通小徑清波四月映疏簾溪山小隱為僧竺源作雙劔洞前千畝山溪女羅帶幾回環井潭龍氣蒼茫外石室仙居縹眇間緑字有書成斷絶丹梯無路可躋攀塵緣已覺忘三宿色界空嘆見一斑海道扁舟何日買故人荔子笑公還張衡未就歸田賦萬里青天羡白鷴承寄佳章依韻奉和録似用賔學士賢契友改正尤荷默頓首白日來何短黃河去不還故人成契濶新貴絶躋攀髙蹈思丘壑幽居隔闠闤琴橫時再鼓門設且常關名逺金閨籍身間玉笋班藏修雖匪易仕進亦惟艱名實稱窮措囊空作老慳清朝甘蹭蹬彩服自斑斕訪舊逰溪上尋盟過泖灣别離今暫合笑語不須刪吟罷詩清思杯餘酒破顔問農將學圃攜妓且逰山力學誠希聖知言足訂頑頻年無箇事終日有餘間會見駒千里常窺豹一斑但當鑽故紙何用解連環蒲扇雖勤寫桑弧亦倦彎鏡中添雪髮席上愧雲鬟詩寄青山裏書來白水間何時覔漁網坐石共垂竿雨中成二詩奉呈思齋閫掾朗中執事程琚頓首閔君起南郡浩氣干層霄髙姿挺梧竹逸韻含風飈談河落珠玉灑灑遺紛囂簿書淨無塵寄興絲桐焦之人妙超卓欲見不可招去冬百草死凍雨何蕭蕭出門擬觴滿泥淖沾膝腰駸駸四牡駕王事資賢勞安得縶維之庶幾永今朝我行客金華栖栖厭窮獨馳驅恥干謁息偃甘局束端居寡儔伍紆結填心曲雨花散虛簷燈影動寒屋羇鴻送哀響欲斷凄更續長句四韻奉贄郡倅相公先生伏干郢削諸生張樞再拜銀章朱紱照瓊輈特命東吳最上遊綵筆判花分半虎鸞刀解節少全牛一官檇李風生葉午夜雲間月滿樓為報廬江毛孝子故人張奉在南洲奉和中秋玩月佳什三首録上虛白先生宗逺隱君用發一笑鮑恂再拜昔年為作幄宫客曽向宫中看玉輪萬丈光懸金粟樹三更影落絳河津生憎老兔深為窟却嘆仙娥不嫁人回首歸來舊塵世滿天風露一吟身數年不對中秋月月色依然不負秋懶問仙人臨玉樹且陪帝子上瓊樓斗牛低繞天根轉河漢斜橫左界流却望蓬萊宫闕逺幾隨清影重回頭浪洗今宵明月好干弋滿地幾人看惟堪院落清宵賞忍照沙場白骨寒綵筆寫殘思縳兔玉笙吹罷擬乘鸞知君此會非忘世只為良辰一笑難至正庚子歲中秋後五日在玩易齋寫寄賀玄月先生博士榮遷夀樂堂新居晚契生紫陽方回頓首拜蓬萊五色海雲邊夀樂新堂綵戲前院宇捲簾通燕賀園林把酒聽鶯遷貌如司馬溫公像耕有歐陽潁水田不用蒲輪到門外身心無事勝神仙沈右詩敬次叔方先生見示詩韻右頓首上城南陋巷居新僦緑竹移栽幾個斜藂桂山中招舊隱讀書堆裏認君家蜀人漫説文園賦吳市爭看乘鶴車斷簡味腴如啖蔗虎頭癡絶至今誇右顧仲贄移居詩步屧春風裏翛然忘世情間門無客到載酒泛江行雨過山如染潮回水自生鷗沙割千頃夢不到泉明右留笠澤别業詩次韻叔方先生五言律詩二首兼示伯行敬初發一笑右上憶昔陪二子吟嘯野亭中風急江花白霜晴木葉紅去留身若寄陶寫興無窮更喜陳夫子幽尋訝許同掩卷坐忘寐書燈耿獨明年華勞髮改夜氣與神清感夢慚蕉鹿排愁賴麯生何時重相見握手話真情叔方先生過詠歸亭賦詩二首以志盍簮之喜沈右上短棹相過莫便回詠歸亭上且低徊升堂拜母稱觴後躋陛呼童瀹茗來八尺畫屏分紫錦一雙蠟屐破蒼苔空江草木雖搖落猶有寒華帶雨開積雨空林喜報晴杖藜隨意傍江行天寒木落青山出日轉沙虛白鳥明漫擬東林時釀黍自憐南畝晚歸耕潁川高士能相過間把瑶琴膝上橫東林薄酒試新嘗中有松花膩粉香遣道潁川陳有道書齋渴飲勝茶湯尺牘草八字偕一壺薄酒奉寄上惜不多耳楊誠齋文藁不曽收得所謂芍藥屋疑只是用幄簾覆架者古人稱牡丹為木芍藥白居易有詩云上張幕幄庇豈亦本諸此未審是否更乞考正之右再行稟慎獨先生坐下右頓首拜啓十月望過吳江别業得所惠書者三光隂如過隙駒俯居江村况味寥落東流活活悵望送清晝耳比來計道體迪吉右萍梗之暇每懷相從聚首實迫以歲計未免以淹遲數日須至節前可歸相會有期已篆書千字文留此多日乞恕皋稽之罪嘗因親戚會宴為酒所困終日憒憒近者始覺神清尚欲借觀數日決不為寒具油所涴呵呵中酒雜詩五首中酒如卧病天寒露為霜東軒候朝旭暴背屢移牀江頭風浪急舟小力難勝一槳歸來晚長林月已恆太丘海岱士肆情丘壑間考槃詩賦罷采菊終南山歲閏寒猶薄風回水自生杖藜隨小步極目大江橫朋酒享公堂農家盡滌場縣官薄稅斂田野足農桑右拙詩僣易呈上並乞裁正兹因端便勒此是記不備右再行叔方教授先生留宿書齋二首有懷伯行性初二徵君兼呈樂志堂主人一笑植再拜蕭齋掩關坐清夜雨聲中春酒浮杯緑寒燈落花紅知君應傳癖老我漫詩窮共笑謀生拙好懷何日同屋脊留殘鳥空忩恍夜明畸人孤夢斷老鶴一聲清冗冗存吾道悠悠念此生相思隔煙水悵望渺豫情奉陪秦郎中母夫人八十夀筵歌登君堂拜君母坐君右酌君酒君冠切雲藻火綬刲腴割鮮會昆友霞觴共獻感斯夀兩行蛾睂小垂手鼓吏蹀躞盈軒牖清歌裊裊絲縈藕鳯蠟龍香團暖煙南極老人星在斗老人清健福如阜飲寒食生忘白首孤孽踈逺及奔走陽煦春育同親厚聖經賢傳儒淵藪座間雍容不去口妙年胎教君腹授所以巍科談笑取君言世運厄陽九甲第紛紛慢蒿莠湖田數頃宅一畝謝超宗兒孟光婦賣金養志恐少後尚欲外望家豐蔀嗟豫遭亂墓失守貧賤鬱鬱此居久伯符公瑾骨已朽丈夫意氣誰不有夜闌青鳥巢階栁凝步凌波動魚笱我歌跌宕君聽否出門大笑霜鐘吼逄前賦夀詞殊覺才有未盡後補此篇形容宴樂之盛然剩員呈武藝愈呈愈見可笑也或諸公丕振掇首四句而和其意如何招隱辭中茹字改作菹字幸甚雨晴尚圖一見瞻望伊邇臨楮不勝馳情長慶隂君會伯宣助教多問小兒丸藥乞再惠少許十九日逄再行虞山人勝伯陳山人惟實皆為鄉里邂逅共飲問及仙逰事欲共賦詩未果寫既去諒已醉矣酒醒遂和以答二賢初意此凡響也十八日介録掃除狡獪蓄神機開頂葫蘆不置扉人物已從垣外見真形漸向市中微丹成白鴿沖霄去劔化雙龍破浪歸自此更無毫髮憾緑毛繞體欲成衣獨據胡床醉不移坐深簷露滴髭睂蕭蕭風水成音樂淡淡星河起鷺鷥語罷欲乘黃鶴去興來嘗看白雲飛火龍炎熖茶將熟不折扶桑一氣炊羃羃松隂布網羅鶴巢松頂吸天河是何道士圍碁坐著箇樵夫對酒歌看月也知為爾好慿風無奈欲歸何道君直過橋西去還記垂楊葉不多小詩奉寄子微良友希是正曹元用頓首我在水之南子在水之北南北俱無百步逺經旬不得見顔色一水相濟猶如此况復分離在他國霜黃木葉秋漸聞哀鴻日夜催歸亟錦帆一旦挂清風後日相逄難再得海內豈無真英竒衰俗誰哀知音稀鴻鵠壯志在千里肯與燕雀同羣飛我今下榻待徐稚君其倒著蔡雍屣數相往來莫相厭直到陽關分手地書府所收李白集望付下覽畢輒還不阻為荷元用謹啓敏同以閥閲世家一鼂浮雲變滅此身如商寶尊彛僅存萬一於斯世耳因作寶彛一首奉寄須共默菴先生光和乃佳耳眯眼劫灰仁後堂却求甫里坦東床寶彛天使文章在鐡馬功髙譜系長力學要須成宅相善烹何止佐臺郎翩翩濁世佳公子毛羽依然是鳯凰老友鄭元祐兒子咸畫雁老人作江天仍作詩命咸書卷上朔方六月猶有雪江南十月水未結雁門一夜起秋風飛到江南未八月江南處處多稻粱景物何獨為瀟湘沙汀月暗漁火起警奴一夜空慌忙休言汝肉不登爼全身已被家兒取猶幸先生有愛心放汝長江得容與龔氏翠岩題自寫蘇黃像海風吹髮如短蓬精魄㺯成秃鬢翁歸來已覺陽羡鄰里隘不似雪堂概江空六年歲月幪尊中何况如今一螺墨安能及公目如初生犢細觀此畫尤崛竒兩顴巉岩無剩肉百年光景春夢婆人間遂少天上多一炷清香留永日奈此堂堂不語何譬如寶鼎淪泗上萬夫之力那能起後來博古彼誰子猶寫雄深吞簠簋不然豈徒有三足兩耳獨留天地中間泣神鬼人之龍文之虎人言海內四學士又云蘇門六君子洪崖肩髙萬丈餘談笑拍摩何軒渠當為誰作前者王當為誰作後者盧詩到聖時不讀書高處豈獨煮湯坐團蒲豈不迢迢百世下好事亦寫蘇黃圖又非中郎虎賁之自身又非叔敖身後之規模典刑摩詰劣少須一丈精神三尺素光芒射入數百步布袍便是山谷褐可能其中有菜肚龔開尺牘往豫見薑白石詩一卷有絶句作小草尤佳云道人野性如天馬欲擺青絲出帝間某愛此詩第恨其不通畫不能使無聲詩有聲畫相表見豫作前馬既又念此句此馬終無出路復成後紙去冬有瘦馬一匹寄天台僧在書記鶴臞亦以書來取畫久之未報今得此歸丈室如有數也天隨言凡物惟散者為得二馬得失何如白石不可作析而辨之其在鶴臞矣楚龔開家藏龔聖與人馬今歸白石翁記雪巘禇先生為士友戴祖禹畫馬謂得一翹舉者為佳因憶敖器之評曹孟德詩云如幽燕老將氣韻沈雄此語若施之畫馬尤為至當雖不翹舉亦可此藁一年前手定今以先生之言用酬來意又似不偶然也淮隂龔開詩老龔謫世房星精愛畫先皇照夜真霹靂一聲天上落鼎湖飛浪白如銀維禎開元四十九萬馬迅電追風莫可蹤不是畫師題品出誰知一匹是真龍李構八坊隊隊馬如雲曾向開元奉聖君今日飛龍仙駕逺千金駿骨世空聞秦約家藏錢舜舉畫卷不見西湖處士星儼然風月為誰明當時寂寞孤山下兩句詩成萬古名吳興錢選舜舉畫於習懶齋并題題和靖觀梅圖癡童臞鶴冷相隨笑指南枝傍小溪到處一般香影色孤山只在斷橋西仇逺高馬小兒圖華翰料非九分臕童子身長五尺饒青絲鞍短金勒緊春風去去人馬驍莫作尋常厮養看沙陀義兒皆如漢此兒此馬俱可憐馬方三齒人未冠天真爛漫好容儀楚楚衣裝無不宜豈比五陵少年輩胭脂坡下鬬輕肥四海風塵雖已息人才自小當愛惜如此小兒如此馬他日應從萬人敵老夫出無驢可騎乃有此馬騎此兒呼兒回頭為小駐停鞍聽我吟新詩兒不回頭馬行疾老夫對此空嘖嘖龔聖與題趙千里聚扇上寫山翠水丹山氣旁礴幾疊香痕經手握何年破鏡飛上天吳淞水剪并刀薄江南寶繪多遺餘王孫不歸恨蘼蕪蘼蕪消歇秋風起班姬為我歌烏烏伯雨次韻宋諸王孫妙盤礴萬里江山歸一握卷藏袖中舒在手清風徐來縠衣薄文采於今淪落餘雕闌玉砌凄煙蕪至寶不隨黃土化門上空啼頭白烏鄭元祐誰見解衣乍盤礴卷懷雲煙歸掌握春雨冥冥江水波竹間日暮衣裳薄零落王孫翰墨餘越王臺殿久荒蕪要知人好畫亦好愛此當年屋上烏倪瓉苧衣春暖初盤礴點綴溪山不盈握白雲隔浦見桃花坐久涼風起叢薄故物凋零百歲餘王孫有恨迷平蕪衡門今日看真迹始與人辨雌雄烏陳方題錢思復曲江草堂先生嘗中江浙鄉試時出浙江潮賦三千人中皆不知錢唐江為曲江獨先生用之蓋出自枚乘七發試官大稱賞遂號曲江居士搆堂於徐范兩村扁為曲江草堂浣花寂寞鍾山逺今見風流在曲江八十儀型今有幾三千詞賦總無雙屋頭秋老凌霜樹竹裏春間聽雨忩好向兩村尋舊隱月淪峯下澗飛瀧易恆題松陵王良輔逺趣樓樓傍有三髙祠雪灘三髙祠下髙人宅地壓江湖勝輞川二水蕩搖天逺近亂峯離合統中邉雪灘夜憶稽山路笠澤朝迎甫里船倚遍闌干吟不盡夕陽飛過落霜前易恆偕嵩上人逰虎丘寺出郭眺西郊言尋虎丘寺入門細路轉涉巘佳境萃靈風散熹微山光起迢遞同行集緇侣耽玩起神祕劔去池水空湛湛深莫縋荒哉闔閭墓似有靈物衛鐡鳯翔層空玉鳬閉深隧維時春雨聽落澗有哀思冥搜倚浮圖六合惟一氣鳥鳴臺殿髙日落山水麗逍遙淡忘返因之酬素志更期重來逰同向山中醉謝璚樹寄元鎮訪君祇院幽思生雲林蕭蕭遺世情蒼藤倚木條蔓古白榆在門枝幹橫仙人攜琴下夜榻使客留詩過春城山中此樂不可極顧我廓落久何成黃伯成題雲林筠石故山有錫知何日笠澤移家放棹時雨裏推篷寫筠石燒香何處獨題詩倪先生嘗辟地漁村人有追尋之者忽聞蘆葦中有異香遂為追者所得詩中故云易恆文成悼雲林先生先生素有歸老茒山之志而卒不遂末章故及之灑然遺世出風埃小劫人間一夢回畫筆獨傳成逸品詩名端不負清才老年故舊無多矣前輩風流安在哉未遂大茒歸隱計山靈應悉鶴空來前人題樹石小景繁霜如雪滿林飄玉樹琅玕日夜凋不見平泉佳子弟洛陽園宅草蕭蕭夢叟題畫竹雲林畫竹師蕭悅更愛燕人王淡逰為問梁溪千尺影何如老可在湖州潘瓠齋可傳集序老杜曰新詩句句盡堪傳作詩不可傳曽不愈轅下駒雖千章萬什徒妄廢人楮筆耳君子曰不作無損唐詩人凡百卅有餘家其詩見於今可與杜老相傳者寧幾人哉豫徒張憲嘗以筆削唐百草家請於豫豫於各集選其可傳而無愧於君子議者什不能一二黃山谷甥四人皆喜詩龜父者為最龜父詩所積凡二十餘首黃著為集其詩斤斤不百首谷因喜之以為句句可傳者在此吾錢門稱能詩者南北凡百餘人求其自憲及吳下袁華輩者不能十人華自二十歲後三十年所積亦無慮千有餘首而吾選之得如干首蓋又倍於龜父矣故命其集曰可傳好事者梓而行之求豫序故豫序之如此至正二十三年嵗次癸卯春閏會稽楊維禎序鄭明德賣夀器以贅壻玉山道人復贈一棺賦詩以謝邀豫次韻山人右臂枯且痛日耕硯田耘剡藤只今年已六十五感時念舊身凌兢文章海內鳴當日老病窮愁如蝟集子亡女長當贅壻無錢賣棺情豈恤江空木落西風髙短衣破屋驚搜牢相逄玉山泪流霰老我太平難再遭玉山重義急水火為製柟木棺若繭得纒裹便呼老僕荷􅓩隨醉死何妨即埋我君不見北邙山荒墳纍纍白草間積金何如種隂德黃鳥能遺三公環袁華龜巢老人辭龜巢於蓮夀千歲巢於蓍萬一千五百餘年龜非夀不能巢也毗陵謝君子蘭命其所居巢其言曰天地吾大巢也惟天地弗壞吾巢亦弗壞夫天地恃形而久然有形未有不壞者又曰世不我用吾生自全用不用全不全繫造物非龜所能為夫用不用在人全不全在我莊周謂寧生而曳尾則龜之所以自全也豈繫於造物而曰非龜所能哉子以巢為夀徴則相與逍遙乎有巢氏之上矣因繫之以辭辭曰維蓮有葉兮維蓍有叢孰靈而夀兮巢此幽宫吾巢天地兮吾巢與久天地終壞兮巢吾何有生而曳尾兮樂且全世不我用兮安吾天有巢世逺兮昌其旋歲千萬兮吾何後先吾將從子於巢兮終吾天年郭翼野老移家圖為謝子蘭題野老移家向何許乃在吳淞之甫里治生擬學陶朱公釣竿欲覔玄真子小兒讀書坐船頭大兒擊楫歌中流細君斫鱠婦炊黍老子醉卧蘆花秋人生真樂不易得兒女團圞居澤國避秦何必問桃源朝泛江南暮江北袁華題倪雲林山居圖地僻無轍迹知為靜者居山泉激石駛岩樹覆忩虛洗藥坐濯澗負苓行讀書兹丘儻可老吾欲樂耕鋤題雲林所寄陳彥亷春草軒圖彥亷有春草帖乃張旭所書彼美陳徵士幽居愜素心字臨張旭帖詩詠孟郊吟老圃秋花瘦間庭春草深寫圖并琢句持寄自雲林倪雲林同集雲林遁世士詩酒日陶情灑墨寫蟲篆放歌揮兕觥庭下幽花吐階前踈雨晴不愁江路永扶醉出重城題張外史登善精舍隂森水石林堂幽六月倣佛如三秋髙遁何慚孔車騎舊逰還憶董糟丘鶴臺夜禮紫虛象鳬舄朝回黃篾樓願乞引年餐玉法頡頏飛佩閬風頭寄雲林先生人日才過春未深滿城風雨晝隂隂又逄元夜傳柑爇恰似重陽泛菊吟字寫硬黃當几畔硯分淺碧到溪潯從他狂客時推罵笑對青山酒自斟雲林竹木圖初陽被原隰微風度簷楹修竹㺯晴色嘉木敷春榮隱君笠澤上觀物以怡情寫生寄毫素持贈重瑶瓊袁華題雲林畫梁鴻溪上草堂幽紅樹黃華幾度秋回首雲林人不見西風落日思悠悠曽日章題雲林竹蒼竹紛紛碧一梢雲林筆意在匏陶玉樓天上初成後誰向鵝池得鳯毛陸大本題畫托迹江湖五十年畫圖相見思依然先生不是知幾早那得清名與世傳吕志學又青山古樹淫滄江斜日裏不見野舟翁更憶雲林子消搖天地內此樂復何似安得長相逄清流為洗耳道衍雲林畫扇稜稜蒼石雨斑斑竹樹扶踈倚暮寒却憶玄丘菴裏夜一方秋影月中看朱應辰題畫山中舊宅去多年落日滄波理釣船白首歸來訪鄰里廢池喬木思凄然韓奕雲林應是别何年去泛東吳笠澤船仙骨已為遼海鶴只遺詞翰尚翛然曹恕笠澤東頭陸氏莊竹梧百畝晝隂涼憶居曽借莊中住長夏髙眠不下堂俞貞木雲林與介石書瓚啓經宿不面旦來想體力佳也此時早餉已久能同德機先生緩步過蝸牛廬中煮一杅日注茶觀陸探微髙岡茂林圖否德機先生處不别書也匆匆不具瓚以七月末得帶痰卧病兼旬幽憂無聊因賦詩以自解云耳瓚數月前辱執事及德常縣宰書教俾寫學門石記記文特古淡可愛鄭翁傑思也繆書不由講學點畫不能遒媚結體還更俗惡又頗工於小不工於大縣宰欲流傳於久逺宜屬之工於書人品異俗者乃於文稱耳繆書那能副髙意耶要是縣宰君自書一通甚佳也瓚非飾詞切告相體幸甚文及烏絲紙同此內上冀視入近承執事示問政卧病不能奉報此數日少差體中尤惙惙耳縣宰君賢郎以六月初嘗一過允同處一餉頃即去僕亦不得一見允同云寒熱疾作即去矣鶴翁先生夀容付允聞處令轉遞上八月餘矣瓚病乏力不可多作字草草先此具報數日間體中稍佳别奉縣宰君書也秋涼二公或可一來江渚否匆匆不具八月十三日瓚再拜瓚啓今日聞有失女之悲幸勿過悲哽一二日當一杯解悶也真人碑來曽寫否明日送紙却乃可下筆耳明月試縱步一出尤佳謹資啓不具瓚再拜瓚再拜新春伏惟履候多福欲往展賀村野畏人不出耳昨有數字與令嗣想曽過目畫匣倘要用當送去無用則已先公竹杖腳爐小巾倘有之希尋以見惠無則不煩也元度入城何日還還日為致意謹承候匆匆不具十一日瓚啓上與王子明瓚偶入城郭思所以承誨益擾厨傳兼之以寓館頮􅌨可謂溷擾不一而足自非故舊之誼何以得此於左右哉兩日不靣伏想台候多福坡書天際烏雲含雨重卷子能攜一觀僧房迂談半日政自不忘但不知執事不厭此迂濶清事否不可則已謹啓不具瓚經宿不面旦來想惟履候勝常心逺錬師之一二用物留允同處不幸折足倒地將欲棄之矣齋閣下有沈香求一兩許不必入藥用者如允同前大片之類劈取少許亦不妨不可則已不可求也小子物在手者隨以與人不較隨以所須不問錢價大小及不在手則無可奈何非若他人靳惜其微而不較其大也呵呵二十一日瓚再拜昨日承過我又得約齋翁共坐遂有終晷之清談足下論甚佳猶未的然於所取舍耳夜來二卷思之尚有一二字未是幸攜至改定并幽林思同祈借閲幽林思乃似重刻瘞鶴銘唐拓豈有是哉僕血氣雖衰未嘗貪得若而翁索人物也瓚再拜瓚奉别後從蘭陵東郭門外人家少憩三日待荆溪發行李來即歸田舍到家稍稍休影而州縣差科迫促騷然因歎那能復以憒憒從彼之榛榛乎便命扁舟入徙寓村落中調氣靜坐得以少抒其中磊磊者一日從一二林下人登靈巖山覽觀天池石壁之勝尋姑胥臺古迹若司馬子長蘇長公悲世憤俗不可一世之概後百世而不及見古人則求古迹觀之以自解惜不肖非其人回望太湖之西諸峯出沒指點數螺若芥舟泛泛杯水中當是銅官遺墨曰望吾季子君乃政著白雲滅沒處杜門著書降屈其心志不能以道表見於當世真為之泣下沾襟也閏月末暫還繫舟江渚南稍治夏衣將復至吳而過荆溪即時氣難測隂雨浸淫不審何似伏惟樂道間居履候多福瓚招愆納尤動與世忤豈非以自內致之耶復何敢怨天尤人當深自疚耳每動心於明公者則非可一悲感而已窮居蕭然舍無一物為寄偶尋得書室中聖傳總録若干册聞見善録一册可助常行檢閲唐玄宗御書孝經石刻四拓本紙墨頗佳又青白舊碗各一隻用奉左右聊寓不忘之意不直一嘆耳末由參侍臨書惘惘千萬慎之自愛不備上鶴溪再上鶴溪瓚再拜四月偶過吳淞弗獲上謁不能如約次日即走荒澤又不得詣謝以别惶恐何限爾後欲一奉狀以聞不敏日復一日竟成因循比來不審何似伏惟吉德所臨風俗為厚望進此道寵辱俱忘履候多福僕罪釁所積而我室人亦成長往哀懼哽塞大不可言日月不居奄餘兩月依依故物觸事損心奈何夫以世緣言之悲歎何能有已若以法眼觀之則我此身成大無有此宗少文所以三復至教方能遣哀耳襄事粗畢大山長林之思此心已羣於鹿豕間矣如何兹因令嗣德機徴君趨侍輒狀白承動靜恐欲知僕近況遂并及之末由趨侍臨楮無任瞻依歲事峥嶸所冀為道自重不備瓚再拜又覆鶴溪瓚再拜前日打破慳囊令人不安雖然赤子所願固不深以為憂耳真人碑昨日改定數語且未可即寫尚有少議頃回以既不宣上允同瓚啓去秋獲一聚首深慰悶懷不意復還里第而羣寇未息官府事繁山林飢寒往而不返似未為都無所見也近知移家暫住余宅與僕南渚相去甚邇良用慰愜九月草六日欲與潘翁共載詣謁恐舍館未定故不敢到長至前後當專造也兹先走一力上問乍冷伏惟履候多福令伯環慶丈人令叔子明司丞天民先生賢父子想皆安勝亦不知尚留何許力還希回示數字以慰懇切謹上承動靜不宣瓚頓首錦雞一雙鱖魚二尾漫上瓚再行忽然再病江渚歸復兼旬藉庇雖已獲安氣尤未復耳因偶出行李中乏香燒用髙齋雜香零碎者求少許燒置卧內以淨穢氣由是求懇倘無則已不須芥蒂也謹咨啓不具倘令壻歸乞為告鄭重意連日憒憒獨坐無聊三月一日忽然開雲風景固佳而悽悽有念舊思賢之感因成此詩詠歌無已涕泣沾襟而吾德機徴君離隔在百里不得與之周旋即寫此詩以寄當亦為我惻然也彛齋髙士賢父子彥衡賢良與謙廣文雅集次第為道瞻企也彥衡齋閣中有好香為須少許彛齋髙士雖有之而靳惜如金僕數日中入城亦欲一往謝而未敢必彥衡君酒量無敵是所畏也比來想佳望不為酒困耳匆匆不具橘忩伯昻想日有宴談之樂冀道問訊瓚適往謁值從者不在而還近乏墨用寓所必賸吾宜興墨能分惠一珽不可則已去年往寄所附欲爇小餅是潔香作供想已忘之矣一笑瓚上承桐露兄見還銅佛像深感至意旦夕致一佳物少答厚情矣此蓋祖師像非班卜佛像也未寄至時深怪銅佛像在新已西照堂房內那緣得在水中已而果非也辱彛齋先生寄馬脯乾魚尤餘盛心瀼西草堂專待理宗兄至何遂杳然耶三月十二日早行不獲候别賢翁壻乘興往謁明成兄十三日過江渚而介石君待僕之歸二日矣承厪專信教墨與羊羫酒榼俱至物豐意厚拜賜之辱因與介石君厭飲信宿還輒成五言一首以道謝私并致謝彥衡親契也舊陸筆三枝頗可用謹附上比欲費吳潔小餅作供恐忘之矣二月蓋舟楫必能踐約一來江渚也瓚近辱見過寓所窮居荒落不能具雞黍之奉愧悚何限别來匆匆兼旬觴詠殊劇仲夏未暄不審復何似伏計履候多福瓚獲交於髙門幾二十年矣深愧迂繆不能與世俯仰但受知賢父子則深耳英嗣得壻於陸氏非止齋則不可成止齋之推精察詳雖瓠齋往返數數止齋猶不能決然為準瓚於斯時適宴溪上目見其周折而瓚又深知宫門禮義之素且承賢父子見囑令具書於止齋瓚敢靳於言乎言之諄諄因定議於止齋之手乃成婚於其捐館之後今兹英嗣夫婦父母之間益怡然無間言寧非止齋之德是亦天之造古人所謂有德於我者背之不祥豈虛言哉閣下使英嗣所托但不忘止齋足矣於不肖何與焉兹乃辱盛德惠羊羫珍果精縑酒器瓚何謂而當此也古人取與辭受之間不可徇俗而違禮也苟辭受不當於義是亦不能固窮所謂窮斯濫矣瓚非主婚之親尊又非婚妁之女媒乃妄加盛禮於不肖甚無謂也非獨不肖取譏於識者於閣下盛譽亦有少損焉耳塵坌汩汩遂羈賜多日不能即全璧以歸悚恐而已兹謹以還歸於下執事幸留置之倘不以不肖之言為誠而再遺斷不敢拜賜之辱徒勞往返耳瓚非壟斷者也切冀體悉倘能借我蓮葉硯試用數日則足矣亦非敢乾沒為鼠竊之事只欲與小齋一二硯比試髙下耳能信此言即付去人來幸甚令壻彥衡文學以才賢良雅集併為道瞻企之思亦以鄙意咨之二公當蒙首肯也以中兄要乃翁老先生畫像并要不肖詩畫此月望前後寄上數日來意思憒憒大不佳略無清思畫像亦留南渚未曽取出耳允同初四日挈家過丘生家間乞知及尚阻郵傳臨書增感所冀加愛以慰懷思不備瓚漫浪之迹放蕩於江湖之上雖時時往返錢唐苕霅出入城府翺逰縉紳間聞知動靜之詳意不得奉一字為慊耳極念不審復何似想惟履候多福賢郎姻事將有成期可賀可賀此一姻事執事但知潘瓠齋往返周旋之力殊不知賤者一書之功此時非賤者之出徐止齋小婆媽皆斷斷不肯執事可密為打聽不必問之瓠齋便可知其的實姻事將成之際雖以嶽氏蓮葉硯松雪之玉水滴相酬亦不足為凂也如何因便附此上問且以發執事一笑此亦飲水知源之義也便中希還數字不備良常草堂先生會文告致意趙正書未曽勾疏旦晚入城來面取之也瓚拜瓚啓隔日不面隂雨悵悵懸情比復何如已遷耶抑吉日尚未屆也可否謹馳聞不一一瓚再拜鵝一隻夏果尊酒聊為遷喬之慶輕瀆悚愧可冀留幸留幸瓚再拜昨日以桔蘖二種及庾兄枉顧深見髙義不薄銘刻之兹因便風及子真送藥輒附數字上謝九經十七史果肯與人乞於十七史內付四五册九經全付至并問價寫示價却不可太大徒勞力耳否則已之館舍溫筆乞取一枝絶佳者封至幸甚謹奉字匆匆不具瓚比承下顧欣慰欣慰繆藁曽寫出否如寫畢乞付尊染來桃竹杖曽對賢長公説否匆匆不具瓚再拜比聞中疾暴瀉勢已平復謹此致問欲往見足腫未全差耳雅山卷繆為二小詩煩染翰墨一書并小引望割去塗竄者拈合并求佳製一首長短隨意近賦得二三詩粗有興味倘體中已無恙明日來共觀之也雨濕憒憒頗覺難堪謹啓不宣瓚頓首再拜比辱枉顧喜慰無已云喻五月內之約必能踐魏文之期獵也兩日不面想尊候多福林提舉已來未耶伯氏體中當遂平復也老溫遣其子以新製筆來特神妙於常者不敢獨擅其妙用分之前如希言允同公堇不在宅先生為各留三二貼償其所直以遣之幸甚亦不負所舉也若使之空返則僕深有愧於彼矣惟加意焉謹咨啓不具瓚再拜昨日乃知再楫入城移居沈氏猶可賀也比聞説城中賣書王老者有碧箋上打辨陽老人自銘石刻得為應錢買至幸幸物到即還元直或五或十更好向開府不較耳更乞問王老此刻誰與書者六磚帖帶來一觀切祝相見不逺所冀加珍不宣瓚啓九日欲屈從者奉萸酒一巵知為他人所先遂不果也十日辱手帖餉以吳淞四腮鱸益重感盛情領登當面謝以盡昨晚因從善奉謁而從者尚未還寓也不具瓚比獲邂逅一見賢叔姪真若隔世也為之惻然者久之數欲復來瀼西草堂何意杳然不聞拿舟音耶聞桐露君獲於水池中洮石班卜佛二件能以其一全歸乃盡古義非流俗比也然亦以元價奉還不知賢主以此言為然否謹干瀆不具瓚再拜夜來獲聚首言笑之樂經宿不面想履候平善也漢鑑書中有一紙草稿恐在葉內篷上雨潺潺幸一檢附至無則已并書院中書几上有貞居寫夷則宫雪獅兒二詞後有賤子寫滿江紅未了則在彼乞付至撿本寫足付去不在此則已草草得罪計草七帖後一帖曩時於李兵部先生借録别紙恐遺失乃聚於此本云雲林畫竹樹秀石杜東原所藏今歸朱世民斷劔故留碧鉛刀終有神坡陀歲寒色不似醉時真饒介喬木千章髙出雲幽篁幾箇石嶙峋平生丘壑真成癖莫怪烏藤來往頻于思緝蒼然古木石岩幽移得江南一段秋共説卿君知籀法數竿瀟灑更風流髙巽志木落秋吟夜露翻山空無人石榻寒不似君家子午谷雲旗晝下玄都壇唐肅雲林之樹森如玉春雨琅玕長更多使我臨風重懷想幽篁佳木共婆娑薛毅夫流光冉冉逐驚波文物空存晉永和遼寉重尋舊城郭當時風致已無多王璲長憶山中舊草廬蒼崖古木共扶踈今朝偶爾看圖畫便擬身同木石居東陽陳允明支機靈石墜星河夜半虹光發澗阿憶在栖神山下宿幽篁佳木共婆娑張簡清閟當年風度雲林此日襟期每向詩中見畫今於畫裏觀詩盧充賴三春雷雨蒼龍角萬里雲霄翠鳯毛怪得君家圖畫裏虛忩涼月夜蕭騷全詮雲林竹史明古鈔寄廣平舊作梅花賦鐵石心腸嫵媚辭髙士巖前清賞足月明竹外寫橫枝笠澤莊頭道士家書林風竹翠交加新梢便有凌雲勢髙出牆簷掃落花張簡燦燦碧玉枝託根在崑崙日出四海靜影拂青雲端君王愛直節樹之黃金門花繁實且多待以慰青鸞永嘉文信海上琅玕碧玉枝紛紛蒼雪帶雲飛仙人拾得青鸞尾裁作朝元翠羽衣本初雲林寫竹與梅岩自比清貧太守饞蒼翠滿庭聲似玉一枝先喜出松杉薊丘李繹涼隂一片在灣崎墨卷蒼龍起硯池記得月明江上見秋風吹折玉蘭枝如一道人清閟閣前煙雨春梅花岩裏玉生塵老懷不聽東里曲却剪橫枝贈野人嘉陵楊基風葉暗秋林煙梢帶夕隂美人離思逺湘水夜來深吳郡謝徽雲林不作桃花賦能為梅巖寫竹枝雨過粉香渾欲濕月明清影似曽移靜臨童子敲茶臼隱接吾家洗硯池日暮天寒倚亭翠絶勝雉尾露宫墀席帽山人王逄瑟瑟清風響翠濤青鸞飛影下亭皋何人吹斷參差玉滿地月明金錯刀鐵笛道人堂上娟娟竹翛然悟淡遊南風時隱几不復夢洋州卧龍山民王宥我愛雲林竹繞池繁隂映水緑漪漪十年不到蕭間館却寫秋煙慰所思周彛秋思與秋聲間齋助夕清幽人夢回處煙鳥月中明髙啓美人華翠裾步入虛堂裏月落聽秋聲憶在湘江水葛蒙尺牘瓚啓不審復何似想惟體中清勝行元博士近有信來家否聞體中少不佳比當平復也不得往候懸情而已聞執事説新收得庾子山詩集在州郭時欲借以示僕不暇兹專一力至左右千萬暫借一覽執事近與僕情同骨肉諒不托故靳而不借也僕亦不敢乾沒之不必過慮蓋以窮措大細事多曲謹遇大事多迂逺故云耳如何村居枇杷數樹盡熟爛然如金彈然食之頗不美趙子昻詩云貧家自歎無金彈數樹枇杷俱不生之句余乃賦一詩云踈踈桐雨橘花香寂寂桐隂硯席涼怪底枝頭金彈子枇杷盡熟不堪嘗并寫上一笑瓚再行此帖并前共草八帖飲飛雲樓作松石圖因題公子池館淨雨晴生緑苔孤琴候蘿徑濁酒泛春杯鈎簾待素月庭宇無纎埃誰知長松下自有清風來倪瓚展圖似有風蕭颯六月髙堂舞壑龍頭角空騰青獬豸爪髯雄據玉芙蓉杜陵善賦韋侯畫秦相能要泰華封著我避塵泉石裏看雲惟賴一枝笻甬東邉封題諸葛宗道五大夫圖于清溪之九曲亭近見邉封草書四帖從鮮于氏書法有霜鶴堂印文見此詩為録云王汝璋詩見青崖集寄席心齋老子心齋與世違山中春雨藥苗肥騎將鶴去身俱瘦鍊得丹成骨自飛青簡風雷行祕籙紫綃雲霧出仙衣明年海上金桃熟并就安期作伴歸答心齋席鍊師二首山色搖春發翠妍慿軒把酒答流年自知原憲貧非病人謂陶潛醉會眠壇植百花香白日天開一鳥入青煙席謙已作東遊想紫氣看從海上先西林谷口羣仙宅青髮蕭蕭古逸民驗過神丹專奉母著成真誥必傳人愛山不下烏皮几留客先除白葛巾門外松花如可服豈無方術為輕身重寄心齋西北髙峯秀可拈青蓮一朵立纎纎種來仙李如瓶大煮得春醪似蜜甜鄭老書題常在手信公詩句好掀髯相過為問長生理雲笈今開第幾籖送席心齋住白鶴觀二首我愛仙人葛稚川又騎白鶴入蒼煙四山瑤草日應長千樹碧桃春可憐劔氣吐虹晴射斗丹光如火夜通天姑蘇城下相尋日種子還成玉作田闔閭城東日寶觀道紀堂前席鍊師芝草滿山都是藥琅玕繞屋遍題詩乾坤一粒空中黍歲月千年石上碁棗大如瓜還未熟明朝我欲訪安期又送心齋住白鶴觀二首昔在鴻山遇席謙長松薄雪下飛簷道歸玉石心逾達詩到珠宫律更嚴鸞版晝鳴雲擁座龍文夜誦月窺簾應思慈母營甘旨春雨園林笋露尖鶴舞橋邉白鶴飛真人猶憶趙知微新官特賜黃金榜上服還披紫玉衣仙觀樓臺春寂寂道山花木晝暉暉學仙千載歸來后城郭蕭條事已非寄席心齋辛苦臞仙愛讀書饘酏常足為親娛時人不得輕毛義當世焉知有伯俞興動南湖晴泛鷁情饒北里晚飛鳬春來準擬攜琴問松下相看比白鬚又寄席鍊師雁杳魚沈久寂寥漫思鳬舄候王喬寄詩松下見君否載酒山中知路遙步月娟娟長照屋天風歷歷自吹瓢想應别後身強健春雨年年長藥苗寄佑聖道院席心齋五雲飛搆擬蓬萊夜夜丹光照上台月出蛟龍環劍佩笙鳴鸞鳯集樓臺玄經自寫黃庭字緑酒誰同紫玉杯江國已成三載别不慿青鳥一書來陳文度詩朝真宫夜陪席鍊師蘿徑掩空扉炎塵逐雨歸山明餘月在草暗一螢飛姹女鸞和馭真仙鶴羽衣焚香與默坐初悟幻情非答席鍊師朱墨守蓬忩何年望省郎允憐遺鶴伴多愧亞鴛行知事宵無寐交情日漸忘來書因置篋一看一回腸二月八日重逰靈應奉簡席鍊師昔曽避亂久相依今日重來却似歸客意欲隨春北去雁聲猶帶雪南飛已多中國栖荆棘不獨陽山死蕨薇倘向赤松方外住願陪鶴從莫相違得席鍊師詩一首近聞鄉舊盡凋殘君老常懷孰與安喜見新詩俱小楷眼明必定尚加餐過獅林精舍清境超塵俗松龕映竹開魚驚幡影散鳥聽鉢聲來梵像敷蓮座禪宗問木杯山僧不慮世白髮也毰毸雨後過獅林精舍當曉一鶯鳴林收宿雨晴網殘蟲脫罥蜂閙蜜催成梅氣袈裟潤香花佛座清回廊僧不見看壁自吟行海虞席先生墓銘席氏之系出於晉大夫籍談之後裔孫瓌避楚項羽之名改籍為席漢唐以來其族漸蕃散落諸郡及宋有諱汶言者官至尚書司封郎中致仕與文潞公富鄭公輩為耆英會席氏至尚書公始著先生實出其後父某大父某曽大父某俱潛德弗振世居海虞故先生為海虞人也先生名應珍字心齋年未冠即辭庭闈入鄉之某院從某習老子法先生性端誠好學不苟略於真經祕籙醮章丹法靡不洞究兼讀儒者書於易尤邃至於釋氏之大法術家之小道悉能通焉先生孝於母滫瀡溫清之奉勿少怠死葬如禮春秋祀享其痛泣若新喪或謂之曰先生親愛既割矣何得徇世禮若是之過耶先生曰吾法當割愛入道然世間豈有不孝之神仙也哉於是或可其言先生友于兄弟睦於宗戚和於鄉黨接物之際溫溫如春風襲人故髯丈髫童皆知敬愛先生始出則提點海虞之某觀次遷蘇之白鶴桐川之靈應皆有治績惟靈應一坐二十餘稔兵後能中興其業人咸譽之也嗚呼先生習其教而弗沈也故能博究儒釋諸家之書割其愛而弗固也故能奉於親盡生事葬祭之禮潔其身而弗我也豈非古之有道之士者歟先生老夀八十有一號子陽子洪武十四年三月十日以疾卒火既化函其骨葬於某山之原弟子陳某陸嗣源嗣源先生之外孫也同郡沙門道衍與先生為忘形友故敢掇其梗槩以志於墓銘曰席之昔晉談出避項諱籍作席子姓蕃宗德積尚書公氏惟赫惟先生裔乃的從黃老弗沈溺究諸子貫儒釋了至道邃於易奉厥親敬匪色葬與祭痛而泣致孝聞震里域和爾鄉睦爾戚觀領三夀八十歲辛酉疾乃卒化於火函其骨卜某山竟窀穸衍作銘勒貞石俾玄風遺無極姚廣孝鄧善之詩送劉時中還括蒼兼寄洪中行洪郎不來魚雁稀君今歲暮告我歸故人青燈山水屋逰子白首風霜衣時俗俯仰妨道性聖哲出處存真機東還石門對飛瀑卧看寒月投忩扉題子昻馬奔騰駿骨雲路長蕭灑神鬃風露涼沙場春牧草肥雨野徼秋嘶楓隕霜三山戰士黃金甲五陵俠客紅絲韁朝羈暮絡只愁斷華山煙樹遙蒼蒼題林彥文詩卷送南歸東周離黍先亡雅南楚崇蘭又變騷上下漢唐觀體製古今李杜擅雄豪青林晚日鳴雙鳥碧海秋風釣六鰲白髮詩翁會天趣吳山一笑返輕舠倪瓚詩留别虞勝伯清才卓行虞徴士食粥三年致母喪詩法道園能繼武畫傳洪谷早升堂獨髙落落松筠節不逐悠悠雁鶩行此日别君江海去波光鷗影思微茫題勝伯仙臺髙士圖仙臺有髙士聞在最髙峯濯足五湖水結巢千歲松霞扉雲扄不可到落花如雪絲吹濛醉顔生酡目瞳瞳飛花蹴踏金芙蓉絳綃為裳玉鍊容往來倐忽其猶龍伊誰貌此世外蹤青城山人仙中翁運筆直與天同功倪生作詩以咏歎凌跨倒影它日期相從題陳惟允畫六言罨畫溪頭喚渡銅官山下尋僧水榭汀橋曲曲風林雲磴層層題畫僦得城東三畝居水光竹色照琴書晨起開門驚宿鳥詩成洗硯沒逰魚右抄有竹莊所藏吳傅朋逰絲書卷玉鳯凌秋桂花渚漢女繅雲不成縷齊州月曉金氣涼不如崇岡泛晴光晴空淡白風力小落花飛絮隨飛揚二十八宿羅空碧長毫睒光密如織同心百結映天回誰把量春金粟尺西河仙客飛上天欲綰輕痕苦無力安陽韓性瀛國魏夫人虞美人草歌紹興乙卯七月二十八日吳傅朋為沈守約書鴻門玉斗紛如雪十萬降兵夜流血咸陽宫殿三月紅霸業已隨煙燼滅隂陵失道非天亡剛強必死仁義王英雄本學萬人敵安用慘戚悲紅粧三軍散盡旌旗倒玉帳佳人坐中老香魂先逐劍花飛新血化為原上草芳心寂寞寄寒枝舊曲聞之似斂睂怨悒裴徊愁不語恰如初聽楚歌時清魂杳杳今誰主玉骨他年恥為土會當移植漢王宫更伴尊前戚姬舞南豐諸曽與王廣陵為文字交吳紫溪實廣陵之外孫於曾氏有素則此詩為文肅夫人所作無疑噫熙寧之逄迎建中之調停夫人獨無一語諫其夫而且倚聲㺯筆尚論漢髙之戚姬何耶前輩嘗言婦人與知文墨非美事殆有深意然曽氏子孫空青艇齋世傳江西之燈閫庭淵懿有自來矣紫溪自謂筆法得栁半葉體不知此語何所自豈與魯公屋漏法相類然不可強解也袁桷題題易安室唐子易安室怡然容膝寬披圖聊諷詠跬步足逰觀魚泳波光碧鳥飛山影寒猶嗤陶學士煮雪一生酸倪瓚柬徐季章問疾趙思式本滄浪之水春增波居鄰學宫愛伶歌文室談諧已無病書閣校讐寧有訛人來石井寄新茗夢入鑑湖披緑蓑我思君子亦覯止江花未落還相過倪瓚謝璚樹詩序詩亡而為騷為五言吟詠得性情之正者其惟淵明乎韋栁沖淡蕭散皆得陶之旨趣下此則王摩詰矣何則富麗窮苦之詞易工幽深間逺之語難造至若李杜韓蘇固已烜赫焜煌出入今古踰前而絶後陶其性情有正始之餘遺風則間然矣延陵謝君璚樹居亂世而有怡愈之色隱居教授以樂其志家無瓶粟歌詩不為愁苦無聊之言染翰吐辭必陶韋為準則己酉春攜所賦詩若干首示余於空谷無足音之地余為諷詠永日飯瓦釡之粥麋曝茅簷之初日怡然不知有甲兵之塵形體之纍也余疑璚樹為有道者非歟其得之於義熙者多矣遂為之序倪瓚初夏寄倪元鎮抄集中溪上夜來雨青林密如霧日出檜柏香沙靜鳬鷖聚野夫抱琴出喜與樵者遇黃鳥時一鳴緑隂已無數緩帶受回風席帽沾落絮感物發長謠放懷飲清酤胡為勞其生終歲牽百慮願言廬霍期逍遙共遲暮揭曼碩小僕鄒福頗能作詩是時諸名流皆有所贈福也事人初不切學詩習字欲自别不似南鄰守令兒輕裘肥馬通關節宋褧題鄒福詩後右鄒福詩七首鄒福者吾鄉田夫之子也粗讀孝經論語家貧與人傭耕泰定元年豫居憂於家其父遣從豫給薪水之勞然暇則密自觀書居五年豫攜至京師會新天子入正大統以文德治天下明年春開奎章閣詔延儒雅講論道德置授經郎以教勳舊大臣子弟之在左右者以國子教授廬陵林希顔及余為之寅入而酉出令福守舍以盡日閉門讀書習字間為小詩及暮則請可否於余余或方倦欲休或方讀書有會意處或執筆為文章思方屬必輟而告之不使幾微見豫懈怠意遂以為常今年秋遷丞藝文日簡靜無事請問之時益富矣余適墜馬在告日卧齋閣福連有所作皆可觀余因取其法度音節尤近者得七首為書之仍題其後以志豫喜且以為世之世臣大家學士大夫之子弟不知學者之勸余在閣中時福又從林希顔學國書希顔極稱其可教其所得淺深豫不能知也要亦好上者云爾余數年於文事使令蓋深得其助焉因并識於此揭曼碩珊瑚木難卷六
